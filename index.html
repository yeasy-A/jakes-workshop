<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f0e6d6" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Workshop" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Jake&#39;s Workshop" />
<meta property="og:title" content="Jake's Workshop" />
<meta property="og:description" content="Little apps & games I've built — tap one to play." />
<meta property="og:image" content="og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Jake's Workshop" />
<meta name="twitter:description" content="Little apps & games I've built — tap one to play." />
<meta name="twitter:image" content="og.png" />
<title>Jake's Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f0e6d6;--paper-2:#fbf5ea;--card:#fffaf1;--ink:#231d16;--ink-soft:#6c6052;--line:#d8c9b3;--accent:#ec5a23;
    --shadow:0 18px 34px -22px rgba(60,40,20,.6),0 4px 10px -6px rgba(60,40,20,.16),inset 0 1px 0 rgba(255,255,255,.7)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(820px 360px at 50% -130px,rgba(236,90,35,.13),transparent 70%),
      radial-gradient(circle at 1px 1px,rgba(120,90,50,.10) 1px,transparent 0) 0 0/22px 22px,
      linear-gradient(160deg,var(--paper),#e7dac6);
    background-attachment:fixed;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:calc(38px + env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom))}
  header{text-align:center;margin-bottom:24px}
  header .mk{width:74px;height:74px;margin:0 auto 13px;border-radius:21px;display:grid;place-items:center;font-size:40px;
    background:radial-gradient(circle at 32% 26%,#fffaf1,#ffd6a3 58%,var(--accent));
    box-shadow:0 16px 30px -14px rgba(236,90,35,.6),inset 0 2px 0 rgba(255,255,255,.6)}
  header h1{font-size:31px;letter-spacing:-1px;margin:2px 0 5px;font-weight:700}
  header p{color:var(--ink-soft);margin:0 auto;font-size:15px;max-width:33ch;line-height:1.4}
  #list{display:flex;flex-direction:column;gap:13px}
  a.app{position:relative;display:flex;align-items:center;gap:15px;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px;overflow:hidden;
    transition:transform .15s cubic-bezier(.2,.8,.2,1),box-shadow .15s;
    opacity:0;transform:translateY(11px);animation:rise .5s cubic-bezier(.2,.8,.2,1) forwards}
  a.app::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--a,var(--accent));opacity:.9}
  @media (hover:hover){a.app:hover{transform:translateY(-3px);box-shadow:0 28px 46px -24px rgba(60,40,20,.72),0 7px 16px -9px rgba(60,40,20,.24)}
    a.app:hover .go{transform:translateX(3px)}}
  a.app:active{transform:translateY(0) scale(.992)}
  a.app .ico{font-size:36px;flex:0 0 auto;width:58px;height:58px;display:grid;place-items:center;border-radius:15px;
    background:radial-gradient(circle at 30% 24%,#fff,color-mix(in srgb,var(--a,var(--accent)) 15%,var(--paper-2)));
    border:1px solid color-mix(in srgb,var(--a,var(--accent)) 30%,var(--line));box-shadow:inset 0 1px 0 rgba(255,255,255,.75)}
  a.app .meta{flex:1;min-width:0}
  a.app .meta .nm{font-weight:700;font-size:18.5px;letter-spacing:-.2px}
  a.app .meta .bl{color:var(--ink-soft);font-size:13px;margin-top:3px;line-height:1.4}
  a.app .go{flex:0 0 auto;width:30px;height:30px;display:grid;place-items:center;border-radius:50%;font-size:16px;font-weight:700;
    color:var(--a,var(--accent));background:color-mix(in srgb,var(--a,var(--accent)) 13%,transparent);transition:transform .15s}
  a.app.soon{opacity:.55;pointer-events:none}
  .soonpill{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:2px 9px;align-self:flex-start}
  footer{text-align:center;color:var(--ink-soft);font-size:12.5px;margin-top:22px;line-height:1.6}
  footer .wm{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--ink);opacity:.72;margin-bottom:5px}
  @keyframes rise{to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){a.app{animation:none;opacity:1;transform:none}*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mk">🧰</div>
    <h1>Jake's Workshop</h1>
    <p>Little apps &amp; games I've built — tap one to play.</p>
  </header>
  <div id="list"></div>
  <footer><span class="wm">🧰 Jake's Workshop</span><br>Free · no sign-up · works on your phone.<br>Your progress saves on your own device.</footer>
</div>
<script>
  // Add an app: drop its folder next to this file and add a line here.
  const APPS = [
    {dir:"sparks/", ico:"⚡", a:"#ec5a23", nm:"Sparks", bl:"Ten quick brain games — creativity, word links, patterns, symbols, rhyme, plus working-memory, focus & flexibility trainers."},
    {dir:"patternmap/", ico:"🗺️", a:"#5f86d6", nm:"PatternMap", bl:"An interactive map of the patterns & typology woven through Scripture — explore how the Bible connects to itself."},
    {dir:"faith/", ico:"✝️", a:"#8a6fc0", nm:"Faith", bl:"A Catholic companion — Daily Examen, the Rosary with today's mysteries, the Divine Mercy Chaplet, plus a Verse & Saint of the day."},
    {dir:"va/", ico:"🎖️", a:"#c9972e", nm:"VA Toolkit", bl:"VA combined-rating calculator (real 'VA math,' with the bilateral factor), a claims checklist, and a benefits reference for veterans."},
    {dir:"veteran-finder/", ico:"🧭", a:"#5a6535", nm:"Veteran Finder", bl:"Find the nonprofits that can help veterans & families — search by need, era, and keyword, or answer four questions for a matched shortlist."},
    {dir:"jobs/", ico:"⚓", a:"#3a4a63", nm:"Billet", bl:"An AI job-hunt console — harvests real listings, filters them by a geo/remote compass, scores fit & joy, then swipes keep/kill. What's here is a live showcase of a real run; copy it to run your own, on your own Claude subscription."},
    {dir:"tongues/", ico:"💬", a:"#e2934a", nm:"Tongues", bl:"A real Spanish A1 unit — Saludos y presentaciones — fully playable with real audio and spaced review, built with the Curriculum Forge pipeline. No account, no login — your progress stays only in this browser, nothing is sent anywhere."},
    {dir:"boilerplate/", ico:"⚙️", a:"#b8733a", nm:"Boilerplate", bl:"A prompt engine — prefab prompts forged from real mistakes. Pick one, bolt it onto your query, copy the finished line straight to your terminal."},
    {dir:"spinner/", ico:"🎡", a:"#1aa088", nm:"Decision Spinner", bl:"A wheel of names — type in options, spin, and let it pick. Settles 'who does the dishes' and 'where do we eat.'"},
  ];
  document.getElementById("list").innerHTML = APPS.map((a,i)=>
    `<a class="app${a.soon?' soon':''}" href="${a.soon?'#':a.dir}" style="--a:${a.a};animation-delay:${i*60}ms">
       <div class="ico">${a.ico}</div>
       <div class="meta"><div class="nm">${a.nm}</div><div class="bl">${a.bl}</div>${a.soon?'<span class="soonpill">SOON</span>':''}</div>
       ${a.soon?'':'<div class="go">→</div>'}
     </a>`).join("");
</script>
</body>
</html>

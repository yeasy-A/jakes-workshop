<style>
  :root{--bg:#141b33;--bg2:#1b2444;--card:#212c52;--ink:#eef1fb;--soft:#a8b2d6;--line:#33406e;--gold:#e7c46a;--gold-d:#caa14a;--rose:#c98aa6}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);background:radial-gradient(ellipse at 50% -10%,#26305a 0%,#141b33 60%);min-height:100%;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Lora",Georgia,serif}
  .wrap{max-width:560px;margin:0 auto;padding:16px 18px calc(34px + env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .home{border:1px solid var(--line);background:var(--card);width:40px;height:40px;border-radius:12px;display:grid;place-items:center;text-decoration:none;font-size:18px;color:var(--ink);cursor:pointer}
  header h1{font-size:22px;margin:0;letter-spacing:.5px}
  header .date{margin-left:auto;font-size:12.5px;color:var(--soft);text-align:right;line-height:1.3}
  .screen{display:none;animation:f .3s ease}.screen.on{display:block}
  @keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 10px 30px -18px rgba(0,0,0,.7)}
  .lbl{font-size:11px;letter-spacing:2px;color:var(--gold);font-weight:600}
  .verse{font-size:20px;line-height:1.45;margin:10px 0 8px}
  .ref{color:var(--gold);font-weight:600;font-size:14px}
  .saint .nm{font-size:21px;margin:8px 0 2px}
  .saint .feast{font-size:12px;color:var(--soft);letter-spacing:1px}
  .saint .bl{color:var(--soft);font-size:14.5px;line-height:1.5;margin-top:8px}
  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;transition:transform .07s}
  .tile:active{transform:translateY(2px)}
  .tile .i{font-size:30px}.tile .n{font-size:13px;font-weight:600;margin-top:6px}
  .backrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .back{border:1px solid var(--line);background:var(--card);border-radius:11px;width:38px;height:38px;font-size:17px;color:var(--ink);cursor:pointer}
  .backrow h2{font-size:19px;margin:0}
  /* prayer walk */
  .walk{text-align:center}
  .progress{font-size:12px;letter-spacing:1.5px;color:var(--gold);margin:4px 0 2px}
  .beads{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:10px 0 4px;max-width:340px;margin-left:auto;margin-right:auto}
  .bead{width:9px;height:9px;border-radius:50%;background:var(--line)}.bead.on{background:var(--gold)}.bead.cur{background:var(--rose);transform:scale(1.4)}
  .pray-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px 20px;margin:14px 0;min-height:220px;display:flex;flex-direction:column;justify-content:center}
  .pray-lbl{font-size:13px;letter-spacing:2px;color:var(--gold);font-weight:600;margin-bottom:4px}
  .pray-sub{color:var(--rose);font-size:14px;margin-bottom:12px;font-style:italic}
  .pray-text{font-size:19px;line-height:1.6}
  .nav{display:flex;gap:10px}
  .nav .b{flex:1;border:1.5px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:14px;padding:16px;font:inherit;font-weight:700;font-size:16px;cursor:pointer}
  .nav .b.next{flex:2;background:var(--gold);color:#241a05;border-color:var(--gold)}
  .nav .b:active{transform:translateY(1px)}
  /* examen */
  .dots{display:flex;gap:7px;justify-content:center;margin:8px 0 14px}
  .dots .d{width:9px;height:9px;border-radius:50%;background:var(--line)}.dots .d.on{background:var(--gold)}
  .ex-step{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 20px;margin-bottom:14px;min-height:230px}
  .ex-step .n{font-size:12px;letter-spacing:2px;color:var(--gold);font-weight:600}
  .ex-step h3{font-size:24px;margin:8px 0 12px}
  .ex-step p{font-size:17px;line-height:1.6;color:var(--ink)}
  .ex-step .scr{margin-top:14px;color:var(--soft);font-size:14.5px;font-style:italic;line-height:1.5}
  .center{text-align:center;color:var(--soft);font-size:14px;line-height:1.6;padding:20px}
  /* tiles: 2x2, depth, lift */
  .tiles{grid-template-columns:1fr 1fr}
  .tile{box-shadow:0 12px 28px -20px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.05);transition:transform .15s cubic-bezier(.2,.8,.2,1),box-shadow .15s,border-color .15s}
  .tile .i{filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
  @media(hover:hover){.tile:hover{transform:translateY(-3px);border-color:var(--gold-d);box-shadow:0 20px 36px -18px rgba(0,0,0,.8)}}
  .card{box-shadow:0 12px 32px -20px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.045)}
  /* prayers library */
  .pgroup{margin-bottom:16px}.pgroup .lbl{display:block;margin:0 2px 9px}
  .prow{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:9px;color:var(--ink);font:inherit;font-size:16px;cursor:pointer;transition:transform .12s,border-color .12s;box-shadow:0 9px 24px -20px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.04)}
  .prow .chev{color:var(--gold);font-weight:700;flex:0 0 auto;font-size:15px}
  .prow:active{transform:scale(.99)}
  @media(hover:hover){.prow:hover{border-color:var(--gold-d);transform:translateX(2px)}}
  .back2{border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:11px;padding:10px 15px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:8px}
  .ptitle{font-size:24px;margin:2px 0 14px;color:var(--ink)}
  /* rosary mystery picker */
  .mystpick{display:flex;flex-direction:column;gap:12px}
  .myst{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;color:var(--ink);font:inherit;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;box-shadow:0 11px 26px -19px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.045)}
  .myst:active{transform:scale(.99)}
  @media(hover:hover){.myst:hover{border-color:var(--gold-d);transform:translateY(-2px);box-shadow:0 20px 36px -18px rgba(0,0,0,.8)}}
  .myst .mhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .myst .mname{font-size:18px}
  .myst .today{font-size:10px;letter-spacing:1.5px;font-weight:700;color:#241a05;background:var(--gold);border-radius:999px;padding:2px 9px}
  .myst .mlist{margin:0;padding-left:20px;color:var(--soft);font-size:13.5px;line-height:1.65}
  .myst .mlist li{margin:1px 0}
  /* footer + a11y */
  .suite-foot{text-align:center;color:var(--soft);font-size:12px;opacity:.7;margin-top:22px;letter-spacing:.3px}
  :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:4px}
  @media(prefers-reduced-motion:reduce){.screen{animation:none}*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="home" id="homeBtn" title="Home">✝️</div>
    <h1 class="serif" id="hTitle">Faith</h1>
    <div class="date" id="hDate"></div>
  </header>

  <!-- HOME -->
  <section class="screen on" id="s-home">
    <div class="card">
      <div class="lbl">VERSE OF THE DAY</div>
      <div class="verse serif" id="vText"></div>
      <div class="ref" id="vRef"></div>
    </div>
    <div class="card saint">
      <div class="lbl">SAINT OF THE DAY</div>
      <div class="nm serif" id="sName"></div>
      <div class="feast" id="sFeast"></div>
      <div class="bl" id="sBlurb"></div>
    </div>
    <div class="tiles">
      <div class="tile" data-go="examen"><div class="i">🕊️</div><div class="n">Daily Examen</div></div>
      <div class="tile" data-go="rosary"><div class="i">📿</div><div class="n">Holy Rosary</div></div>
      <div class="tile" data-go="chaplet"><div class="i">🩸</div><div class="n">Divine Mercy</div></div>
      <div class="tile" data-go="prayers"><div class="i">📖</div><div class="n">Prayers</div></div>
    </div>
  </section>

  <!-- EXAMEN -->
  <section class="screen" id="s-examen">
    <div class="backrow"><button class="back" data-home>←</button><h2 class="serif">Daily Examen</h2></div>
    <div class="dots" id="exDots"></div>
    <div class="ex-step" id="exStep"></div>
    <div class="nav"><button class="b" id="exBack">Back</button><button class="b next" id="exNext">Next</button></div>
  </section>

  <!-- WALK (rosary + chaplet share) -->
  <section class="screen" id="s-walk">
    <div class="backrow"><button class="back" data-home>←</button><h2 class="serif" id="walkTitle">Rosary</h2></div>
    <div class="walk">
      <div class="progress" id="walkProg"></div>
      <div class="beads" id="walkBeads"></div>
      <div class="pray-card">
        <div class="pray-lbl" id="prayLbl"></div>
        <div class="pray-sub" id="praySub" style="display:none"></div>
        <div class="pray-text serif" id="prayText"></div>
      </div>
      <div class="nav"><button class="b" id="walkBack">Back</button><button class="b next" id="walkNext">Next bead →</button></div>
    </div>
  </section>

  <!-- ROSARY MYSTERY PICKER -->
  <section class="screen" id="s-pick">
    <div class="backrow"><button class="back" data-home>←</button><h2 class="serif">Holy Rosary</h2></div>
    <p class="center" style="padding:2px 4px 14px">Choose a set of mysteries to pray. Today's set is marked.</p>
    <div class="mystpick" id="mystPick"></div>
  </section>

  <!-- PRAYERS LIBRARY -->
  <section class="screen" id="s-prayers">
    <div class="backrow"><button class="back" data-home>←</button><h2 class="serif">Prayers</h2></div>
    <div id="prayersList"></div>
    <div id="prayerRead" style="display:none"></div>
  </section>

  <div class="suite-foot">🧰 Jake's Workshop</div>
</div>

/* ---------- prayers ---------- */
const P={
cross:"In the name of the Father, and of the Son, and of the Holy Spirit. Amen.",

{g:"Everyday",title:"Hail Mary",text:P.hail},
{g:"Everyday",title:"Glory Be",text:P.glory},
{g:"Everyday",title:"Apostles' Creed",text:P.creed},
{g:"Everyday",title:"Act of Contrition",text:"O my God, I am heartily sorry for having offended Thee, and I detest all my sins because of Thy just punishments, but most of all because they offend Thee, my God, who art all good and deserving of all my love. I firmly resolve, with the help of Thy grace, to sin no more and to avoid the near occasions of sin. Amen."},
{g:"Everyday",title:"Morning Offering",text:"O Jesus, through the Immaculate Heart of Mary, I offer You my prayers, works, joys, and sufferings of this day, in union with the Holy Sacrifice of the Mass throughout the world. I offer them for all the intentions of Your Sacred Heart: the salvation of souls, reparation for sin, and the reunion of all Christians. Amen."},
{g:"Everyday",title:"Grace Before Meals",text:"Bless us, O Lord, and these Thy gifts, which we are about to receive from Thy bounty, through Christ our Lord. Amen."},
{g:"Everyday",title:"Guardian Angel",text:"Angel of God, my guardian dear, to whom God's love commits me here, ever this day be at my side, to light and guard, to rule and guide. Amen."},
{g:"To Our Lady",title:"Hail, Holy Queen",text:P.salve},
{g:"To Our Lady",title:"The Memorare",text:"Remember, O most gracious Virgin Mary, that never was it known that anyone who fled to thy protection, implored thy help, or sought thy intercession was left unaided. Inspired by this confidence, I fly unto thee, O Virgin of virgins, my Mother; to thee do I come, before thee I stand, sinful and sorrowful. O Mother of the Word Incarnate, despise not my petitions, but in thy mercy hear and answer me. Amen."},
{g:"To Our Lady",title:"The Angelus",text:"V. The Angel of the Lord declared unto Mary.\nR. And she conceived of the Holy Spirit.\n— Hail Mary —\nV. Behold the handmaid of the Lord.\nR. Be it done unto me according to thy word.\n— Hail Mary —\nV. And the Word was made flesh.\nR. And dwelt among us.\n— Hail Mary —\nV. Pray for us, O holy Mother of God.\nR. That we may be made worthy of the promises of Christ.\n\nLet us pray: Pour forth, we beseech Thee, O Lord, Thy grace into our hearts; that we, to whom the Incarnation of Christ Thy Son was made known by the message of an angel, may by His Passion and Cross be brought to the glory of His Resurrection. Through the same Christ our Lord. Amen."},

{g:"Devotions & Protection",title:"Divine Mercy — decade prayers",text:"On the Our Father bead:\nEternal Father, I offer You the Body and Blood, Soul and Divinity of Your dearly beloved Son, Our Lord Jesus Christ, in atonement for our sins and those of the whole world.\n\nOn the ten beads:\nFor the sake of His sorrowful Passion, have mercy on us and on the whole world.\n\nConcluding (×3):\nHoly God, Holy Mighty One, Holy Immortal One, have mercy on us and on the whole world."},

const MYST={
joyful:["The Annunciation","The Visitation","The Nativity","The Presentation in the Temple","The Finding of Jesus in the Temple"],
sorrowful:["The Agony in the Garden","The Scourging at the Pillar","The Crowning with Thorns","The Carrying of the Cross","The Crucifixion"],
glorious:["The Resurrection","The Ascension","The Descent of the Holy Spirit","The Assumption of Mary","The Coronation of Mary"],
luminous:["The Baptism in the Jordan","The Wedding at Cana","The Proclamation of the Kingdom","The Transfiguration","The Institution of the Eucharist"]
};
const ORD=["First","Second","Third","Fourth","Fifth"];
function todaySet(){return [["glorious","Glorious"],["joyful","Joyful"],["sorrowful","Sorrowful"],["glorious","Glorious"],["luminous","Luminous"],["sorrowful","Sorrowful"],["joyful","Joyful"]][now.getDay()];}

function rosarySteps(setKey){
  const [k,name]= setKey ? [setKey, setKey[0].toUpperCase()+setKey.slice(1)] : todaySet();
  const m=MYST[k]; const s=[];
  s.push({l:"Sign of the Cross",t:P.cross});
  s.push({l:"The Apostles' Creed",t:P.creed});
  s.push({l:"Our Father",t:P.our});
  ["faith","hope","charity"].forEach(v=>s.push({l:"Hail Mary — for "+v,t:P.hail}));
  s.push({l:"Glory Be",t:P.glory});
  for(let d=0;d<5;d++){
    s.push({l:ORD[d]+" "+name+" Mystery",sub:m[d],t:"Announce the mystery and pause to picture it. Pray this decade for its fruit."});
    s.push({l:"Our Father",t:P.our});
    for(let h=1;h<=10;h++) s.push({l:"Hail Mary "+h+"/10",sub:m[d],t:P.hail});
    s.push({l:"Glory Be",t:P.glory});
    s.push({l:"Fatima Prayer",t:P.fatima});
  }
  s.push({l:"Hail, Holy Queen",t:P.salve});
  s.push({l:"Sign of the Cross",t:P.cross});
  return {title:name+" Mysteries",steps:s};
}
function chapletSteps(){
  const s=[];
  s.push({l:"Sign of the Cross",t:P.cross});
  s.push({l:"Our Father",t:P.our});
  s.push({l:"Hail Mary",t:P.hail});
  s.push({l:"The Apostles' Creed",t:P.creed});
  for(let d=0;d<5;d++){
    s.push({l:"Eternal Father (decade "+(d+1)+")",t:P.dmEternal});
    for(let h=1;h<=10;h++) s.push({l:"Sorrowful Passion "+h+"/10",t:P.dmPassion});
  }
  s.push({l:"Holy God (×3)",t:P.dmHoly});
  s.push({l:"Closing",t:"Jesus, I trust in You."});
  s.push({l:"Sign of the Cross",t:P.cross});
  return {title:"Chaplet of Divine Mercy",steps:s};
}

/* ---------- prayer walk engine ---------- */
let walk=null,wi=0;
function startWalk(which,setKey){
  walk = which==="rosary"? rosarySteps(setKey) : chapletSteps(); wi=0;
  $("#walkTitle").textContent=walk.title; renderWalk(); go("walk");
}
function renderWalk(){
  const st=walk.steps[wi];
  $("#prayLbl").textContent=st.l;
  const sub=$("#praySub"); if(st.sub){sub.style.display="block";sub.textContent=st.sub;}else sub.style.display="none";
  $("#prayText").textContent=st.t;
  $("#walkProg").textContent="Step "+(wi+1)+" of "+walk.steps.length;
  // beads: show a compact bead row of the whole rosary/chaplet
  const n=walk.steps.length;
  $("#walkBeads").innerHTML=walk.steps.map((_,i)=>`<span class="bead${i<wi?' on':''}${i===wi?' cur':''}"></span>`).join("");
  $("#walkBack").disabled=wi===0; $("#walkNext").textContent = wi>=n-1? "Finish ✓" : "Next bead →";
}
$("#walkNext").onclick=()=>{ if(wi>=walk.steps.length-1){ go("home"); } else { wi++; renderWalk(); window.scrollTo(0,0); } };
$("#walkBack").onclick=()=>{ if(wi>0){wi--;renderWalk();} };

/* ---------- examen ---------- */
const EX=[
["PRESENCE","Be still","Pause. Become aware that God is here with you, right now — closer than your own breath. Take a slow breath and ask the Holy Spirit to walk back through this day with you.","'Be still, and know that I am God.' — Psalm 46:10"],
["GRATITUDE","Give thanks","Look back over your day and notice the gifts — the small mercies and the large. A face, a meal, a moment of rest. Name a few, and give thanks for each.","'Give thanks to the Lord, for he is good.' — Psalm 118:1"],
["REVIEW","Walk the hours","Replay the day, hour by hour. Where did you feel close to God — alive, loving, at peace? Where did you feel pulled away — anxious, irritable, empty? Notice your feelings without judging them; they are telling you something.","'Search me, O God, and know my heart.' — Psalm 139:23"],
["SORROW","Ask for mercy","Is there a moment you turned from love, or fell short? Tell God simply and honestly. Ask for His mercy — and receive it. He is gentle, and slow to anger, and rich in kindness.","'A contrite and humbled heart, O God, thou wilt not despise.' — Psalm 51:17"],
["RESOLVE","Toward tomorrow","Look to the day ahead. Choose one thing — a person to love, a task, a temptation — and ask now for the grace you'll need. Then close with the Our Father, and rest in His care.","'Cast all your care upon him, for he hath care of you.' — 1 Peter 5:7"],
];
let ei=0;
function renderEx(){
  const e=EX[ei];
  $("#exStep").innerHTML=`<div class="n">STEP ${ei+1} · ${e[0]}</div><h3 class="serif">${e[1]}</h3><p>${e[2]}</p><div class="scr">${e[3]}</div>`;
  $("#exDots").innerHTML=EX.map((_,i)=>`<span class="d${i===ei?' on':''}"></span>`).join("");
  $("#exBack").disabled=ei===0; $("#exNext").textContent= ei>=EX.length-1? "Amen ✓":"Next";
}
$("#exNext").onclick=()=>{ if(ei>=EX.length-1){ go("home"); } else { ei++; renderEx(); } };
$("#exBack").onclick=()=>{ if(ei>0){ei--;renderEx();} };

/* ---------- rosary mystery picker ---------- */
function openPick(){ renderPick(); go("pick"); }
function renderPick(){
  const today=todaySet()[0];
  const sets=[["joyful","Joyful"],["sorrowful","Sorrowful"],["glorious","Glorious"],["luminous","Luminous"]];
  $("#mystPick").innerHTML=sets.map(([k,name])=>
    `<button class="myst" data-set="${k}">
       <div class="mhead"><span class="mname serif">${name} Mysteries</span>${k===today?'<span class="today">TODAY</span>':''}</div>
       <ol class="mlist">${MYST[k].map(x=>`<li>${x}</li>`).join("")}</ol>
     </button>`).join("");
  $$("#mystPick .myst").forEach(b=>b.onclick=()=>startWalk("rosary",b.dataset.set));
}

/* ---------- prayers library ---------- */
function openPrayers(){ showPrayerList(); go("prayers"); }
function showPrayerList(){
  const groups=[];
  PRAYERS.forEach((p,i)=>{ let grp=groups.find(x=>x.g===p.g); if(!grp){grp={g:p.g,items:[]};groups.push(grp);} grp.items.push([p,i]); });
  $("#prayersList").innerHTML=groups.map(grp=>
    `<div class="pgroup"><span class="lbl">${grp.g.toUpperCase()}</span>`+
    grp.items.map(([p,i])=>`<button class="prow" data-i="${i}"><span>${p.title}</span><span class="chev">→</span></button>`).join("")+
    `</div>`).join("");
  $$("#prayersList .prow").forEach(b=>b.onclick=()=>openPrayer(+b.dataset.i));
  $("#prayerRead").style.display="none"; $("#prayersList").style.display="block"; window.scrollTo(0,0);
}
function openPrayer(i){
  const p=PRAYERS[i];
  $("#prayerRead").innerHTML=`<button class="back2" id="pBack">← All prayers</button>`+
    `<div class="pray-card"><div class="pray-lbl">${p.g.toUpperCase()}</div>`+
    `<div class="ptitle serif">${p.title}</div>`+
    `<div class="pray-text serif">${p.text.replace(/\n/g,"<br>")}</div></div>`;
  $("#pBack").onclick=showPrayerList;
  $("#prayersList").style.display="none"; $("#prayerRead").style.display="block"; window.scrollTo(0,0);
}

/* ---------- nav ---------- */
function go(id){ $$(".screen").forEach(s=>s.classList.remove("on")); $("#s-"+id).classList.add("on"); window.scrollTo(0,0);
  $("#hTitle").textContent = id==="home"?"Faith":({examen:"Examen",walk:walk?walk.title:"Rosary",pick:"Rosary",prayers:"Prayers"})[id]||"Faith"; }
$$("[data-go]").forEach(t=>t.onclick=()=>{ const g=t.dataset.go;
  if(g==="examen"){ei=0;renderEx();go("examen");}
  else if(g==="rosary"){openPick();}
  else if(g==="prayers"){openPrayers();}
  else startWalk(g); });
$$("[data-home]").forEach(b=>b.onclick=()=>go("home"));
$("#homeBtn").onclick=()=>{ // ✝️ acts as: home if not on home, else back to launcher
  if($("#s-home").classList.contains("on")) location.href="../"; else go("home"); };
</script>

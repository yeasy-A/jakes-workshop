.bible__head-row .bible__title{ margin-bottom:0; padding-right:0; }
.bible__filter{ display:inline-flex; padding:3px; gap:3px; background:var(--surface-2); border:1px solid var(--border); border-radius:999px; margin-bottom:14px; }
.bible__filter-btn{
  padding:7px 16px; border-radius:999px; font-size:12.5px; font-weight:600;
  color:var(--text-dim); transition:all var(--dur-fast) var(--ease);
}
.bible__filter-btn:hover{ color:var(--text); }
.bible__filter-btn.is-active{ background:var(--accent); color:var(--text-on-accent); box-shadow:0 2px 10px rgba(139,109,240,.4); }

.heatmap-wrap{ margin-top:4px; }
.heatmap-cell{ overflow:visible; }
.heatmap-cell__tip{
  position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%) translateY(4px);
  white-space:nowrap; padding:5px 9px; border-radius:7px; font-size:11px; font-weight:600;
  background:var(--glass-2); border:1px solid var(--glass-border); color:var(--text);
  box-shadow:var(--shadow); opacity:0; pointer-events:none;
  transition:opacity var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease); z-index:6;
}
.heatmap-cell:hover .heatmap-cell__tip{ opacity:1; transform:translateX(-50%) translateY(0); }
.heatmap-legend__label{ font-size:10px; color:var(--text-faint); letter-spacing:.3px; }
.heatmap-legend__bar{
  flex:1; height:7px; margin:0 9px; border-radius:999px;
  /* mirror the corrected cell ramp (surface-2 -> divine) so the legend matches the strip */
  background:linear-gradient(90deg, var(--surface-2), color-mix(in srgb, var(--c-divine) 85%, transparent));
  box-shadow:inset 0 0 0 1px var(--border-soft);
}
.heatmap-empty{ flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-faint); }

/* two-column layout */
.bible__cols{ flex:1; display:flex; gap:0; overflow:hidden; }
.bible__col{ flex:1; min-width:0; display:flex; flex-direction:column; border-right:1px solid var(--border-soft); overflow:hidden; }
.bible__col:last-child{ border-right:none; }
.bible__col.is-hidden{ display:none; }
.bible__col-title{
  font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--text-faint); padding:12px 16px 6px; flex:none;
}
.bible__list{ flex:1; overflow-y:auto; padding:2px 0 12px; }

/* book rows */
.bible__book{ border-bottom:1px solid var(--border-soft); }
.bible__book-head{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:10px 16px; cursor:pointer; transition:background var(--dur-fast) var(--ease);
}
.bible__book-head:hover:not([disabled]){ background:var(--surface-2); }
.bible__book-head[disabled]{ cursor:default; }
.bible__chev{ width:14px; height:14px; flex:none; color:var(--text-faint); transition:transform var(--dur-fast) var(--ease); display:inline-flex; }
.bible__chev svg{ width:14px; height:14px; }
.bible__book.is-expanded > .bible__book-head .bible__chev{ transform:rotate(90deg); color:var(--accent); }
.bible__book-name{ flex:1; font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bible__book.is-empty .bible__book-name{ color:var(--text-faint); font-weight:500; }
.bible__dots{ display:flex; gap:3px; flex:none; }
.bible__dot{ width:7px; height:7px; border-radius:50%; }
.bible__dot--sm{ width:6px; height:6px; }
.bible__book-count{
  font-size:10.5px; font-weight:700; min-width:18px; height:18px; padding:0 5px;
  display:inline-flex; align-items:center; justify-content:center; border-radius:999px;
  background:var(--surface-3); color:var(--text-dim); flex:none;
}
.bible__book.is-empty .bible__book-count{ opacity:.35; }
.bible__book.is-pulse{ animation:biblePulse .9s var(--ease); }
@keyframes biblePulse{ 0%,100%{ background:transparent; } 30%{ background:color-mix(in srgb, var(--accent) 18%, transparent); } }

/* chapters / verses */
.bible__book-body{ background:rgba(0,0,0,.18); padding:4px 0 8px; }
.bible__chapter{ padding:0; }
.bible__chapter-head{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left;
  padding:7px 16px 7px 26px; cursor:pointer; transition:background var(--dur-fast) var(--ease);
}
.bible__chapter-head:hover{ background:var(--surface-2); }
.bible__chev--sm{ width:12px; height:12px; }
.bible__chev--sm svg{ width:12px; height:12px; }
.bible__chapter.is-expanded > .bible__chapter-head .bible__chev--sm{ transform:rotate(90deg); color:var(--accent); }
.bible__chapter-name{ flex:1; font-size:12px; font-weight:600; color:var(--text-dim); }
.bible__chapter-count{ font-size:10px; color:var(--text-faint); }
.bible__verses{ padding:2px 16px 6px 36px; }
.bible__verse{
  display:flex; align-items:center; gap:8px; width:100%; text-align:left;
  padding:5px 10px; margin:2px 0; border-radius:7px; font-size:12.5px; color:var(--text-dim);
  cursor:pointer; transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.bible__verse:hover{ background:var(--surface-3); color:var(--text); }
.bible__verse.is-highlighted{ background:color-mix(in srgb, var(--c-divine) 16%, transparent); color:var(--c-divine); font-weight:600; }
.bible__verse-ref{ font-weight:700; min-width:42px; }
.bible__verse-dots{ display:flex; gap:3px; flex:1; }
.bible__verse-n{ font-size:10.5px; color:var(--text-faint); }
.bible__empty-note{ font-size:11.5px; color:var(--text-faint); padding:10px 16px; font-style:italic; }

/* node flash (verse highlight) */
.node--flash .node__glow{ animation:nodeFlash 1.2s var(--ease); }
@keyframes nodeFlash{
  0%,100%{ box-shadow:0 6px 22px rgba(0,0,0,.45), 0 0 22px -4px color-mix(in srgb, var(--glow) 55%, transparent); }
  35%{ box-shadow:0 0 0 4px color-mix(in srgb, var(--glow) 70%, transparent), 0 0 60px -2px var(--glow); }
}

/* =========================================================================
   VERSE PICKER — bible.js openPicker emitted classes (overlay inside host)
   ========================================================================= */
.versepicker{
  margin:10px 0; padding:12px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); box-shadow:var(--shadow); position:relative; z-index:7;
}
.versepicker__head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.versepicker__head .versepicker__input{ flex:1; }
.versepicker__close{
  width:30px; height:30px; flex:none; display:flex; align-items:center; justify-content:center;
  border-radius:8px; color:var(--text-dim); transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.versepicker__close:hover{ background:var(--surface-3); color:var(--text); }
.versepicker__result-ref{ font-size:12.5px; font-weight:700; color:var(--c-divine); }
.versepicker__result-text{ font-family:var(--font-serif); font-style:italic; font-size:12.5px; color:var(--text-dim); }
.versepicker__result-text--dim{ font-style:normal; color:var(--text-faint); font-family:var(--font-sans); }
.versepicker__result--book .versepicker__result-ref{ color:var(--text); }
.versepicker__hint{ padding:14px; text-align:center; color:var(--text-faint); font-size:12.5px; }

/* =========================================================================
   SYNC INDICATOR + SETTINGS PAGE — sync.js emitted classes
   ========================================================================= */
.sync-indicator{ cursor:default; }
.sync-indicator.is-clickable{ cursor:pointer; }
.sync-indicator__text{ display:flex; flex-direction:column; line-height:1.2; }
.sync-indicator__label{ font-size:12px; font-weight:700; color:var(--text); }
.sync-indicator__sub{ font-size:10.5px; color:var(--text-faint); }
.sync-indicator__icon{ width:16px; height:16px; color:var(--text-dim); flex:none; display:inline-flex; }
.sync-indicator__icon svg{ width:16px; height:16px; }
.sync-indicator__badge{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:18px; height:18px; padding:0 5px; border-radius:999px;
  background:var(--warn); color:var(--text-on-accent); font-size:10.5px; font-weight:700;
}
.sync-indicator--unconfigured{ opacity:.85; }
.sync-indicator__progress{ position:absolute; left:10px; right:10px; bottom:5px; height:3px; border-radius:999px; background:var(--surface-3); overflow:hidden; }
.sync-indicator__progress-fill{ height:100%; background:linear-gradient(90deg,var(--info),var(--accent)); width:0; transition:width .18s linear; }
.sync-indicator.sync-indicator--pulse{ animation:syncPulse .6s var(--ease); }
@keyframes syncPulse{ 0%,100%{ box-shadow:var(--shadow); } 50%{ box-shadow:var(--shadow), 0 0 0 4px color-mix(in srgb, var(--accent) 30%, transparent); } }

/* settings page panel: sync.js renders directly into #settingsPage (no inner .settings__panel) */
.settings-page{ overflow:auto; }
.settings-page > .settings__head,
.settings-page > .settings__body,
.settings-page > .settings__footer{
  width:min(640px,100%);
}
.settings-page{ flex-direction:column; }
.settings-page > .settings__head{
  background:var(--surface); border:1px solid var(--glass-border); border-bottom:none;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0; box-shadow:var(--shadow-lg);
  transform:translateY(16px) scale(.98); opacity:0;
  transition:transform var(--dur) var(--ease-out), opacity var(--dur) var(--ease);
}
.settings-page > .settings__body{
  background:var(--surface); border-left:1px solid var(--glass-border); border-right:1px solid var(--glass-border);
  transform:translateY(16px) scale(.98); opacity:0;
  transition:transform var(--dur) var(--ease-out), opacity var(--dur) var(--ease);
}
.settings-page > .settings__footer{
  background:var(--surface); border:1px solid var(--glass-border); border-top:1px solid var(--border-soft);
  border-radius:0 0 var(--radius-lg) var(--radius-lg); box-shadow:var(--shadow-lg);
  transform:translateY(16px) scale(.98); opacity:0;
  transition:transform var(--dur) var(--ease-out), opacity var(--dur) var(--ease);
}
.settings-page.is-open > .settings__head,
.settings-page.is-open > .settings__body,
.settings-page.is-open > .settings__footer{ transform:translateY(0) scale(1); opacity:1; }

.settings__head-title{ display:flex; align-items:center; gap:9px; font-size:18px; font-weight:700; }
.settings__head-title svg{ width:20px; height:20px; color:var(--accent); }

.settings__onboard{ display:flex; align-items:flex-start; gap:13px; text-align:left; }
.settings__onboard-icon{ width:34px; height:34px; flex:none; color:var(--accent); }
.settings__onboard-icon svg{ width:34px; height:34px; }
.settings__onboard-text strong{ display:block; color:var(--text); margin-bottom:4px; }
.settings__onboard-text p{ margin:0; }

.settings__status-dot{ width:11px; height:11px; }
.settings__status-text{ display:flex; flex-direction:column; gap:2px; }
.settings__status-text strong{ font-size:13.5px; }
.settings__status-text span{ font-size:11.5px; color:var(--text-faint); font-weight:500; }
.settings__retry{ margin-left:auto; }
.status--connected{ border-color:color-mix(in srgb, var(--ok) 35%, transparent); }
.status--connected .settings__status-text strong{ color:var(--ok); }
.status--syncing{ border-color:color-mix(in srgb, var(--info) 35%, transparent); }
.status--syncing .settings__status-text strong{ color:var(--info); }
.status--error{ border-color:color-mix(in srgb, var(--err) 35%, transparent); }
.status--error .settings__status-text strong{ color:var(--err); }

.settings__label{ font-size:11.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text-faint); }
.settings__input{
  width:100%; padding:11px 13px; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text); font-size:13.5px; outline:none;
  transition:border-color var(--dur-fast) var(--ease);
}
.settings__input:focus{ border-color:var(--accent); }
.settings__select{ cursor:pointer; }
.settings__hint{ font-size:11.5px; color:var(--text-faint); }
.settings__path-row{ display:flex; gap:8px; }
.settings__path-row .settings__input{ flex:1; }
.settings__pick{ flex:none; padding:11px; }

.settings__progress{ width:100%; height:6px; border-radius:999px; background:var(--surface-3); overflow:hidden; }
.settings__progress-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg,var(--info),var(--accent)); width:0; transition:width .18s linear; }

/* Connect Vault Folder block (real File System Access sync) */
.settings__connect{
  display:flex; flex-direction:column; gap:12px;
  padding:14px 16px; border-radius:var(--radius);
  background:var(--surface-2); border:1px solid var(--border-soft);
}
.settings__connect-row{ display:flex; align-items:flex-start; gap:11px; }
.settings__connect-dot{
  width:9px; height:9px; flex:none; margin-top:4px; border-radius:50%;
  background:var(--text-faint); box-shadow:0 0 0 3px color-mix(in srgb, var(--text-faint) 18%, transparent);
}
.settings__connect-dot.is-on{ background:var(--ok); box-shadow:0 0 0 3px color-mix(in srgb, var(--ok) 22%, transparent); }
.settings__connect-text{ display:flex; flex-direction:column; gap:3px; }
.settings__connect-text strong{ font-size:13px; color:var(--text); }
.settings__connect-text span{ font-size:12px; color:var(--text-dim); line-height:1.5; }
.settings__connect-text code, .settings__callout-text code, .settings__hint code{
  font-size:11.5px; padding:1px 5px; border-radius:5px;
  background:var(--surface-3); color:var(--text);
}
.settings__connect-actions{ display:flex; gap:9px; flex-wrap:wrap; }

/* file:// fallback callout */
.settings__callout{
  display:flex; gap:12px; padding:14px 16px; border-radius:var(--radius);
  background:color-mix(in srgb, var(--warn) 12%, var(--surface-2));
  border:1px solid color-mix(in srgb, var(--warn) 40%, var(--border));
}
.settings__callout-icon{ width:20px; height:20px; flex:none; color:var(--warn); }
.settings__callout-icon svg{ width:20px; height:20px; }
.settings__callout-text{ display:flex; flex-direction:column; gap:6px; }
.settings__callout-text strong{ font-size:13px; color:var(--text); }
.settings__callout-text p{ font-size:12px; color:var(--text-dim); line-height:1.55; margin:0; }

/* ---------------------------------------------------------------------------
   Node scaling — driven by --node-scale on #nodeLayer (PM.graph.setNodeSize)
   --------------------------------------------------------------------------- */
.node-layer{ --node-scale:1; }
.node-layer .node{ width:calc(var(--node-size) * var(--node-scale)); height:calc(var(--node-size) * var(--node-scale)); }
.node-layer .node__icon{ width:calc(34px * var(--node-scale)); height:calc(34px * var(--node-scale)); }
.node-layer .node__icon svg{ width:calc(30px * var(--node-scale)); height:calc(30px * var(--node-scale)); }
.node-layer .node__label{ font-size:calc(12.5px * var(--node-scale)); top:calc(100% + 9px); }

/* ---------------------------------------------------------------------------
   Map customization popover (PM.graph layout/size panel)
   --------------------------------------------------------------------------- */
.map-popover{
  position:absolute;
  top:20px; left:74px;
  z-index:calc(var(--z-toolbar) + 1);
  width:300px;
  max-height:calc(100vh - 40px);
  overflow-y:auto;
  padding:16px;
  display:flex; flex-direction:column; gap:16px;
  background:var(--glass-2);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  opacity:0; transform:translateY(-6px) scale(.97);
  pointer-events:none;
  transition:opacity var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease-out);
}
.map-popover.is-open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.map-popover__title{
  font-size:11.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
  color:var(--text-faint);
}
.map-popover__group{ display:flex; flex-direction:column; gap:9px; }
.map-popover__seg{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.map-popover__seg-btn{
  display:flex; align-items:center; justify-content:center; gap:5px;
  padding:8px 5px; border-radius:var(--radius-sm);
  background:var(--surface-2); border:1px solid var(--border);
  color:var(--text-dim); font-size:11.5px; font-weight:600; cursor:pointer;
  min-width:0; overflow:hidden;
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
}
.map-popover__seg-btn span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.map-popover__seg-btn:hover{ background:var(--surface-3); color:var(--text); }
.map-popover__seg-btn.is-active{
  background:color-mix(in srgb, var(--accent) 22%, transparent);
  color:var(--accent);
  border-color:color-mix(in srgb, var(--accent) 45%, transparent);
}
.map-popover__seg-btn svg{ width:15px; height:15px; }
.map-popover__row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.map-popover__readout{ font-size:12px; font-weight:700; color:var(--accent); min-width:36px; text-align:right; }
.map-popover__range{ width:100%; accent-color:var(--accent); cursor:pointer; }
.map-popover__build{ font-size:10px; color:var(--text-faint); text-align:center; padding-top:4px; letter-spacing:.02em; opacity:.85; }

/* dashboard cards (sync.js dashCard) */
.settings__dash{ display:grid; grid-template-columns:repeat(4,1fr); gap:11px; }
.settings__dash-card{
  padding:13px 11px; border-radius:var(--radius); background:var(--surface-2);
  border:1px solid var(--border-soft); text-align:center; display:flex; flex-direction:column; align-items:center; gap:4px;
}
.settings__dash-icon{ width:18px; height:18px; color:var(--accent); opacity:.8; }
.settings__dash-icon svg{ width:18px; height:18px; }
.settings__dash-value{ font-size:16px; font-weight:800; color:var(--text); }
.settings__dash-label{ font-size:9.5px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--text-faint); }

/* error log (sync.js classes) */
.settings__errorlog{ border-radius:var(--radius); background:var(--surface-2); border:1px solid var(--border-soft); overflow:hidden; }
.settings__errorlog-head{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; padding:11px 14px; font-size:12.5px; font-weight:600; color:var(--text-dim); cursor:pointer; }
.settings__errorlog-chev{ display:inline-flex; width:14px; height:14px; transition:transform var(--dur-fast) var(--ease); }
.settings__errorlog-chev svg{ width:14px; height:14px; }
.settings__errorlog.is-open .settings__errorlog-chev{ transform:rotate(90deg); }
.settings__errorlog-count{ margin-left:auto; min-width:18px; height:18px; padding:0 5px; display:inline-flex; align-items:center; justify-content:center; border-radius:999px; background:var(--surface-3); color:var(--text-dim); font-size:10.5px; font-weight:700; }
.settings__errorlog-clear{ margin-left:8px; font-size:11px; font-weight:600; color:var(--accent); padding:2px 8px; border-radius:6px; }
.settings__errorlog-clear:hover{ background:color-mix(in srgb, var(--accent) 14%, transparent); }
.settings__errorlog-list{ display:none; padding:0 14px 12px; max-height:170px; overflow-y:auto; }
.settings__errorlog.is-open .settings__errorlog-list{ display:block; }
.settings__errorlog-item{ display:flex; gap:10px; padding:7px 0; border-top:1px solid var(--border-soft); font-size:11.5px; }
.settings__errorlog-time{ color:var(--text-faint); flex:none; }
.settings__errorlog-msg{ color:var(--err); }
.settings__errorlog-empty{ padding:12px 0; font-size:12px; color:var(--text-faint); text-align:center; }

/* template editor (sync.js classes) */
.settings__template-head{ display:flex; flex-direction:column; gap:4px; margin-bottom:9px; }
.settings__vars{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:9px; }
.settings__var-chip{
  font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; font-weight:600;
  padding:4px 8px; border-radius:7px; color:var(--c-divine);
  background:color-mix(in srgb, var(--c-divine) 12%, var(--surface-2));
  border:1px solid color-mix(in srgb, var(--c-divine) 30%, transparent);
  transition:all var(--dur-fast) var(--ease);
}
.settings__var-chip:hover{ background:color-mix(in srgb, var(--c-divine) 22%, var(--surface-2)); }
.settings__template-grid{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
.settings__template-input{
  width:100%; min-height:300px; padding:13px; background:#0c0c1c; border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text-dim);
  font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.6; outline:none; tab-size:2; resize:vertical;
  transition:border-color var(--dur-fast) var(--ease);
}
.settings__template-input:focus{ border-color:var(--accent); }
.settings__template-preview{
  background:#0c0c1c; border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:13px; overflow:auto; max-height:330px;
}
.settings__template-preview-label{ font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--text-faint); margin-bottom:7px; }
.settings__template-pre{
  margin:0; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; line-height:1.6;
  color:var(--text-dim); white-space:pre-wrap; word-break:break-word;
}
.tpl-var{ color:var(--c-divine); background:color-mix(in srgb, var(--c-divine) 16%, transparent); border-radius:4px; padding:0 3px; font-weight:600; }
.tpl-var--unknown{ color:var(--warn); background:color-mix(in srgb, var(--warn) 16%, transparent); }

/* settings buttons (sync.js uses .btn variants) */
.btn--accent{ background:linear-gradient(135deg,#b79bff,#8b6df0); border-color:transparent; color:var(--text-on-accent); box-shadow:0 6px 20px rgba(139,109,240,.35); }
.btn--accent:hover{ filter:brightness(1.08); box-shadow:0 8px 26px rgba(139,109,240,.45); }
.btn--err{ color:var(--err); border-color:color-mix(in srgb, var(--err) 35%, transparent); }
.btn--err:hover{ background:color-mix(in srgb, var(--err) 16%, transparent); border-color:var(--err); }

@media (max-width:720px){
  .settings__template-grid{ grid-template-columns:1fr; }
  .settings__dash{ grid-template-columns:repeat(2,1fr); }
}

/* toast icon stack already styled; ensure toast enter from data.js (.is-shown) */
.toast{ opacity:1; }

<a href="../" title="All apps" style="position:fixed;left:10px;bottom:10px;z-index:99999;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(20,20,28,.72);color:#fff;border:1px solid rgba(255,255,255,.22);border-radius:11px;text-decoration:none;font-size:19px;backdrop-filter:blur(5px);box-shadow:0 4px 14px rgba(0,0,0,.3)">🏠</a>
<!-- PatternMap static body skeleton (the inner body markup).
     Containers are static; JS (PM.*) fills the empty shells. ids/classes match CONTRACT.md section 4. -->

<div id="app" class="app">

  <!-- ============================ CANVAS ============================ -->
  <div id="viewport" class="viewport">
    <div id="world" class="world">

      <!-- SVG edge layer: draws in world coords, overflow visible. JS fills <path>s. -->
      <svg id="edgeLayer" class="edge-layer" overflow="visible" aria-hidden="true">
        <defs>
          <marker id="arrowDefault" class="edge-arrow edge-arrow--default"
                  markerWidth="12" markerHeight="12" refX="9" refY="5"
                  orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L10,5 L0,10 Z"></path>
          </marker>
          <marker id="arrowActive" class="edge-arrow edge-arrow--active"
                  markerWidth="14" markerHeight="14" refX="10" refY="6"
                  orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L12,6 L0,12 Z"></path>
          </marker>
        </defs>
        <!-- JS appends <path class="edge"> and <text class="edge__label"> here -->
      </svg>

      <!-- Cluster bubbles (behind nodes). JS fills. -->
      <div id="clusterLayer" class="cluster-layer"></div>

      <!-- Absolutely-positioned node cards. JS fills. -->
      <div id="nodeLayer" class="node-layer"></div>

    </div><!-- /#world -->

    <!-- ===================== FLOATING OVERLAYS (inside viewport) ===================== -->

    <!-- Toolbar (top-left) -->
    <div id="toolbar" class="toolbar" role="toolbar" aria-label="Canvas tools">
      <button id="zoomInBtn" class="toolbar__btn" type="button" title="Zoom in" aria-label="Zoom in">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line><line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </button>
      <button id="zoomOutBtn" class="toolbar__btn" type="button" title="Zoom out" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="8" y1="11" x2="14" y2="11"></line><line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </button>
      <button id="fitBtn" class="toolbar__btn" type="button" title="Fit all" aria-label="Fit all to view">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 9V5a1 1 0 0 1 1-1h4"></path><path d="M15 4h4a1 1 0 0 1 1 1v4"></path><path d="M20 15v4a1 1 0 0 1-1 1h-4"></path><path d="M9 20H5a1 1 0 0 1-1-1v-4"></path>
        </svg>
      </button>
      <span class="toolbar__sep" aria-hidden="true"></span>

     modal -> bible -> sync -> app. app.js is last and self-invokes PM.init() on

<script>
/* ===== data.js ===== */
/* =============================================================================
 * PatternMap — data.js  (MODULE 1 of 7, loaded FIRST)
 * Namespace owner + data layer + persistence + shared helpers + constants +
 * seed content + embedded KJV verses.
 *
 * Conforms to CONTRACT.md §1, §2, §3, §6.1, §7 and the builder task brief.
 * Vanilla JS only. No imports, no build step. Attaches everything to window.PM.
 * No DOM side effects at parse time (only function/constant registration).
 * ===========================================================================*/

/* ---------------------------------------------------------------------------
 * §1  Establish the global namespace skeleton (data.js creates it all).
 * -------------------------------------------------------------------------*/
window.PM = window.PM || {};
PM.state  = PM.state  || {};
PM.data   = PM.data   || {};
PM.graph  = PM.graph  || {};
PM.drawer = PM.drawer || {};
PM.modal  = PM.modal  || {};
PM.bible  = PM.bible  || {};
PM.sync   = PM.sync   || {};
PM.consts = PM.consts || {};

/* ---------------------------------------------------------------------------
 * §1.1  Top-level cross-cutting helpers.
 * -------------------------------------------------------------------------*/

PM.uid = function (prefix) {
  var p = prefix || 'id';
  var t = Date.now().toString(36);
  var r = Math.random().toString(36).slice(2, 6);
  while (r.length < 4) { r += '0'; }
  return p + '_' + t + '_' + r;
};

PM.now = function () { return Date.now(); };

PM.fmtDate = function (ts, mode) {
  if (!ts) { return '—'; }
  var d = new Date(ts);
  if (isNaN(d.getTime())) { return '—'; }
  mode = mode || 'date';

  if (mode === 'rel') {
    var diff = Date.now() - ts;
    if (diff < 0) { diff = 0; }
    var sec = Math.floor(diff / 1000);
    var min = Math.floor(sec / 60);
    var hr = Math.floor(min / 60);
    var day = Math.floor(hr / 24);
    if (sec < 45) { return 'just now'; }
    if (min < 60) { return min + 'm ago'; }
    if (hr < 24) { return hr + 'h ago'; }
    if (day <= 7) { return day + 'd ago'; }
    mode = 'date'; // fall through to absolute date past 7d
  }

  var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  var datePart = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
  if (mode === 'datetime') {
    var h = d.getHours();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12; if (h12 === 0) { h12 = 12; }
    var mm = d.getMinutes(); if (mm < 10) { mm = '0' + mm; }
    return datePart + ', ' + h12 + ':' + mm + ' ' + ampm;
  }
  return datePart;
};

PM.toast = function (message, kind, ms) {
  kind = kind || 'info';
  if (typeof ms !== 'number') { ms = (kind === 'error') ? 5000 : 3200; }
  var host = document.getElementById('toastHost');
  if (!host) {
    // No host yet (e.g. very early boot) — degrade to console, never throw.
    try { console.log('[toast:' + kind + '] ' + message); } catch (e) {}
    return;
  }
  var el = document.createElement('div');
  el.className = 'toast toast--' + kind;
  var iconName = kind === 'success' ? 'check'
               : kind === 'error' ? 'alert'
               : kind === 'warn' ? 'alert'
               : 'check';
  var ico = document.createElement('span');
  ico.className = 'toast__icon';
  ico.innerHTML = PM.data.iconSvg(iconName);
  var txt = document.createElement('span');
  txt.className = 'toast__msg';
  txt.textContent = message;
  el.appendChild(ico);
  el.appendChild(txt);
  host.appendChild(el);

  // Allow CSS enter transition.
  requestAnimationFrame(function () { el.classList.add('is-shown'); });

  var remove = function () {
    el.classList.remove('is-shown');
    el.classList.add('is-leaving');
    setTimeout(function () {
      if (el.parentNode) { el.parentNode.removeChild(el); }
    }, 300);
  };
  setTimeout(remove, ms);
  el.addEventListener('click', remove);
};

/* ---------------------------------------------------------------------------
 * Persistence — PM.save / PM.load  (debounced write ≤1 / 400ms).
 * -------------------------------------------------------------------------*/

var _saveTimer = null;
var _saveDirty = false;

function _writeNow() {
  _saveTimer = null;
  _saveDirty = false;
  try {
    var slice = {
      v: 1,
      patterns: PM.state.patterns,
      edges: PM.state.edges,
      settings: PM.state.settings,
      transform: PM.state.transform
    };
    localStorage.setItem(PM.consts.STORAGE_KEY, JSON.stringify(slice));
  } catch (e) {
    try { console.warn('PM.save failed:', e); } catch (e2) {}
  }
}

PM.save = function () {
  _saveDirty = true;
  if (_saveTimer) { return; }
  _saveTimer = setTimeout(_writeNow, 400);
};

PM.load = function () {
  var raw;
  try { raw = localStorage.getItem(PM.consts.STORAGE_KEY); }
  catch (e) { return false; }
  if (!raw) { return false; }

  var obj;
  try { obj = JSON.parse(raw); }
  catch (e) { return false; }
  if (!obj || typeof obj !== 'object') { return false; }
  if (!Array.isArray(obj.patterns) || !Array.isArray(obj.edges)) { return false; }

  PM.state.patterns = obj.patterns;
  PM.state.edges = obj.edges;

  if (obj.settings && typeof obj.settings === 'object') {
    // Merge onto defaults so new fields are never undefined.
    var s = PM.state.settings;
    for (var k in obj.settings) {
      if (Object.prototype.hasOwnProperty.call(obj.settings, k)) {
        s[k] = obj.settings[k];
      }
    }
    if (!Array.isArray(s.errorLog)) { s.errorLog = []; }
    if (!s.template) { s.template = PM.consts.DEFAULT_TEMPLATE; }
  }

  if (obj.transform && typeof obj.transform === 'object') {
    var t = obj.transform;
    PM.state.transform = {
      x: typeof t.x === 'number' ? t.x : 0,
      y: typeof t.y === 'number' ? t.y : 0,
      k: typeof t.k === 'number' ? t.k : 1
    };
  }
  return true;
};

PM.data.iconSvg = function (name) {
  var inner = _ICONS[name];
  if (!inner) { return ''; }
  return '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" ' +
         'stroke="currentColor" stroke-width="2" stroke-linecap="round" ' +
         'stroke-linejoin="round" aria-hidden="true">' + inner + '</svg>';
};

/* ---------------------------------------------------------------------------
 * §2 PM.data.initState — reset PM.state to canonical defaults.
 * -------------------------------------------------------------------------*/

PM.data.initState = function () {
  PM.state.patterns = [];
  PM.state.edges = [];
  PM.state.transform = { x: 0, y: 0, k: 1 };
  PM.state.settings = {
    vaultPath: '',
    syncFolder: 'PatternMap/Patterns',
    frequency: 'onSave',
    template: PM.consts.DEFAULT_TEMPLATE,
    lastSynced: 0,
    status: 'unconfigured',
    pending: 0,
    syncedNotes: 0,
    errorLog: [],
    layoutType: 'force',
    nodeScale: 1,
    nodeShape: 'circle',
    edgeCurviness: 0.5
  };
  PM.state.selection = null;
  PM.state.filters = {
    categories: new Set(),
    testaments: 'both',
    book: null,
    dateRange: null
  };
  PM.state.search = '';
  PM.state.ui = {
    locked: false,
    clusterMode: false,
    drawerOpen: false,
    modalOpen: false,
    bibleOpen: false,
    settingsOpen: false
  };
  PM.state._layout = {
    running: false,
    raf: 0,
    ticksLeft: 0,
    nodes: new Map(),
    dragId: null
  };
};

/* ---------------------------------------------------------------------------
 * Pattern / Edge CRUD.
 * -------------------------------------------------------------------------*/

PM.data.makePattern = function (partial) {
  partial = partial || {};
  var t = PM.now();
  var title = (partial.title != null) ? String(partial.title) : 'Untitled Pattern';
  var spread = 320;
  return {
    id: partial.id || PM.uid('pat'),
    title: title,
    category: partial.category || 'custom',
    description: partial.description != null ? String(partial.description) : '',
    testament: partial.testament || 'both',
    refs: Array.isArray(partial.refs) ? partial.refs.slice() : [],
    tags: Array.isArray(partial.tags) ? partial.tags.slice() : [],
    observations: Array.isArray(partial.observations) ? partial.observations.slice() : [],
    obsidianPath: partial.obsidianPath || ('PatternMap/' + title + '.md'),
    created: typeof partial.created === 'number' ? partial.created : t,
    modified: typeof partial.modified === 'number' ? partial.modified : t,
    refCount: typeof partial.refCount === 'number' ? partial.refCount : 0,
    x: typeof partial.x === 'number' ? partial.x : (Math.random() - 0.5) * spread,
    y: typeof partial.y === 'number' ? partial.y : (Math.random() - 0.5) * spread,
    synced: partial.synced === true ? true : false
  };
};

PM.data.addPattern = function (partial) {
  var p = PM.data.makePattern(partial);
  PM.state.patterns.push(p);
  PM.data.recountAll();
  return p;
};

PM.data.updatePattern = function (id, patch) {
  var p = PM.data.getPattern(id);
  if (!p) { return null; }
  if (patch && typeof patch === 'object') {
    for (var k in patch) {
      if (Object.prototype.hasOwnProperty.call(patch, k)) {
        if (k === 'id' || k === 'created' || k === 'refCount') { continue; }
        p[k] = patch[k];
      }
    }
  }
  p.modified = PM.now();
  p.synced = false;
  return p;
};

PM.data.deletePattern = function (id) {
  var idx = -1;
  for (var i = 0; i < PM.state.patterns.length; i++) {
    if (PM.state.patterns[i].id === id) { idx = i; break; }
  }
  if (idx === -1) { return false; }
  PM.state.patterns.splice(idx, 1);

  PM.state.edges = PM.state.edges.filter(function (e) {
    return e.from !== id && e.to !== id;
  });

  if (PM.state.selection === id) { PM.state.selection = null; }
  if (PM.state._layout && PM.state._layout.nodes) {
    PM.state._layout.nodes.delete(id);
  }
  PM.data.recountAll();
  return true;
};

PM.data.touch = function (id) {
  var p = PM.data.getPattern(id);
  if (!p) { return null; }
  p.modified = PM.now();
  p.synced = false;
  return p;
};

PM.data.addEdge = function (spec) {
  spec = spec || {};
  var from = spec.from, to = spec.to;
  if (!from || !to) { return null; }
  if (from === to) { return null; } // no self-edges

  // Dedup on unordered pair.
  for (var i = 0; i < PM.state.edges.length; i++) {
    var ex = PM.state.edges[i];
    if ((ex.from === from && ex.to === to) ||
        (ex.from === to && ex.to === from)) {
      return ex;
    }
  }
  var s = (typeof spec.strength === 'number') ? spec.strength : 0.6;
  if (s < 0) { s = 0; } if (s > 1) { s = 1; }
  var edge = {
    id: spec.id || PM.uid('edge'),
    from: from,
    to: to,
    label: spec.label != null ? String(spec.label) : '',
    strength: s
  };
  PM.state.edges.push(edge);
  PM.data.recountAll();
  return edge;
};

PM.data.updateEdge = function (id, patch) {
  var e = PM.data.getEdge(id);
  if (!e) { return null; }
  if (patch && typeof patch === 'object') {
    for (var k in patch) {
      if (Object.prototype.hasOwnProperty.call(patch, k)) {
        if (k === 'id') { continue; }
        if (k === 'strength') {
          var s = patch[k];
          if (typeof s === 'number') {
            if (s < 0) { s = 0; } if (s > 1) { s = 1; }
            e.strength = s;
          }
          continue;
        }
        e[k] = patch[k];
      }
    }
  }
  return e;
};

PM.data.deleteEdge = function (id) {
  var before = PM.state.edges.length;
  PM.state.edges = PM.state.edges.filter(function (e) { return e.id !== id; });
  var removed = PM.state.edges.length !== before;
  if (removed) { PM.data.recountAll(); }
  return removed;
};

PM.data.getPattern = function (id) {
  for (var i = 0; i < PM.state.patterns.length; i++) {
    if (PM.state.patterns[i].id === id) { return PM.state.patterns[i]; }
  }
  return null;
};

PM.data.getEdge = function (id) {
  for (var i = 0; i < PM.state.edges.length; i++) {
    if (PM.state.edges[i].id === id) { return PM.state.edges[i]; }
  }
  return null;
};

PM.data.edgesOf = function (id) {
  return PM.state.edges.filter(function (e) {
    return e.from === id || e.to === id;
  });
};

PM.data.neighborsOf = function (id) {
  var out = [];
  var seen = {};
  var edges = PM.data.edgesOf(id);
  for (var i = 0; i < edges.length; i++) {
    var other = edges[i].from === id ? edges[i].to : edges[i].from;
    if (seen[other]) { continue; }
    seen[other] = true;
    var p = PM.data.getPattern(other);
    if (p) { out.push(p); }
  }
  return out;
};

PM.data.recountAll = function () {
  var counts = {};
  var i;
  for (i = 0; i < PM.state.patterns.length; i++) {
    counts[PM.state.patterns[i].id] = 0;
  }
  for (i = 0; i < PM.state.edges.length; i++) {
    var e = PM.state.edges[i];
    if (counts[e.from] != null) { counts[e.from]++; }
    if (counts[e.to] != null) { counts[e.to]++; }
  }
  for (i = 0; i < PM.state.patterns.length; i++) {
    var p = PM.state.patterns[i];
    p.refCount = counts[p.id] || 0;
  }
};

/* ---------------------------------------------------------------------------
 * Search / filtering.
 * -------------------------------------------------------------------------*/

PM.data.search = function (query) {
  var q = (query == null ? '' : String(query)).trim().toLowerCase();
  if (!q) { return PM.state.patterns.slice(); }
  return PM.state.patterns.filter(function (p) {
    if (p.title && p.title.toLowerCase().indexOf(q) !== -1) { return true; }
    if (p.description && p.description.toLowerCase().indexOf(q) !== -1) { return true; }
    var i;
    for (i = 0; i < p.tags.length; i++) {
      if (String(p.tags[i]).toLowerCase().indexOf(q) !== -1) { return true; }
    }
    for (i = 0; i < p.refs.length; i++) {
      var r = p.refs[i];
      var key = (r.book + ' ' + r.chapter + ':' + r.verse).toLowerCase();
      if (key.indexOf(q) !== -1) { return true; }
      if (r.book && r.book.toLowerCase().indexOf(q) !== -1) { return true; }
    }
    return false;
  });
};

PM.data.matchesFilters = function (pattern) {
  if (!pattern) { return false; }
  var f = PM.state.filters;

  // Category filter (empty Set = show all).
  if (f.categories && f.categories.size > 0 && !f.categories.has(pattern.category)) {
    return false;
  }

  // Testament filter.
  if (f.testaments && f.testaments !== 'both') {
    // A 'both'-scoped pattern is always considered visible under OT/NT filters.
    if (pattern.testament !== 'both' && pattern.testament !== f.testaments) {
      return false;
    }
  }

  // Book filter — pattern must reference that book.
  if (f.book) {
    var hit = false;
    for (var i = 0; i < pattern.refs.length; i++) {
      if (pattern.refs[i].book === f.book) { hit = true; break; }
    }
    if (!hit) { return false; }
  }

  // Date range (by created).
  if (f.dateRange) {
    var c = pattern.created;
    if (typeof f.dateRange.from === 'number' && c < f.dateRange.from) { return false; }
    if (typeof f.dateRange.to === 'number' && c > f.dateRange.to) { return false; }
  }

  return true;
};

PM.data.visiblePatterns = function () {
  return PM.state.patterns.filter(PM.data.matchesFilters);
};

/* Books that currently have at least one linked pattern (canonical order). */
PM.data.booksWithPatterns = function () {
  var seen = {};
  var pats = PM.state.patterns || [];
  for (var i = 0; i < pats.length; i++) {
    var rs = pats[i].refs || [];
    for (var j = 0; j < rs.length; j++) {
      if (rs[j] && rs[j].book) { seen[rs[j].book] = true; }
    }
  }
  // Return in canonical BOOKS order so the menu reads OT->NT.
  var out = [];
  var books = (PM.consts && PM.consts.BOOKS) || [];
  for (var k = 0; k < books.length; k++) {
    if (seen[books[k].name]) { out.push(books[k].name); }
  }
  // Include any referenced book not present in BOOKS (defensive) appended after.
  for (var b in seen) {
    if (Object.prototype.hasOwnProperty.call(seen, b) && out.indexOf(b) === -1) { out.push(b); }
  }
  return out;
};

/* Re-apply all downstream views after a filter change (chips + highlight + heatmap). */
function _afterFilterChange() {
  PM.data.renderFilterChips();
  if (PM.graph && typeof PM.graph.applyHighlight === 'function') { PM.graph.applyHighlight(); }
  if (PM.bible && typeof PM.bible.renderHeatmap === 'function') { PM.bible.renderHeatmap(); }
}

/* renderFilterChips — category chips + Book/Date-added dropdown chips + testament/clear
 * chips into #filterChips. (SPEC §Screens/1: filter by category, by Bible book, by date.) */
PM.data.renderFilterChips = function () {
  var host = document.getElementById('filterChips');
  if (!host) { return; }
  // Tear down any open dropdown + its outside-click listener before re-render.
  if (PM.data._closeFilterMenu) { PM.data._closeFilterMenu(); }
  host.innerHTML = '';
  var f = PM.state.filters;

  var i;
  for (i = 0; i < PM.data.CATEGORIES.length; i++) {
    (function (cat) {
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'filter-chip';
      chip.setAttribute('data-cat', cat.key);
      chip.style.setProperty('--chip-color', cat.color);
      if (f.categories && f.categories.has(cat.key)) {
        chip.classList.add('is-active');
      }
      var dot = document.createElement('span');
      dot.className = 'filter-chip__dot';
      dot.style.background = cat.color;
      var label = document.createElement('span');
      label.className = 'filter-chip__label';
      label.textContent = cat.label;
      chip.appendChild(dot);
      chip.appendChild(label);
      chip.addEventListener('click', function () {
        if (f.categories.has(cat.key)) { f.categories.delete(cat.key); }
        else { f.categories.add(cat.key); }
        _afterFilterChange();
      });
      host.appendChild(chip);
    })(PM.data.CATEGORIES[i]);
  }

  // --- "Book" dropdown chip (filter by Bible book) -------------------------
  (function () {
    var books = PM.data.booksWithPatterns();
    var items = [{ value: null, label: 'All books' }];
    for (var b = 0; b < books.length; b++) { items.push({ value: books[b], label: books[b] }); }
    var activeLabel = f.book ? f.book : 'Book';
    _buildMenuChip(host, {
      label: activeLabel,
      active: !!f.book,
      items: items,
      isSelected: function (v) { return (v || null) === (f.book || null); },
      onPick: function (v) { f.book = v || null; _afterFilterChange(); }
    });
  })();

  // --- "Date added" dropdown chip (filter by date created) ----------------
  (function () {
    var now = (typeof PM.now === 'function') ? PM.now() : Date.now();
    var DAY = 86400000;
    var presets = [
      { value: null,        label: 'Any time' },
      { value: 7 * DAY,     label: 'Last 7 days' },
      { value: 30 * DAY,    label: 'Last 30 days' },
      { value: 90 * DAY,    label: 'Last 90 days' },
      { value: 365 * DAY,   label: 'Last year' }
    ];
    // Recover the currently-active preset (if dateRange.from maps to one of ours).
    var activeWindow = null;
    if (f.dateRange && typeof f.dateRange.from === 'number') {
      activeWindow = now - f.dateRange.from;
    }
    function presetLabel() {
      if (!f.dateRange) { return 'Date added'; }
      for (var p = 1; p < presets.length; p++) {
        if (activeWindow != null && Math.abs(presets[p].value - activeWindow) < DAY) {
          return presets[p].label;
        }
      }
      return 'Date added';
    }
    _buildMenuChip(host, {
      label: presetLabel(),
      active: !!f.dateRange,
      items: presets,
      isSelected: function (v) {
        if (v == null) { return !f.dateRange; }
        return activeWindow != null && Math.abs(v - activeWindow) < DAY;
      },
      onPick: function (v) {
        f.dateRange = (v == null) ? null : { from: ((typeof PM.now === 'function') ? PM.now() : Date.now()) - v };
        _afterFilterChange();
      }
    });
  })();

  // "Clear" chip — only when any filter is active.
  var anyActive = (f.categories && f.categories.size > 0) ||
                  f.testaments !== 'both' || f.book || f.dateRange;
  if (anyActive) {
    var clear = document.createElement('button');
    clear.type = 'button';
    clear.className = 'filter-chip filter-chip--clear';
    clear.textContent = 'Clear';
    clear.addEventListener('click', function () {
      f.categories.clear();
      f.testaments = 'both';
      f.book = null;
      f.dateRange = null;
      _afterFilterChange();
    });
    host.appendChild(clear);
  }
};

/* _buildMenuChip — a dropdown filter chip (Book / Date added). Appends a chip to `host`;
 * clicking it opens a popover menu of {value,label} options. Exactly one popover is open
 * at a time and it closes on outside-click / Escape / re-render. */
function _buildMenuChip(host, opts) {
  var caret = '<span class="filter-chip__caret"><svg viewBox="0 0 24 24" width="11" height="11" ' +
    'fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" ' +
    'stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></span>';
  var chip = document.createElement('button');
  chip.type = 'button';
  chip.className = 'filter-chip filter-chip--menu';
  if (opts.active) { chip.classList.add('is-active'); }
  var lbl = document.createElement('span');
  lbl.className = 'filter-chip__label';
  lbl.textContent = opts.label;
  chip.appendChild(lbl);
  chip.insertAdjacentHTML('beforeend', caret);

  function openMenu() {
    // Close any other open menu first.
    if (PM.data._closeFilterMenu) { PM.data._closeFilterMenu(); }
    var menu = document.createElement('div');
    menu.className = 'filter-menu';
    if (!opts.items || !opts.items.length) {
      var empty = document.createElement('div');
      empty.className = 'filter-menu__empty';
      empty.textContent = 'No options';
      menu.appendChild(empty);
    }
    for (var i = 0; i < (opts.items || []).length; i++) {
      (function (it) {
        var row = document.createElement('button');
        row.type = 'button';
        row.className = 'filter-menu__item';
        if (opts.isSelected && opts.isSelected(it.value)) { row.classList.add('is-selected'); }
        var ck = document.createElement('span');
        ck.className = 'check';
        ck.innerHTML = (PM.data.iconSvg ? PM.data.iconSvg('check') : '');
        var txt = document.createElement('span');
        txt.textContent = it.label;
        row.appendChild(ck);
        row.appendChild(txt);
        row.addEventListener('click', function (e) {
          e.stopPropagation();
          closeMenu();
          opts.onPick(it.value);
        });
        menu.appendChild(row);
      })(opts.items[i]);
    }
    chip.appendChild(menu);

    function onDocClick(e) {
      if (!chip.contains(e.target)) { closeMenu(); }
    }
    function onKey(e) {
      if (e.key === 'Escape') { closeMenu(); }
    }
    function closeMenu() {
      document.removeEventListener('mousedown', onDocClick, true);
      document.removeEventListener('keydown', onKey, true);
      if (menu.parentNode) { menu.parentNode.removeChild(menu); }
      PM.data._closeFilterMenu = null;
    }
    // defer attach so the opening click itself doesn't immediately close it
    setTimeout(function () {
      document.addEventListener('mousedown', onDocClick, true);
      document.addEventListener('keydown', onKey, true);
    }, 0);
    PM.data._closeFilterMenu = closeMenu;
  }

  chip.addEventListener('click', function (e) {
    e.stopPropagation();
    // toggle: if this chip already owns the open menu, close it
    if (chip.querySelector('.filter-menu')) {
      if (PM.data._closeFilterMenu) { PM.data._closeFilterMenu(); }
      return;
    }
    openMenu();
  });
  host.appendChild(chip);
}

PM.data.exportJSON = function () {
  var slice = {
    v: 1,
    patterns: PM.state.patterns,
    edges: PM.state.edges,
    settings: PM.state.settings,
    transform: PM.state.transform
  };
  return JSON.stringify(slice, null, 2);
};

PM.data.statsByBook = function () {
  var map = new Map();
  for (var i = 0; i < PM.state.patterns.length; i++) {
    var p = PM.state.patterns[i];
    var counted = {};
    for (var j = 0; j < p.refs.length; j++) {
      var book = p.refs[j].book;
      if (!book) { continue; }
      if (!map.has(book)) { map.set(book, { count: 0, cats: new Set() }); }
      var rec = map.get(book);
      rec.cats.add(p.category);
      // count = number of distinct patterns touching this book
      if (!counted[book]) { counted[book] = true; rec.count++; }
    }
  }
  return map;
};

/* ---------------------------------------------------------------------------
 * Verse helpers — task-mandated PM.getVerse / PM.fetchVerse.
 * (PM.bible.* in bible.js may share PM.data.verses as its embedded source.)
 * -------------------------------------------------------------------------*/

function _verseKeyFromRef(ref) {
  if (ref == null) { return ''; }
  if (typeof ref === 'string') { return ref.trim(); }
  if (ref.book && ref.chapter != null && ref.verse != null) {
    return ref.book + ' ' + ref.chapter + ':' + ref.verse;
  }
  return '';
}

PM.getVerse = function (ref) {
  var key = _verseKeyFromRef(ref);
  if (!key) { return null; }
  if (Object.prototype.hasOwnProperty.call(PM.data.verses, key)) {
    return PM.data.verses[key];
  }
  return null;
};

PM.fetchVerse = function (ref) {
  // Async. Try bolls.life; cache into PM.data.verses on success; offline -> null.
  return new Promise(function (resolve) {
    try {
      var key, book, chapter, verse;
      if (typeof ref === 'string') {
        // Parse "Book C:V" via PM.bible.parseRef if available, else minimal parse.
        var parsed = (PM.bible && typeof PM.bible.parseRef === 'function')
          ? PM.bible.parseRef(ref) : null;
        if (parsed) { ref = parsed; }
        else {
          var m = String(ref).trim().match(/^(.+?)\s+(\d+):(\d+)$/);
          if (!m) { resolve(null); return; }
          ref = { book: m[1].trim(), chapter: +m[2], verse: +m[3] };
        }
      }
      book = ref.book; chapter = ref.chapter; verse = ref.verse;
      key = _verseKeyFromRef(ref);

      // Embedded hit short-circuits the network.
      var embedded = PM.getVerse(key);
      if (embedded != null) { resolve(embedded); return; }

      var meta = PM.consts.BOOK_BY_NAME[book];
      if (!meta) { resolve(null); return; }

      var url = PM.consts.BOLLS_BASE + meta.id + '/' + chapter + '/' + verse + '/';
      fetch(url).then(function (res) {
        if (!res || !res.ok) { resolve(null); return; }
        return res.json();
      }).then(function (json) {
        if (!json) { resolve(null); return; }
        // bolls.life returns { ..., text: "..." } (or an array on some endpoints).
        var text = null;
        if (typeof json.text === 'string') { text = json.text; }
        else if (Array.isArray(json) && json[0] && typeof json[0].text === 'string') {
          text = json[0].text;
        }
        if (text == null) { resolve(null); return; }
        // Strip any residual HTML tags that bolls may include.
        text = String(text).replace(/<[^>]*>/g, '').trim();
        PM.data.verses[key] = text; // cache for offline reuse
        resolve(text);
      }).catch(function () { resolve(null); });
    } catch (e) {
      resolve(null);
    }
  });
};

  { sk: 'c_serpent', title: 'The Bronze Serpent Lifted Up', category: 'prophetic', testament: 'both', description: 'In the wilderness Moses lifted a serpent of brass upon a pole, and whoso looked upon it lived; even so must the Son of man be lifted up, that the venom of sin be healed by a believing gaze.', refs: [_ref('Numbers', 21, 8), _ref('Numbers', 21, 9), _ref('2 Kings', 18, 4), _ref('John', 3, 14), _ref('John', 3, 15), _ref('1 Corinthians', 10, 9)], tags: ['bronze-serpent','lifted-up','wilderness','healing','crucifixion'], observations: [ { ts: _seedTs(11, 2), text: 'Both the serpent and the cross make the very image of the curse into the instrument of cure — sin and death disarmed by their own likeness.' } ] },
  { sk: 'c_manna', title: 'Manna and the Bread of Life', category: 'prophetic', testament: 'both', description: 'Bread rained down from heaven to feed Israel in the desert, gathered fresh each dawn; yet that bread was but the shadow of the true Bread, for Christ saith, “I am the living bread which came down from heaven.”', refs: [_ref('Exodus', 16, 4), _ref('Exodus', 16, 15), _ref('Deuteronomy', 8, 3), _ref('Psalms', 78, 24), _ref('John', 6, 31), _ref('John', 6, 35), _ref('John', 6, 51), _ref('1 Corinthians', 10, 3)], tags: ['manna','bread-of-life','wilderness','heaven-sent','eucharist'], observations: [ { ts: _seedTs(7, 1), text: 'The fathers ate manna and died; he that eateth this Bread shall live for ever — the type sustains the body, the antitype the soul.' } ] },
  { sk: 'c_melchizedek', title: 'Melchizedek, Priest-King of Salem', category: 'prophetic', testament: 'both', description: 'Without father, without mother, without beginning of days, Melchizedek met Abram with bread and wine and blessed him; a priest for ever after whose order Christ is sworn the eternal High Priest.', refs: [_ref('Genesis', 14, 18), _ref('Psalms', 110, 4), _ref('Hebrews', 5, 6), _ref('Hebrews', 6, 20), _ref('Hebrews', 7, 1), _ref('Hebrews', 7, 3), _ref('Hebrews', 7, 17)], tags: ['melchizedek','priest-king','bread-and-wine','eternal-priesthood','order'], observations: [ { ts: _seedTs(19, 3), text: 'His priesthood precedes Levi and outlasts it — proof that a greater Priest was always purposed, unbound by lineage or death.' } ] },
  { sk: 'c_kinsman', title: 'Boaz the Kinsman-Redeemer', category: 'relational', testament: 'both', description: 'Boaz, the near kinsman, paid the price to redeem the field and take the widow Ruth to wife; so Christ our nearest Kinsman, born of woman, redeemed his impoverished bride at the cost of himself.', refs: [_ref('Leviticus', 25, 25), _ref('Ruth', 2, 20), _ref('Ruth', 3, 9), _ref('Ruth', 4, 9), _ref('Ruth', 4, 10), _ref('Job', 19, 25), _ref('Galatians', 4, 4), _ref('Galatians', 4, 5)], tags: ['kinsman-redeemer','boaz','ruth','redemption','bride'], observations: [ { ts: _seedTs(15, 0), text: 'The redeemer must be near of kin, able to pay, and willing — three conditions met perfectly only in the Word made flesh.' } ] },
  { sk: 'c_joseph', title: 'Joseph: Rejected then Exalted', category: 'prophetic', testament: 'both', description: 'Sold by his brethren for silver, cast into the pit, then raised to a throne whence he saved the very kin who betrayed him; “ye thought evil against me; but God meant it unto good.”', refs: [_ref('Genesis', 37, 28), _ref('Genesis', 45, 4), _ref('Genesis', 45, 5), _ref('Genesis', 50, 20), _ref('Psalms', 105, 17), _ref('Acts', 7, 9), _ref('Philippians', 2, 9)], tags: ['joseph','rejected-exalted','sold-for-silver','providence','reconciliation'], observations: [ { ts: _seedTs(23, 4), text: 'Betrayed for silver and raised to save his betrayers — the whole gospel arc rehearsed in a single patriarch.' } ] },
  { sk: 'c_newadam', title: 'Christ the New Adam', category: 'prophetic', testament: 'both', description: 'By one man came sin and death into the world through a tree of disobedience; by one Man came righteousness and life through a tree of obedience — the last Adam, a quickening spirit.', refs: [_ref('Genesis', 2, 7), _ref('Genesis', 3, 6), _ref('Romans', 5, 14), _ref('Romans', 5, 18), _ref('Romans', 5, 19), _ref('1 Corinthians', 15, 22), _ref('1 Corinthians', 15, 45)], tags: ['new-adam','last-adam','disobedience-obedience','life','representative-head'], observations: [ { ts: _seedTs(4, 1), text: 'Adam is the figure of him that was to come — the first head ruined the race, the second head recovers it, each acting for all.' } ] },
  { sk: 'w_flood', title: 'The Flood', category: 'structural', testament: 'both', description: 'The waters that drowned a wicked world bore the ark safely through judgment — and Peter names that selfsame water the true figure of baptism, wherein death’s flood becomes the door to a saved life.', refs: [_ref('Genesis', 6, 17), _ref('Genesis', 7, 12), _ref('Genesis', 8, 1), _ref('Genesis', 9, 11), _ref('1 Peter', 3, 20), _ref('1 Peter', 3, 21)], tags: ['baptism','judgment','ark','cleansing','new-creation'], observations: [ { ts: _seedTs(14, 2), text: 'Peter’s “like figure” (1 Pet 3:21) makes the ark’s eight souls saved “by water” the explicit type of baptism — saved through, not from, the waters.' } ] },
  { sk: 'w_redsea', title: 'Red Sea Crossing', category: 'structural', testament: 'both', description: 'Israel passed through the sea on dry ground while the same walls of water that shielded them swallowed Pharaoh — Paul calls it being baptized unto Moses in the cloud and in the sea.', refs: [_ref('Exodus', 14, 21), _ref('Exodus', 14, 22), _ref('Exodus', 14, 29), _ref('Exodus', 15, 1), _ref('1 Corinthians', 10, 1), _ref('1 Corinthians', 10, 2)], tags: ['baptism','exodus','deliverance','dry-ground','passing-through'], observations: [ { ts: _seedTs(9, 1), text: '“Baptized unto Moses in the cloud and in the sea” (1 Cor 10:2) pairs water and Spirit-cloud — the same two witnesses Jesus names in John 3:5.' } ] },
  { sk: 'w_livingwater', title: 'Living Water', category: 'prophetic', testament: 'both', description: 'The prophets indict a people who forsook the fountain of living waters to hew broken cisterns — and at the well and in the temple courts the Lord stands and cries, whosoever thirsteth, let him come and drink of Me.', refs: [_ref('Isaiah', 55, 1), _ref('Jeremiah', 2, 13), _ref('Zechariah', 14, 8), _ref('John', 4, 10), _ref('John', 4, 14), _ref('John', 7, 38)], tags: ['fountain','thirst','spirit','well','indwelling'], observations: [ { ts: _seedTs(21, 3), text: 'John 7:39 glosses the “rivers of living water” as the Spirit — Jeremiah’s forsaken fountain restored from within the believer.' } ] },
  { sk: 'w_jordan', title: 'Crossing the Jordan', category: 'structural', testament: 'both', description: 'Israel crossed Jordan on dry ground into the promise, Naaman dipped seven times and his flesh came again clean as a child’s — and at that same river John baptized unto repentance, and the Sinless One went down into the cleansing flood.', refs: [_ref('Joshua', 3, 16), _ref('Joshua', 3, 17), _ref('2 Kings', 5, 14), _ref('Matthew', 3, 6), _ref('Matthew', 3, 13), _ref('Mark', 1, 5)], tags: ['baptism','jordan','cleansing','repentance','entering-promise'], observations: [ { ts: _seedTs(6, 0), text: 'Naaman’s sevenfold dipping (2 Kgs 5:14) prefigures the washing John offered at the very same Jordan — leprosy and sin both cleansed in the river of entry.' } ] },
  { sk: 'w_bloodsprinkling', title: 'Blood of Sprinkling', category: 'divine', testament: 'both', description: 'Moses sprinkled the blood of the covenant upon the people, saying, Behold the blood — and Hebrews lifts our eyes to the blood of sprinkling that speaketh better things than that of Abel, ratifying a better testament.', refs: [_ref('Exodus', 24, 8), _ref('Leviticus', 16, 14), _ref('Hebrews', 9, 19), _ref('Hebrews', 9, 22), _ref('Hebrews', 12, 24), _ref('1 Peter', 1, 2)], tags: ['blood','covenant','sprinkling','atonement','mediator'], observations: [ { ts: _seedTs(12, 1), text: '“The blood of sprinkling that speaketh better things than that of Abel” (Heb 12:24) sets Christ’s blood as the antitype of both Abel’s cry and Moses’ basin.' } ] },
  { sk: 'w_laver', title: 'The Bronze Laver', category: 'structural', testament: 'both', description: 'Between the altar and the holy place stood the laver of brass, that the priests might wash and not die — and Christ now sanctifies His church, cleansing it with the washing of water by the word, the laver of regeneration.', refs: [_ref('Exodus', 30, 18), _ref('Exodus', 30, 19), _ref('Exodus', 38, 8), _ref('Ephesians', 5, 26), _ref('Titus', 3, 5), _ref('Hebrews', 10, 22)], tags: ['washing','priesthood','sanctification','regeneration','word'], observations: [ { ts: _seedTs(18, 2), text: 'Ephesians 5:26 (“washing of water by the word”) reads the priests’ laver as the church’s ongoing cleansing — bronze basin fulfilled in Word-and-water.' } ] },
  { sk: 'k_davidcov', title: 'Davidic Covenant — The Everlasting Throne', category: 'prophetic', testament: 'both', description: 'To David the LORD sware a throne that should not pass away, and the angel told Mary her Son would reign over the house of Jacob for ever — the oath of the kingdom come to flesh.', refs: [_ref('2 Samuel', 7, 16), _ref('Psalms', 89, 4), _ref('Psalms', 132, 11), _ref('Isaiah', 9, 7), _ref('Luke', 1, 33), _ref('Acts', 2, 30)], tags: ['davidic-covenant','throne','kingdom','everlasting','royal-oath'], observations: [ { ts: _seedTs(9, 2), text: 'Gabriel’s “throne of his father David” in Luke 1:32 is a direct citation of the 2 Samuel 7 oath — the covenant is the script Gabriel reads.' } ] },
  { sk: 'k_anointed', title: 'The Anointed One — Messiah and Christ', category: 'prophetic', testament: 'both', description: 'The oil ran down on David and the Spirit came upon him, and ages after God anointed Jesus of Nazareth with the Holy Ghost and with power — “Christ” being but the Greek for the oil-kissed king.', refs: [_ref('1 Samuel', 16, 13), _ref('Psalms', 2, 2), _ref('Psalms', 45, 7), _ref('Isaiah', 61, 1), _ref('Daniel', 9, 25), _ref('Acts', 10, 38)], tags: ['messiah','anointing','christ','holy-spirit','kingship'], observations: [ { ts: _seedTs(15, 0), text: 'Acts 10:38 reads like 1 Samuel 16:13 fulfilled: where Samuel poured oil, the Father pours the Spirit — the visible sign becomes the invisible power.' } ] },
  { sk: 'k_branch', title: 'The Branch — Righteous Shoot of David', category: 'prophetic', testament: 'both', description: 'A rod springs from the stem of Jesse and a righteous Branch is raised unto David, the man whose name is The BRANCH — the felled royal stump greening again in the Root and Offspring of David.', refs: [_ref('Isaiah', 11, 1), _ref('Isaiah', 4, 2), _ref('Jeremiah', 23, 5), _ref('Jeremiah', 33, 15), _ref('Zechariah', 3, 8), _ref('Zechariah', 6, 12), _ref('Revelation', 22, 16)], tags: ['branch','shoot-of-jesse','davidic-line','priest-king','righteous-king'], observations: [ { ts: _seedTs(22, 3), text: 'Zechariah 6:12–13 crowns the Branch and seats him as priest upon the throne — the only OT figure to hold both offices, fulfilled in Hebrews’ priest-king.' } ] },
  { sk: 'k_sonofdavid', title: 'Son of David — The Royal Title', category: 'relational', testament: 'NT', description: 'The book of the generation opens with “the son of David,” the blind cry it for mercy, and the multitudes hosanna it at the gate — Israel’s hope confessing the King by His pedigree.', refs: [_ref('Matthew', 1, 1), _ref('Matthew', 9, 27), _ref('Matthew', 21, 9), _ref('Matthew', 22, 42), _ref('Mark', 10, 47), _ref('Romans', 1, 3)], tags: ['son-of-david','royal-title','genealogy','hosanna','messianic-claim'], observations: [ { ts: _seedTs(6, 1), text: 'In Matthew 22:42–45 Jesus presses that David calls his own Son “Lord” — the title is true but too small; the Son of David is also David’s Lord.' } ] },
  { sk: 'k_shepherd', title: 'The Shepherd-King — One Shepherd, David', category: 'relational', testament: 'both', description: 'The LORD is my shepherd, and He sets up one shepherd over them, even David, and the Good Shepherd lays down His life for the sheep — the crook and the sceptre made one staff.', refs: [_ref('Psalms', 23, 1), _ref('Psalms', 78, 71), _ref('Ezekiel', 34, 23), _ref('Micah', 5, 2), _ref('John', 10, 11), _ref('Hebrews', 13, 20), _ref('1 Peter', 5, 4)], tags: ['shepherd-king','good-shepherd','pastoral','davidic-rule','flock'], observations: [ { ts: _seedTs(13, 4), text: 'Ezekiel 34 indicts the false shepherds then promises “my servant David” — John 10 answers it, the LORD-Shepherd of v.11–16 and the David-Shepherd of v.23 collapsing into one.' } ] },
  { sk: 'k_throneark', title: 'The Throne and the Ark — Enthroned on Cherubim', category: 'divine', testament: 'both', description: 'God speaks from between the cherubim above the mercy seat, sits high and lifted up with His train filling the temple, and John sees the throne set in heaven — the ark a footstool of the cosmic seat.', refs: [_ref('Exodus', 25, 22), _ref('1 Samuel', 4, 4), _ref('Psalms', 80, 1), _ref('Isaiah', 6, 1), _ref('Ezekiel', 1, 26), _ref('Hebrews', 9, 5), _ref('Revelation', 4, 2)], tags: ['throne','ark','cherubim','mercy-seat','enthroned-glory'], observations: [ { ts: _seedTs(28, 2), text: 'The mercy seat “between the cherubim” (Ex 25:22) is the earthly miniature of Isaiah 6 and Revelation 4 — the same throne, scaled from box to heaven.' } ] },
  { sk: 'n_twelve', title: 'The Number Twelve', category: 'numerical', testament: 'both', description: 'As Jacob blessed the twelve tribes, so the Lamb set twelve apostles upon twelve thrones — and the New Jerusalem beareth twelve gates and twelve foundations, the old Israel and the new met in one wall of jasper.', refs: [_ref('Genesis', 49, 28), _ref('Exodus', 28, 21), _ref('Matthew', 19, 28), _ref('Luke', 6, 13), _ref('Revelation', 21, 12), _ref('Revelation', 21, 14)], tags: ['twelve','tribes','apostles','number','jerusalem'], observations: [ { ts: _seedTs(12, 2), text: 'Revelation 21:12–14 fuses the twelve tribes (the gates) with the twelve apostles (the foundations) — one city built of both covenants.' } ] },
  { sk: 'n_firstfruits', title: 'Firstfruits', category: 'prophetic', testament: 'both', description: 'Israel waved the first sheaf of harvest before the Lord, a pledge that the whole field was His; and Christ is risen from the dead, become the firstfruits of them that slept, the firstborn of a coming harvest of the dead.', refs: [_ref('Exodus', 23, 19), _ref('Leviticus', 23, 10), _ref('Deuteronomy', 26, 10), _ref('1 Corinthians', 15, 20), _ref('1 Corinthians', 15, 23), _ref('Romans', 8, 23), _ref('James', 1, 18)], tags: ['firstfruits','harvest','resurrection','offering','order'], observations: [ { ts: _seedTs(8, 1), text: '1 Corinthians 15:23 keeps the harvest order: Christ the firstfruits, afterward they that are Christ’s at His coming.' } ] },
  { sk: 'n_jubilee', title: 'Jubilee, the Year of Release', category: 'structural', testament: 'both', description: 'In the fiftieth year the trumpet sounded liberty throughout the land, every debt forgiven and every man returned to his possession — and Jesus opened the scroll to preach the acceptable year of the Lord, the everlasting Jubilee come in flesh.', refs: [_ref('Leviticus', 25, 10), _ref('Leviticus', 25, 13), _ref('Isaiah', 61, 1), _ref('Isaiah', 61, 2), _ref('Luke', 4, 18), _ref('Luke', 4, 19)], tags: ['jubilee','release','liberty','debt','acceptable-year'], observations: [ { ts: _seedTs(21, 4), text: 'Luke 4:18–19 quotes Isaiah 61 but stops mid-sentence before “the day of vengeance,” claiming only the Jubilee of release.' } ] },
  { sk: 'n_remnant', title: 'The Remnant', category: 'prophetic', testament: 'both', description: 'Though Israel be as the sand of the sea, only a remnant shall return; the seven thousand that bowed not the knee to Baal — and Paul beheld in his own day a remnant according to the election of grace.', refs: [_ref('1 Kings', 19, 18), _ref('Isaiah', 10, 21), _ref('Micah', 5, 7), _ref('Zephaniah', 3, 13), _ref('Romans', 9, 27), _ref('Romans', 11, 5)], tags: ['remnant','election','preservation','return','grace'], observations: [ { ts: _seedTs(5, 2), text: 'Isaiah named his son Shear-jashub, “a remnant shall return” (Isaiah 7:3) — a walking sign of the doctrine.' } ] },
  { sk: 'n_dayofthelord', title: 'The Day of the Lord', category: 'prophetic', testament: 'both', description: 'The prophets cried that the Day of the Lord cometh, darkness and not light, the sun turned to blood — and Peter declareth it shall come as a thief, the heavens passing away with a great noise, the elements melting with fervent heat.', refs: [_ref('Joel', 2, 1), _ref('Joel', 2, 31), _ref('Amos', 5, 18), _ref('Amos', 5, 20), _ref('1 Thessalonians', 5, 2), _ref('2 Peter', 3, 10)], tags: ['day-of-the-lord','judgment','prophetic','cosmic','thief'], observations: [ { ts: _seedTs(17, 0), text: 'Joel 2:31’s sun-to-darkness reappears in Acts 2:20 at Pentecost — the Day already breaking in.' } ] },
  { sk: 'n_exilereturn', title: 'Exile and Return', category: 'structural', testament: 'both', description: 'Judah was carried captive to Babylon, yet Cyrus loosed them to rebuild the house of the Lord — the selfsame road the prodigal walked, who came to himself in the far country and rose to return unto his father.', refs: [_ref('2 Kings', 25, 11), _ref('Jeremiah', 29, 10), _ref('Ezra', 1, 1), _ref('Ezra', 1, 3), _ref('Luke', 15, 18), _ref('Luke', 15, 24)], tags: ['exile','return','babylon','restoration','prodigal'], observations: [ { ts: _seedTs(3, 1), text: 'Luke 15:24, “was dead, and is alive again,” reads the prodigal’s homecoming as a personal exile-and-return.' } ] },
  { sk: 'h_bride', title: 'Bridegroom & Bride', category: 'relational', testament: 'both', description: 'The LORD betroths faithless Israel unto Himself for ever, and the whole canon bends toward one wedding — until the Lamb’s wife hath made herself ready and the marriage supper is come.', refs: [_ref('Hosea', 2, 19), _ref('Song of Solomon', 2, 16), _ref('Isaiah', 62, 5), _ref('Ephesians', 5, 25), _ref('Revelation', 19, 7), _ref('Revelation', 21, 2)], tags: ['bride','marriage','covenant','wedding','betrothal'], observations: [ { ts: _seedTs(8, 2), text: 'Paul calls marriage a “great mystery” of Christ and the church (Eph 5:32) — Hosea’s betrothal language is its OT seed.' } ] },
  { sk: 'h_vine', title: 'The True Vine & the Vineyard', category: 'structural', testament: 'both', description: 'Israel is the vine brought out of Egypt and planted, but it brought forth wild grapes; Christ stands forth as the true Vine, and the failed vineyard finds its fruit only in Him.', refs: [_ref('Psalms', 80, 8), _ref('Isaiah', 5, 1), _ref('Isaiah', 5, 7), _ref('John', 15, 1), _ref('John', 15, 5), _ref('Matthew', 21, 33)], tags: ['vine','vineyard','fruit','israel','abiding'], observations: [ { ts: _seedTs(14, 1), text: 'Isaiah 5’s wild grapes and Psalm 80’s ravaged vine are answered by John 15:1 — the Vine that cannot fail.' } ] },
  { sk: 'h_harvest', title: 'Harvest & Reaping', category: 'prophetic', testament: 'both', description: 'From Ruth gleaning in Boaz’s field to Joel’s sickle put to the ripe vintage, the harvest ripens toward the end of the world, when the reapers are the angels and the Son of man thrusts in His sickle.', refs: [_ref('Joel', 3, 13), _ref('Ruth', 2, 3), _ref('Matthew', 9, 37), _ref('Matthew', 13, 39), _ref('John', 4, 35), _ref('Revelation', 14, 15)], tags: ['harvest','reaping','sickle','firstfruits','judgment'], observations: [ { ts: _seedTs(21, 3), text: 'Joel 3:13 “put ye in the sickle, for the harvest is ripe” is quoted almost verbatim by the angel in Rev 14:15.' } ] },
  { sk: 'h_light', title: 'Light & Darkness', category: 'divine', testament: 'both', description: 'The first divine word, “Let there be light,” divides light from darkness; the same Word made flesh is the Life that is the Light of men, and the darkness comprehended it not.', refs: [_ref('Genesis', 1, 3), _ref('Isaiah', 9, 2), _ref('John', 1, 4), _ref('John', 1, 5), _ref('John', 8, 12), _ref('Revelation', 21, 23)], tags: ['light','darkness','creation','glory','life'], observations: [ { ts: _seedTs(5, 0), text: 'John 1 deliberately re-opens Genesis 1 — “In the beginning” + “light” — making Christ the uncreated Light behind day one.' } ] },
  { sk: 'h_mountain', title: 'The Mountain of God', category: 'structural', testament: 'both', description: 'The glory descends on Sinai in fire, abides on Zion the holy hill, and blazes again on the mount of Transfiguration — and in the last day the mountain of the LORD’s house is established above the hills.', refs: [_ref('Exodus', 19, 20), _ref('Isaiah', 2, 2), _ref('Psalms', 2, 6), _ref('Matthew', 17, 2), _ref('Hebrews', 12, 22), _ref('Revelation', 21, 10)], tags: ['mountain','sinai','zion','glory','transfiguration'], observations: [ { ts: _seedTs(11, 4), text: 'Moses and Elijah — the two who met God on Sinai/Horeb — reappear on the Transfiguration mount (Matt 17), tying the holy hills together.' } ] },
  { sk: 'h_newwine', title: 'New Wine', category: 'prophetic', testament: 'both', description: 'The promised land flows with the blood of grapes, and the LORD’s feast on Zion is a feast of wines on the lees; at Cana the water blushes to wine, the new wine that cannot be kept in old bottles.', refs: [_ref('Genesis', 49, 11), _ref('Isaiah', 25, 6), _ref('Amos', 9, 13), _ref('John', 2, 11), _ref('Matthew', 9, 17), _ref('Matthew', 26, 29)], tags: ['wine','feast','cana','wedding','newness'], observations: [ { ts: _seedTs(3, 1), text: 'Cana’s “good wine kept until now” (John 2:10) enacts Isaiah 25:6’s mountain feast of wines on the lees — the kingdom arrives as a wedding vintage.' } ] },
];

/* Deep-copy a seed pattern template into a real Pattern (no sk, real id, dates). */
function _materializePattern(tpl) {
  var t = PM.now();
  return PM.data.makePattern({
    title: tpl.title,
    category: tpl.category,
    testament: tpl.testament,
    description: tpl.description,
    refs: tpl.refs.map(function (r) {
      return { book: r.book, chapter: r.chapter, verse: r.verse };
    }),
    tags: tpl.tags ? tpl.tags.slice() : [],
    observations: (tpl.observations || []).map(function (o) {
      return { ts: o.ts, text: o.text };
    }),
    obsidianPath: 'PatternMap/' + _slug(tpl.title) + '.md',
    created: tpl.created || t,
    modified: tpl.modified || t,
    synced: false
  });
}

function _slug(title) {
  return String(title)
    .toLowerCase()
    .replace(/→/g, 'to')          // arrow -> "to"
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

/* Build a fresh {patterns, edges} graph from the seed templates. */
function _buildSeed() {
  var skToId = {};
  var patterns = [];
  var i;
  for (i = 0; i < PM.data.defaultPatterns.length; i++) {
    var tpl = PM.data.defaultPatterns[i];
    var p = _materializePattern(tpl);
    // Initial circle spread so the force layout has a pleasant starting ring.
    var n = PM.data.defaultPatterns.length;
    var ang = (i / n) * Math.PI * 2;
    p.x = Math.cos(ang) * 260;
    p.y = Math.sin(ang) * 260;
    skToId[tpl.sk] = p.id;
    patterns.push(p);
  }

  var edges = [];
  var seenPair = {};
  for (i = 0; i < PM.data.defaultEdges.length; i++) {
    var e = PM.data.defaultEdges[i];
    var from = skToId[e.from], to = skToId[e.to];
    if (!from || !to || from === to) { continue; }
    var key = from < to ? from + '|' + to : to + '|' + from;
    if (seenPair[key]) { continue; }
    seenPair[key] = true;
    var s = (typeof e.strength === 'number') ? e.strength : 0.6;
    if (s < 0) { s = 0; } if (s > 1) { s = 1; }
    edges.push({
      id: PM.uid('edge'),
      from: from,
      to: to,
      label: e.label || '',
      strength: s
    });
  }

  return { patterns: patterns, edges: edges };
}

/* §6.1 PM.data.seed — populate PM.state.patterns/edges from templates. */
PM.data.seed = function () {
  var built = _buildSeed();
  PM.state.patterns = built.patterns;
  PM.state.edges = built.edges;
  PM.data.recountAll();
  return { patterns: PM.state.patterns, edges: PM.state.edges };
};

/* Task-mandated PM.seed() — returns a fresh DEEP COPY of {patterns, edges}
 * WITHOUT mutating PM.state (a pure factory the integrator/tests can use). */
PM.seed = function () {
  var built = _buildSeed();
  // refCount on the copy.
  var counts = {};
  var i;
  for (i = 0; i < built.patterns.length; i++) { counts[built.patterns[i].id] = 0; }
  for (i = 0; i < built.edges.length; i++) {
    if (counts[built.edges[i].from] != null) { counts[built.edges[i].from]++; }
    if (counts[built.edges[i].to] != null) { counts[built.edges[i].to]++; }
  }
  for (i = 0; i < built.patterns.length; i++) {
    built.patterns[i].refCount = counts[built.patterns[i].id] || 0;
  }
  return JSON.parse(JSON.stringify(built));
};

 * Task-brief convenience aliases (kept for the brief's PM.data shape).
 * These are READ views; the canonical surfaces are above.
 * -------------------------------------------------------------------------*/
PM.data.categories = PM.data.CATEGORIES;
PM.data.books = {
  ot: PM.consts.BOOKS.filter(function (b) { return b.testament === 'OT'; }),
  nt: PM.consts.BOOKS.filter(function (b) { return b.testament === 'NT'; })
};

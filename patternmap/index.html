      PM.toast('Connected to ' + (target ? target.title : 'pattern'), 'success');
    }
  }

  // Public contract name: addConnection() — opens the inline search.
  PM.drawer.addConnection = function () {
    toggleConnectSearch(true);
  };

  function removeConnection(edgeId) {
    if (!edgeId) return;
    if (PM.data && typeof PM.data.deleteEdge === 'function') {
      PM.data.deleteEdge(edgeId);
    }
    if (typeof PM.save === 'function') PM.save();
    if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();
    PM.drawer.renderConnections(current());
    refreshMeta(current());
  }

  /* ----------------------------------------------------------------------- *
   * addObservation — append, touch, save, re-render
   * ----------------------------------------------------------------------- */
  PM.drawer.addObservation = function (text) {
    var p = current();
    if (!p) return;
    var body = (text || '').trim();
    if (!body) return;

    var obs = (p.observations || []).slice();
    obs.push({ ts: (typeof PM.now === 'function') ? PM.now() : Date.now(), text: body });

    if (PM.data && typeof PM.data.updatePattern === 'function') {
      PM.data.updatePattern(p.id, { observations: obs });
    } else if (PM.data && typeof PM.data.touch === 'function') {
      p.observations = obs;
      PM.data.touch(p.id);
    }
    if (typeof PM.save === 'function') PM.save();
    if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();

    PM.drawer.renderObservations(current());
    PM.drawer.renderSyncStatus(current());
    refreshMeta(current());
    if (typeof PM.toast === 'function') PM.toast('Observation added.', 'success');
  };

  /* ----------------------------------------------------------------------- *
   * Open in Obsidian
   * ----------------------------------------------------------------------- */
  function openInObsidian(p) {
    var uri = '';
    if (PM.sync && typeof PM.sync.obsidianUri === 'function') {
      try { uri = PM.sync.obsidianUri(p) || ''; } catch (e) { uri = ''; }
    }
    if (!uri) {
      if (typeof PM.toast === 'function') PM.toast('No Obsidian vault configured.', 'warn');
      return;
    }
    try {
      window.location.href = uri;   // obsidian:// deep link
    } catch (e) {
      if (typeof PM.toast === 'function') PM.toast('Could not open Obsidian.', 'error');
    }
  }

  /* ----------------------------------------------------------------------- *
   * confirmDelete — confirm → delete pattern + edges → close → re-render
   * ----------------------------------------------------------------------- */
  PM.drawer.confirmDelete = function () {
    var p = current();
    if (!p) return;
    var ok = window.confirm(
      'Delete "' + p.title + '"?\n\n' +
      'This removes the pattern and all its connections. This cannot be undone.'
    );
    if (!ok) return;

    var title = p.title;
    if (PM.data && typeof PM.data.deletePattern === 'function') {
      PM.data.deletePattern(p.id);   // removes pattern + its edges + clears selection + recounts
    }
    if (typeof PM.save === 'function') PM.save();

    // Close the drawer (also clears selection through graph.select(null) if not
    // already cleared by deletePattern).
    PM.drawer.close();

    if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();
    if (typeof PM.render === 'function') PM.render();
    if (typeof PM.toast === 'function') PM.toast('Deleted "' + title + '".', 'info');
  };

})();
</script>
<script>
/* ===== modal.js ===== */
/* ============================================================================
 * PatternMap — modal.js
 * PM.modal: Add/Edit pattern modal + shared verse picker (VersePickerSearch).
 *
 * Conforms to CONTRACT §6.4. Public surface:
 *   PM.modal.mount / openAdd / openEdit / close / render / collect / validate
 *           / submit / setSubmitting / suggestPath / openVersePicker
 *   PM.slug(title)            (top-level slug helper, idempotent guard)
 *
 * No DOM side effects at parse time; all wiring happens in PM.modal.mount(),
 * which PM.init() calls. Everything attaches to window.PM.
 * ==========================================================================*/
(function () {
  'use strict';

  window.PM = window.PM || {};
  PM.modal = PM.modal || {};

  /* ----------------------------------------------------------------------- *
   * PM.slug — slugify a title into a filesystem-friendly note basename.
   * Kept readable (spaces preserved as spaces is NOT desired for a slug; the
   * Obsidian path uses the human title via suggestPath, but slug is the safe
   * machine form used as a fallback / id-ish helper). Idempotent define guard.
   * ----------------------------------------------------------------------- */
  if (typeof PM.slug !== 'function') {
    PM.slug = function (title) {
      return String(title == null ? '' : title)
        .normalize('NFKD')
        .replace(/[̀-ͯ]/g, '')   // strip diacritics
        .replace(/→/g, 'to')               // arrow used in seed titles
        .replace(/&/g, 'and')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')       // non-alnum -> hyphen
        .replace(/^-+|-+$/g, '')           // trim hyphens
        .replace(/-{2,}/g, '-') || 'untitled';
    };
  }

  /* ----------------------------------------------------------------------- *
   * Module-private state for the currently-open modal session.
   * ----------------------------------------------------------------------- */
  var session = {
    mode: 'add',        // 'add' | 'edit'
    editId: null,       // pattern id when editing
    category: 'divine', // currently selected category key
    testament: 'both',  // 'OT' | 'NT' | 'both'
    refs: [],           // Ref[] collected from the tag input
    tags: [],           // string[] freeform tags
    connectIds: [],     // string[] ids of patterns to initially connect
    pathEdited: false,  // true once the user manually edits the Obsidian path
    submitting: false,  // submitting state
    mounted: false      // mount() ran
  };

  var BOOK_DATALIST_ID = 'pmBookList';

  /* ----------------------------------------------------------------------- *
   * Small DOM helpers (private).
   * ----------------------------------------------------------------------- */
  function $(id) { return document.getElementById(id); }
  function backdrop() { return $('addModal'); }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  // Resolve an icon string from data layer, falling back to empty.
  function icon(name) {
    return (PM.data && typeof PM.data.iconSvg === 'function') ? PM.data.iconSvg(name) : '';
  }

  function categories() {
    return (PM.data && PM.data.CATEGORIES) ? PM.data.CATEGORIES : [];
  }
  function categoryColor(key) {
    return (PM.data && typeof PM.data.categoryColor === 'function')
      ? PM.data.categoryColor(key) : '#fb923c';
  }

  // Book names for autocomplete; tolerant if bible not yet loaded.
  function bookNames() {
    if (PM.bible && typeof PM.bible.bookNames === 'function') {
      try { return PM.bible.bookNames() || []; } catch (e) { /* ignore */ }
    }
    if (PM.consts && PM.consts.BOOKS) return PM.consts.BOOKS.map(function (b) { return b.name; });
    return [];
  }

  // Parse a free string into a Ref via bible; returns Ref|null.
  function parseRef(str) {
    if (PM.bible && typeof PM.bible.parseRef === 'function') {
      try { return PM.bible.parseRef(str); } catch (e) { return null; }
    }
    return null;
  }

  // Canonical "Book C:V" string for a Ref.
  function verseKey(ref) {
    if (PM.bible && typeof PM.bible.verseKey === 'function') {
      try { return PM.bible.verseKey(ref); } catch (e) { /* ignore */ }
    }
    if (!ref) return '';
    return ref.book + ' ' + ref.chapter + ':' + ref.verse;
  }

  /* ----------------------------------------------------------------------- *
   * PM.modal.suggestPath — auto-suggested Obsidian note path from a title.
   * Uses settings.syncFolder (default "PatternMap/"). Human title preserved
   * (Obsidian filenames allow spaces); illegal path chars are stripped.
   * ----------------------------------------------------------------------- */
  PM.modal.suggestPath = function (title) {
    var folder = (PM.state && PM.state.settings && PM.state.settings.syncFolder) || 'PatternMap/';
    if (folder && folder.charAt(folder.length - 1) !== '/') folder += '/';
    var name = String(title == null ? '' : title).trim();
    // Strip characters illegal in common filesystems; keep spaces & case.
    name = name.replace(/[\\/:*?"<>|]+/g, ' ').replace(/\s+/g, ' ').trim();
    if (!name) name = PM.slug(title);
    return folder + name + '.md';
  };

  /* ----------------------------------------------------------------------- *
   * mount — one-time wiring. Backdrop click, ESC, delegated submit/cancel/close.
   * The modal inner DOM is (re)built per-open by render(), but we wire the
   * backdrop + global key handler once here.
   * ----------------------------------------------------------------------- */
  PM.modal.mount = function () {
    if (session.mounted) return;
    session.mounted = true;

    var bd = backdrop();
    if (!bd) return;

    // Backdrop click (outside .modal) closes — but not while submitting.
    bd.addEventListener('mousedown', function (ev) {
      if (ev.target === bd && !session.submitting) PM.modal.close();
    });

    // ESC closes the modal if it is the top-most overlay handled here.
    // (app.js owns the global ESC priority chain; we also guard locally so the
    //  modal still closes on ESC during isolated testing.)
    document.addEventListener('keydown', function (ev) {
      if (ev.key !== 'Escape') return;
      if (!PM.state || !PM.state.ui || !PM.state.ui.modalOpen) return;
      if (session.submitting) return;
      // Don't steal ESC if settings is open above us (app.js priority).
      if (PM.state.ui.settingsOpen) return;
      PM.modal.close();
    });

    // Ensure a shared <datalist> of book names exists for ref autocomplete.
    ensureBookDatalist();
  };

  function ensureBookDatalist() {
    var dl = $(BOOK_DATALIST_ID);
    if (!dl) {
      dl = document.createElement('datalist');
      dl.id = BOOK_DATALIST_ID;
      document.body.appendChild(dl);
    }
    var names = bookNames();
    // Rebuild options (cheap; only on mount / open).
    dl.innerHTML = names.map(function (n) {
      return '<option value="' + esc(n + ' ') + '"></option>';
    }).join('');
  }

  /* ----------------------------------------------------------------------- *
   * openAdd / openEdit / close
   * ----------------------------------------------------------------------- */
  PM.modal.openAdd = function () {
    session.mode = 'add';
    session.editId = null;
    session.category = (categories()[0] && categories()[0].key) || 'divine';
    session.testament = 'both';
    session.refs = [];
    session.tags = [];
    session.connectIds = [];
    session.pathEdited = false;
    session.submitting = false;
    openCommon(null);
  };

  PM.modal.openEdit = function (id) {
    var p = (PM.data && PM.data.getPattern) ? PM.data.getPattern(id) : null;
    if (!p) {
      if (PM.toast) PM.toast('Pattern not found', 'error');
      return;
    }
    session.mode = 'edit';
    session.editId = id;
    session.category = p.category || 'custom';
    session.testament = p.testament || 'both';
    session.refs = (p.refs || []).map(function (r) {
      return { book: r.book, chapter: r.chapter, verse: r.verse };
    });
    session.tags = (p.tags || []).slice();
    // Pre-connect with existing neighbors so the multiselect reflects reality;
    // submit() diffs against existing edges so no duplicates are made.
    session.connectIds = (PM.data && PM.data.neighborsOf)
      ? PM.data.neighborsOf(id).map(function (n) { return n.id; })
      : [];
    session.pathEdited = true; // existing path is authoritative; don't auto-overwrite
    session.submitting = false;
    openCommon(p);
  };

  function openCommon(pattern) {
    ensureBookDatalist();
    PM.modal.render(session.mode, pattern);
    var bd = backdrop();
    if (bd) {
      bd.classList.add('is-open');
      bd.setAttribute('aria-hidden', 'false');
    }
    if (PM.state && PM.state.ui) PM.state.ui.modalOpen = true;
    // Focus the title field for "empty/filling" flow.
    setTimeout(function () {
      var t = $('mTitle');
      if (t) t.focus();
    }, 30);
  }

  PM.modal.close = function () {
    var bd = backdrop();
    if (bd) {
      bd.classList.remove('is-open');
      bd.setAttribute('aria-hidden', 'true');
    }
    if (PM.state && PM.state.ui) PM.state.ui.modalOpen = false;
    // Reset transient form state.
    session.submitting = false;
    session.editId = null;
    session.refs = [];
    session.tags = [];
    session.connectIds = [];
    session.pathEdited = false;
    // Leave the inner DOM; it is rebuilt on next open.
  };

  /* ----------------------------------------------------------------------- *
   * render — build the full modal form for the given mode.
   * ----------------------------------------------------------------------- */
  PM.modal.render = function (mode, pattern) {
    var bd = backdrop();
    if (!bd) return;

    var titleVal = pattern ? pattern.title : '';
    var descVal = pattern ? (pattern.description || '') : '';
    var pathVal = pattern && pattern.obsidianPath
      ? pattern.obsidianPath
      : PM.modal.suggestPath(titleVal);

    var headTitle = (mode === 'edit') ? 'Edit Pattern' : 'Add Pattern';
    var submitLabel = (mode === 'edit') ? 'Save Changes' : 'Create Pattern';

    var modal = el('div', 'modal');
    modal.setAttribute('role', 'document');

    /* --- head --- */
    var head = el('div', 'modal__head');
    var h = el('h2', 'modal__title', esc(headTitle));
    var closeBtn = el('button', 'modal__close drawer__close');
    closeBtn.id = 'modalCloseBtn';
    closeBtn.type = 'button';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.innerHTML = icon('close') || '×';
    head.appendChild(h);
    head.appendChild(closeBtn);

    /* --- error host (for 'error' state toast at top of modal) --- */
    var errHost = el('div', 'modal__error');
    errHost.id = 'modalError';
    errHost.style.display = 'none';

    /* --- body --- */
    var body = el('div', 'modal__body');

    body.appendChild(fieldTitle(titleVal));
    body.appendChild(fieldCategory());
    body.appendChild(fieldDescription(descVal));
    body.appendChild(fieldTestament());
    body.appendChild(fieldRefs());
    body.appendChild(fieldConnections());
    body.appendChild(fieldTags());
    body.appendChild(fieldPath(pathVal));

    /* --- footer --- */
    var footer = el('div', 'modal__footer');
    var cancel = el('button', 'modal__cancel');
    cancel.id = 'modalCancelBtn';
    cancel.type = 'button';
    cancel.textContent = 'Cancel';
    var submit = el('button', 'modal__submit');
    submit.id = 'modalSubmitBtn';
    submit.type = 'button';
    submit.innerHTML = '<span class="modal__submit-label">' + esc(submitLabel) + '</span>' +
      '<span class="modal__spinner" aria-hidden="true"></span>';
    footer.appendChild(cancel);
    footer.appendChild(submit);

    modal.appendChild(head);
    modal.appendChild(errHost);
    modal.appendChild(body);
    modal.appendChild(footer);

    bd.innerHTML = '';
    bd.appendChild(modal);

    wireButtons();
    refreshSubmitEnabled();
  };

  /* ---------- field builders ---------- */

  function field(labelText, forId, hintHtml) {
    var f = el('div', 'modal__field');
    if (labelText != null) {
      var lab = el('label', 'modal__label', esc(labelText));
      if (forId) lab.setAttribute('for', forId);
      f.appendChild(lab);
    }
    if (hintHtml) {
      var hint = el('div', 'modal__hint', hintHtml);
      f.appendChild(hint);
    }
    return f;
  }

  function fieldTitle(val) {
    var f = field('Title', 'mTitle');
    var input = el('input', 'modal__input');
    input.id = 'mTitle';
    input.type = 'text';
    input.placeholder = 'e.g. The Number Seven';
    input.value = val || '';
    input.setAttribute('required', 'required');
    input.setAttribute('autocomplete', 'off');
    f.appendChild(input);
    // Inline validation hint (filling state).
    var vh = el('div', 'modal__validation', 'Title is required.');
    vh.id = 'mTitleHint';
    vh.style.display = 'none';
    f.appendChild(vh);

    input.addEventListener('input', function () {
      // Clear the required hint as the user fills it.
      if (input.value.trim()) {
        input.classList.remove('is-invalid');
        vh.style.display = 'none';
      }
      // Auto-suggest the Obsidian path from the title until manually edited.
      if (!session.pathEdited) {
        var pathEl = $('mPath');
        if (pathEl) pathEl.value = PM.modal.suggestPath(input.value);
      }
      refreshSubmitEnabled();
    });
    return f;
  }

  function fieldCategory() {
    var f = field('Category', null);
    var grid = el('div', 'modal__cats');
    grid.id = 'mCats';
    grid.setAttribute('role', 'radiogroup');
    grid.setAttribute('aria-label', 'Category');
    categories().forEach(function (cat) {
      var pill = el('button', 'cat-pill');
      pill.type = 'button';
      pill.dataset.cat = cat.key;
      pill.setAttribute('role', 'radio');
      pill.style.setProperty('--node-color', categoryColor(cat.key));
      pill.innerHTML =
        '<span class="cat-pill__icon">' + (icon(cat.icon) || '') + '</span>' +
        '<span class="cat-pill__label">' + esc(cat.label) + '</span>';
      if (cat.key === session.category) {
        pill.classList.add('is-selected');
        pill.setAttribute('aria-checked', 'true');
      } else {
        pill.setAttribute('aria-checked', 'false');
      }
      pill.addEventListener('click', function () {
        session.category = cat.key;
        Array.prototype.forEach.call(grid.children, function (c) {
          var on = c.dataset.cat === cat.key;
          c.classList.toggle('is-selected', on);
          c.setAttribute('aria-checked', on ? 'true' : 'false');
        });
      });
      grid.appendChild(pill);
    });
    f.appendChild(grid);
    return f;
  }

  function fieldDescription(val) {
    var f = field('Description', 'mDesc');
    var ta = el('textarea', 'modal__textarea');
    ta.id = 'mDesc';
    ta.rows = 4;
    ta.placeholder = 'What is this pattern? How does it recur across Scripture?';
    ta.value = val || '';
    f.appendChild(ta);
    return f;
  }

  function fieldTestament() {
    var f = field('Testament Scope', null);
    var seg = el('div', 'modal__segment');
    seg.id = 'mTestament';
    seg.setAttribute('role', 'radiogroup');
    seg.setAttribute('aria-label', 'Testament scope');
    var opts = [
      { v: 'OT', label: 'Old' },
      { v: 'NT', label: 'New' },
      { v: 'both', label: 'Both' }
    ];
    opts.forEach(function (o) {
      var b = el('button', 'modal__segment-btn');
      b.type = 'button';
      b.dataset.testament = o.v;
      b.textContent = o.label;
      b.setAttribute('role', 'radio');
      var on = o.v === session.testament;
      b.classList.toggle('is-active', on);
      b.setAttribute('aria-checked', on ? 'true' : 'false');
      b.addEventListener('click', function () {
        session.testament = o.v;
        Array.prototype.forEach.call(seg.children, function (c) {
          var sel = c.dataset.testament === o.v;
          c.classList.toggle('is-active', sel);
          c.setAttribute('aria-checked', sel ? 'true' : 'false');
        });
      });
      seg.appendChild(b);
    });
    f.appendChild(seg);
    return f;
  }

  function fieldRefs() {
    var f = field('Bible References', 'mRefInput',
      'Type a reference like <code>Genesis 1:1</code> and press Enter.');
    var wrap = el('div', 'modal__taginput');
    wrap.id = 'mRefWrap';

    var tags = el('div', 'modal__tags');
    tags.id = 'mRefTags';

    var input = el('input', 'modal__input modal__taginput-field');
    input.id = 'mRefInput';
    input.type = 'text';
    input.placeholder = 'Add a reference…';
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('list', BOOK_DATALIST_ID);

    input.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' || ev.key === ',') {
        ev.preventDefault();
        commitRef(input);
      } else if (ev.key === 'Backspace' && !input.value && session.refs.length) {
        session.refs.pop();
        renderRefTags();
      }
    });
    input.addEventListener('blur', function () {
      if (input.value.trim()) commitRef(input);
    });

    wrap.appendChild(tags);
    wrap.appendChild(input);
    f.appendChild(wrap);
    // Click anywhere in the wrap focuses the field.
    wrap.addEventListener('click', function (ev) {
      if (ev.target === wrap || ev.target === tags) input.focus();
    });
    // Defer initial render until wrap is in DOM.
    setTimeout(renderRefTags, 0);
    return f;
  }

  function commitRef(input) {
    var raw = input.value.trim().replace(/,+$/, '').trim();
    if (!raw) { input.value = ''; return; }
    var ref = parseRef(raw);
    if (!ref) {
      input.classList.add('is-invalid');
      if (PM.toast) PM.toast('Could not parse "' + raw + '" — try "Book C:V"', 'warn');
      return;
    }
    var key = verseKey(ref);
    var dup = session.refs.some(function (r) { return verseKey(r) === key; });
    if (!dup) session.refs.push(ref);
    input.value = '';
    input.classList.remove('is-invalid');
    renderRefTags();
  }

  function renderRefTags() {
    var host = $('mRefTags');
    if (!host) return;
    host.innerHTML = '';
    session.refs.forEach(function (ref, i) {
      var chip = el('span', 'modal__tag modal__tag--ref');
      chip.innerHTML = '<span class="modal__tag-text">' + esc(verseKey(ref)) + '</span>';
      var x = el('button', 'modal__tag-remove');
      x.type = 'button';
      x.setAttribute('aria-label', 'Remove reference');
      x.innerHTML = icon('close') || '×';
      x.addEventListener('click', function () {
        session.refs.splice(i, 1);
        renderRefTags();
      });
      chip.appendChild(x);
      host.appendChild(chip);
    });
  }

  function fieldConnections() {
    var f = field('Initial Connections', 'mConnSearch',
      'Link this pattern to existing ones.');
    var box = el('div', 'modal__multiselect');
    box.id = 'mConn';

    var search = el('input', 'modal__input');
    search.id = 'mConnSearch';
    search.type = 'text';
    search.placeholder = 'Search patterns…';
    search.setAttribute('autocomplete', 'off');

    var chosen = el('div', 'modal__tags');
    chosen.id = 'mConnChosen';

    var results = el('div', 'modal__multiselect-results');
    results.id = 'mConnResults';
    results.style.display = 'none';

    search.addEventListener('input', function () {
      renderConnResults(search.value);
    });
    search.addEventListener('focus', function () {
      renderConnResults(search.value);
    });
    search.addEventListener('blur', function () {
      // Delay so a click on a result registers first.
      setTimeout(function () { results.style.display = 'none'; }, 160);
    });

    box.appendChild(chosen);
    box.appendChild(search);
    box.appendChild(results);
    f.appendChild(box);
    setTimeout(renderConnChosen, 0);
    return f;
  }

  function allPatterns() {
    return (PM.state && PM.state.patterns) ? PM.state.patterns : [];
  }

  function renderConnResults(query) {
    var results = $('mConnResults');
    if (!results) return;
    var q = String(query || '').trim().toLowerCase();
    var pool;
    if (q && PM.data && typeof PM.data.search === 'function') {
      pool = PM.data.search(q);
    } else {
      pool = allPatterns();
    }
    var list = pool.filter(function (p) {
      if (session.mode === 'edit' && p.id === session.editId) return false; // no self
      if (session.connectIds.indexOf(p.id) !== -1) return false;            // already chosen
      return true;
    }).slice(0, 8);

    results.innerHTML = '';
    if (!list.length) {
      results.style.display = 'block';
      results.appendChild(el('div', 'modal__multiselect-empty',
        allPatterns().length ? 'No matches.' : 'No other patterns yet.'));
      return;
    }
    list.forEach(function (p) {
      var row = el('button', 'modal__multiselect-result');
      row.type = 'button';
      row.dataset.id = p.id;
      var color = categoryColor(p.category);
      row.innerHTML =
        '<span class="modal__dot" style="background:' + esc(color) + '"></span>' +
        '<span class="modal__result-title">' + esc(p.title) + '</span>';
      row.addEventListener('mousedown', function (ev) {
        ev.preventDefault(); // keep focus, prevent blur-close before handling
        if (session.connectIds.indexOf(p.id) === -1) session.connectIds.push(p.id);
        var search = $('mConnSearch');
        if (search) search.value = '';
        renderConnChosen();
        renderConnResults('');
      });
      results.appendChild(row);
    });
    results.style.display = 'block';
  }

  function renderConnChosen() {
    var host = $('mConnChosen');
    if (!host) return;
    host.innerHTML = '';
    session.connectIds.forEach(function (id) {
      var p = (PM.data && PM.data.getPattern) ? PM.data.getPattern(id) : null;
      if (!p) return;
      var chip = el('span', 'modal__tag modal__tag--conn');
      chip.style.setProperty('--node-color', categoryColor(p.category));
      chip.innerHTML =
        '<span class="modal__dot" style="background:' + esc(categoryColor(p.category)) + '"></span>' +
        '<span class="modal__tag-text">' + esc(p.title) + '</span>';
      var x = el('button', 'modal__tag-remove');
      x.type = 'button';
      x.setAttribute('aria-label', 'Remove connection');
      x.innerHTML = icon('close') || '×';
      x.addEventListener('click', function () {
        var idx = session.connectIds.indexOf(id);
        if (idx !== -1) session.connectIds.splice(idx, 1);
        renderConnChosen();
      });
      chip.appendChild(x);
      host.appendChild(chip);
    });
  }

  function fieldTags() {
    var f = field('Tags', 'mTagInput', 'Freeform tags; press Enter to add.');
    var wrap = el('div', 'modal__taginput');
    var tags = el('div', 'modal__tags');
    tags.id = 'mTagTags';
    var input = el('input', 'modal__input modal__taginput-field');
    input.id = 'mTagInput';
    input.type = 'text';
    input.placeholder = 'Add a tag…';
    input.setAttribute('autocomplete', 'off');

    input.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter' || ev.key === ',') {
        ev.preventDefault();
        commitTag(input);
      } else if (ev.key === 'Backspace' && !input.value && session.tags.length) {
        session.tags.pop();
        renderTagTags();
      }
    });
    input.addEventListener('blur', function () {
      if (input.value.trim()) commitTag(input);
    });

    wrap.appendChild(tags);
    wrap.appendChild(input);
    wrap.addEventListener('click', function (ev) {
      if (ev.target === wrap || ev.target === tags) input.focus();
    });
    f.appendChild(wrap);
    setTimeout(renderTagTags, 0);
    return f;
  }

  function commitTag(input) {
    var raw = input.value.trim().replace(/,+$/, '').trim().toLowerCase();
    if (!raw) { input.value = ''; return; }
    if (session.tags.indexOf(raw) === -1) session.tags.push(raw);
    input.value = '';
    renderTagTags();
  }

  function renderTagTags() {
    var host = $('mTagTags');
    if (!host) return;
    host.innerHTML = '';
    session.tags.forEach(function (t, i) {
      var chip = el('span', 'modal__tag');
      chip.innerHTML = '<span class="modal__tag-text">' + esc(t) + '</span>';
      var x = el('button', 'modal__tag-remove');
      x.type = 'button';
      x.setAttribute('aria-label', 'Remove tag');
      x.innerHTML = icon('close') || '×';
      x.addEventListener('click', function () {
        session.tags.splice(i, 1);
        renderTagTags();
      });
      chip.appendChild(x);
      host.appendChild(chip);
    });
  }

  function fieldPath(val) {
    var f = field('Obsidian Note Path', 'mPath',
      'Auto-suggested from the title; edit to override.');
    var input = el('input', 'modal__input modal__input--mono');
    input.id = 'mPath';
    input.type = 'text';
    input.value = val || '';
    input.setAttribute('autocomplete', 'off');
    input.addEventListener('input', function () {
      session.pathEdited = true;
    });
    f.appendChild(input);
    return f;
  }

  /* ----------------------------------------------------------------------- *
   * Button wiring (per render, since DOM is rebuilt).
   * ----------------------------------------------------------------------- */
  function wireButtons() {
    var close = $('modalCloseBtn');
    var cancel = $('modalCancelBtn');
    var submit = $('modalSubmitBtn');
    if (close) close.addEventListener('click', function () { if (!session.submitting) PM.modal.close(); });
    if (cancel) cancel.addEventListener('click', function () { if (!session.submitting) PM.modal.close(); });
    if (submit) submit.addEventListener('click', function () { PM.modal.submit(); });
  }

  function refreshSubmitEnabled() {
    var submit = $('modalSubmitBtn');
    var title = $('mTitle');
    if (!submit) return;
    var ok = !!(title && title.value.trim()) && !session.submitting;
    submit.classList.toggle('is-disabled', !ok);
    submit.disabled = !ok;
  }

  /* ----------------------------------------------------------------------- *
   * collect / validate
   * ----------------------------------------------------------------------- */
  PM.modal.collect = function () {
    var title = $('mTitle');
    var desc = $('mDesc');
    var path = $('mPath');
    return {
      title: title ? title.value.trim() : '',
      category: session.category,
      description: desc ? desc.value : '',
      testament: session.testament,
      refs: session.refs.slice(),
      tags: session.tags.slice(),
      connectIds: session.connectIds.slice(),
      obsidianPath: path ? path.value.trim() : ''
    };
  };

  PM.modal.validate = function (data) {
    var errors = {};
    if (!data || !data.title || !data.title.trim()) {
      errors.title = 'Title is required.';
    }
    var cats = categories().map(function (c) { return c.key; });
    if (data && data.category && cats.length && cats.indexOf(data.category) === -1) {
      errors.category = 'Pick a category.';
    }
    return { ok: Object.keys(errors).length === 0, errors: errors };
  };

  function showError(msg) {
    var host = $('modalError');
    if (!host) return;
    host.innerHTML =
      '<span class="modal__error-icon">' + (icon('alert') || '!') + '</span>' +
      '<span class="modal__error-text">' + esc(msg) + '</span>';
    host.style.display = '';
    host.classList.add('is-shown');
  }
  function clearError() {
    var host = $('modalError');
    if (!host) return;
    host.style.display = 'none';
    host.classList.remove('is-shown');
    host.innerHTML = '';
  }

  function showValidation(errors) {
    if (errors.title) {
      var t = $('mTitle');
      var vh = $('mTitleHint');
      if (t) t.classList.add('is-invalid');
      if (vh) { vh.textContent = errors.title; vh.style.display = ''; }
      if (t) t.focus();
    }
  }

  /* ----------------------------------------------------------------------- *
   * setSubmitting — toggle the submitting UI: disable fields + button spinner.
   * ----------------------------------------------------------------------- */
  PM.modal.setSubmitting = function (on) {
    session.submitting = !!on;
    var modal = backdrop() ? backdrop().querySelector('.modal') : null;
    if (modal) modal.classList.toggle('is-submitting', !!on);

    var submit = $('modalSubmitBtn');
    if (submit) {
      submit.classList.toggle('is-loading', !!on);
      submit.disabled = !!on;
    }
    // Disable all form controls.
    var controls = modal ? modal.querySelectorAll('input, textarea, button') : [];
    Array.prototype.forEach.call(controls, function (c) {
      if (c.id === 'modalSubmitBtn') return; // handled above
      c.disabled = !!on;
      c.classList.toggle('is-disabled', !!on);
    });
    if (!on) refreshSubmitEnabled();
  };

  /* ----------------------------------------------------------------------- *
   * submit — validate -> add/update via PM.data -> create initial edges ->
   * layout/center -> close -> toast. Covers success + error states.
   * ----------------------------------------------------------------------- */
  PM.modal.submit = function () {
    if (session.submitting) return;
    clearError();

    var data = PM.modal.collect();
    var v = PM.modal.validate(data);
    if (!v.ok) {
      showValidation(v.errors);
      // Top-of-modal error toast for the error state.
      var firstMsg = v.errors.title || v.errors.category || 'Please fix the highlighted fields.';
      showError(firstMsg);
      return;
    }

    PM.modal.setSubmitting(true);

    // Simulate a brief async submit so the spinner is visible, then commit.
    setTimeout(function () {
      try {
        var result = (session.mode === 'edit') ? doUpdate(data) : doAdd(data);
        if (!result) throw new Error('Could not save pattern.');

        // Success state: close, relayout/place, pan to node, toast.
        PM.modal.setSubmitting(false);
        PM.modal.close();

        if (PM.save) PM.save();

        // Re-run layout to place the (new or changed) node, then pan to it.
        var isAdd = (session.mode === 'add');
        if (isAdd && PM.graph && PM.graph.startLayout) {
          PM.graph.startLayout();
        } else if (PM.graph && PM.graph.render) {
          PM.graph.render();
        }

        // Pan/zoom to the node (centerOn is the contract's "panTo").
        // For an add, the cooling layout keeps moving every node for ~hundreds of rAF
        // ticks, so centering immediately would frame a stale position the new node then
        // drifts out of. Defer until the layout has roughly settled (matches app.init's
        // post-layout fit delay). For an edit (no relayout) center right away.
        if (PM.graph && PM.graph.centerOn) {
          if (isAdd) {
            (function (nid) {
              setTimeout(function () { PM.graph.centerOn(nid); }, 750);
            })(result.id);
          } else {
            PM.graph.centerOn(result.id);
          }
        }

        // Broad reconcile so chips/heatmap/drawer reflect the change.
        if (PM.render) PM.render();

        if (PM.toast) {
          PM.toast(session.mode === 'edit'
            ? 'Pattern updated'
            : 'Pattern created', 'success');
        }
        // Reset mode after a successful edit close.
        session.mode = 'add';
        session.editId = null;
      } catch (err) {
        PM.modal.setSubmitting(false);
        showError((err && err.message) ? err.message : 'Something went wrong saving.');
        if (PM.toast) PM.toast('Could not save pattern', 'error');
      }
    }, 380);
  };

  function doAdd(data) {
    if (!PM.data || !PM.data.addPattern) return null;
    var p = PM.data.addPattern({
      title: data.title,
      category: data.category,
      description: data.description,
      testament: data.testament,
      refs: data.refs,
      tags: data.tags,
      obsidianPath: data.obsidianPath || PM.modal.suggestPath(data.title)
    });
    if (!p) return null;
    createEdges(p.id, data.connectIds);
    return p;
  }

  function doUpdate(data) {
    if (!PM.data || !PM.data.updatePattern) return null;
    var id = session.editId;
    var p = PM.data.updatePattern(id, {
      title: data.title,
      category: data.category,
      description: data.description,
      testament: data.testament,
      refs: data.refs,
      tags: data.tags,
      obsidianPath: data.obsidianPath || PM.modal.suggestPath(data.title)
    });
    if (!p) return null;

    // Reconcile connections: add newly-chosen edges. (We do not auto-remove
    // edges the user deselected here — edge removal is the drawer's job per
    // contract — but addEdge dedups so re-adding existing is harmless.)
    createEdges(id, data.connectIds);
    return p;
  }

  function createEdges(fromId, toIds) {
    if (!PM.data || !PM.data.addEdge) return;
    (toIds || []).forEach(function (toId) {
      if (toId && toId !== fromId) {
        PM.data.addEdge({ from: fromId, to: toId, label: '', strength: 0.6 });
      }
    });
  }

  /* ======================================================================= *
   * VERSE PICKER (VersePickerSearch) — PM.modal.openVersePicker(onPick)
   * States: idle, searching, results, no-results, selected.
   * Reused by the drawer's "+ Add Reference". Returns a close() function.
   *
   * Rendered as a lightweight overlay using the contract's verse-picker class
   * names (.versepicker / #versePickerInput / .versepicker__results /
   * .versepicker__result). Resolves user typing into Ref objects via bible.
   * ======================================================================= */
  PM.modal.openVersePicker = function (onPick) {
    // Tear down any existing picker first.
    var existing = $('versePickerOverlay');
    if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

    var overlay = el('div', 'versepicker-overlay');
    overlay.id = 'versePickerOverlay';

    var panel = el('div', 'versepicker');
    panel.setAttribute('role', 'dialog');
    panel.setAttribute('aria-label', 'Pick a Bible verse');

    var head = el('div', 'versepicker__head');
    head.innerHTML =
      '<span class="versepicker__title">Add Reference</span>';
    var vpClose = el('button', 'versepicker__close drawer__close');
    vpClose.type = 'button';
    vpClose.setAttribute('aria-label', 'Close');
    vpClose.innerHTML = icon('close') || '×';
    head.appendChild(vpClose);

    var inputWrap = el('div', 'versepicker__inputwrap');
    inputWrap.innerHTML = '<span class="versepicker__icon">' + (icon('search') || '') + '</span>';
    var input = el('input', 'versepicker__input');
    input.id = 'versePickerInput';
    input.type = 'text';
    input.placeholder = 'Type a reference, e.g. John 3:16';
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('list', BOOK_DATALIST_ID);
    inputWrap.appendChild(input);

    var state = el('div', 'versepicker__state'); // idle/searching/no-results messaging
    state.id = 'versePickerState';

    var results = el('div', 'versepicker__results');
    results.id = 'versePickerResults';

    panel.appendChild(head);
    panel.appendChild(inputWrap);
    panel.appendChild(state);
    panel.appendChild(results);
    overlay.appendChild(panel);
    document.body.appendChild(overlay);

    ensureBookDatalist();

    function destroy() {
      document.removeEventListener('keydown', onKey, true);
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }

    function pick(ref) {
      // selected state
      setState('selected', verseKey(ref));
      if (typeof onPick === 'function') {
        try { onPick(ref); } catch (e) { /* swallow consumer errors */ }
      }
      destroy();
    }

    function onKey(ev) {
      if (ev.key === 'Escape') { ev.stopPropagation(); destroy(); }
    }

    function setState(name, detail) {
      state.dataset.state = name;
      if (name === 'idle') {
        state.textContent = 'Start typing a reference like "Genesis 1:1".';
        state.style.display = '';
      } else if (name === 'searching') {
        state.innerHTML = '<span class="versepicker__spinner"></span> Searching…';
        state.style.display = '';
      } else if (name === 'no-results') {
        state.textContent = 'No verse matches "' + (detail || '') + '".';
        state.style.display = '';
      } else if (name === 'results' || name === 'selected') {
        state.style.display = 'none';
        state.textContent = '';
      }
    }

    function renderResult(ref, textMaybe) {
      results.innerHTML = '';
      var row = el('button', 'versepicker__result');
      row.type = 'button';
      var key = verseKey(ref);
      var preview = textMaybe != null ? textMaybe : '';
      row.innerHTML =
        '<span class="versepicker__result-ref">' + esc(key) + '</span>' +
        (preview ? '<span class="versepicker__result-text">' + esc(truncate(preview, 120)) + '</span>' : '');
      row.addEventListener('click', function () { pick(ref); });
      results.appendChild(row);
      setState('results');
    }

    function truncate(s, n) {
      s = String(s || '');
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }

    var debounceT = 0;
    function handleInput() {
      var raw = input.value.trim();
      results.innerHTML = '';
      if (!raw) { setState('idle'); return; }

      var ref = parseRef(raw);
      if (!ref) {
        // Could be partial (just a book name / chapter); guide as no-results.
        setState('no-results', raw);
        return;
      }

      // We have a valid Ref. Show it immediately; enrich with verse text.
      var embedded = '';
      if (PM.bible && typeof PM.bible.verseText === 'function') {
        try { embedded = PM.bible.verseText(ref) || ''; } catch (e) { embedded = ''; }
      }
      if (embedded) {
        renderResult(ref, embedded);
        return;
      }

      // Not embedded: render the ref now, attempt an async fetch for preview.
      renderResult(ref, '');
      if (PM.bible && typeof PM.bible.fetchVerse === 'function') {
        setState('searching');
        var myRef = ref;
        var myToken = ++debounceT;
        PM.bible.fetchVerse(myRef).then(function (txt) {
          if (myToken !== debounceT) return; // superseded
          if (input.value.trim() && parseRef(input.value.trim())) {
            renderResult(myRef, txt || '');
          }
        }).catch(function () {
          if (myToken === debounceT) renderResult(myRef, '');
        });
      }
    }

    input.addEventListener('input', function () {
      handleInput(); // async fetch uses a token (debounceT) to drop stale results
    });
    input.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        var ref = parseRef(input.value.trim());
        if (ref) pick(ref);
      }
    });

    vpClose.addEventListener('click', destroy);
    overlay.addEventListener('mousedown', function (ev) {
      if (ev.target === overlay) destroy();
    });
    document.addEventListener('keydown', onKey, true);

    setState('idle');
    setTimeout(function () { input.focus(); }, 30);

    return destroy;
  };

})();
</script>

    for (var _vk in PM.data.verses) {

          !Object.prototype.hasOwnProperty.call(PM.bible.VERSES, _vk)) {

  /* ---------------------------------------------------------------------------
   * 2. Verse key + reference parsing
   * -------------------------------------------------------------------------*/

  // "Book C:V" — single space book↔chapter, colon, no leading zeros, no spaces.
  PM.bible.verseKey = function (ref) {
    if (!ref) return '';
    if (typeof ref === 'string') return ref; // already a key
    return ref.book + ' ' + ref.chapter + ':' + ref.verse;
  };

  // Build/refresh an abbreviation lookup from PM.consts.BOOKS (lazy; consts is
  // defined by data.js but may not exist at parse time, so resolve on demand).
  var _abbrevMap = null;
  function _normalize(s) {
    return String(s || '').toLowerCase().replace(/\./g, '').replace(/\s+/g, ' ').trim();
  }
  function _books() {
    return (PM.consts && PM.consts.BOOKS) ? PM.consts.BOOKS : [];
  }
  function _buildAbbrevMap() {
    var map = {};
    var books = _books();
    for (var i = 0; i < books.length; i++) {
      var name = books[i].name;
      var norm = _normalize(name);
      map[norm] = name;
      // no-space variant: "1corinthians"
      map[norm.replace(/ /g, '')] = name;
      // common short forms: leading-number prefix + first letters of last word
      var parts = norm.split(' ');
      var num = '';
      var word = parts[parts.length - 1];
      if (/^[123]$/.test(parts[0])) num = parts[0];
      // 3-letter abbrev (e.g. gen, exo, cor)
      for (var len = 3; len <= 4; len++) {
        if (word.length >= len) {
          map[(num ? num : '') + word.slice(0, len)] = name;
          if (num) map[num + ' ' + word.slice(0, len)] = name;

      'zeph': 'Zephaniah', 'hag': 'Haggai', 'zech': 'Zechariah', 'mal': 'Malachi',
      'matt': 'Matthew', 'mt': 'Matthew', 'mark': 'Mark', 'mk': 'Mark', 'luke': 'Luke', 'lk': 'Luke',
      'john': 'John', 'jn': 'John', 'acts': 'Acts',
      'rom': 'Romans', 'ro': 'Romans',
      '1 cor': '1 Corinthians', '1cor': '1 Corinthians', '1co': '1 Corinthians',
      '2 cor': '2 Corinthians', '2cor': '2 Corinthians', '2co': '2 Corinthians',
      'gal': 'Galatians', 'eph': 'Ephesians', 'phil': 'Philippians', 'php': 'Philippians',
      'col': 'Colossians',
      '1 thess': '1 Thessalonians', '1thess': '1 Thessalonians', '2 thess': '2 Thessalonians', '2thess': '2 Thessalonians',
      '1 tim': '1 Timothy', '1tim': '1 Timothy', '2 tim': '2 Timothy', '2tim': '2 Timothy',
      'tit': 'Titus', 'phlm': 'Philemon', 'heb': 'Hebrews', 'jas': 'James',
      '1 pet': '1 Peter', '1pet': '1 Peter', '2 pet': '2 Peter', '2pet': '2 Peter',
      '1 john': '1 John', '1jn': '1 John', '2 john': '2 John', '2jn': '2 John', '3 john': '3 John', '3jn': '3 John',
      'jude': 'Jude', 'rev': 'Revelation', 're': 'Revelation'
    };
    for (var k in extra) {
      // only register if the target book actually exists in BOOKS (or just register anyway; harmless)
      map[_normalize(k)] = extra[k];
    }
    return map;
  }
  function _resolveBook(raw) {
    if (!_abbrevMap || _abbrevMap.__count !== _books().length) {
      _abbrevMap = _buildAbbrevMap();
      _abbrevMap.__count = _books().length;
    }
    var norm = _normalize(raw);
    if (_abbrevMap[norm]) return _abbrevMap[norm];
    if (_abbrevMap[norm.replace(/ /g, '')]) return _abbrevMap[norm.replace(/ /g, '')];
    return null;
  }

  // Parse "Genesis 1:1", "1 cor 13:4", "gen 1.1", etc. -> Ref|null
  PM.bible.parseRef = function (str) {
    if (!str) return null;
    var s = String(str).trim();
    // capture: [book words incl leading number] [chapter] [: or .] [verse]
    var m = s.match(/^\s*((?:[123]\s*)?[A-Za-z][A-Za-z.\s]*?)\s+(\d+)\s*[:.]\s*(\d+)\s*$/);
    if (!m) return null;
    var book = _resolveBook(m[1]);
    if (!book) return null;
    var chapter = parseInt(m[2], 10);
    var verse = parseInt(m[3], 10);
    if (!chapter || !verse) return null;
    return { book: book, chapter: chapter, verse: verse };
  };

  PM.bible.bookNames = function () {
    return _books().map(function (b) { return b.name; });
  };

  /* ---------------------------------------------------------------------------
   * 3. Verse text (embedded + async fallback)
   * -------------------------------------------------------------------------*/
  var _fetching = {}; // key -> true while in-flight (avoid dup fetches)

  PM.bible.verseText = function (refOrKey) {
    var key = PM.bible.verseKey(refOrKey);
    if (!key) return '';
    if (PM.bible.VERSES[key]) return PM.bible.VERSES[key];
    // Fallback to data.js's embedded map before going to the network — both maps are
    // public-domain KJV and one may carry a key the other lacks. Cache it back so the
    // canonical store converges and future lookups stay synchronous.
    if (PM.data && PM.data.verses && PM.data.verses[key]) {
      PM.bible.VERSES[key] = PM.data.verses[key];
      return PM.bible.VERSES[key];
    }
    // not embedded: kick off a background fetch (best-effort), return '' for now.
    var ref = (typeof refOrKey === 'object') ? refOrKey : PM.bible.parseRef(key);
    if (ref && !_fetching[key]) {
      _fetching[key] = true;
      PM.bible.fetchVerse(ref).then(function (txt) {
        _fetching[key] = false;
        if (txt) {
          // re-render any open surfaces that may now have text
          if (PM.drawer && typeof PM.drawer.render === 'function') {
            try { PM.drawer.render(); } catch (e) {}
          }
        }
      });
    }
    return '';
  };

  PM.bible.fetchVerse = function (ref) {
    return new Promise(function (resolve) {
      try {
        var key = PM.bible.verseKey(ref);
        if (PM.bible.VERSES[key]) { resolve(PM.bible.VERSES[key]); return; }
        var book = PM.consts && PM.consts.BOOK_BY_NAME ? PM.consts.BOOK_BY_NAME[ref.book] : null;
        if (!book || typeof fetch !== 'function' || (typeof navigator !== 'undefined' && navigator.onLine === false)) {
          resolve(''); return;
        }
        var base = (PM.consts && PM.consts.BOLLS_BASE) || 'https://bolls.life/get-verse/KJV/';
        var url = base + book.id + '/' + ref.chapter + '/' + ref.verse + '/';
        fetch(url).then(function (r) {
          if (!r || !r.ok) { resolve(''); return; }
          return r.json();
        }).then(function (data) {
          var txt = '';
          if (data) {
            if (typeof data.text === 'string') txt = data.text;
            else if (Array.isArray(data) && data[0] && data[0].text) txt = data[0].text;
          }
          // strip any HTML tags bolls may include
          txt = String(txt || '').replace(/<[^>]*>/g, '').trim();
          if (txt) PM.bible.VERSES[key] = txt;
          resolve(txt);
        }).catch(function () { resolve(''); });
      } catch (e) {
        resolve('');
      }
    });
  };

  /* ---------------------------------------------------------------------------
   * 4. Pattern <-> verse lookup
   * -------------------------------------------------------------------------*/
  PM.bible.patternsForVerse = function (key) {
    var out = [];
    var pats = (PM.state && PM.state.patterns) ? PM.state.patterns : [];
    for (var i = 0; i < pats.length; i++) {
      var p = pats[i];
      if (!p.refs) continue;
      for (var j = 0; j < p.refs.length; j++) {
        if (PM.bible.verseKey(p.refs[j]) === key) { out.push(p); break; }
      }
    }
    return out;
  };

  // Internal: per-book aggregation that also tolerates statsByBook absence.
  function _statsByBook() {
    if (PM.data && typeof PM.data.statsByBook === 'function') {
      try { return PM.data.statsByBook(); } catch (e) {}
    }
    // fallback local computation
    var map = new Map();
    var pats = (PM.state && PM.state.patterns) ? PM.state.patterns : [];
    for (var i = 0; i < pats.length; i++) {
      var p = pats[i];
      if (!p.refs) continue;
      for (var j = 0; j < p.refs.length; j++) {
        var bk = p.refs[j].book;
        if (!map.has(bk)) map.set(bk, { count: 0, cats: new Set() });
        var e = map.get(bk);
        e.count++;
        e.cats.add(p.category);
      }
    }
    return map;
  }

  // Per-book detail: chapters -> verses -> patterns. Built from state on demand.
  function _bookDetail(bookName) {
    var chapters = new Map(); // chapter -> Map<verse, Pattern[]>
    var pats = (PM.state && PM.state.patterns) ? PM.state.patterns : [];
    for (var i = 0; i < pats.length; i++) {
      var p = pats[i];
      if (!p.refs) continue;
      for (var j = 0; j < p.refs.length; j++) {
        var r = p.refs[j];
        if (r.book !== bookName) continue;
        if (!chapters.has(r.chapter)) chapters.set(r.chapter, new Map());
        var vm = chapters.get(r.chapter);
        if (!vm.has(r.verse)) vm.set(r.verse, []);
        vm.get(r.verse).push(p);
      }
    }
    return chapters;
  }

  function _catColor(key) {
    if (PM.data && typeof PM.data.categoryColor === 'function') return PM.data.categoryColor(key);
    return '#fb923c';
  }

  function _esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ---------------------------------------------------------------------------
   * 5. Heatmap density coloring
   *    Dark (no data) -> bright accent (many). Legible at a glance (AC #5).
   * -------------------------------------------------------------------------*/
  function _heatColor(count, max) {
    if (!count) return 'var(--bg-grid)'; // no-data cell: dark, distinct from bg
    // normalize 0..1 with a gentle curve so sparse books still read as "lit"
    var t = max > 0 ? Math.min(1, count / max) : 0;
    var eased = 0.30 + 0.70 * Math.sqrt(t); // floor at 0.30 so any data is visible
    // interpolate from deep violet -> bright violet (accent family)
    // base dark: #2a2150 -> hot: #c4b5fd ; lerp in RGB
    var lo = [42, 33, 80];
    var hi = [196, 181, 253];
    var r = Math.round(lo[0] + (hi[0] - lo[0]) * eased);
    var g = Math.round(lo[1] + (hi[1] - lo[1]) * eased);
    var b = Math.round(lo[2] + (hi[2] - lo[2]) * eased);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  /* ---------------------------------------------------------------------------
   * 6. Drawer scaffold + render
   * -------------------------------------------------------------------------*/
  var _expanded = {};        // bookName -> true (expanded book rows)
  var _expandedCh = {};      // "book|chapter" -> true (expanded chapters)
  var _highlightedKey = null; // currently verse-highlighted key (for state styling)
  var _mounted = false;

  function _drawerEl() { return document.getElementById('bibleDrawer'); }

  // Build the static scaffold (head with filter + heatmap, scrollable list).
  function _buildScaffold() {
    var el = _drawerEl();
    if (!el) return;
    el.innerHTML =
      '<div class="bible__head">' +
        '<div class="bible__head-row">' +
          '<h2 class="bible__title">Bible Explorer</h2>' +
          '<button id="bibleCloseBtn" class="drawer__close" type="button" title="Close" aria-label="Close Bible Explorer">' +
            '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>' +
          '</button>' +
        '</div>' +
        '<div class="bible__filter" role="group" aria-label="Testament filter">' +
          '<button class="bible__filter-btn" data-t="OT" type="button">Old</button>' +
          '<button class="bible__filter-btn" data-t="NT" type="button">New</button>' +
          '<button class="bible__filter-btn" data-t="both" type="button">Both</button>' +
        '</div>' +
        '<div class="heatmap-wrap">' +
          '<div id="heatmapStrip" class="heatmap-strip" role="img" aria-label="Pattern density by book"></div>' +
          '<div class="heatmap-legend">' +
            '<span class="heatmap-legend__label">fewer</span>' +
            '<span class="heatmap-legend__bar" aria-hidden="true"></span>' +
            '<span class="heatmap-legend__label">more</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="bible__cols">' +
        '<div class="bible__col" data-test="OT">' +
          '<div class="bible__col-title">Old Testament</div>' +
          '<div class="bible__list" data-list="OT"></div>' +
        '</div>' +
        '<div class="bible__col" data-test="NT">' +
          '<div class="bible__col-title">New Testament</div>' +
          '<div class="bible__list" data-list="NT"></div>' +
        '</div>' +
      '</div>';
  }

  // Render one book row's inner HTML (collapsed header always; expanded body if open).
  function _bookRowHtml(book, stat) {
    var count = stat ? stat.count : 0;
    var cats = stat ? stat.cats : null;
    var expandedCls = _expanded[book.name] ? ' is-expanded' : '';
    var emptyCls = count ? '' : ' is-empty';
    var dots = '';
    if (cats && cats.size) {
      // ordered by CATEGORIES if available
      var order = (PM.data && PM.data.CATEGORIES) ? PM.data.CATEGORIES.map(function (c) { return c.key; }) : [];
      var keys = Array.from(cats);
      keys.sort(function (a, b) {
        var ia = order.indexOf(a), ib = order.indexOf(b);
        return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
      });
      for (var i = 0; i < keys.length; i++) {
        dots += '<span class="bible__dot" style="background:' + _catColor(keys[i]) + '" title="' + _esc(keys[i]) + '"></span>';
      }
    }
    var html =
      '<div class="bible__book' + expandedCls + emptyCls + '" data-book="' + _esc(book.name) + '">' +
        '<button class="bible__book-head" type="button" data-book="' + _esc(book.name) + '" ' +
          (count ? '' : 'disabled aria-disabled="true" ') + 'aria-expanded="' + (_expanded[book.name] ? 'true' : 'false') + '">' +
          '<span class="bible__chev" aria-hidden="true">' +
            '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>' +
          '</span>' +
          '<span class="bible__book-name">' + _esc(book.name) + '</span>' +
          '<span class="bible__dots">' + dots + '</span>' +
          '<span class="bible__book-count"' + (count ? '' : ' aria-hidden="true"') + '>' + count + '</span>' +
        '</button>';
    if (_expanded[book.name] && count) {
      html += '<div class="bible__book-body">' + _chaptersHtml(book.name) + '</div>';
    }
    html += '</div>';
    return html;
  }

  function _chaptersHtml(bookName) {
    var chapters = _bookDetail(bookName);
    if (!chapters.size) return '<div class="bible__empty-note">No linked verses.</div>';
    var chNums = Array.from(chapters.keys()).sort(function (a, b) { return a - b; });
    var out = '';
    for (var i = 0; i < chNums.length; i++) {
      var ch = chNums[i];
      var ckey = bookName + '|' + ch;
      var open = !!_expandedCh[ckey];
      var vm = chapters.get(ch);
      var verseCount = vm.size;
      out +=
        '<div class="bible__chapter' + (open ? ' is-expanded' : '') + '" data-ch="' + ch + '">' +
          '<button class="bible__chapter-head" type="button" data-book="' + _esc(bookName) + '" data-ch="' + ch + '" aria-expanded="' + (open ? 'true' : 'false') + '">' +
            '<span class="bible__chev bible__chev--sm" aria-hidden="true">' +
              '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>' +
            '</span>' +
            '<span class="bible__chapter-name">Chapter ' + ch + '</span>' +
            '<span class="bible__chapter-count">' + verseCount + '</span>' +
          '</button>';
      if (open) {
        out += '<div class="bible__verses">' + _versesHtml(bookName, ch, vm) + '</div>';
      }
      out += '</div>';
    }
    return out;
  }

  function _versesHtml(bookName, ch, vm) {
    var vNums = Array.from(vm.keys()).sort(function (a, b) { return a - b; });
    var out = '';
    for (var i = 0; i < vNums.length; i++) {
      var v = vNums[i];
      var key = bookName + ' ' + ch + ':' + v;
      var pats = vm.get(v);
      var hi = (_highlightedKey === key) ? ' is-highlighted' : '';
      var catDots = '';
      var seen = {};
      for (var k = 0; k < pats.length; k++) {
        if (seen[pats[k].category]) continue;
        seen[pats[k].category] = 1;
        catDots += '<span class="bible__dot bible__dot--sm" style="background:' + _catColor(pats[k].category) + '"></span>';
      }
      out +=
        '<button class="bible__verse' + hi + '" type="button" data-key="' + _esc(key) + '" title="Highlight ' + pats.length + ' linked pattern' + (pats.length === 1 ? '' : 's') + '">' +
          '<span class="bible__verse-ref">' + ch + ':' + v + '</span>' +
          '<span class="bible__verse-dots">' + catDots + '</span>' +
          '<span class="bible__verse-n">' + pats.length + '</span>' +
        '</button>';
    }
    return out;
  }

  PM.bible.render = function () {
    var el = _drawerEl();
    if (!el) return;
    if (!el.querySelector('.bible__head')) _buildScaffold();

    // reflect testament filter active state
    var tf = (PM.state && PM.state.filters && PM.state.filters.testaments) || 'both';
    var btns = el.querySelectorAll('.bible__filter-btn');
    for (var b = 0; b < btns.length; b++) {
      btns[b].classList.toggle('is-active', btns[b].getAttribute('data-t') === tf);
    }

    var stats = _statsByBook();
    var books = _books();
    var otHtml = '', ntHtml = '';
    for (var i = 0; i < books.length; i++) {
      var book = books[i];
      var rowHtml = _bookRowHtml(book, stats.get(book.name));
      if (book.testament === 'OT') otHtml += rowHtml; else ntHtml += rowHtml;
    }
    var otList = el.querySelector('[data-list="OT"]');
    var ntList = el.querySelector('[data-list="NT"]');
    if (otList) otList.innerHTML = otHtml || '<div class="bible__empty-note">No Old Testament data.</div>';
    if (ntList) ntList.innerHTML = ntHtml || '<div class="bible__empty-note">No New Testament data.</div>';

    // show/hide columns per testament filter
    var cols = el.querySelectorAll('.bible__col');
    for (var c = 0; c < cols.length; c++) {
      var t = cols[c].getAttribute('data-test');
      var show = (tf === 'both') || (tf === t);
      cols[c].classList.toggle('is-hidden', !show);
    }

    PM.bible.renderHeatmap();
  };

  /* ---------------------------------------------------------------------------
   * 7. Heatmap strip (per-book density). Called by PM.render too.
   * -------------------------------------------------------------------------*/
  PM.bible.renderHeatmap = function () {
    var strip = document.getElementById('heatmapStrip');
    if (!strip) return; // scaffold not built yet (drawer never opened) — that's fine
    var stats = _statsByBook();
    var books = _books();
    var tf = (PM.state && PM.state.filters && PM.state.filters.testaments) || 'both';

    // max for normalization (across the currently-shown canon scope)
    var max = 0, total = 0, lit = 0;
    for (var i = 0; i < books.length; i++) {
      if (tf !== 'both' && books[i].testament !== tf) continue;
      var s = stats.get(books[i].name);
      var ct = s ? s.count : 0;
      if (ct > max) max = ct;
      total += ct;
      if (ct) lit++;
    }

    var cells = '';
    for (var j = 0; j < books.length; j++) {
      var book = books[j];
      if (tf !== 'both' && book.testament !== tf) continue;
      var stat = stats.get(book.name);
      var count = stat ? stat.count : 0;
      var color = _heatColor(count, max);
      var tip = book.name + ' — ' + count + ' linked pattern' + (count === 1 ? '' : 's');
      cells +=
        '<button class="heatmap-cell' + (count ? '' : ' is-empty') + (book.testament === 'NT' ? ' is-nt' : '') + '" ' +
          'type="button" data-book="' + _esc(book.name) + '" ' +
          'style="background:' + color + '" title="' + _esc(tip) + '" aria-label="' + _esc(tip) + '">' +
          '<span class="heatmap-cell__tip">' + _esc(tip) + '</span>' +
        '</button>';
    }

    // density state class for at-a-glance styling: no-data / sparse / dense
    strip.classList.remove('is-nodata', 'is-sparse', 'is-dense');
    if (total === 0) strip.classList.add('is-nodata');
    else if (lit <= 6 || max <= 2) strip.classList.add('is-sparse');
    else strip.classList.add('is-dense');

    strip.innerHTML = cells || '<div class="heatmap-empty">No linked verses yet.</div>';
  };

  /* ---------------------------------------------------------------------------
   * 8. Expansion + verse highlight
   * -------------------------------------------------------------------------*/
  PM.bible.expandBook = function (name) {
    if (_expanded[name]) delete _expanded[name];
    else _expanded[name] = true;
    PM.bible.render();
    // ensure the book is scrolled into view when opened
    if (_expanded[name]) {
      var el = _drawerEl();
      if (el) {
        var row = el.querySelector('.bible__book[data-book="' + _cssEsc(name) + '"]');
        if (row && row.scrollIntoView) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }
  };

  function _toggleChapter(book, ch) {
    var ckey = book + '|' + ch;
    if (_expandedCh[ckey]) delete _expandedCh[ckey];
    else _expandedCh[ckey] = true;
    PM.bible.render();
  }

  // Highlight all patterns linked to a verse on the canvas + flash them.
  PM.bible.highlightVerse = function (key) {
    _highlightedKey = key;
    var pats = PM.bible.patternsForVerse(key);

    // route highlight through the canonical graph pass:
    // set the search to the verse key so applyHighlight matches those patterns.
    // (PM.data.search matches refs, so the verse key string matches.)
    if (PM.state) PM.state.search = key;
    var searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.value = key;

    if (PM.graph && typeof PM.graph.applyHighlight === 'function') {
      PM.graph.applyHighlight();
    }

    // flash the matching nodes
    if (pats.length) {
      var layer = document.getElementById('nodeLayer');
      if (layer) {
        for (var i = 0; i < pats.length; i++) {
          var node = layer.querySelector('.node[data-id="' + _cssEsc(pats[i].id) + '"]');
          if (node) {
            node.classList.remove('node--flash');
            // force reflow so re-adding the class restarts the animation
            void node.offsetWidth;
            node.classList.add('node--flash');
            (function (n) {
              setTimeout(function () { n.classList.remove('node--flash'); }, 1200);
            })(node);
          }
        }
      }
      // center on the first matched node so the user sees the result
      if (PM.graph && typeof PM.graph.centerOn === 'function') {
        PM.graph.centerOn(pats[0].id);
      }
      if (PM.toast) PM.toast('Highlighting ' + pats.length + ' pattern' + (pats.length === 1 ? '' : 's') + ' linked to ' + key, 'info');
    } else {
      if (PM.toast) PM.toast('No patterns linked to ' + key + ' yet', 'warn');
    }

    // re-render the bible list so the verse row shows the highlighted state
    PM.bible.render();
  };

  /* ---------------------------------------------------------------------------
   * 9. Open / close + testament filter
   * -------------------------------------------------------------------------*/
  PM.bible.open = function () {
    var el = _drawerEl();
    if (!el) return;
    var willOpen = !el.classList.contains('is-open');
    el.classList.toggle('is-open', willOpen);
    el.setAttribute('aria-hidden', willOpen ? 'false' : 'true');
    if (PM.state && PM.state.ui) PM.state.ui.bibleOpen = willOpen;
    var btn = document.getElementById('bibleBtn');
    if (btn) {
      btn.classList.toggle('is-active', willOpen);
      btn.setAttribute('aria-pressed', willOpen ? 'true' : 'false');
    }
    if (willOpen) PM.bible.render();
  };

  PM.bible.close = function () {
    var el = _drawerEl();
    if (!el) return;
    el.classList.remove('is-open');
    el.setAttribute('aria-hidden', 'true');
    if (PM.state && PM.state.ui) PM.state.ui.bibleOpen = false;
    var btn = document.getElementById('bibleBtn');
    if (btn) {
      btn.classList.remove('is-active');
      btn.setAttribute('aria-pressed', 'false');
    }
  };

  PM.bible.setTestamentFilter = function (t) {
    if (t !== 'OT' && t !== 'NT' && t !== 'both') t = 'both';
    if (PM.state && PM.state.filters) PM.state.filters.testaments = t;
    PM.bible.render();
    if (PM.graph && typeof PM.graph.applyHighlight === 'function') PM.graph.applyHighlight();
    if (PM.data && typeof PM.data.renderFilterChips === 'function') {
      try { PM.data.renderFilterChips(); } catch (e) {}
    }
    if (PM.save) PM.save();
  };

  /* ---------------------------------------------------------------------------
   * 10. Verse picker (used by drawer/modal "Add Reference")
   * -------------------------------------------------------------------------*/
  PM.bible.openPicker = function (onPick) {
    // find a host: prefer open modal body, else detail drawer, else bible drawer.
    var host = null;
    var modal = document.getElementById('addModal');
    var drawer = document.getElementById('detailDrawer');
    if (modal && modal.classList.contains('is-open')) host = modal.querySelector('.modal__body') || modal;
    else if (drawer && drawer.classList.contains('is-open')) host = drawer;
    else host = document.body;

    // remove any existing picker
    var existing = document.getElementById('versePicker');
    if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

    var wrap = document.createElement('div');
    wrap.id = 'versePicker';
    wrap.className = 'versepicker';
    wrap.innerHTML =
      '<div class="versepicker__head">' +
        '<input id="versePickerInput" class="versepicker__input" type="text" ' +
          'placeholder="Type a reference, e.g. John 1:29" autocomplete="off" spellcheck="false" />' +
        '<button class="versepicker__close" type="button" aria-label="Close">' +
          '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>' +
        '</button>' +
      '</div>' +
      '<div class="versepicker__results" data-state="idle"></div>';
    host.appendChild(wrap);

    var input = wrap.querySelector('#versePickerInput');
    var results = wrap.querySelector('.versepicker__results');
    var closeBtn = wrap.querySelector('.versepicker__close');

    function destroy() {
      if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
      document.removeEventListener('keydown', onKey, true);
    }
    function onKey(e) {
      if (e.key === 'Escape') { e.stopPropagation(); destroy(); }
    }
    document.addEventListener('keydown', onKey, true);
    closeBtn.addEventListener('click', destroy);

    function renderResults() {
      var q = input.value.trim();
      if (!q) {
        results.setAttribute('data-state', 'idle');
        results.innerHTML = '<div class="versepicker__hint">Start typing a book name and reference…</div>';
        return;
      }
      results.setAttribute('data-state', 'searching');

      // 1) try a full ref parse (book chapter:verse)
      var ref = PM.bible.parseRef(q);
      var html = '';
      if (ref) {
        var key = PM.bible.verseKey(ref);
        var txt = PM.bible.VERSES[key] || '';
        html +=
          '<button class="versepicker__result is-exact" type="button" data-ref="' + _esc(key) + '">' +
            '<span class="versepicker__result-ref">' + _esc(key) + '</span>' +
            (txt ? '<span class="versepicker__result-text">' + _esc(txt) + '</span>' : '<span class="versepicker__result-text versepicker__result-text--dim">Tap to add (text loads when online)</span>') +
          '</button>';
      }

      // 2) book-name suggestions (so user can build the ref)
      var nq = _normalize(q.replace(/\d+.*$/, '')); // strip trailing chapter:verse for name match
      if (nq) {
        var names = PM.bible.bookNames();
        var matches = [];
        for (var i = 0; i < names.length && matches.length < 8; i++) {
          if (_normalize(names[i]).indexOf(nq) === 0) matches.push(names[i]);
        }
        for (var m = 0; m < matches.length; m++) {
          html += '<button class="versepicker__result versepicker__result--book" type="button" data-book="' + _esc(matches[m]) + '">' +
            '<span class="versepicker__result-ref">' + _esc(matches[m]) + '</span>' +
            '<span class="versepicker__result-text versepicker__result-text--dim">add chapter:verse</span>' +
          '</button>';
        }
      }

      if (!html) {
        results.setAttribute('data-state', 'no-results');
        html = '<div class="versepicker__hint">No match. Try "Genesis 1:1" or "1 Cor 13:4".</div>';
      } else {
        results.setAttribute('data-state', 'results');
      }
      results.innerHTML = html;
    }

    results.addEventListener('click', function (e) {
      var rbtn = e.target.closest('.versepicker__result');
      if (!rbtn) return;
      var refKey = rbtn.getAttribute('data-ref');
      if (refKey) {
        var ref = PM.bible.parseRef(refKey);
        if (ref) {
          results.setAttribute('data-state', 'selected');
          if (typeof onPick === 'function') onPick(ref);
          // warm the text cache
          PM.bible.verseText(ref);
          destroy();
        }
        return;
      }
      var bookName = rbtn.getAttribute('data-book');
      if (bookName) {
        input.value = bookName + ' ';
        input.focus();
        renderResults();
      }
    });

    var deb;
    input.addEventListener('input', function () {
      clearTimeout(deb);
      deb = setTimeout(renderResults, 80);
    });

    renderResults();
    setTimeout(function () { try { input.focus(); } catch (e) {} }, 0);

    return destroy; // caller may close programmatically
  };

  /* ---------------------------------------------------------------------------
   * 11. Mount: one-time wiring (delegation for open/close/filter/accordion).
   * -------------------------------------------------------------------------*/
  function _cssEsc(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/["\\\]]/g, '\\$&');
  }

  PM.bible.mount = function () {
    if (_mounted) return;
    _mounted = true;
    var el = _drawerEl();
    if (!el) return;

    // ensure scaffold exists so heatmap can render before first open
    if (!el.querySelector('.bible__head')) _buildScaffold();

    // delegated click handling within the drawer
    el.addEventListener('click', function (e) {
      // close
      if (e.target.closest('#bibleCloseBtn')) { PM.bible.close(); return; }

      // testament filter
      var fbtn = e.target.closest('.bible__filter-btn');
      if (fbtn) { PM.bible.setTestamentFilter(fbtn.getAttribute('data-t')); return; }

      // heatmap cell -> expand + scroll to that book
      var cell = e.target.closest('.heatmap-cell');
      if (cell) {
        var bk = cell.getAttribute('data-book');
        if (bk) {
          // make sure the right column is shown
          var book = PM.consts && PM.consts.BOOK_BY_NAME ? PM.consts.BOOK_BY_NAME[bk] : null;
          if (book && PM.state && PM.state.filters) {
            var tf = PM.state.filters.testaments;
            if (tf !== 'both' && tf !== book.testament) PM.bible.setTestamentFilter('both');
          }
          if (!_expanded[bk]) _expanded[bk] = true;
          PM.bible.render();
          var row = el.querySelector('.bible__book[data-book="' + _cssEsc(bk) + '"]');
          if (row && row.scrollIntoView) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
          if (row) {
            row.classList.add('is-pulse');
            setTimeout(function () { row.classList.remove('is-pulse'); }, 900);
          }
        }
        return;
      }

      // book header toggle
      var bhead = e.target.closest('.bible__book-head');
      if (bhead && !bhead.disabled) {
        PM.bible.expandBook(bhead.getAttribute('data-book'));
        return;
      }

      // chapter header toggle
      var chead = e.target.closest('.bible__chapter-head');
      if (chead) {
        _toggleChapter(chead.getAttribute('data-book'), parseInt(chead.getAttribute('data-ch'), 10));
        return;
      }

      // verse click -> highlight
      var vbtn = e.target.closest('.bible__verse');
      if (vbtn) {
        PM.bible.highlightVerse(vbtn.getAttribute('data-key'));
        return;
      }
    });

    // initial heatmap paint (drawer may be closed but #render calls this too)
    PM.bible.renderHeatmap();
  };

})();
</script>
<script>
/* ===== sync.js ===== */
/* ============================================================================
   PM.sync — Obsidian sync simulation + settings page + global indicator
   Contract §6.6. Defines exactly the closed surface listed in §10.
   ========================================================================== */
(function () {
  'use strict';

  window.PM = window.PM || {};
  PM.sync = PM.sync || {};

  /* ---- private module state (not on the public surface) ------------------ */
  var _intervalId = null;     // setInterval handle for frequency-based sync
  var _syncTimer = null;      // setTimeout handle for the simulated async sync
  var _errorLogOpen = false;  // collapsible error-log open/closed (ephemeral UI)
  var _progress = 0;          // 0..100 progress bar value during a sync
  var _progTimer = null;      // interval handle animating the progress bar

  /* small helpers ---------------------------------------------------------- */
  function settings() { return PM.state.settings; }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function icon(name) {
    return (PM.data && PM.data.iconSvg) ? PM.data.iconSvg(name) : '';
  }

  function fmt(ts, mode) {
    return (PM.fmtDate ? PM.fmtDate(ts, mode) : (ts ? new Date(ts).toLocaleString() : '—'));
  }

  /* ------------------------------------------------------------------------ */
  /* REAL Obsidian sync — File System Access API + IndexedDB handle store      */
  /* When window.showDirectoryPicker exists (http://localhost / https) we can  */
  /* write real .md files. On file:// it is undefined → simulated + export.    */
  /* ------------------------------------------------------------------------ */

  var _dirHandle = null;          // live FileSystemDirectoryHandle (in-memory)

  PM.sync.fsSupported = function () {
    return (typeof window !== 'undefined') && (typeof window.showDirectoryPicker === 'function');
  };

  PM.sync.hasHandle = function () { return !!_dirHandle; };

  // --- tiny IndexedDB wrapper: db 'patternmap', store 'handles', key 'vault' ---
  function idbOpen() {
    return new Promise(function (resolve, reject) {
      if (typeof indexedDB === 'undefined') { reject(new Error('no indexedDB')); return; }
      var req = indexedDB.open('patternmap', 1);
      req.onupgradeneeded = function () {
        var db = req.result;
        if (!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error || new Error('idb open failed')); };
    });
  }

  function idbPut(key, val) {
    return idbOpen().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(val, key);
        tx.oncomplete = function () { db.close(); resolve(true); };
        tx.onerror = function () { db.close(); reject(tx.error); };
      });
    });
  }

  function idbGet(key) {
    return idbOpen().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction('handles', 'readonly');
        var rq = tx.objectStore('handles').get(key);
        rq.onsuccess = function () { db.close(); resolve(rq.result || null); };
        rq.onerror = function () { db.close(); reject(rq.error); };
      });
    });
  }

  function idbDel(key) {

    return idbOpen().then(function (db) {
      return new Promise(function (resolve) {
        var tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').delete(key);
        tx.oncomplete = function () { db.close(); resolve(true); };
        tx.onerror = function () { db.close(); resolve(false); };
      });
    }).catch(function () { return false; });
  }

  function verifyPermission(handle, rw) {
    var opts = { mode: rw ? 'readwrite' : 'read' };
    if (!handle || typeof handle.queryPermission !== 'function') return Promise.resolve(true);
    return handle.queryPermission(opts).then(function (p) {
      if (p === 'granted') return true;
      if (typeof handle.requestPermission !== 'function') return false;
      return handle.requestPermission(opts).then(function (p2) { return p2 === 'granted'; });
    }).catch(function () { return false; });
  }

  // "Connect Vault Folder": pick a dir, persist its handle, mark connected.
  PM.sync.connectVault = function () {
    if (!PM.sync.fsSupported()) {
      PM.toast && PM.toast('Live writing needs the local server (http://localhost)', 'warn', 5000);
      return Promise.resolve(false);
    }
    return window.showDirectoryPicker({ mode: 'readwrite' }).then(function (handle) {
      _dirHandle = handle;
      return verifyPermission(handle, true).then(function (ok) {
        if (!ok) { PM.toast && PM.toast('Write permission denied', 'error'); return false; }
        return idbPut('vault', handle).catch(function () { return false; }).then(function () {
          var s = settings();
          if (!s.vaultPath || !String(s.vaultPath).trim()) s.vaultPath = handle.name || 'Vault';
          s.status = 'connected';
          PM.save && PM.save();
          PM.sync.renderIndicator();
          if (PM.state.ui && PM.state.ui.settingsOpen) PM.sync.renderSettings();
          PM.toast && PM.toast('Vault folder connected', 'success');
          return true;
        });
      });
    }).catch(function () { /* user cancelled / denied */ return false; });
  };

  // Reconnect a persisted handle on load (re-prompts for permission if needed).
  PM.sync.restoreHandle = function () {
    if (!PM.sync.fsSupported()) return Promise.resolve(false);
    return idbGet('vault').then(function (handle) {
      if (!handle) return false;
      return verifyPermission(handle, true).then(function (ok) {
        if (!ok) return false;
        _dirHandle = handle;
        if (settings().status === 'unconfigured') settings().status = 'connected';
        PM.sync.renderIndicator();
        if (PM.state.ui && PM.state.ui.settingsOpen) PM.sync.renderSettings();
        return true;
      });
    }).catch(function () { return false; });
  };

  PM.sync.disconnectVault = function () {
    _dirHandle = null;
    return idbDel('vault').then(function () {
      var s = settings();
      s.status = (s.vaultPath && String(s.vaultPath).trim()) ? 'connected' : 'unconfigured';
      PM.save && PM.save();
      PM.sync.renderIndicator();
      if (PM.state.ui && PM.state.ui.settingsOpen) PM.sync.renderSettings();
      PM.toast && PM.toast('Vault folder disconnected', 'info');
      return true;
    });
  };

  // Resolve the sync subfolder handle inside the vault (creates it if needed).
  function targetDir() {
    if (!_dirHandle) return Promise.reject(new Error('no handle'));
    var folder = String(settings().syncFolder || 'PatternMap/').replace(/^\/+|\/+$/g, '');
    if (!folder) return Promise.resolve(_dirHandle);
    // walk nested segments e.g. "PatternMap/sub"
    var parts = folder.split('/').filter(Boolean);
    var chain = Promise.resolve(_dirHandle);
    parts.forEach(function (seg) {
      chain = chain.then(function (dir) { return dir.getDirectoryHandle(seg, { create: true }); });
    });
    return chain;
  }

  function writeFile(dir, name, contents) {
    return dir.getFileHandle(name, { create: true }).then(function (fh) {
      return fh.createWritable().then(function (w) {
        return w.write(contents).then(function () { return w.close(); });
      });
    });
  }

  // Build the index MOC linking every pattern by [[wikilink]], grouped by category.
  PM.sync.indexMarkdown = function () {
    var ps = (PM.state && PM.state.patterns) || [];
    var groups = {};
    var order = [];
    for (var i = 0; i < ps.length; i++) {
      var key = ps[i].category || 'custom';
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(ps[i]);
    }
    var out = [
      '---',
      'title: "PatternMap"',
      'cssclasses: [patternmap, patternmap-moc]',
      'tags: [patternmap, MOC]',
      '---',
      '',
      '# PatternMap',
      '',
      'A map of content linking every pattern, grouped by category.',
      ''
    ];
    order.sort();
    for (var g = 0; g < order.length; g++) {
      var cat = order[g];
      var label = (PM.data && PM.data.category) ? (PM.data.category(cat).label || cat) : cat;
      out.push('## ' + label);
      var members = groups[cat].slice().sort(function (a, b) {
        return String(a.title || '').localeCompare(String(b.title || ''));
      });
      for (var m = 0; m < members.length; m++) {
        var slug = PM.sync.slugFor(members[m]);
        out.push('- [[' + slug + '|' + (members[m].title || slug) + ']]');
      }
      out.push('');
    }
    out.push('---');
    out.push('> Synced from PatternMap');
    return out.join('\n');
  };

  // REAL write of all patterns + the index MOC. Reports per-file progress via cb.
  // Resolves to the number of pattern notes written; rejects on FS error.
  function writeAll(onProgress) {
    return targetDir().then(function (dir) {
      var ps = (PM.state && PM.state.patterns) || [];
      var total = ps.length + 1; // + index MOC
      var done = 0;
      function bump() { done++; if (onProgress) onProgress(Math.round((done / total) * 100)); }
      var chain = Promise.resolve();
      ps.forEach(function (p) {
        chain = chain.then(function () {
          var name = PM.sync.slugFor(p) + '.md';
          return writeFile(dir, name, PM.sync.noteMarkdown(p)).then(function () {
            p.synced = true;
            bump();
          });
        });
      });
      chain = chain.then(function () {
        return writeFile(dir, 'PatternMap.md', PM.sync.indexMarkdown()).then(bump);
      });
      return chain.then(function () { return ps.length; });
    });
  }

  // Concatenated .md of every note + the index (file:// export fallback).
  PM.sync.exportAllMarkdown = function () {
    var ps = (PM.state && PM.state.patterns) || [];
    var blocks = [];
    blocks.push('<!-- PatternMap.md -->\n\n' + PM.sync.indexMarkdown());
    for (var i = 0; i < ps.length; i++) {
      var name = PM.sync.slugFor(ps[i]) + '.md';
      blocks.push('<!-- ' + name + ' -->\n\n' + PM.sync.noteMarkdown(ps[i]));
    }
    return blocks.join('\n\n\n');
  };

  PM.sync.downloadAllMarkdown = function () {
    var text = PM.sync.exportAllMarkdown();
    try {
      var blob = new Blob([text], { type: 'text/markdown' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'PatternMap-notes.md';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      PM.toast && PM.toast('Exported ' + ((PM.state.patterns || []).length) + ' notes (.md)', 'success');
    } catch (e) {
      PM.toast && PM.toast('Export failed', 'error');
    }
  };

  /* ------------------------------------------------------------------------ */
  /* Status model                                                             */
  /* ------------------------------------------------------------------------ */

  // Map the global settings.status -> presentation metadata.
  var STATUS_META = {
    unconfigured: { dot: 'is-unconfigured', label: 'Not configured', cls: 'sync-indicator--unconfigured' },
    connected:    { dot: 'is-connected',    label: 'Connected',      cls: 'sync-indicator--connected' },
    syncing:      { dot: 'is-syncing',      label: 'Syncing…',  cls: 'sync-indicator--syncing' },
    error:        { dot: 'is-error',        label: 'Sync error',     cls: 'sync-indicator--error' }
  };

  // Derive the *effective* status (unconfigured always wins when no vault path
  // AND no connected directory handle).
  function effectiveStatus() {
    var s = settings();
    var configured = (s.vaultPath && String(s.vaultPath).trim()) || _dirHandle || (_helper.available === true);
    if (!configured) {
      // never lie: with no vault path / handle we are unconfigured (unless mid-sync)
      if (s.status !== 'syncing') return 'unconfigured';
    }
    return s.status || 'connected';
  }

  /* ------------------------------------------------------------------------ */
  /* PM.sync.computePending / statusOf                                        */
  /* ------------------------------------------------------------------------ */

  PM.sync.computePending = function () {
    var n = 0, ps = PM.state.patterns || [];
    for (var i = 0; i < ps.length; i++) if (ps[i].synced === false) n++;
    settings().pending = n;
    return n;
  };

  PM.sync.statusOf = function (pattern) {
    if (!pattern) return 'pending';
    if (settings().status === 'error') return 'error';
    return pattern.synced ? 'synced' : 'pending';
  };

  /* ------------------------------------------------------------------------ */
  /* PM.sync.noteMarkdown — template rendering                                */
  /* ------------------------------------------------------------------------ */

  // Render a single template, substituting {{vars}} for a pattern.
  // The default template + buildVars together emit the CANONICAL Obsidian
  // note format (frontmatter + wikilinked Connected Patterns + verse text).
  // Unknown {{x}} tokens are left as-is (per contract).
  PM.sync.noteMarkdown = function (pattern) {
    var tpl = settings().template || (PM.consts && PM.consts.DEFAULT_TEMPLATE) || '';
    var vars = buildVars(pattern);
    return tpl.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, function (whole, key) {
      return Object.prototype.hasOwnProperty.call(vars, key) ? vars[key] : whole;
    });
  };

  /* ---- slug rule: basename of obsidianPath sans .md, else slugify title ---- */
  PM.sync.slugFor = function (pattern) {
    var p = pattern || {};
    var path = String(p.obsidianPath || '');
    if (path.trim()) {
      var base = path.replace(/\\/g, '/').split('/').pop();   // basename
      base = base.replace(/\.md$/i, '');
      if (base.trim()) return slugify(base);
    }
    return slugify(p.title || 'untitled');
  };

  function slugify(s) {
    return String(s == null ? '' : s)
      .toLowerCase()
      .replace(/→/g, 'to')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'untitled';
  }

  // ISO date (YYYY-MM-DD) for frontmatter / observation lines.
  function isoDate(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    if (isNaN(d.getTime())) return '';
    var mo = d.getMonth() + 1, da = d.getDate();
    return d.getFullYear() + '-' + (mo < 10 ? '0' + mo : mo) + '-' + (da < 10 ? '0' + da : da);
  }

  // YAML tag-array form: tags: [a, b]  (or tags: [] when none).
  function yamlTags(tags) {
    var t = (tags || []).filter(function (x) { return x != null && String(x).trim(); });
    if (!t.length) return '[]';
    return '[' + t.map(function (x) { return String(x).trim(); }).join(', ') + ']';
  }

  // "## Bible References" body: one bullet per ref, with KJV verse text when known.
  function bibleRefsBody(p) {
    var refs = (p.refs || []);
    if (!refs.length) return '_No references yet._';
    return refs.map(function (r) {
      var key = (PM.bible && PM.bible.verseKey) ? PM.bible.verseKey(r)
        : (r.book + ' ' + r.chapter + ':' + r.verse);
      var text = (typeof PM.getVerse === 'function') ? PM.getVerse(r) : null;
      if (text) return '- **' + key + '** — "' + text + '"';
      return '- **' + key + '**';
    }).join('\n');
  }

  // "## Connected Patterns" body: every edge touching this pattern, as
  // [[other-slug|Other Title]] — _label_ . "_None yet._" when no connections.
  function connectionsBody(p) {
    if (!p || !p.id) return '_None yet._';
    var es = (PM.state && PM.state.edges) || [];
    var lines = [];
    for (var i = 0; i < es.length; i++) {
      var e = es[i];
      if (e.from !== p.id && e.to !== p.id) continue;
      var otherId = (e.from === p.id) ? e.to : e.from;
      var other = (PM.data && PM.data.getPattern) ? PM.data.getPattern(otherId) : null;
      if (!other) continue;
      var slug = PM.sync.slugFor(other);
      var title = other.title || slug;
      var label = e.label || 'related';
      lines.push('- [[' + slug + '|' + title + ']] — _' + label + '_');
    }
    return lines.length ? lines.join('\n') : '_None yet._';
  }

  // "## Observations" body, most-recent first; "_No observations yet._" when none.
  function observationsBody(p) {
    var obs = (p.observations || []).slice();
    if (!obs.length) return '_No observations yet._';
    obs.sort(function (a, b) { return (b.ts || 0) - (a.ts || 0); });
    return obs.map(function (o) {
      return '- ' + isoDate(o.ts) + ' — ' + (o.text || '');
    }).join('\n');
  }

  function buildVars(pattern) {
    var p = pattern || {};
    return {
      title: p.title || '',
      category: p.category || 'custom',
      description: p.description || '',
      testament: p.testament || 'both',
      tags: yamlTags(p.tags),
      references: String((p.refs || []).length),
      created: isoDate(p.created),
      modified: isoDate(p.modified),
      bibleReferences: bibleRefsBody(p),
      connections: connectionsBody(p),
      observations: observationsBody(p),
      // legacy aliases kept so older custom templates still resolve
      refs: bibleRefsBody(p),
      id: p.id || ''
    };
  }

  // expose the var keys for the template-editor preview/legend
  function templateVarNames() {
    return ['title', 'category', 'testament', 'tags', 'created', 'modified',
      'references', 'description', 'bibleReferences', 'connections', 'observations'];
  }

  // keep a public-ish alias requested by spec text (PM.sync.generateMarkdown)
  // without expanding the closed §10 surface meaningfully — noteMarkdown is canonical.
  PM.sync.generateMarkdown = function (pattern) { return PM.sync.noteMarkdown(pattern); };

  /* ------------------------------------------------------------------------ */
  /* PM.sync.obsidianUri                                                      */
  /* ------------------------------------------------------------------------ */

  PM.sync.obsidianUri = function (pattern) {
    var s = settings();
    var vault = String(s.vaultPath || '').replace(/\/+$/, '');
    var rel = pattern ? String(pattern.obsidianPath || '') : '';
    // Build an absolute file path: vaultPath + '/' + obsidianPath (rel may already include syncFolder)
    var full = rel;
    if (vault) full = vault + '/' + rel.replace(/^\/+/, '');
    return 'obsidian://open?path=' + encodeURIComponent(full);
  };

  // Build the openInObsidian(id) helper the spec describes (resolve id -> pattern -> uri -> navigate)
  PM.sync.openInObsidian = function (id) {
    var p = (PM.data && PM.data.getPattern) ? PM.data.getPattern(id) : null;
    if (!p) { PM.toast && PM.toast('Pattern not found', 'error'); return ''; }
    var uri = PM.sync.obsidianUri(p);
    try { window.open(uri, '_blank'); } catch (e) { /* sandbox-safe */ }
    PM.toast && PM.toast('Opening in Obsidian…', 'info');
    return uri;
  };

  /* ------------------------------------------------------------------------ */
  /* PM.sync.setStatus                                                        */
  /* ------------------------------------------------------------------------ */

  PM.sync.setStatus = function (status, msg) {
    var s = settings();
    s.status = status;
    if (status === 'error') {
      s.errorLog = s.errorLog || [];
      s.errorLog.push({ ts: PM.now ? PM.now() : Date.now(), message: msg || 'Sync failed' });
      // keep the log from growing unbounded
      if (s.errorLog.length > 50) s.errorLog = s.errorLog.slice(-50);
    }
    PM.sync.renderIndicator();
    if (PM.state.ui && PM.state.ui.settingsOpen) PM.sync.renderSettings();
    PM.save && PM.save();
  };

  /* ------------------------------------------------------------------------ */
  /* PM.sync.syncNow / retry                                                  */
  /* ------------------------------------------------------------------------ */

  /* ------------------------------------------------------------------------ */
  /* Local sync helper (patternmap-serve) — zero-friction real writes over    */
  /* http://localhost. POSTs rendered notes to a tiny local server that writes */
  /* them into the vault. Preferred over the FS Access API when reachable.     */
  /* ------------------------------------------------------------------------ */
  var _helper = { available: null, info: null };
  var _helperSyncing = false;

  function canUseHelper() {
    try {
      return (typeof fetch === 'function') && (typeof location !== 'undefined') &&
        /^https?:$/.test(location.protocol);
    } catch (e) { return false; }
  }

  PM.sync.helperAvailable = function () { return _helper.available === true; };

  PM.sync.helperCheck = function () {
    if (!canUseHelper()) { _helper.available = false; return Promise.resolve(false); }
    return fetch('api/status', { method: 'GET' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { _helper.available = !!(j && j.ok); _helper.info = j || null; return _helper.available; })
      .catch(function () { _helper.available = false; return false; });
  };

  function helperSync() {
    var s = settings();
    if (_helperSyncing) return Promise.resolve();
    _helperSyncing = true;
    s.status = 'syncing';
    _progress = 8;
    PM.sync.computePending();
    PM.sync.renderIndicator();
    if (PM.state.ui.settingsOpen) PM.sync.renderSettings();

    var ps = (PM.state && PM.state.patterns) || [];
    var notes = ps.map(function (p) {
      return { name: PM.sync.slugFor(p) + '.md', content: PM.sync.noteMarkdown(p) };
    });
    notes.push({ name: 'PatternMap.md', content: PM.sync.indexMarkdown() });
    var folder = String(s.syncFolder || 'PatternMap/').replace(/^\/+|\/+$/g, '') || 'PatternMap';

    return fetch('api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: folder, notes: notes })
    }).then(function (r) {
      return r.json().catch(function () { return null; }).then(function (j) { return { ok: r.ok, j: j }; });
    }).then(function (res) {
      _helperSyncing = false;
      _progress = 100; updateProgressBar();
      if (!res.ok || !res.j || !res.j.ok) {
        throw new Error((res.j && res.j.error) || 'Local server could not write the notes.');
      }
      for (var i = 0; i < ps.length; i++) ps[i].synced = true;
      s.lastSynced = PM.now ? PM.now() : Date.now();
      s.status = 'connected';
      s.syncedNotes = (res.j.written != null) ? res.j.written : notes.length;
      if (res.j.path) s.vaultResolved = res.j.path;
      PM.sync.computePending();
      PM.sync.renderIndicator();
      if (PM.state.ui.settingsOpen) PM.sync.renderSettings();
      PM.toast && PM.toast('Synced ' + s.syncedNotes + ' notes to your vault', 'success');
      PM.save && PM.save();
      _progress = 0;
    }).catch(function (err) {
      _helperSyncing = false;
      _progress = 0;
      PM.sync.setStatus('error', (err && err.message) ? err.message : 'Local server sync failed.');
      PM.toast && PM.toast('Sync failed — ' + ((err && err.message) || 'local server error'), 'error');
    });
  }

  PM.sync.syncNow = function () {
    // 0) Prefer the local sync helper (patternmap-serve) when reachable.
    if (canUseHelper()) {
      if (_helper.available === true) return helperSync();
      if (_helper.available === null) {
        return PM.sync.helperCheck().then(function (ok) {
          return ok ? helperSync() : syncNowNoHelper();
        });
      }
    }
    return syncNowNoHelper();
  };

  function syncNowNoHelper() {
    var s = settings();

    // When a real directory handle is connected, do REAL writes.
    if (_dirHandle) return realSync();

    if (!s.vaultPath || !String(s.vaultPath).trim()) {
      PM.toast && PM.toast('Connect a vault folder before syncing', 'warn');
      // bounce the user to settings so they can fix it
      if (!PM.state.ui.settingsOpen) PM.sync.openSettings();
      return;
    }
    if (_syncTimer) return; // already syncing; ignore re-entrancy

    // -> syncing (SIMULATED path: no FS access, e.g. file:// without a handle)
    s.status = 'syncing';
    _progress = 0;
    PM.sync.computePending();
    PM.sync.renderIndicator();
    if (PM.state.ui.settingsOpen) PM.sync.renderSettings();

    // animate the progress bar while "writing"
    if (_progTimer) clearInterval(_progTimer);
    _progTimer = setInterval(function () {
      _progress = Math.min(96, _progress + Math.random() * 22 + 6);
      updateProgressBar();
    }, 180);

    var ms = 900 + Math.random() * 900;
    _syncTimer = setTimeout(function () {
      _syncTimer = null;
      if (_progTimer) { clearInterval(_progTimer); _progTimer = null; }
      _progress = 100;
      updateProgressBar();

      // ~18% chance to simulate an error (per spec "a chance to show error state")
      var fail = Math.random() < 0.18;
      if (fail) {
        PM.sync.setStatus('error', 'Could not write notes to vault (simulated network/FS error).');
        PM.toast && PM.toast('Sync failed — tap retry', 'error');
      } else {
        // success: mark all patterns synced, bump lastSynced, recompute pending
        var ps = PM.state.patterns || [];
        var wrote = 0;
        for (var i = 0; i < ps.length; i++) {
          if (ps[i].synced === false) wrote++;
          ps[i].synced = true;
        }
        s.lastSynced = PM.now ? PM.now() : Date.now();
        s.status = 'connected';
        s.syncedNotes = ps.length;
        PM.sync.computePending();
        PM.sync.renderIndicator();
        if (PM.state.ui.settingsOpen) PM.sync.renderSettings();
        PM.toast && PM.toast(
          wrote > 0 ? ('Synced ' + wrote + ' note' + (wrote === 1 ? '' : 's')) : 'Up to date',
          'success');
        PM.save && PM.save();
      }
      _progress = 0;
    }, ms);
  };

  // Real File System Access write of every note + the index MOC.
  function realSync() {
    var s = settings();
    if (_realSyncing) return Promise.resolve(); // re-entrancy guard
    _realSyncing = true;
    s.status = 'syncing';
    _progress = 0;
    PM.sync.computePending();
    PM.sync.renderIndicator();
    if (PM.state.ui.settingsOpen) PM.sync.renderSettings();

    return verifyPermission(_dirHandle, true).then(function (ok) {
      if (!ok) throw new Error('Write permission was denied for the vault folder.');
      return writeAll(function (pct) {
        _progress = Math.min(99, pct);
        updateProgressBar();
      });
    }).then(function (count) {
      _progress = 100;
      updateProgressBar();
      s.lastSynced = PM.now ? PM.now() : Date.now();
      s.status = 'connected';
      s.syncedNotes = count;
      s.pending = 0;
      PM.sync.computePending();
      PM.sync.renderIndicator();
      if (PM.state.ui.settingsOpen) PM.sync.renderSettings();
      PM.toast && PM.toast('Wrote ' + count + ' note' + (count === 1 ? '' : 's') + ' + index to vault', 'success');
      PM.save && PM.save();
      _progress = 0;
    }).catch(function (err) {
      PM.sync.setStatus('error', (err && err.message) ? err.message : 'Could not write notes to the vault folder.');
      PM.toast && PM.toast('Sync failed — tap retry', 'error');
      _progress = 0;
    }).then(function () {
      _realSyncing = false;
    });
  }
  var _realSyncing = false;

  PM.sync.retry = function () {
    // clear error visual then re-run
    settings().status = 'connected';
    PM.sync.renderIndicator();
    PM.sync.syncNow();
  };

  function updateProgressBar() {
    var bar = document.getElementById('syncProgressFill');
    if (bar) bar.style.width = Math.round(_progress) + '%';
    var ind = document.querySelector('#syncIndicator .sync-indicator__progress-fill');
    if (ind) ind.style.width = Math.round(_progress) + '%';
  }

  /* ------------------------------------------------------------------------ */
  /* PM.sync.applyFrequency / maybeAutoSync                                   */
  /* ------------------------------------------------------------------------ */

  var FREQ_MS = { '5m': 5 * 60 * 1000, '15m': 15 * 60 * 1000, '1h': 60 * 60 * 1000 };

  PM.sync.applyFrequency = function () {
    if (_intervalId) { clearInterval(_intervalId); _intervalId = null; }
    var f = settings().frequency;
    if (FREQ_MS[f]) {
      _intervalId = setInterval(function () {
        // only fire when configured (handle or path) and not already syncing
        var s = settings();
        var configured = _dirHandle || (s.vaultPath && String(s.vaultPath).trim());
        if (configured && s.status !== 'syncing') {
          PM.sync.syncNow();
        }
      }, FREQ_MS[f]);
    }
  };

  // Called by app.js after mutations. On 'onSave' it debounces a sync — REAL
  // FS write when a directory handle is connected, simulated otherwise.
  PM.sync.maybeAutoSync = function () {
    var f = settings().frequency;
    PM.sync.computePending();
    if (f === 'onSave') {
      pulseIndicator();
      var configured = _dirHandle || (settings().vaultPath && String(settings().vaultPath).trim());
      if (configured && !_syncTimer && !_realSyncing) {
        // gentle: defer a sync so rapid edits coalesce
        if (_progTimer) return;
        clearTimeout(_onSaveDebounce);
        _onSaveDebounce = setTimeout(function () { PM.sync.syncNow(); }, 600);
      }
    }
    PM.sync.renderIndicator();
  };
  var _onSaveDebounce = null;

  function pulseIndicator() {
    var el = document.getElementById('syncIndicator');
    if (!el) return;
    el.classList.remove('sync-indicator--pulse');
    // force reflow so the animation can restart
    void el.offsetWidth;
    el.classList.add('sync-indicator--pulse');
  }

  /* ------------------------------------------------------------------------ */
  /* PM.sync.renderIndicator — global always-visible status (criterion 6)     */
  /* ------------------------------------------------------------------------ */

  PM.sync.renderIndicator = function () {
    var el = document.getElementById('syncIndicator');
    if (!el) return;
    var st = effectiveStatus();
    var meta = STATUS_META[st] || STATUS_META.connected;
    var s = settings();
    var pending = PM.sync.computePending();

    // base class set
    el.className = 'sync-indicator ' + meta.cls + ' is-clickable';

    var sub;
    if (st === 'unconfigured') {
      sub = 'Set up Obsidian sync';
    } else if (st === 'syncing') {
      sub = 'Writing notes…';
    } else if (st === 'error') {
      sub = 'Click to retry';
    } else {
      sub = pending > 0
        ? (pending + ' pending')
        : ('Synced ' + fmt(s.lastSynced, 'rel'));
    }

    var pendingBadge = (pending > 0 && st !== 'unconfigured' && st !== 'syncing')
      ? '<span class="sync-indicator__badge">' + pending + '</span>'
      : '';

    var progress = (st === 'syncing')
      ? '<div class="sync-indicator__progress"><div class="sync-indicator__progress-fill" style="width:' +
        Math.round(_progress) + '%"></div></div>'
      : '';

    el.innerHTML =
      '<span class="sync-indicator__dot ' + meta.dot + '"></span>' +
      '<span class="sync-indicator__text">' +
      '<span class="sync-indicator__label">' + esc(meta.label) + '</span>' +
      '<span class="sync-indicator__sub">' + esc(sub) + '</span>' +
      '</span>' +
      pendingBadge +
      '<span class="sync-indicator__icon">' + icon('sync') + '</span>' +
      progress;

    el.title = 'Obsidian sync: ' + meta.label +
      (st === 'connected' && s.lastSynced ? (' — last ' + fmt(s.lastSynced, 'datetime')) : '');

    // wire the click (idempotent: replace handler each render)
    el.onclick = function () {
      var cur = effectiveStatus();
      if (cur === 'error') { PM.sync.retry(); return; }
      if (cur === 'unconfigured') { PM.sync.openSettings(); return; }
      // connected/idle -> open settings dashboard (never navigate away to *check*, but allow opening)
      PM.sync.openSettings();
    };
  };

  /* ------------------------------------------------------------------------ */
  /* Settings page open/close                                                 */
  /* ------------------------------------------------------------------------ */

  PM.sync.openSettings = function () {
    var page = document.getElementById('settingsPage');
    if (!page) return;
    PM.state.ui.settingsOpen = true;
    PM.sync.renderSettings();
    page.classList.add('is-open');
    page.setAttribute('aria-hidden', 'false');
    var btn = document.getElementById('settingsBtn');
    if (btn) btn.classList.add('is-active');
    // Probe the local sync helper (patternmap-serve); re-render to reflect it.
    if (_helper.available === null && canUseHelper()) {
      PM.sync.helperCheck().then(function () {
        if (PM.state.ui.settingsOpen) PM.sync.renderSettings();
        PM.sync.renderIndicator();
      });
    }
    // focus the vault path input for quick setup
    var vp = document.getElementById('vaultPathInput');
    if (vp) setTimeout(function () { try { vp.focus(); } catch (e) {} }, 60);
  };

  PM.sync.closeSettings = function () {
    var page = document.getElementById('settingsPage');
    if (!page) return;
    PM.state.ui.settingsOpen = false;
    page.classList.remove('is-open');
    page.setAttribute('aria-hidden', 'true');
    var btn = document.getElementById('settingsBtn');
    if (btn) btn.classList.remove('is-active');
  };

  // contract alias used by app.js (#settingsBtn -> toggle)
  PM.sync.close = function () { PM.sync.closeSettings(); };

  /* ------------------------------------------------------------------------ */
  /* Settings page render                                                     */
  /* ------------------------------------------------------------------------ */

  var FREQ_OPTIONS = [
    { v: 'manual', label: 'Manual only' },
    { v: 'onSave', label: 'On every save' },
    { v: '5m', label: 'Every 5 minutes' },
    { v: '15m', label: 'Every 15 minutes' },
    { v: '1h', label: 'Every hour' }
  ];

  PM.sync.renderSettings = function () {
    var page = document.getElementById('settingsPage');
    if (!page) return;
    var s = settings();
    var st = effectiveStatus();
    var configured = !!(s.vaultPath && String(s.vaultPath).trim());

    page.innerHTML =
      head() +
      '<div class="settings__body">' +
        (configured ? '' : onboarding()) +
        statusBlock(st) +
        connectBlock() +
        fieldsBlock() +
        dashboardBlock() +
        errorLogBlock() +
        templateBlock() +
      '</div>' +
      footer();

    wireSettings();
  };

  // "Connect Vault Folder" via File System Access — or a file:// fallback callout.
  function connectBlock() {
    if (_helper.available === true) {
      var hp = (_helper.info && _helper.info.path) ? _helper.info.path : 'your notes folder';
      return '' +
        '<div class="settings__connect">' +
          '<div class="settings__connect-row"><span class="settings__connect-dot is-on"></span>' +
            '<div class="settings__connect-text"><strong>Connected via local server</strong>' +
            '<span>PatternMap is running through <code>patternmap-serve</code> and writes notes straight to <code>' + hp + '</code>. Just click <em>Sync Now</em>.</span></div>' +
          '</div>' +
        '</div>';
    }
    if (PM.sync.fsSupported()) {
      var connected = PM.sync.hasHandle();
      var dot = connected
        ? '<span class="settings__connect-dot is-on"></span>'
        : '<span class="settings__connect-dot"></span>';
      var label = connected
        ? 'Vault folder connected — notes write directly to disk.'
        : 'Pick your vault folder once. PatternMap writes real <code>.md</code> files there and remembers the folder across reloads.';
      var btns = connected
        ? '<button id="connectVaultBtn" class="btn btn--accent" type="button">' + icon('book') + 'Reconnect folder</button>' +
          '<button id="disconnectVaultBtn" class="btn btn--ghost" type="button">Disconnect</button>'
        : '<button id="connectVaultBtn" class="btn btn--accent" type="button">' + icon('book') + 'Connect Vault Folder</button>';
      return '' +
        '<div class="settings__connect">' +
          '<div class="settings__connect-row">' + dot +
            '<div class="settings__connect-text"><strong>Live folder writing</strong>' +
            '<span>' + label + '</span></div>' +
          '</div>' +
          '<div class="settings__connect-actions">' + btns + '</div>' +
        '</div>';
    }
    // file:// fallback: no File System Access API in this context.
    return '' +
      '<div class="settings__callout">' +
        '<div class="settings__callout-icon">' + icon('alert') + '</div>' +
        '<div class="settings__callout-text">' +
          '<strong>Live writing needs the local server</strong>' +
          '<p>This page is running from <code>file://</code>, where browsers do not expose ' +
          'the folder-picker API. To write notes straight to disk, run the ' +
          '<code>patternmap-serve</code> helper (it opens <code>http://localhost</code>), then ' +
          'reload and click <em>Connect Vault Folder</em>.</p>' +
          '<p>Your notes folder already exists at <code>/path/to/notes/PatternMap</code> ' +
          '(kept in sync), so anything you export lands right beside it.</p>' +
        '</div>' +
      '</div>';
  }

  function head() {
    return '' +
      '<div class="settings__head">' +
        '<div class="settings__head-title">' + icon('settings') +
          '<span>Obsidian Sync</span></div>' +
        '<button id="settingsCloseBtn" class="settings__close drawer__close" ' +
          'type="button" aria-label="Close settings">' + icon('close') + '</button>' +
      '</div>';
  }

  function onboarding() {
    return '' +
      '<div class="settings__onboard">' +
        '<div class="settings__onboard-icon">' + icon('book') + '</div>' +
        '<div class="settings__onboard-text">' +
          '<strong>Connect your Obsidian vault</strong>' +
          '<p>Point PatternMap at a local vault folder and your patterns ' +
          'will be written as Markdown notes you can open right in Obsidian.</p>' +
        '</div>' +
      '</div>';
  }

  function statusBlock(st) {
    var meta = STATUS_META[st] || STATUS_META.connected;
    var s = settings();
    var desc;
    if (st === 'unconfigured') desc = 'Add a vault path below to get started.';
    else if (st === 'syncing') desc = 'Writing notes to your vault…';
    else if (st === 'error') {
      var last = (s.errorLog && s.errorLog.length) ? s.errorLog[s.errorLog.length - 1].message : 'Last sync failed.';
      desc = last;
    } else {
      desc = s.lastSynced ? ('Last synced ' + fmt(s.lastSynced, 'rel') + '.') : 'Ready to sync.';
    }

    var retry = (st === 'error')
      ? '<button id="retrySyncBtn" class="btn btn--err settings__retry" type="button">' +
          icon('sync') + 'Retry sync</button>'
      : '';

    var bar = (st === 'syncing')
      ? '<div class="settings__progress"><div id="syncProgressFill" ' +
        'class="settings__progress-fill" style="width:' + Math.round(_progress) + '%"></div></div>'
      : '';

    return '' +
      '<div class="settings__status ' + meta.cls.replace('sync-indicator--', 'status--') + '">' +
        '<span class="settings__status-dot sync-indicator__dot ' + meta.dot + '"></span>' +
        '<div class="settings__status-text">' +
          '<strong>' + esc(meta.label) + '</strong>' +
          '<span>' + esc(desc) + '</span>' +
        '</div>' +
        retry +
      '</div>' + bar;
  }

  function fieldsBlock() {
    var s = settings();
    var freqOpts = FREQ_OPTIONS.map(function (o) {
      return '<option value="' + o.v + '"' + (s.frequency === o.v ? ' selected' : '') +
        '>' + esc(o.label) + '</option>';
    }).join('');

    return '' +
      '<div class="settings__field">' +
        '<label class="settings__label" for="vaultPathInput">Vault path</label>' +
        '<div class="settings__path-row">' +
          '<input id="vaultPathInput" class="settings__input" type="text" spellcheck="false" ' +
            'placeholder="/path/to/notes" value="' + esc(s.vaultPath) + '">' +
          '<button id="pickVaultBtn" class="btn btn--ghost settings__pick" type="button" ' +
            'title="Choose folder">' + icon('book') + '</button>' +
        '</div>' +
        '<span class="settings__hint">The absolute path to your local Obsidian vault. ' +
          'Notes resolve to <code>&lt;vault path&gt;/PatternMap</code>.</span>' +
      '</div>' +

      '<div class="settings__field">' +
        '<label class="settings__label" for="syncFolderInput">Sync folder</label>' +
        '<input id="syncFolderInput" class="settings__input" type="text" spellcheck="false" ' +
          'placeholder="PatternMap/" value="' + esc(s.syncFolder) + '">' +
        '<span class="settings__hint">Folder inside the vault where notes are written.</span>' +
      '</div>' +

      '<div class="settings__field">' +
        '<label class="settings__label" for="frequencySelect">Sync frequency</label>' +
        '<select id="frequencySelect" class="settings__input settings__select">' + freqOpts + '</select>' +
        '<span class="settings__hint">How often PatternMap writes changes to the vault.</span>' +
      '</div>';
  }

  function dashboardBlock() {
    var s = settings();
    var synced = (PM.state.patterns || []).filter(function (p) { return p.synced; }).length;
    var pending = PM.sync.computePending();
    var errs = (s.errorLog || []).length;

    return '' +
      '<div class="settings__dash">' +
        dashCard(icon('check'), fmt(s.lastSynced, s.lastSynced ? 'datetime' : 'rel'), 'Last synced') +
        dashCard(icon('book'), String(synced), 'Synced notes') +
        dashCard(icon('sync'), String(pending), 'Pending changes') +
        dashCard(icon('alert'), String(errs), 'Errors logged') +
      '</div>';
  }

  function dashCard(ic, value, label) {
    return '' +
      '<div class="settings__dash-card">' +
        '<div class="settings__dash-icon">' + ic + '</div>' +
        '<div class="settings__dash-value">' + esc(value) + '</div>' +
        '<div class="settings__dash-label">' + esc(label) + '</div>' +
      '</div>';
  }

  function errorLogBlock() {
    var log = settings().errorLog || [];
    var rows = log.length
      ? log.slice().reverse().map(function (e) {
          return '<li class="settings__errorlog-item">' +
            '<span class="settings__errorlog-time">' + esc(fmt(e.ts, 'datetime')) + '</span>' +
            '<span class="settings__errorlog-msg">' + esc(e.message) + '</span>' +
            '</li>';
        }).join('')
      : '<li class="settings__errorlog-empty">No errors logged. 🎉</li>';

    var clearBtn = log.length
      ? '<button id="clearErrorLogBtn" class="settings__errorlog-clear" type="button">Clear</button>'
      : '';

    return '' +
      '<div class="settings__errorlog' + (_errorLogOpen ? ' is-open' : '') + '">' +
        '<button id="errorLogToggle" class="settings__errorlog-head" type="button" ' +
          'aria-expanded="' + (_errorLogOpen ? 'true' : 'false') + '">' +
          '<span class="settings__errorlog-chev">' + icon('chevron') + '</span>' +
          '<span>Error log</span>' +
          '<span class="settings__errorlog-count">' + log.length + '</span>' +
          clearBtn +
        '</button>' +
        '<ul class="settings__errorlog-list">' + rows + '</ul>' +
      '</div>';
  }

  function templateBlock() {
    var tpl = settings().template || (PM.consts && PM.consts.DEFAULT_TEMPLATE) || '';
    var vars = templateVarNames();
    var legend = vars.map(function (v) {
      return '<button class="settings__var-chip" type="button" data-var="' + v + '">{{' + v + '}}</button>';
    }).join('');

    return '' +
      '<div class="settings__template">' +
        '<div class="settings__template-head">' +
          '<label class="settings__label" for="templateInput">Note template</label>' +
          '<span class="settings__hint">Click a variable to insert it. {{tokens}} are filled per pattern.</span>' +
        '</div>' +
        '<div class="settings__vars">' + legend + '</div>' +
        '<div class="settings__template-grid">' +
          '<textarea id="templateInput" class="settings__template-input" spellcheck="false" ' +
            'rows="14">' + esc(tpl) + '</textarea>' +
          '<div class="settings__template-preview" aria-label="Template preview">' +
            '<div class="settings__template-preview-label">Highlighted</div>' +
            '<pre id="templatePreview" class="settings__template-pre">' + highlightTemplate(tpl) + '</pre>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  // Render template text with {{var}} tokens wrapped in colored spans.
  function highlightTemplate(tpl) {
    var known = {};
    templateVarNames().forEach(function (v) { known[v] = true; });
    // escape everything first, then re-inject token spans against the escaped text
    var escd = esc(tpl);
    return escd.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, function (whole, key) {
      var cls = known[key] ? 'tpl-var' : 'tpl-var tpl-var--unknown';
      return '<span class="' + cls + '">' + whole + '</span>';
    });
  }

  function footer() {
    var configured = !!(settings().vaultPath && String(settings().vaultPath).trim());
    return '' +
      '<div class="settings__footer">' +
        '<button id="exportNotesBtn" class="btn btn--ghost" type="button">' +
          icon('external') + 'Export all notes (.md)</button>' +
        '<button id="openVaultBtn" class="btn btn--ghost" type="button"' +
          (configured ? '' : ' disabled') + '>' +
          icon('external') + 'Open Vault Folder</button>' +
        '<button id="syncNowBtn" class="btn btn--accent settings__sync-now" type="button"' +
          (settings().status === 'syncing' ? ' disabled' : '') + '>' +
          icon('sync') + 'Sync Now</button>' +
      '</div>';
  }

  /* ------------------------------------------------------------------------ */
  /* Settings page wiring (re-bound on each render — handlers are idempotent)  */
  /* ------------------------------------------------------------------------ */

  function wireSettings() {
    on('settingsCloseBtn', 'click', function () { PM.sync.closeSettings(); });
    on('syncNowBtn', 'click', function () { PM.sync.syncNow(); });
    on('retrySyncBtn', 'click', function () { PM.sync.retry(); });
    on('openVaultBtn', 'click', openVaultFolder);
    on('pickVaultBtn', 'click', pickVault);
    on('connectVaultBtn', 'click', function () { PM.sync.connectVault(); });
    on('disconnectVaultBtn', 'click', function () { PM.sync.disconnectVault(); });
    on('exportNotesBtn', 'click', function () { PM.sync.downloadAllMarkdown(); });

    var vp = document.getElementById('vaultPathInput');
    if (vp) vp.addEventListener('change', function () {
      var was = !!(settings().vaultPath && settings().vaultPath.trim());
      settings().vaultPath = vp.value.trim();
      var now = !!settings().vaultPath;
      if (now && settings().status === 'unconfigured') settings().status = 'connected';
      if (!now) settings().status = 'unconfigured';
      PM.save && PM.save();
      PM.sync.renderIndicator();
      PM.sync.renderSettings();
      if (!was && now) PM.toast && PM.toast('Vault connected', 'success');
    });

    var sf = document.getElementById('syncFolderInput');
    if (sf) sf.addEventListener('change', function () {
      var v = sf.value.trim();
      if (v && !/\/$/.test(v)) v += '/';
      settings().syncFolder = v || 'PatternMap/';
      PM.save && PM.save();
    });

    var freq = document.getElementById('frequencySelect');
    if (freq) freq.addEventListener('change', function () {
      settings().frequency = freq.value;
      PM.sync.applyFrequency();
      PM.save && PM.save();
      PM.toast && PM.toast('Sync frequency: ' + labelForFreq(freq.value), 'info');
    });

    on('errorLogToggle', 'click', function (e) {
      // ignore clicks bubbling from the clear button
      if (e.target && e.target.id === 'clearErrorLogBtn') return;
      _errorLogOpen = !_errorLogOpen;
      PM.sync.renderSettings();
    });

    on('clearErrorLogBtn', 'click', function (e) {
      e.stopPropagation();
      settings().errorLog = [];
      if (settings().status === 'error') settings().status =
        (settings().vaultPath ? 'connected' : 'unconfigured');
      PM.save && PM.save();
      PM.sync.renderIndicator();
      PM.sync.renderSettings();
    });

    // template editor: live preview + persist (debounced)
    var ta = document.getElementById('templateInput');
    if (ta) {
      ta.addEventListener('input', function () {
        var pre = document.getElementById('templatePreview');
        if (pre) pre.innerHTML = highlightTemplate(ta.value);
        settings().template = ta.value;
        clearTimeout(_tplDebounce);
        _tplDebounce = setTimeout(function () { PM.save && PM.save(); }, 400);
      });
    }

    // variable chips: insert token at cursor
    var chips = document.querySelectorAll('.settings__var-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].addEventListener('click', function () {
        insertVar(this.getAttribute('data-var'));
      });
    }
  }
  var _tplDebounce = null;

  function insertVar(name) {
    var ta = document.getElementById('templateInput');
    if (!ta) return;
    var token = '{{' + name + '}}';
    var start = ta.selectionStart || 0;
    var end = ta.selectionEnd || 0;
    ta.value = ta.value.slice(0, start) + token + ta.value.slice(end);
    var pos = start + token.length;
    ta.selectionStart = ta.selectionEnd = pos;
    ta.focus();
    var pre = document.getElementById('templatePreview');
    if (pre) pre.innerHTML = highlightTemplate(ta.value);
    settings().template = ta.value;
    PM.save && PM.save();
  }

  function labelForFreq(v) {
    for (var i = 0; i < FREQ_OPTIONS.length; i++) if (FREQ_OPTIONS[i].v === v) return FREQ_OPTIONS[i].label;
    return v;
  }

  function openVaultFolder() {
    var s = settings();
    var base = String(s.vaultPath || '').trim();
    if (!base && PM.sync.hasHandle()) base = '/path/to/notes';
    if (!base) { PM.toast && PM.toast('No vault path set', 'warn'); return; }
    var folder = base.replace(/\/+$/, '') + '/' + String(s.syncFolder || '').replace(/^\/+/, '');
    // Best-effort: try a file:// open; otherwise just inform (sandbox-safe simulation)
    try { window.open('file://' + folder, '_blank'); } catch (e) {}
    PM.toast && PM.toast('Vault folder: ' + folder, 'info', 5000);
  }

  function pickVault() {
    // File System Access API → connect a real folder handle. Otherwise the
    // input is text-only (file:// fallback).
    if (PM.sync.fsSupported()) {
      PM.sync.connectVault();
    } else {
      var vp2 = document.getElementById('vaultPathInput');
      if (vp2) { vp2.focus(); }
      PM.toast && PM.toast('Type your vault path here, or run patternmap-serve for live writing', 'info', 5000);
    }
  }

  function on(id, evt, fn) {
    var el = document.getElementById(id);
    if (el) el.addEventListener(evt, fn);
  }

  /* ------------------------------------------------------------------------ */
  /* PM.sync.mount — one-time wiring                                          */
  /* ------------------------------------------------------------------------ */

  PM.sync.mount = function () {
    // Render the global indicator immediately so it's always visible.
    PM.sync.renderIndicator();

    // Try to silently restore a previously-connected vault folder handle.
    if (PM.sync.fsSupported()) {
      PM.sync.restoreHandle().catch(function () {});
    }

    // Keyboard: Escape inside settings closes it (app.js also handles global ESC,
    // but we guard our own state defensively).
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && PM.state.ui && PM.state.ui.settingsOpen) {
        var ae = document.activeElement;
        var typing = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT');
        if (!typing) PM.sync.closeSettings();
      }
    });

    // Backdrop click on the settings page (clicking the dim area, not the panel) closes it.
    var page = document.getElementById('settingsPage');
    if (page) {
      page.addEventListener('mousedown', function (e) {
        if (e.target === page) PM.sync.closeSettings();
      });
    }
  };

  /* ------------------------------------------------------------------------ */
  /* Aliases requested by SPEC narrative (kept thin; canonical names above)   */
  /* ------------------------------------------------------------------------ */
  PM.sync.render = function () { PM.sync.renderSettings(); };
  PM.sync.updateIndicator = function () { PM.sync.renderIndicator(); };

})();
</script>
<script>
/* ===== app.js ===== */
/* =============================================================================
 * PatternMap — app.js
 * Bootstrap / glue. LOADS LAST. Owns PM.init() and PM.render().
 *
 * Per CONTRACT.md §6.7, this file is the single boot entrypoint and the broad
 * "reconcile everything visible from PM.state" function. The cross-cutting
 * helpers (uid/now/fmtDate/toast/save/load) are owned by data.js; here they are
 * provided ONLY as a defensive backstop (guarded by typeof) so that if data.js
 * is absent during isolated testing the app still boots — when data.js is
 * present its definitions win because data.js loads first and this file never
 * overwrites an existing function.
 *
 * Also defines PM.state's default shape as a backstop (data.js.initState owns
 * the canonical reset), plus a slug helper coordinated with the modal.
 * =========================================================================== */

(function () {
  'use strict';

  window.PM = window.PM || {};
  var PM = window.PM;

  /* ---------------------------------------------------------------------------
   * 0. Sub-namespace guards (order-tolerant; data.js normally creates these)
   * ------------------------------------------------------------------------- */
  PM.state  = PM.state  || {};
  PM.data   = PM.data   || {};
  PM.graph  = PM.graph  || {};
  PM.drawer = PM.drawer || {};
  PM.modal  = PM.modal  || {};
  PM.bible  = PM.bible  || {};
  PM.sync   = PM.sync   || {};
  PM.consts = PM.consts || {};

  /* ---------------------------------------------------------------------------
   * Tiny internal utilities (private to app.js)
   * ------------------------------------------------------------------------- */
  function $(id) { return document.getElementById(id); }

  function isFn(x) { return typeof x === 'function'; }

  // Call a PM.* function only if it exists; never throw if a module is missing.
  function safe(fn /* function|undefined */) {
    if (!isFn(fn)) return undefined;
    try {
      return fn.apply(null, Array.prototype.slice.call(arguments, 1));
    } catch (err) {
      // Integration backstop: log but keep the app alive.
      if (window.console && console.error) {
        console.error('[PatternMap] module call failed:', err);
      }
      return undefined;
    }
  }

  function isTypingTarget(el) {
    if (!el) return false;
    var tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || tag === 'select' ||
           el.isContentEditable === true;
  }

  /* ===========================================================================
   * 1. CROSS-CUTTING HELPER BACKSTOPS
   * These are normatively owned by data.js. We install them ONLY if missing so
   * the app degrades gracefully. data.js (loaded first) always wins in practice.
   * =========================================================================== */

  if (!isFn(PM.uid)) {
    PM.uid = function (prefix) {
      var t = Date.now().toString(36);
      var r = Math.random().toString(36).slice(2, 6);
      return (prefix || 'id') + '_' + t + '_' + r;
    };
  }

  if (!isFn(PM.now)) {
    PM.now = function () { return Date.now(); };
  }

  if (!isFn(PM.fmtDate)) {
    // Contract §1.1: PM.fmtDate(ts:number, mode?) — epoch ms in, formatted out.
    PM.fmtDate = function (ts, mode) {
      if (!ts) return '—';
      var d = new Date(ts);
      if (isNaN(d.getTime())) return '—';
      var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                    'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      var dateStr = months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

      if (mode === 'datetime') {
        var h = d.getHours();
        var ampm = h >= 12 ? 'PM' : 'AM';
        var h12 = h % 12; if (h12 === 0) h12 = 12;
        var m = d.getMinutes(); if (m < 10) m = '0' + m;
        return dateStr + ', ' + h12 + ':' + m + ' ' + ampm;
      }

      if (mode === 'rel') {
        var diff = Date.now() - ts;
        if (diff < 0) diff = 0;
        var sec = Math.floor(diff / 1000);
        var min = Math.floor(sec / 60);
        var hr  = Math.floor(min / 60);
        var day = Math.floor(hr / 24);
        if (sec < 45) return 'just now';
        if (min < 60) return min + 'm ago';
        if (hr < 24)  return hr + 'h ago';
        if (day <= 7) return day + 'd ago';
        return dateStr; // fall back past 7d
      }

      return dateStr; // 'date' default
    };
  }

  if (!isFn(PM.toast)) {
    // Contract §1.1: transient toast in #toastHost; success/error/info/warn; auto-dismiss.
    PM.toast = function (message, kind, ms) {
      var host = $('toastHost');
      if (!host) return;
      kind = kind || 'info';
      if (typeof ms !== 'number') ms = (kind === 'error') ? 5000 : 3200;

      var el = document.createElement('div');
      el.className = 'toast toast--' + kind;
      el.setAttribute('role', 'status');

      var icon = document.createElement('span');
      icon.className = 'toast__icon';
      var iconName = kind === 'success' ? 'check'
                   : kind === 'error'   ? 'alert'
                   : kind === 'warn'    ? 'alert'
                   : 'sync';
      if (PM.data && isFn(PM.data.iconSvg)) {
        icon.innerHTML = PM.data.iconSvg(iconName) || '';
      }

      var body = document.createElement('span');
      body.className = 'toast__msg';
      body.textContent = String(message == null ? '' : message);

      el.appendChild(icon);
      el.appendChild(body);
      host.appendChild(el);

      // Allow CSS enter transition on next frame.
      requestAnimationFrame(function () { el.classList.add('is-shown'); });

      var dismissed = false;
      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        el.classList.remove('is-shown');
        el.classList.add('is-leaving');
        setTimeout(function () {
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 320);
      }
      el.addEventListener('click', dismiss);
      setTimeout(dismiss, ms);
    };
  }

  if (!isFn(PM.save)) {
    // Backstop persistence. data.js owns the debounced canonical version.
    PM.save = function () {
      try {
        var key = (PM.consts && PM.consts.STORAGE_KEY) || 'patternmap.v1';
        var s = PM.state || {};
        var payload = {
          v: 1,
          patterns: s.patterns || [],
          edges: s.edges || [],
          settings: s.settings || {},
          transform: s.transform || { x: 0, y: 0, k: 1 }
        };
        localStorage.setItem(key, JSON.stringify(payload));
      } catch (err) {
        if (window.console && console.warn) console.warn('[PatternMap] save failed:', err);
      }
      // Reflect persistence in the sync indicator; trigger on-save sync hook.
      safe(PM.sync && PM.sync.renderIndicator);
      if (PM.state && PM.state.settings && PM.state.settings.frequency === 'onSave') {
        safe(PM.sync && PM.sync.maybeAutoSync);
      }
    };
  }

  if (!isFn(PM.load)) {
    // Backstop hydrate. data.js owns the canonical version.
    PM.load = function () {
      try {
        var key = (PM.consts && PM.consts.STORAGE_KEY) || 'patternmap.v1';
        var raw = localStorage.getItem(key);
        if (!raw) return false;
        var data = JSON.parse(raw);
        if (!data || typeof data !== 'object') return false;
        if (!Array.isArray(data.patterns)) return false;
        PM.state.patterns = data.patterns || [];
        PM.state.edges = Array.isArray(data.edges) ? data.edges : [];
        PM.state.transform = data.transform || { x: 0, y: 0, k: 1 };
        if (data.settings && typeof data.settings === 'object') {
          // Merge to preserve any new default keys.
          for (var k in data.settings) {
            if (Object.prototype.hasOwnProperty.call(data.settings, k)) {
              PM.state.settings[k] = data.settings[k];
            }
          }
        }
        return true;
      } catch (err) {
        if (window.console && console.warn) console.warn('[PatternMap] load failed:', err);
        return false;
      }
    };
  }

  /* ---------------------------------------------------------------------------
   * PM.slug — coordinate: prefer the modal's if it defines one. Provide a
   * filesystem-friendly slug as a fallback only.
   * ------------------------------------------------------------------------- */
  if (!isFn(PM.slug)) {
    PM.slug = function (s) {
      return String(s == null ? '' : s)
        .trim()
        .replace(/[\/\\:*?"<>|]+/g, '')   // strip path-hostile chars
        .replace(/\s+/g, ' ');
    };
  }

  /* ===========================================================================
   * 2. PM.state default shape (backstop; data.js.initState owns canonical reset)
   * Per CONTRACT §2. Installed only if data.js has not already populated it.
   * =========================================================================== */
  function defaultState() {
    return {
      // persisted
      patterns: [],
      edges: [],
      transform: { x: 0, y: 0, k: 1 },
      settings: {
        vaultPath: '',
        syncFolder: 'PatternMap/Patterns',
        frequency: 'onSave',
        template: (PM.consts && PM.consts.DEFAULT_TEMPLATE) || '',
        lastSynced: 0,
        status: 'unconfigured',
        pending: 0,
        syncedNotes: 0,
        errorLog: [],
        layoutType: 'force',
        nodeScale: 1,
        nodeShape: 'circle',
        edgeCurviness: 0.5
      },
      // ephemeral
      selection: null,
      filters: {
        categories: new Set(),
        testaments: 'both',
        book: null,
        dateRange: null
      },
      search: '',
      ui: {
        locked: false,
        clusterMode: false,
        drawerOpen: false,
        modalOpen: false,
        bibleOpen: false,
        settingsOpen: false
      },
      // runtime-only graph bookkeeping
      _layout: {
        running: false,
        raf: 0,
        ticksLeft: 0,
        nodes: new Map(),
        dragId: null
      }
    };
  }

  function ensureStateShape() {
    // If data.js already gave us a fully-formed state, leave it alone.
    if (PM.state && Array.isArray(PM.state.patterns) && PM.state.filters &&
        PM.state.ui && PM.state._layout) {
      return;
    }
    // Otherwise install the default shape, preserving any keys data.js set.
    var def = defaultState();
    PM.state = PM.state || {};
    for (var k in def) {
      if (PM.state[k] === undefined) PM.state[k] = def[k];
    }
    // Make sure nested ephemeral objects exist even if state was partial.
    if (!PM.state.filters) PM.state.filters = def.filters;
    if (!(PM.state.filters.categories instanceof Set)) {
      PM.state.filters.categories = new Set(PM.state.filters.categories || []);
    }
    if (!PM.state.ui) PM.state.ui = def.ui;
    if (!PM.state._layout) PM.state._layout = def._layout;
    if (!(PM.state._layout.nodes instanceof Map)) {
      PM.state._layout.nodes = new Map();
    }
    if (!PM.state.settings) PM.state.settings = def.settings;
  }

  /* ===========================================================================
   * 3. PM.render — broad reconcile of everything visible from PM.state.
   * Idempotent. Order per CONTRACT §1.1 / §6.7.
   * =========================================================================== */
  PM.render = function () {
    safe(PM.graph.render);
    safe(PM.bible.renderHeatmap);
    safe(PM.drawer.render);
    safe(PM.sync.renderIndicator);
    safe(PM.data.renderFilterChips);
    updateEmptyState();
  };

  function updateEmptyState() {
    var empty = $('emptyState');
    if (!empty) return;
    var count = (PM.state && PM.state.patterns) ? PM.state.patterns.length : 0;
    if (count === 0) empty.classList.remove('is-hidden');
    else empty.classList.add('is-hidden');
  }

  function hideLoading() {
    var loading = $('loadingState');
    if (loading) loading.classList.add('is-hidden');
  }

  function showLoading() {
    var loading = $('loadingState');
    if (loading) loading.classList.remove('is-hidden');
  }

  /* ===========================================================================
   * 4. Global event wiring (CONTRACT §6.7.1). All wiring lives here, attached
   *    inside PM.init so nothing touches the DOM at parse time.
   * =========================================================================== */

  function on(id, evt, handler) {
    var el = $(id);
    if (el) el.addEventListener(evt, handler);
  }

  function wireToolbar() {
    on('zoomInBtn',  'click', function () { safe(PM.graph.zoomIn); });
    on('zoomOutBtn', 'click', function () { safe(PM.graph.zoomOut); });
    on('fitBtn',     'click', function () { safe(PM.graph.fit); });
    on('lockBtn',    'click', function () { safe(PM.graph.toggleLock); });
    on('clusterBtn', 'click', function () { safe(PM.graph.toggleCluster); });
    // bibleBtn + settingsBtn are toggles owned by their modules.
    on('bibleBtn',    'click', function () { toggleBible(); });
    on('settingsBtn', 'click', function () { toggleSettings(); });
    on('mapCustomizeBtn', 'click', function () { safe(PM.graph.toggleCustomizer); });
  }

  function toggleBible() {
    var open = PM.state.ui && PM.state.ui.bibleOpen;
    if (open && isFn(PM.bible.close)) { safe(PM.bible.close); return; }
    if (!open && isFn(PM.bible.open)) { safe(PM.bible.open); return; }
    // Backstop: if open/close not split, call open() as a toggle.
    safe(PM.bible.open);
  }

  function toggleSettings() {
    var open = PM.state.ui && PM.state.ui.settingsOpen;
    if (open && isFn(PM.sync.closeSettings)) { safe(PM.sync.closeSettings); return; }
    if (!open && isFn(PM.sync.openSettings)) { safe(PM.sync.openSettings); return; }
    safe(PM.sync.openSettings);
  }

  function wireAddButtons() {
    on('addPatternBtn', 'click', function () { safe(PM.modal.openAdd); });
    // Empty-state has its own add button (#emptyAddBtn in dom.html).
    on('emptyAddBtn', 'click', function () { safe(PM.modal.openAdd); });
  }

  var searchTimer = 0;
  function wireSearch() {
    var input = $('searchInput');
    if (!input) return;
    input.addEventListener('input', function (e) {
      PM.state.search = e.target.value || '';
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(function () {
        // Contract registry: applyHighlight is the single highlight pass.
        // Task references applySearch; prefer applyHighlight (canonical), fall back.
        if (isFn(PM.graph.applyHighlight)) { safe(PM.graph.applyHighlight); }
        else if (isFn(PM.graph.applySearch)) { safe(PM.graph.applySearch, PM.state.search); }
      }, 120);
    });
  }

  function wireKeyboard() {
    document.addEventListener('keydown', function (e) {
      // Escape works even from inputs; everything else only when not typing.
      if (e.key === 'Escape') {
        handleEscape();
        return;
      }
      if (isTypingTarget(e.target)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;

      switch (e.key) {
        case '+':
        case '=':
          safe(PM.graph.zoomIn); e.preventDefault(); break;
        case '-':
        case '_':
          safe(PM.graph.zoomOut); e.preventDefault(); break;
        case 'f':
        case 'F':
          safe(PM.graph.fit); break;
        case 'l':
        case 'L':
          safe(PM.graph.toggleLock); break;
        case 'c':
        case 'C':
          safe(PM.graph.toggleCluster); break;
        case 'b':
        case 'B':
          toggleBible(); break;
        case 'n':
        case 'N':
        case 'a':
        case 'A':
          safe(PM.modal.openAdd); break;
        default:
          break;
      }
    });
  }

  // Escape closes the top-most open overlay by priority:
  //   settings > modal > bible > drawer ; else clear selection.
  function handleEscape() {
    var ui = PM.state.ui || {};
    if (ui.settingsOpen) {
      if (isFn(PM.sync.closeSettings)) safe(PM.sync.closeSettings);
      return;
    }
    if (ui.modalOpen) {
      if (isFn(PM.modal.close)) safe(PM.modal.close);
      return;
    }
    if (ui.bibleOpen) {
      if (isFn(PM.bible.close)) safe(PM.bible.close);
      return;
    }
    if (ui.drawerOpen) {
      if (isFn(PM.drawer.close)) safe(PM.drawer.close);
      return;
    }
    if (PM.state.selection != null) {
      if (isFn(PM.graph.select)) safe(PM.graph.select, null);
      else if (isFn(PM.drawer.close)) safe(PM.drawer.close);
    }
  }

  var resizeTimer = 0;
  function wireResize() {
    window.addEventListener('resize', function () {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        safe(PM.graph.applyTransform);
        safe(PM.graph.renderMiniMap);
      }, 60);
    });
  }

  /* ===========================================================================
   * 5. Interval sync timer backstop.
   * sync.js owns PM.sync.applyFrequency() (CONTRACT §6.6 / §6.7 step 8). We call
   * it. If it is missing, we run our own interval honoring settings.frequency.
   * =========================================================================== */
  var _intervalHandle = 0;
  var FREQ_MS = { '5m': 5 * 60 * 1000, '15m': 15 * 60 * 1000, '1h': 60 * 60 * 1000 };

  function applyFrequencyBackstop() {
    if (_intervalHandle) { clearInterval(_intervalHandle); _intervalHandle = 0; }
    var freq = (PM.state.settings && PM.state.settings.frequency) || 'manual';
    var ms = FREQ_MS[freq];
    if (ms && isFn(PM.sync.syncNow)) {
      _intervalHandle = setInterval(function () { safe(PM.sync.syncNow); }, ms);
    }
  }

  function setupSyncTimer() {
    if (isFn(PM.sync.applyFrequency)) {
      safe(PM.sync.applyFrequency);
    } else {
      applyFrequencyBackstop();
    }
  }

  /* ===========================================================================
   * 6. PM.init — the single boot entrypoint (CONTRACT §6.7).
   * =========================================================================== */
  PM.init = function () {
    showLoading();

    // 1. Default state.
    if (isFn(PM.data.initState)) safe(PM.data.initState);
    ensureStateShape();

    // Ensure settings carries a usable default template if data.js didn't.
    if (PM.state.settings && !PM.state.settings.template &&
        PM.consts && PM.consts.DEFAULT_TEMPLATE) {
      PM.state.settings.template = PM.consts.DEFAULT_TEMPLATE;
    }

    // 2. Restore or seed.
    var restored = false;
    if (isFn(PM.load)) restored = !!safe(PM.load);
    if (!restored) {
      if (isFn(PM.data.seed)) safe(PM.data.seed);
      if (isFn(PM.save)) safe(PM.save);
    }

    // 3. Recount derived refCounts.
    if (isFn(PM.data.recountAll)) safe(PM.data.recountAll);

    // 4. Mount all modules (one-time DOM wiring per module).
    safe(PM.graph.mount);
    safe(PM.graph.mountCustomizer);
    safe(PM.drawer.mount);
    safe(PM.modal.mount);
    safe(PM.bible.mount);
    safe(PM.sync.mount);

    // 5. Wire global controls.
    wireToolbar();
    wireSearch();
    wireAddButtons();
    wireKeyboard();
    wireResize();

    // 6/7. Build graph + first layout + render.
    if (isFn(PM.graph.init)) {
      // Some graph builds expose init() distinct from mount(); call if present.
      safe(PM.graph.init);
    }

    var hasPositions = restored &&
      Array.isArray(PM.state.patterns) &&
      PM.state.patterns.length > 0 &&
      PM.state.patterns.every(function (p) {
        return typeof p.x === 'number' && typeof p.y === 'number';
      });

    if (hasPositions) {
      safe(PM.graph.render);
    } else if (PM.state.patterns && PM.state.patterns.length > 0) {
      // Relax the freshly-seeded (or position-less) graph, then fit.
      if (isFn(PM.graph.startLayout)) {
        safe(PM.graph.startLayout);
        // Fit once after layout has had a moment to relax. The layout cooling
        // loop auto-stops; fit a bit after to frame the constellation.
        setTimeout(function () { safe(PM.graph.fit); }, 700);
      } else {
        safe(PM.graph.render);
        safe(PM.graph.fit);
      }
    } else {
      safe(PM.graph.render);
    }

    // 8. Arm the interval sync timer per settings.frequency.
    setupSyncTimer();

    // 9. Broad render.
    PM.render();

    // 6 (visibility). Hide loading; show empty state if needed.
    // Brief loading shimmer for the "loading" component state, then reveal.
    setTimeout(function () {
      hideLoading();
      updateEmptyState();
    }, 350);
  };

  /* ===========================================================================
   * 7. Auto-boot. Call PM.init() once the DOM is ready. The integrator places
   *    app.js LAST inside <body>, so the static skeleton already exists, but we
   *    still guard on readyState for safety.
   * =========================================================================== */
  function boot() {
    if (PM.__booted) return;
    PM.__booted = true;
    PM.init();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, { once: true });
  } else {
    boot();
  }

})();
</script>
</body>
</html>

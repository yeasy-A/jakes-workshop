<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PatternMap</title>
<meta name="description" content="PatternMap — a living constellation of biblical patterns: a node-graph study canvas with Bible integration and Obsidian sync.">
<meta name="color-scheme" content="dark">
<!-- Google Fonts: one sans (Inter) + one serif (Lora) for scripture. System fallbacks in --font-* keep it fully offline. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   PatternMap — Design System (styles.css)
   Raw CSS only (integrator wraps in a single <style>).
   Implements every :root token + every state class the JS toggles per CONTRACT.
   ============================================================================ */

/* ---------------------------------------------------------------------------
   :root tokens (CONTRACT §5.1 — values are normative)
   --------------------------------------------------------------------------- */
:root{
  /* category colors */
  --c-divine:#ffd45e;
  --c-numerical:#a78bfa;
  --c-prophetic:#2dd4bf;
  --c-relational:#fb7185;
  --c-structural:#38bdf8;
  --c-custom:#fb923c;

  /* base surfaces */
  --bg:#0d0d1a;            /* canvas background */
  --bg-grid:#181830;       /* dot/grid texture color */
  --surface:#15152a;       /* panels/cards base */
  --surface-2:#1d1d38;     /* raised surface (inputs, chips) */
  --surface-3:#262648;     /* hover surface */
  --border:#2c2c52;        /* hairline borders */
  --border-soft:#22223f;

  /* glass */
  --glass:rgba(21,21,42,.92);
  --glass-2:rgba(29,29,56,.94);
  --glass-border:rgba(124,124,180,.14);

  /* text */
  --text:#e8e8f4;          /* primary text */
  --text-dim:#a8a8c8;      /* secondary text (nudged up for AA on glass surfaces) */
  --text-faint:#7676a0;    /* tertiary / placeholders (nudged up for legibility) */
  --text-on-accent:#0d0d1a;

  /* accents / status */
  --accent:#a78bfa;        /* primary UI accent (matches numerical violet) */
  --ok:#2dd4bf;            /* connected / success */
  --warn:#fb923c;          /* pending / warn */
  --err:#fb7185;           /* error */
  --info:#38bdf8;

  /* serif for scripture */
  --font-sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --font-serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;

  /* geometry / motion */
  --node-size:96px;        /* base node diameter */
  --radius:14px;           /* panel corner radius */
  --radius-sm:9px;
  --radius-lg:20px;
  --drawer-w:360px;        /* right detail drawer width */
  --bible-w:380px;         /* left bible drawer width */
  --shadow:0 10px 40px rgba(0,0,0,.45);
  --shadow-lg:0 24px 70px rgba(0,0,0,.6);
  --ease:cubic-bezier(.22,.61,.36,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --dur:.28s;
  --dur-fast:.16s;
  --z-world:1; --z-toolbar:30; --z-drawer:40; --z-modal:60; --z-toast:90;
}

/* ---------------------------------------------------------------------------
   Global reset
   --------------------------------------------------------------------------- */
*,*::before,*::after{ box-sizing:border-box; }
html,body{ margin:0; padding:0; height:100%; }
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:var(--font-sans);
  font-size:14px;
  line-height:1.5;
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  letter-spacing:.1px;
}
button{ font:inherit; color:inherit; cursor:pointer; border:none; background:none; }
input,textarea,select{ font:inherit; color:inherit; }
textarea{ resize:vertical; }
a{ color:var(--accent); text-decoration:none; }
ul,ol{ margin:0; padding:0; list-style:none; }
::selection{ background:rgba(167,139,250,.35); color:#fff; }
svg{ display:block; }

/* Custom scrollbars (dark) */
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:10px; border:2px solid transparent; background-clip:content-box; }
::-webkit-scrollbar-thumb:hover{ background:#3a3a6a; background-clip:content-box; }
*{ scrollbar-width:thin; scrollbar-color:var(--surface-3) transparent; }

/* Scripture / verse quotes in serif */
.scripture,.verse-text,.drawer__ref-text{
  font-family:var(--font-serif);
  font-style:italic;
  line-height:1.6;
  color:var(--text);
}

/* shared focus ring */
:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.is-disabled,[disabled]{ opacity:.5; pointer-events:none; cursor:not-allowed; }

/* ---------------------------------------------------------------------------
   App shell + canvas with dot-field background
   --------------------------------------------------------------------------- */
.app{
  position:fixed;
  inset:0;
  display:flex;
  overflow:hidden;
}
.viewport{
  position:absolute;
  inset:0;
  z-index:var(--z-world);
  overflow:hidden;
  cursor:grab;
  background-color:var(--bg);
  /* subtle dot-field: two tiled radial gradients + a soft center vignette glow */
  background-image:
    radial-gradient(circle at 50% 40%, rgba(60,40,120,.18), transparent 60%),
    radial-gradient(var(--bg-grid) 1.4px, transparent 1.4px),
    radial-gradient(rgba(124,124,180,.05) 1px, transparent 1px);
  background-size:100% 100%, 36px 36px, 36px 36px;
  background-position:0 0, 0 0, 18px 18px;
}
.viewport:active{ cursor:grabbing; }
.viewport.is-panning{ cursor:grabbing; }
.viewport.is-locked{ cursor:default; }

.world{
  position:absolute;
  top:0; left:0;
  width:0; height:0;
  transform-origin:0 0;
  will-change:transform;
}
.edge-layer{
  position:absolute;
  top:0; left:0;
  overflow:visible;
  width:1px; height:1px;
  pointer-events:none;
}
.edge-layer .edge{ pointer-events:stroke; }
.cluster-layer{
  position:absolute;
  top:0; left:0;
  overflow:visible;
  pointer-events:none;
}
.node-layer{
  position:absolute;
  top:0; left:0;
  overflow:visible;
}

/* ---------------------------------------------------------------------------
   PatternNode (.node) — glass card with category glow
   transform set inline by JS: translate(x,y) translate(-50%,-50%)
   --node-color set inline by JS to the category hex.
   --------------------------------------------------------------------------- */
.node{
  position:absolute;
  top:0; left:0;
  width:var(--node-size);
  height:var(--node-size);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  --node-color:var(--c-custom);
  --glow:var(--node-color);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  transition:filter var(--dur) var(--ease);
  z-index:1;
}
/* the round glass disc */
.node__glow{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
    radial-gradient(circle at 32% 28%, rgba(255,255,255,.10), transparent 55%),
    var(--glass-2);
  border:1.5px solid color-mix(in srgb, var(--node-color) 42%, var(--glass-border));
  /* NB: no backdrop-filter here — it was applied to all 42 nodes and, under the
     view's zoom transform during a layout switch, caused compositor glitching.
     --glass-2 is 72% opaque so nodes still read as solid glass discs. */
  box-shadow:
    0 0 0 1px rgba(0,0,0,.25),
    0 6px 22px rgba(0,0,0,.45),
    0 0 22px -4px color-mix(in srgb, var(--glow) 55%, transparent),
    inset 0 0 18px -6px color-mix(in srgb, var(--glow) 60%, transparent);
  transition:box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease), transform var(--dur) var(--ease-out);
}
/* ---- Node shapes: set via data-shape on #nodeLayer (PM.graph.setNodeShape) ----
   Rounded shapes keep the box-shadow halo. Angular (clip-path) shapes can't use
   box-shadow (it would be clipped), so they get their glow via filter:drop-shadow,
   which follows the clipped silhouette. The 1.5px border becomes the shape edge. */
.node-layer[data-shape="circle"]  .node__glow{ border-radius:50%; }
.node-layer[data-shape="rounded"] .node__glow{ border-radius:26%; }
.node-layer[data-shape="square"]  .node__glow{ border-radius:9%; }
.node-layer[data-shape="diamond"]  .node__glow,
.node-layer[data-shape="hexagon"]  .node__glow,
.node-layer[data-shape="triangle"] .node__glow,
.node-layer[data-shape="star"]     .node__glow{
  border-radius:0;
  box-shadow:none;
  /* single, cheap drop-shadow (does not sample the backdrop) for the shape glow */
  filter:drop-shadow(0 2px 9px color-mix(in srgb, var(--glow) 46%, rgba(0,0,0,.55)));
}
.node-layer[data-shape="diamond"]  .node__glow{ clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
.node-layer[data-shape="hexagon"]  .node__glow{ clip-path:polygon(25% 4%, 75% 4%, 100% 50%, 75% 96%, 25% 96%, 0% 50%); }
.node-layer[data-shape="triangle"] .node__glow{ clip-path:polygon(50% 5%, 95% 92%, 5% 92%); }
.node-layer[data-shape="star"]     .node__glow{ clip-path:polygon(50% 2%, 61% 35%, 97% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 3% 35%, 39% 35%); }
/* keep selection legible on clipped shapes (no box-shadow rings there) */
.node-layer[data-shape="diamond"]  .node--selected .node__glow,
.node-layer[data-shape="hexagon"]  .node--selected .node__glow,
.node-layer[data-shape="triangle"] .node--selected .node__glow,
.node-layer[data-shape="star"]     .node--selected .node__glow{
  border-width:2.5px;
  filter:drop-shadow(0 0 4px var(--node-color))
         drop-shadow(0 0 16px color-mix(in srgb, var(--glow) 75%, transparent));
}
.node__icon{
  position:relative;
  z-index:1;
  width:34px; height:34px;
  color:var(--node-color);
  display:flex; align-items:center; justify-content:center;
  /* no per-icon drop-shadow filter — it was 42 live filter layers churning during
     graph repaints; the node-color fill keeps icons clearly legible without it. */
  pointer-events:none;
}
.node__icon svg{ width:30px; height:30px; }
.node__label{
  position:absolute;
  top:calc(100% + 9px);
  left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  max-width:170px;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:12.5px;
  font-weight:600;
  letter-spacing:.2px;
  color:var(--text-dim);
  text-shadow:0 1px 8px rgba(0,0,0,.8);
  pointer-events:none;
  transition:color var(--dur) var(--ease);
}

/* Tooltip card (revealed on hover) */
.node__tooltip{
  position:absolute;
  bottom:calc(100% + 14px);
  left:50%;
  transform:translateX(-50%) translateY(6px);
  min-width:170px;
  max-width:248px;
  padding:11px 13px;
  background:var(--glass);
  backdrop-filter:blur(16px) saturate(130%);
  -webkit-backdrop-filter:blur(16px) saturate(130%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  box-shadow:var(--shadow);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease-out);
  z-index:5;
  text-align:left;
}
.node__tooltip::after{
  content:"";
  position:absolute;
  top:100%; left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top-color:var(--glass-border);
}
.node__tooltip-title{ font-size:13px; font-weight:700; color:var(--text); margin-bottom:3px; }
.node__tooltip-desc{ font-size:11.5px; color:var(--text-dim); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.node__tooltip-count{
  margin-top:7px; font-size:11px; font-weight:600;
  color:var(--node-color);
  display:flex; align-items:center; gap:5px;
}

/* --- node states --- */
.node--hovered .node__glow{
  transform:translateY(-3px) scale(1.05);
  border-color:color-mix(in srgb, var(--node-color) 72%, transparent);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.25),
    0 12px 30px rgba(0,0,0,.5),
    0 0 38px -2px color-mix(in srgb, var(--glow) 80%, transparent),
    inset 0 0 22px -4px color-mix(in srgb, var(--glow) 75%, transparent);
}
.node--hovered .node__label{ color:var(--text); }
.node--hovered .node__tooltip{ opacity:1; transform:translateX(-50%) translateY(0); }

.node--selected{ z-index:3; }
.node--selected .node__glow{
  border-color:var(--node-color);
  box-shadow:
    0 0 0 2px color-mix(in srgb, var(--node-color) 90%, transparent),
    0 0 0 6px color-mix(in srgb, var(--node-color) 22%, transparent),
    0 14px 36px rgba(0,0,0,.55),
    0 0 50px -2px color-mix(in srgb, var(--glow) 85%, transparent),
    inset 0 0 26px -4px color-mix(in srgb, var(--glow) 80%, transparent);
  animation:breathe 2.6s var(--ease) infinite;
}
.node--selected .node__label{ color:var(--node-color); font-weight:700; }

.node--highlighted{ z-index:2; filter:none; }
.node--highlighted .node__glow{
  border-color:color-mix(in srgb, var(--node-color) 65%, transparent);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.25),
    0 10px 28px rgba(0,0,0,.5),
    0 0 34px -3px color-mix(in srgb, var(--glow) 80%, transparent),
    inset 0 0 20px -5px color-mix(in srgb, var(--glow) 70%, transparent);
}
.node--highlighted .node__label{ color:var(--text); }

.node--dimmed{ filter:saturate(.5); }
.node--dimmed .node__glow{ opacity:.34; box-shadow:none; }
.node--dimmed .node__label{ opacity:.28; }
.node--dimmed .node__icon{ opacity:.4; }

.node--dragging{ cursor:grabbing; z-index:4; }
.node--dragging .node__glow{ transition:none; transform:scale(1.08); box-shadow:0 18px 44px rgba(0,0,0,.6), 0 0 46px -2px color-mix(in srgb, var(--glow) 85%, transparent); }
.node--dragging .node__tooltip{ display:none; }

.node--clustered .node__glow{ border-color:color-mix(in srgb, var(--node-color) 55%, transparent); }

@keyframes breathe{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.055); }
}

/* ---------------------------------------------------------------------------
   Edges (SVG)
   --------------------------------------------------------------------------- */
.edge{
  fill:none;
  /* idle edges adopt a desaturated blend of their source-category hue (set via the
     per-edge --edge-color inline prop) so relationships are legible by color, not a
     flat gray. Falls back to the faint base if no color is set. */
  stroke:color-mix(in srgb, var(--edge-color, var(--text-faint)) 55%, var(--text-faint));
  stroke-linecap:round;
  stroke-dasharray:7 9;
  /* Static dashes. The old `animation:dashFlow ... infinite` ran on EVERY edge
     forever — with 76 edges that's 76 perpetual SVG repaints, which glitched the
     whole graph (lines/icons/pill) on GPU. Active edges still animate (edgePulse)
     when a node is selected — that's only a handful at a time. */
  transition:stroke var(--dur) var(--ease), opacity var(--dur) var(--ease), stroke-width var(--dur) var(--ease);
}
@keyframes dashFlow{
  to{ stroke-dashoffset:-32; }
}
/* wide transparent companion path that catches the hover (the visible stroke is too thin) */
.edge__hit{
  fill:none;
  stroke:transparent;
  stroke-width:14;
  stroke-linecap:round;
  pointer-events:stroke;
  cursor:pointer;
}
/* soft wide wash under the core — the "ribbon" half of the taper */
.edge__halo{
  fill:none;
  stroke:color-mix(in srgb, var(--edge-color, var(--accent)) 70%, transparent);
  stroke-linecap:round;
  pointer-events:none;
  transition:stroke var(--dur) var(--ease), opacity var(--dur) var(--ease), stroke-width var(--dur) var(--ease);
}
.edge--active{
  stroke:var(--edge-color, var(--accent));
  stroke-dasharray:none;
  opacity:1 !important;
  animation:edgePulse 1.4s var(--ease) infinite;
  filter:drop-shadow(0 0 5px color-mix(in srgb, var(--edge-color, var(--accent)) 70%, transparent));
}
.edge__halo.edge--active{
  stroke:color-mix(in srgb, var(--edge-color, var(--accent)) 55%, transparent);
  opacity:.5 !important;
  animation:none;
}
@keyframes edgePulse{
  0%,100%{ stroke-opacity:.65; }
  50%{ stroke-opacity:1; }
}
.edge--dimmed{ opacity:.06 !important; animation:none; }
/* hover-to-reveal on the edge itself (every other element reveals info on hover).
   The hover class is toggled per-edge in JS via the wide .edge__hit companion path,
   since flat SVG siblings can't be scoped with a CSS combinator. */
.edge--hover{ stroke:var(--edge-color, var(--accent)); stroke-opacity:1; }

/* Edge label pill (SVG text) */
.edge__label{
  fill:var(--text-dim);
  font-family:var(--font-sans);
  font-size:11px;
  font-weight:600;
  letter-spacing:.3px;
  paint-order:stroke;
  stroke:var(--bg);
  stroke-width:4px;
  stroke-linejoin:round;
  text-anchor:middle;
  dominant-baseline:middle;
  opacity:0;
  pointer-events:none;
  transition:opacity var(--dur) var(--ease);
}
.edge__label--show,
.edge--active + .edge__label{ opacity:1; }
.edge__label--show{ fill:var(--text); }

/* SVG arrow markers (filled via these helper selectors; JS sets <marker> shapes) */
#arrowDefault path,#arrowDefault polygon{ fill:var(--text-faint); }
#arrowActive path,#arrowActive polygon{ fill:var(--accent); }

/* Cluster bubbles */
.cluster{
  fill:color-mix(in srgb, var(--accent) 8%, transparent);
  stroke:color-mix(in srgb, var(--accent) 24%, transparent);
  stroke-width:1.5;
  stroke-dasharray:4 6;
}
.cluster__label{
  fill:var(--text-dim);
  font-family:var(--font-sans);
  font-size:13px;
  font-weight:700;
  letter-spacing:.4px;
  text-anchor:middle;
}

/* ---------------------------------------------------------------------------
   Floating glass shell mixin look — applied to toolbar/search/minimap/etc.
   --------------------------------------------------------------------------- */
.toolbar,.searchbar,.filter-chips,.minimap,.sync-indicator{
  position:fixed;
  z-index:var(--z-toolbar);
}
.toolbar,.searchbar,.minimap,.sync-indicator{
  background:var(--glass);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow);
}
/* This GPU/driver glitches when re-compositing backdrop-filter — the blur recomputes
   whenever anything changes inside a glass panel (e.g. a toolbar icon background on
   hover), which flickered the icon AND the surrounding bar. Disable the live blur
   everywhere; panels read cleanly via the now near-opaque --glass backgrounds. */
*{ backdrop-filter:none !important; -webkit-backdrop-filter:none !important; }

/* Toolbar (top-left) */
.toolbar{
  top:20px; left:20px;
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:6px;
  border-radius:var(--radius);
}
.toolbar__btn{
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius-sm);
  color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
  position:relative;
}
.toolbar__btn svg{ width:20px; height:20px; }
.toolbar__btn:hover{ background:var(--surface-3); color:var(--text); }
.toolbar__btn:active{ transform:scale(.92); }
.toolbar__btn.is-active{
  background:color-mix(in srgb, var(--accent) 22%, transparent);
  color:var(--accent);
  box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent);
}
.toolbar__sep{ height:1px; margin:3px 4px; background:var(--border-soft); }

/* Search bar (top-right) */
.searchbar{
  top:20px; right:20px;
  display:flex; align-items:center;
  gap:9px;
  padding:0 14px;
  height:44px;
  width:280px;
  border-radius:999px;
  transition:width var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
}
.searchbar:focus-within{
  width:330px;
  box-shadow:var(--shadow), 0 0 0 1px color-mix(in srgb, var(--accent) 50%, transparent);
}
.searchbar__icon{ width:18px; height:18px; color:var(--text-faint); flex:none; }
.searchbar__icon svg{ width:18px; height:18px; }
.searchbar__input{
  flex:1;
  min-width:0;
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-size:13.5px;
}
.searchbar__input::placeholder{ color:var(--text-faint); }

/* Filter chips (top-right, under search) */
.filter-chips{
  top:78px; right:20px;
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:7px;
  max-width:340px;
}
.filter-chip{
  --chip-color:var(--text-dim);
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px 6px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  color:var(--text-dim);
  background:var(--glass);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  transition:all var(--dur-fast) var(--ease);
  white-space:nowrap;
}
.filter-chip__dot{
  width:9px; height:9px;
  border-radius:50%;
  background:var(--chip-color);
  flex:none;
  box-shadow:0 0 7px color-mix(in srgb, var(--chip-color) 70%, transparent);
}
.filter-chip:hover{ color:var(--text); border-color:color-mix(in srgb, var(--chip-color) 45%, var(--glass-border)); }
.filter-chip.is-active{
  color:var(--text);
  background:color-mix(in srgb, var(--chip-color) 18%, var(--glass));
  border-color:color-mix(in srgb, var(--chip-color) 60%, transparent);
  box-shadow:0 4px 16px rgba(0,0,0,.3), 0 0 0 1px color-mix(in srgb, var(--chip-color) 40%, transparent);
}
/* per-category chip colors via data-cat */
.filter-chip[data-cat="divine"]{ --chip-color:var(--c-divine); }
.filter-chip[data-cat="numerical"]{ --chip-color:var(--c-numerical); }
.filter-chip[data-cat="prophetic"]{ --chip-color:var(--c-prophetic); }
.filter-chip[data-cat="relational"]{ --chip-color:var(--c-relational); }
.filter-chip[data-cat="structural"]{ --chip-color:var(--c-structural); }
.filter-chip[data-cat="custom"]{ --chip-color:var(--c-custom); }

/* dropdown filter chips (Book / Date added) + their popover menu */
.filter-chip__caret{ width:11px; height:11px; opacity:.65; margin-left:1px; flex:none; }
.filter-chip__caret svg{ width:11px; height:11px; }
.filter-chip--menu{ position:relative; }
.filter-menu{
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  min-width:168px;
  max-height:300px;
  overflow-y:auto;
  padding:6px;
  display:flex;
  flex-direction:column;
  gap:2px;
  background:var(--glass-2);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  box-shadow:var(--shadow-lg);
  z-index:calc(var(--z-toolbar) + 5);
}
.filter-menu__item{
  display:flex; align-items:center; gap:8px;
  text-align:left;
  padding:7px 10px;
  border-radius:7px;
  font-size:12px; font-weight:600;
  color:var(--text-dim);
  white-space:nowrap;
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.filter-menu__item:hover{ background:var(--surface-3); color:var(--text); }
.filter-menu__item.is-selected{ color:var(--text); background:color-mix(in srgb, var(--accent) 16%, transparent); }
.filter-menu__item .check{ width:13px; height:13px; flex:none; opacity:0; color:var(--accent); }
.filter-menu__item .check svg{ width:13px; height:13px; }
.filter-menu__item.is-selected .check{ opacity:1; }
.filter-menu__empty{ padding:8px 10px; font-size:11.5px; color:var(--text-faint); }

/* + Add Pattern pill (bottom-center, glowing) */
.add-pattern-pill{
  position:fixed;
  bottom:26px; left:50%;
  transform:translateX(-50%);
  z-index:var(--z-toolbar);
  display:inline-flex;
  align-items:center;
  gap:9px;
  padding:13px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
  letter-spacing:.3px;
  color:var(--text-on-accent);
  background:linear-gradient(135deg, #b79bff, #8b6df0);
  /* static depth only; the pulsing glow lives on ::before and animates OPACITY
     (compositor-only) instead of box-shadow — animating box-shadow repainted every
     frame and glitched on GPU. Only transform animates on this element. */
  box-shadow:0 8px 30px rgba(139,109,240,.42), 0 0 0 1px rgba(255,255,255,.12) inset;
  transition:transform var(--dur) var(--ease-out);
}
.add-pattern-pill::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  z-index:-1;
  pointer-events:none;
  box-shadow:0 0 42px -3px rgba(167,139,250,.8), 0 12px 38px rgba(139,109,240,.5);
  opacity:.55;
  animation:pillGlow 3.4s var(--ease) infinite;  /* pulses opacity, not box-shadow */
}
.add-pattern-pill svg{ width:18px; height:18px; }
.add-pattern-pill:hover{ transform:translateX(-50%); } /* no lift: a transform change on hover re-layers the whole (zoomed-out) view and glitches */
.add-pattern-pill:active{ transform:translateX(-50%) translateY(-1px) scale(.98); }
@keyframes pillGlow{
  0%,100%{ opacity:.42; }
  50%{ opacity:.78; }
}

/* Minimap (bottom-right) */
.minimap{
  bottom:24px; right:24px;
  width:200px; height:140px;
  border-radius:var(--radius);
  padding:6px;
  overflow:hidden;
  transition:border-color var(--dur-fast) var(--ease); /* box-shadow snaps on hover (no per-frame shadow repaint / GPU glitch) */
}
.minimap:hover{ box-shadow:var(--shadow), 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent); }
.minimap__canvas{
  width:100%; height:100%;
  display:block;
  border-radius:9px;
  background:rgba(10,10,22,.5);
}
.minimap__viewport{
  position:absolute;
  border:1.5px solid color-mix(in srgb, var(--accent) 80%, transparent);
  background:color-mix(in srgb, var(--accent) 12%, transparent);
  border-radius:4px;
  cursor:grab;
  box-shadow:0 0 12px -2px color-mix(in srgb, var(--accent) 60%, transparent);
  transition:border-color var(--dur-fast) var(--ease);
}
.minimap__viewport:hover{ border-color:var(--accent); }
.minimap__viewport:active{ cursor:grabbing; }

/* Global sync indicator (top-right corner; sits left of search visually) */
.sync-indicator{
  top:20px; right:316px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  height:44px;
  padding:0 14px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:600;
  color:var(--text-dim);
  transition:color var(--dur) var(--ease);
}
.sync-indicator:hover{ color:var(--text); }
.sync-indicator__dot{
  width:9px; height:9px;
  border-radius:50%;
  background:var(--text-faint);
  flex:none;
}
.sync-indicator__count{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:18px; height:18px; padding:0 5px;
  border-radius:999px;
  background:var(--surface-3);
  color:var(--text);
  font-size:10.5px; font-weight:700;
}

/* ---------------------------------------------------------------------------
   Status dots (shared: sync indicator + settings dashboard + drawer badge)
   --------------------------------------------------------------------------- */
.status-dot{ width:9px; height:9px; border-radius:50%; flex:none; display:inline-block; }
.status-dot--ok,.status-dot--connected,.status-dot--synced{ background:var(--ok); box-shadow:0 0 8px color-mix(in srgb, var(--ok) 70%, transparent); }
.status-dot--warn,.status-dot--pending{ background:var(--warn); box-shadow:0 0 8px color-mix(in srgb, var(--warn) 70%, transparent); }
.status-dot--err,.status-dot--error{ background:var(--err); box-shadow:0 0 8px color-mix(in srgb, var(--err) 70%, transparent); }
.status-dot--unconfigured{ background:var(--text-faint); }
.status-dot--syncing,.status-dot--spinning{
  background:var(--info);
  position:relative;
  box-shadow:0 0 8px color-mix(in srgb, var(--info) 70%, transparent);
}
.status-dot--syncing::after,.status-dot--spinning::after{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:50%;
  border:1.5px solid transparent;
  border-top-color:var(--info);
  animation:spin .8s linear infinite;
}
/* mirror onto the sync-indicator dot too */
.sync-indicator__dot.is-connected{ background:var(--ok); box-shadow:0 0 8px color-mix(in srgb, var(--ok) 70%, transparent); }
.sync-indicator__dot.is-syncing{ background:var(--info); box-shadow:0 0 8px color-mix(in srgb, var(--info) 70%, transparent); animation:pulseDot 1s var(--ease) infinite; }
.sync-indicator__dot.is-error{ background:var(--err); box-shadow:0 0 8px color-mix(in srgb, var(--err) 70%, transparent); }
.sync-indicator__dot.is-unconfigured{ background:var(--text-faint); }
@keyframes pulseDot{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* Generic spinner */
.spinner{
  width:16px; height:16px;
  border-radius:50%;
  border:2px solid color-mix(in srgb, currentColor 30%, transparent);
  border-top-color:currentColor;
  animation:spin .7s linear infinite;
  display:inline-block;
  flex:none;
}

/* ---------------------------------------------------------------------------
   Drawers (shared base) — slide via transform; .is-open reveals
   --------------------------------------------------------------------------- */
.drawer{
  position:fixed;
  top:0; bottom:0;
  z-index:var(--z-drawer);
  display:flex;
  flex-direction:column;
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(135%);
  -webkit-backdrop-filter:blur(24px) saturate(135%);
  box-shadow:var(--shadow-lg);
  transition:transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
  will-change:transform;
}
.drawer--right{
  right:0;
  width:var(--drawer-w);
  border-left:1px solid var(--glass-border);
  transform:translateX(calc(100% + 10px));
}
.drawer--left{
  left:0;
  width:var(--bible-w);
  border-right:1px solid var(--glass-border);
  transform:translateX(calc(-100% - 10px));
}
.drawer.is-open{ transform:translateX(0); }

/* drawer common head/section/footer */
.drawer__head{
  position:relative;
  padding:20px 22px 16px;
  border-bottom:1px solid var(--border-soft);
}
.drawer__catbar{
  height:4px;
  border-radius:999px;
  margin:-6px 0 12px;
  background:var(--node-color, var(--accent));
  box-shadow:0 0 14px color-mix(in srgb, var(--node-color, var(--accent)) 65%, transparent);
}
.drawer__title{
  font-size:19px;
  font-weight:700;
  line-height:1.25;
  letter-spacing:.1px;
  color:var(--text);
  padding-right:30px;
  outline:none;
  border-radius:6px;
}
.drawer__title[contenteditable]:hover,
.drawer__title[contenteditable]:focus{ background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--border); }
.drawer__close{
  position:absolute;
  top:16px; right:16px;
  width:30px; height:30px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px;
  color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.drawer__close:hover{ background:var(--surface-3); color:var(--text); }
.drawer__close svg{ width:18px; height:18px; }

.drawer__badge{
  display:inline-flex; align-items:center; gap:6px;
  margin-top:10px;
  padding:4px 11px;
  border-radius:999px;
  font-size:11.5px; font-weight:700;
  letter-spacing:.4px; text-transform:uppercase;
  color:var(--node-color, var(--accent));
  background:color-mix(in srgb, var(--node-color, var(--accent)) 14%, transparent);
  border:1px solid color-mix(in srgb, var(--node-color, var(--accent)) 35%, transparent);
}
.drawer__badge svg{ width:13px; height:13px; }

.drawer__body{ flex:1; overflow-y:auto; padding:6px 0 10px; }
.drawer__section{ padding:16px 22px; border-bottom:1px solid var(--border-soft); }
.drawer__section:last-child{ border-bottom:none; }
.drawer__section-title{
  font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  color:var(--text-faint);
  margin-bottom:11px;
  display:flex; align-items:center; justify-content:space-between;
}
.drawer__desc{
  font-size:13.5px; line-height:1.6; color:var(--text-dim);
  white-space:pre-wrap;
  outline:none; border-radius:8px; padding:4px;
}
.drawer__desc[contenteditable]:hover,
.drawer__desc[contenteditable]:focus{ background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--border); color:var(--text); }

/* Bible refs list */
.drawer__refs{ display:flex; flex-direction:column; gap:10px; }
.drawer__ref{
  padding:11px 13px;
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);
  border-left:3px solid var(--accent);
  transition:border-color var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
}
.drawer__ref:hover{ background:var(--surface-3); border-left-color:var(--c-divine); }
.drawer__ref-cite{ font-size:12.5px; font-weight:700; color:var(--c-divine); margin-bottom:5px; letter-spacing:.2px; }
.drawer__ref-text{ font-size:13.5px; color:var(--text); }
.drawer__ref-text.is-loading{ color:var(--text-faint); font-style:italic; }

/* connected pattern chips */
.drawer__chips{ display:flex; flex-wrap:wrap; gap:7px; }
.drawer__chip{
  --chip-color:var(--accent);
  display:inline-flex; align-items:center; gap:7px;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px; font-weight:600;
  color:var(--text);
  background:var(--surface-2);
  border:1px solid var(--border);
  transition:all var(--dur-fast) var(--ease);
}
.drawer__chip:hover{ background:var(--surface-3); border-color:color-mix(in srgb, var(--chip-color) 55%, transparent); }
.drawer__chip-dot{ width:8px; height:8px; border-radius:50%; background:var(--chip-color); box-shadow:0 0 6px color-mix(in srgb, var(--chip-color) 70%, transparent); }
.drawer__chip-rel{ font-size:10.5px; color:var(--text-faint); font-weight:500; }
.drawer__chip[data-cat="divine"]{ --chip-color:var(--c-divine); }
.drawer__chip[data-cat="numerical"]{ --chip-color:var(--c-numerical); }
.drawer__chip[data-cat="prophetic"]{ --chip-color:var(--c-prophetic); }
.drawer__chip[data-cat="relational"]{ --chip-color:var(--c-relational); }
.drawer__chip[data-cat="structural"]{ --chip-color:var(--c-structural); }
.drawer__chip[data-cat="custom"]{ --chip-color:var(--c-custom); }

/* observations */
.drawer__obs{ display:flex; flex-direction:column; gap:9px; }
.drawer__obs-item{
  padding:10px 12px;
  background:var(--surface-2);
  border-radius:var(--radius-sm);
  border:1px solid var(--border-soft);
}
.drawer__obs-text{ font-size:13px; line-height:1.55; color:var(--text); }
.drawer__obs-time{ font-size:10.5px; color:var(--text-faint); margin-top:6px; }
.drawer__obs-input{
  width:100%;
  margin-top:4px;
  padding:10px 12px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:13px;
  min-height:56px;
  outline:none;
  transition:border-color var(--dur-fast) var(--ease);
}
.drawer__obs-input:focus{ border-color:var(--accent); }
.drawer__obs-input::placeholder{ color:var(--text-faint); }

/* metadata grid */
.drawer__meta{
  display:grid; grid-template-columns:auto 1fr; gap:6px 14px;
  font-size:12px;
}
.drawer__meta-k{ color:var(--text-faint); }
.drawer__meta-v{ color:var(--text-dim); text-align:right; }

/* per-pattern sync row */
.drawer__sync{
  display:flex; align-items:center; justify-content:space-between;
  gap:10px;
  padding:11px 13px;
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);
}
.drawer__sync-status{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--text-dim); }

/* footer */
.drawer__footer{
  display:flex; gap:9px;
  padding:16px 22px;
  border-top:1px solid var(--border-soft);
}

/* drawer loading content state */
.drawer.is-loading .drawer__body{ opacity:.4; pointer-events:none; }

/* small "+ add" inline buttons used across drawer */
.btn-add-inline{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; font-weight:600;
  color:var(--accent);
  padding:3px 7px;
  border-radius:7px;
  transition:background var(--dur-fast) var(--ease);
}
.btn-add-inline:hover{ background:color-mix(in srgb, var(--accent) 14%, transparent); }
.btn-add-inline svg{ width:13px; height:13px; }

/* ---------------------------------------------------------------------------
   Generic buttons (used in drawer footer / modal / settings)
   --------------------------------------------------------------------------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 16px;
  border-radius:var(--radius-sm);
  font-size:13px; font-weight:600;
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  /* explicit props (not `all`) so box-shadow/filter changes on hover snap instead of
     animating frame-by-frame, which glitched on GPU. Lift + colors still animate. */
  transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
}
.btn svg{ width:16px; height:16px; }
.btn:hover{ background:var(--surface-3); border-color:var(--surface-3); }
.btn:active{ transform:translateY(0); }
.btn--primary{
  background:linear-gradient(135deg,#b79bff,#8b6df0);
  border-color:transparent;
  color:var(--text-on-accent);
  box-shadow:0 6px 20px rgba(139,109,240,.35);
}
.btn--primary:hover{ filter:brightness(1.08); box-shadow:0 8px 26px rgba(139,109,240,.45); }
.btn--ghost{ background:transparent; }
.btn--ghost:hover{ background:var(--surface-2); }
.btn--danger{ color:var(--err); border-color:color-mix(in srgb, var(--err) 35%, transparent); }
.btn--danger:hover{ background:color-mix(in srgb, var(--err) 16%, transparent); border-color:var(--err); }
.btn--block{ width:100%; }

/* ---------------------------------------------------------------------------
   Add / Edit modal — centered, backdrop blur
   --------------------------------------------------------------------------- */
.modal-backdrop{
  position:fixed; inset:0;
  z-index:var(--z-modal);
  display:flex; align-items:center; justify-content:center;
  padding:30px;
  background:rgba(6,6,16,.55);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--dur) var(--ease);
}
.modal-backdrop.is-open{ opacity:1; pointer-events:auto; }
.modal{
  width:min(560px,100%);
  max-height:86vh;
  display:flex; flex-direction:column;
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  transform:translateY(18px) scale(.97);
  opacity:0;
  transition:transform var(--dur) var(--ease-out), opacity var(--dur) var(--ease);
}
.modal-backdrop.is-open .modal{ transform:translateY(0) scale(1); opacity:1; }
.modal__head{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border-soft);
}
.modal__title{ font-size:18px; font-weight:700; letter-spacing:.1px; }
.modal__close{
  width:32px; height:32px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px; color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.modal__close:hover{ background:var(--surface-3); color:var(--text); }
.modal__close svg{ width:18px; height:18px; }

.modal__body{ flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:18px; position:relative; }
.modal__field{ display:flex; flex-direction:column; gap:8px; }
.modal__label{ font-size:11.5px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--text-faint); }
.modal__label .req{ color:var(--err); margin-left:3px; }

/* form controls */
.field-input,.field-textarea,.field-select{
  width:100%;
  padding:11px 13px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-size:13.5px;
  outline:none;
  transition:border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
}
.field-input::placeholder,.field-textarea::placeholder{ color:var(--text-faint); }
.field-input:focus,.field-textarea:focus,.field-select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}
.field-textarea{ min-height:88px; line-height:1.55; }
.field-input.is-error,.field-textarea.is-error{ border-color:var(--err); box-shadow:0 0 0 3px color-mix(in srgb, var(--err) 18%, transparent); }
.field-hint{ font-size:11.5px; color:var(--text-faint); }
.field-hint.is-error{ color:var(--err); }

/* category pill grid */
.modal__cats{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.cat-pill{
  --pill-color:var(--c-custom);
  display:flex; align-items:center; gap:9px;
  padding:11px 12px;
  border-radius:var(--radius-sm);
  background:var(--surface-2);
  border:1.5px solid var(--border);
  font-size:12.5px; font-weight:600;
  color:var(--text-dim);
  transition:all var(--dur-fast) var(--ease);
}
.cat-pill__icon{
  width:24px; height:24px; flex:none;
  display:flex; align-items:center; justify-content:center;
  color:var(--pill-color);
}
.cat-pill__icon svg{ width:20px; height:20px; }
.cat-pill:hover{ border-color:color-mix(in srgb, var(--pill-color) 55%, transparent); color:var(--text); }
.cat-pill.is-selected{
  color:var(--text);
  background:color-mix(in srgb, var(--pill-color) 16%, var(--surface-2));
  border-color:var(--pill-color);
  box-shadow:0 0 0 3px color-mix(in srgb, var(--pill-color) 16%, transparent), 0 0 18px -6px color-mix(in srgb, var(--pill-color) 70%, transparent);
}
.cat-pill[data-cat="divine"]{ --pill-color:var(--c-divine); }
.cat-pill[data-cat="numerical"]{ --pill-color:var(--c-numerical); }
.cat-pill[data-cat="prophetic"]{ --pill-color:var(--c-prophetic); }
.cat-pill[data-cat="relational"]{ --pill-color:var(--c-relational); }
.cat-pill[data-cat="structural"]{ --pill-color:var(--c-structural); }
.cat-pill[data-cat="custom"]{ --pill-color:var(--c-custom); }

/* segmented control (testament scope OT/NT/Both, bible filter) */
.segmented{
  display:inline-flex;
  padding:3px;
  gap:3px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:999px;
}
.segmented__opt{
  padding:7px 16px;
  border-radius:999px;
  font-size:12.5px; font-weight:600;
  color:var(--text-dim);
  transition:all var(--dur-fast) var(--ease);
}
.segmented__opt:hover{ color:var(--text); }
.segmented__opt.is-active{
  background:var(--accent);
  color:var(--text-on-accent);
  box-shadow:0 2px 10px rgba(139,109,240,.4);
}

/* tag input (refs / freeform tags) */
.tag-input{
  display:flex; flex-wrap:wrap; align-items:center; gap:6px;
  padding:8px 10px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  transition:border-color var(--dur-fast) var(--ease);
}
.tag-input:focus-within{ border-color:var(--accent); }
.tag{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 9px;
  border-radius:999px;
  font-size:11.5px; font-weight:600;
  background:var(--surface-3);
  color:var(--text);
}
.tag--ref{ color:var(--c-divine); background:color-mix(in srgb, var(--c-divine) 14%, var(--surface-3)); }
.tag__x{ width:14px; height:14px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:var(--text-faint); }
.tag__x:hover{ background:var(--err); color:#fff; }
.tag__x svg{ width:10px; height:10px; }
.tag-input__field{ flex:1; min-width:90px; background:none; border:none; outline:none; color:var(--text); font-size:13px; padding:3px 2px; }
.tag-input__field::placeholder{ color:var(--text-faint); }

/* autocomplete dropdown (book names / connect multiselect) */
.autocomplete{
  position:relative;
}
.autocomplete__menu{
  position:absolute; left:0; right:0; top:calc(100% + 4px);
  max-height:200px; overflow-y:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  box-shadow:var(--shadow);
  z-index:5;
}
.autocomplete__item{
  padding:9px 13px;
  font-size:13px; color:var(--text-dim);
  cursor:pointer;
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.autocomplete__item:hover,.autocomplete__item.is-active{ background:var(--surface-2); color:var(--text); }

/* connect multiselect rows */
.connect-list{ display:flex; flex-direction:column; gap:5px; max-height:180px; overflow-y:auto; }
.connect-item{
  display:flex; align-items:center; gap:9px;
  padding:8px 11px;
  border-radius:var(--radius-sm);
  background:var(--surface-2);
  border:1px solid transparent;
  font-size:13px; color:var(--text-dim);
  transition:all var(--dur-fast) var(--ease);
}
.connect-item:hover{ background:var(--surface-3); color:var(--text); }
.connect-item.is-selected{ border-color:var(--accent); color:var(--text); background:color-mix(in srgb, var(--accent) 12%, var(--surface-2)); }
.connect-item__dot{ width:8px; height:8px; border-radius:50%; flex:none; }
.connect-item__check{ margin-left:auto; color:var(--accent); width:16px; height:16px; opacity:0; }
.connect-item.is-selected .connect-item__check{ opacity:1; }

/* modal footer + submit spinner + in-modal error toast */
.modal__footer{
  display:flex; justify-content:flex-end; gap:10px;
  padding:16px 24px;
  border-top:1px solid var(--border-soft);
}
.modal__submit{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  min-width:130px;
  padding:11px 20px;
  border-radius:var(--radius-sm);
  font-size:13.5px; font-weight:700;
  color:var(--text-on-accent);
  background:linear-gradient(135deg,#b79bff,#8b6df0);
  box-shadow:0 6px 20px rgba(139,109,240,.4);
  transition:transform var(--dur-fast) var(--ease); /* brightness snaps on hover; only transform animates */
}
.modal__submit:hover{ filter:brightness(1.08); }
.modal__submit svg{ width:16px; height:16px; }
.modal__cancel{
  padding:11px 20px; border-radius:var(--radius-sm);
  font-size:13.5px; font-weight:600;
  color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.modal__cancel:hover{ background:var(--surface-2); color:var(--text); }

/* submitting state: disable + spinner */
.modal.is-submitting .modal__body{ opacity:.55; pointer-events:none; }
.modal__submit .spinner{ display:none; }
.modal.is-submitting .modal__submit{ pointer-events:none; }
.modal.is-submitting .modal__submit .spinner{ display:inline-block; }
.modal.is-submitting .modal__submit .modal__submit-label{ opacity:.7; }

/* in-modal error banner (top of modal) */
.modal__error{
  display:none;
  align-items:center; gap:9px;
  margin:0 0 4px;
  padding:10px 13px;
  border-radius:var(--radius-sm);
  background:color-mix(in srgb, var(--err) 14%, var(--surface-2));
  border:1px solid color-mix(in srgb, var(--err) 40%, transparent);
  color:var(--err);
  font-size:12.5px; font-weight:600;
}
.modal__error.is-shown{ display:flex; }
.modal__error svg{ width:16px; height:16px; flex:none; }

/* ---------------------------------------------------------------------------
   Bible drawer (left) — head + filter + heatmap + accordion
   --------------------------------------------------------------------------- */
.bible__head{ padding:20px 22px 14px; border-bottom:1px solid var(--border-soft); position:relative; }
.bible__title{ font-size:18px; font-weight:700; display:flex; align-items:center; gap:9px; margin-bottom:14px; padding-right:34px; }
.bible__title svg{ width:20px; height:20px; color:var(--c-divine); }
.bible__close{
  position:absolute; top:16px; right:16px;
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.bible__close:hover{ background:var(--surface-3); color:var(--text); }
.bible__close svg{ width:18px; height:18px; }
.bible__filter{ display:flex; justify-content:center; margin-bottom:14px; }

/* Heatmap strip — cells colored by density (dark -> bright) */
.heatmap-strip{
  display:flex;
  gap:1px;
  height:30px;
  border-radius:8px;
  overflow:hidden;
  background:rgba(0,0,0,.3);
  box-shadow:inset 0 0 0 1px var(--border-soft);
  padding:3px;
}
.heatmap-cell{
  flex:1;
  min-width:2px;
  border-radius:3px;
  /* density driven inline by JS via --d (0..1); we map over a visible base so empty
     books still read as a quiet floor, not the strip background. */
  --d:0;
  background:color-mix(in srgb, var(--c-divine) calc(var(--d) * 100%), var(--surface-2));
  transition:transform var(--dur-fast) var(--ease), filter var(--dur-fast) var(--ease);
  cursor:pointer;
  position:relative;
}
.heatmap-cell:hover{ transform:scaleY(1.25); filter:brightness(1.3); z-index:2; }
.heatmap-cell[data-d="0"],.heatmap-cell.is-empty{ background:var(--surface-2); }
.heatmap-cell.is-active{ box-shadow:inset 0 0 0 1.5px var(--text); }
/* legend caption under strip */
.heatmap-legend{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:6px;
  font-size:10px; color:var(--text-faint); letter-spacing:.3px;
}

/* book accordion list */
.bible__list{ flex:1; overflow-y:auto; padding:6px 0; }
.bible__group-title{
  font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--text-faint);
  padding:14px 22px 6px;
}
.bible__book{ border-bottom:1px solid var(--border-soft); }
.bible__book-row{
  display:flex; align-items:center; gap:10px;
  padding:11px 22px;
  cursor:pointer;
  transition:background var(--dur-fast) var(--ease);
}
.bible__book-row:hover{ background:var(--surface-2); }
.bible__book-chev{ width:14px; height:14px; color:var(--text-faint); transition:transform var(--dur-fast) var(--ease); flex:none; }
.bible__book.is-expanded .bible__book-chev{ transform:rotate(90deg); color:var(--accent); }
.bible__book-name{ flex:1; font-size:13.5px; font-weight:600; color:var(--text); }
.bible__book.is-empty .bible__book-name{ color:var(--text-faint); font-weight:500; }
.bible__book-count{
  font-size:11px; font-weight:700;
  min-width:20px; height:20px; padding:0 6px;
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:999px;
  background:var(--surface-3); color:var(--text-dim);
}
.bible__book.is-empty .bible__book-count{ opacity:.4; }
.bible__dots{ display:flex; gap:3px; flex:none; }
.bible__dot{ width:7px; height:7px; border-radius:50%; box-shadow:0 0 5px color-mix(in srgb, currentColor 60%, transparent); }
.bible__dot[data-cat="divine"]{ background:var(--c-divine); }
.bible__dot[data-cat="numerical"]{ background:var(--c-numerical); }
.bible__dot[data-cat="prophetic"]{ background:var(--c-prophetic); }
.bible__dot[data-cat="relational"]{ background:var(--c-relational); }
.bible__dot[data-cat="structural"]{ background:var(--c-structural); }
.bible__dot[data-cat="custom"]{ background:var(--c-custom); }

/* expanded chapters/verses */
.bible__chapters{
  display:none;
  padding:4px 22px 12px 30px;
  background:rgba(0,0,0,.18);
}
.bible__book.is-expanded .bible__chapters{ display:block; }
.bible__chapter{ padding:6px 0; }
.bible__chapter-name{ font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:4px; }
.bible__verse{
  display:flex; align-items:center; gap:8px;
  padding:5px 10px;
  margin:2px 0;
  border-radius:7px;
  font-size:12.5px; color:var(--text-dim);
  cursor:pointer;
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.bible__verse:hover{ background:var(--surface-3); color:var(--text); }
.bible__verse.is-active{ background:color-mix(in srgb, var(--c-divine) 16%, transparent); color:var(--c-divine); font-weight:600; }
.bible__verse-cite{ font-weight:600; }
.bible__verse-count{ margin-left:auto; font-size:10.5px; color:var(--text-faint); }

/* ---------------------------------------------------------------------------
   Verse picker
   --------------------------------------------------------------------------- */
.versepicker{ display:flex; flex-direction:column; gap:10px; }
.versepicker__input{
  width:100%; padding:11px 13px;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text); font-size:13.5px; outline:none;
  transition:border-color var(--dur-fast) var(--ease);
}
.versepicker__input:focus{ border-color:var(--accent); }
.versepicker__input::placeholder{ color:var(--text-faint); }
.versepicker__results{ display:flex; flex-direction:column; gap:4px; max-height:240px; overflow-y:auto; }
.versepicker__result{
  display:flex; flex-direction:column; gap:3px;
  padding:10px 12px;
  border-radius:var(--radius-sm);
  background:var(--surface-2);
  border:1px solid transparent;
  cursor:pointer;
  transition:all var(--dur-fast) var(--ease);
}
.versepicker__result:hover,.versepicker__result.is-active{ background:var(--surface-3); border-color:color-mix(in srgb, var(--accent) 45%, transparent); }
.versepicker__result.is-selected{ border-color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, var(--surface-2)); }
.versepicker__cite{ font-size:12.5px; font-weight:700; color:var(--c-divine); }
.versepicker__preview{ font-family:var(--font-serif); font-style:italic; font-size:12.5px; color:var(--text-dim); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
/* picker states */
.versepicker__empty,.versepicker__searching{
  padding:20px; text-align:center; color:var(--text-faint); font-size:12.5px;
}
.versepicker__searching{ display:flex; align-items:center; justify-content:center; gap:9px; }

/* ---------------------------------------------------------------------------
   Settings page overlay
   --------------------------------------------------------------------------- */
.settings-page{
  position:fixed; inset:0;
  z-index:var(--z-modal);
  display:flex; align-items:center; justify-content:center;
  padding:40px;
  background:rgba(6,6,16,.6);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0; pointer-events:none;
  transition:opacity var(--dur) var(--ease);
}
.settings-page.is-open{ opacity:1; pointer-events:auto; }
.settings__panel{
  width:min(640px,100%);
  max-height:88vh;
  display:flex; flex-direction:column;
  background:var(--surface);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  transform:translateY(16px) scale(.98);
  opacity:0;
  transition:transform var(--dur) var(--ease-out), opacity var(--dur) var(--ease);
}
.settings-page.is-open .settings__panel{ transform:translateY(0) scale(1); opacity:1; }
.settings__head{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border-soft);
}
.settings__title{ font-size:18px; font-weight:700; display:flex; align-items:center; gap:9px; }
.settings__title svg{ width:20px; height:20px; color:var(--accent); }
.settings__close{
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.settings__close:hover{ background:var(--surface-3); color:var(--text); }
.settings__close svg{ width:18px; height:18px; }
.settings__body{ flex:1; overflow-y:auto; padding:22px 24px; display:flex; flex-direction:column; gap:20px; }
.settings__field{ display:flex; flex-direction:column; gap:8px; }

/* status row */
.settings__status{
  display:flex; align-items:center; gap:11px;
  padding:13px 16px;
  border-radius:var(--radius);
  background:var(--surface-2);
  border:1px solid var(--border-soft);
}
.settings__status-text{ font-size:13.5px; font-weight:600; }
.settings__status--connected{ border-color:color-mix(in srgb, var(--ok) 35%, transparent); }
.settings__status--connected .settings__status-text{ color:var(--ok); }
.settings__status--syncing{ border-color:color-mix(in srgb, var(--info) 35%, transparent); }
.settings__status--syncing .settings__status-text{ color:var(--info); }
.settings__status--error{ border-color:color-mix(in srgb, var(--err) 35%, transparent); }
.settings__status--error .settings__status-text{ color:var(--err); }
.settings__status--unconfigured .settings__status-text{ color:var(--text-dim); }
.settings__status-msg{ font-size:12px; color:var(--text-faint); margin-left:auto; }

/* onboarding prompt (never configured) */
.settings__onboard{
  padding:18px;
  border-radius:var(--radius);
  background:color-mix(in srgb, var(--accent) 8%, var(--surface-2));
  border:1px dashed color-mix(in srgb, var(--accent) 40%, transparent);
  text-align:center;
  font-size:13px; color:var(--text-dim);
  line-height:1.6;
}

/* progress bar (syncing) */
.progress{
  width:100%; height:6px;
  border-radius:999px;
  background:var(--surface-3);
  overflow:hidden;
}
.progress__bar{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--info),var(--accent));
  width:40%;
  animation:progressIndet 1.2s var(--ease) infinite;
}
@keyframes progressIndet{
  0%{ transform:translateX(-100%); width:40%; }
  50%{ width:60%; }
  100%{ transform:translateX(260%); width:40%; }
}

/* dashboard stats grid */
.settings__dash{
  display:grid; grid-template-columns:repeat(3,1fr); gap:11px;
}
.settings__stat{
  padding:14px;
  border-radius:var(--radius);
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  text-align:center;
}
.settings__stat-num{ font-size:22px; font-weight:800; color:var(--text); }
.settings__stat-label{ font-size:10.5px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--text-faint); margin-top:4px; }

/* collapsible error log */
.settings__errorlog{
  border-radius:var(--radius);
  background:var(--surface-2);
  border:1px solid var(--border-soft);
  overflow:hidden;
}
.settings__errorlog-head{
  display:flex; align-items:center; gap:9px;
  padding:11px 14px;
  font-size:12.5px; font-weight:600; color:var(--text-dim);
  cursor:pointer;
}
.settings__errorlog-head svg{ width:14px; height:14px; transition:transform var(--dur-fast) var(--ease); }
.settings__errorlog.is-open .settings__errorlog-head svg{ transform:rotate(90deg); }
.settings__errorlog-head .count{ margin-left:auto; color:var(--err); font-weight:700; }
.settings__errorlog-body{ display:none; padding:0 14px 12px; max-height:160px; overflow-y:auto; }
.settings__errorlog.is-open .settings__errorlog-body{ display:block; }
.settings__errorlog-item{
  font-size:11.5px; color:var(--text-dim);
  padding:7px 0; border-top:1px solid var(--border-soft);
  display:flex; gap:10px;
}
.settings__errorlog-item .ts{ color:var(--text-faint); flex:none; }
.settings__errorlog-item .msg{ color:var(--err); }

/* template editor with .var token highlight */
.settings__template{ position:relative; }
.settings__template textarea{
  width:100%; min-height:170px;
  padding:13px;
  background:#0c0c1c;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-dim);
  font-family:"SFMono-Regular",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
  font-size:12.5px; line-height:1.6;
  outline:none; tab-size:2;
  transition:border-color var(--dur-fast) var(--ease);
}
.settings__template textarea:focus{ border-color:var(--accent); }
/* highlighted preview (overlay or rendered chips) — .var tokens */
.settings__template-preview{
  margin-top:8px;
  padding:13px;
  background:#0c0c1c;
  border:1px solid var(--border-soft);
  border-radius:var(--radius-sm);
  font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  font-size:12.5px; line-height:1.6;
  color:var(--text-dim);
  white-space:pre-wrap;
  max-height:160px; overflow-y:auto;
}
.settings__footer{
  display:flex; gap:10px; justify-content:flex-end;
  padding:16px 24px;
  border-top:1px solid var(--border-soft);
}

/* ---------------------------------------------------------------------------
   Toasts — slide-in, success/error/info/warn
   --------------------------------------------------------------------------- */
.toast-host{
  position:fixed;
  top:80px; left:50%;
  transform:translateX(-50%);
  z-index:var(--z-toast);
  display:flex; flex-direction:column; gap:10px;
  align-items:center;
  pointer-events:none;
}
.toast{
  display:flex; align-items:center; gap:11px;
  min-width:240px; max-width:420px;
  padding:13px 16px;
  border-radius:var(--radius);
  background:var(--glass-2);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border:1px solid var(--glass-border);
  border-left:3px solid var(--accent);
  box-shadow:var(--shadow);
  color:var(--text);
  font-size:13px; font-weight:500;
  pointer-events:auto;
  animation:toastIn var(--dur) var(--ease-out);
}
.toast.is-leaving{ animation:toastOut var(--dur) var(--ease) forwards; }
.toast__icon{ width:18px; height:18px; flex:none; color:var(--accent); }
.toast__icon svg{ width:18px; height:18px; }
.toast--info{ border-left-color:var(--info); }
.toast--info .toast__icon{ color:var(--info); }
.toast--success{ border-left-color:var(--ok); }
.toast--success .toast__icon{ color:var(--ok); }
.toast--warn{ border-left-color:var(--warn); }
.toast--warn .toast__icon{ color:var(--warn); }
.toast--error{ border-left-color:var(--err); }
.toast--error .toast__icon{ color:var(--err); }
@keyframes toastIn{
  from{ opacity:0; transform:translateY(-14px) scale(.96); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}
@keyframes toastOut{
  to{ opacity:0; transform:translateY(-10px) scale(.96); }
}

/* ---------------------------------------------------------------------------
   Empty state — centered illustrated constellation (CSS/SVG)
   --------------------------------------------------------------------------- */
.empty-state{
  position:fixed; inset:0;
  z-index:5;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:8px;
  text-align:center;
  pointer-events:none;
}
.empty-state.is-hidden{ display:none; }
.empty-state__art{
  width:200px; height:160px;
  margin-bottom:14px;
  position:relative;
  opacity:.9;
}
/* constellation dots + lines drawn either as inline SVG (preferred) or via these helpers */
.empty-state__art svg{ width:100%; height:100%; overflow:visible; }
.empty-state__art .cons-line{
  stroke:color-mix(in srgb, var(--accent) 40%, transparent);
  stroke-width:1;
  stroke-dasharray:3 4;
  animation:dashFlow 3s linear infinite;
}
.empty-state__art .cons-star{
  fill:var(--accent);
  animation:twinkle 2.6s var(--ease) infinite;
}
.empty-state__art .cons-star:nth-child(2n){ fill:var(--c-divine); animation-delay:.5s; }
.empty-state__art .cons-star:nth-child(3n){ fill:var(--c-prophetic); animation-delay:1.1s; }
.empty-state__art .cons-star:nth-child(5n){ fill:var(--c-relational); animation-delay:1.7s; }
@keyframes twinkle{
  0%,100%{ opacity:.5; transform:scale(1); transform-box:fill-box; transform-origin:center; }
  50%{ opacity:1; transform:scale(1.4); transform-box:fill-box; transform-origin:center; }
}
.empty-state__title{ font-size:18px; font-weight:700; color:var(--text); }
.empty-state__sub{ font-size:13.5px; color:var(--text-dim); max-width:300px; line-height:1.6; }
.empty-state__cta{ margin-top:16px; pointer-events:auto; }

/* ---------------------------------------------------------------------------
   Loading skeleton shimmer
   --------------------------------------------------------------------------- */
.loading-state{
  position:fixed; inset:0;
  z-index:6;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
}
.loading-state.is-hidden{ display:none; }
.loading-state__field{
  position:relative;
  width:min(640px,80vw);
  height:min(420px,60vh);
}
/* floating skeleton node discs */
.skeleton-node{
  position:absolute;
  width:84px; height:84px;
  border-radius:50%;
  background:linear-gradient(100deg,var(--surface) 30%,var(--surface-3) 50%,var(--surface) 70%);
  background-size:200% 100%;
  animation:shimmer 1.4s linear infinite;
}
.skeleton-line{
  position:absolute;
  height:10px; border-radius:5px;
  background:linear-gradient(100deg,var(--surface) 30%,var(--surface-3) 50%,var(--surface) 70%);
  background-size:200% 100%;
  animation:shimmer 1.4s linear infinite;
}
@keyframes shimmer{
  0%{ background-position:200% 0; }
  100%{ background-position:-200% 0; }
}
.loading-state__label{
  position:absolute; bottom:-40px; left:0; right:0;
  text-align:center; font-size:12.5px; color:var(--text-faint); letter-spacing:.5px;
}

/* ---------------------------------------------------------------------------
   Reduced motion
   --------------------------------------------------------------------------- */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.05ms !important;
  }
  .edge{ animation:none; stroke-dasharray:none; }
}

/* ===== Use Lora for scripture serif when the webfont loads (system serif fallback otherwise) ===== */
:root{ --font-serif:"Lora","Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif; }

/* ===========================================================================
   INTEGRATION BRIDGE — supplemental styles reconciling class-name drift between
   the JS modules' generated DOM and the base stylesheet. Authored by the
   integrator; the base styles.css above is left verbatim. Everything here maps
   real emitted class names (drawer.js / modal.js / bible.js / sync.js / dom.html)
   onto the existing design tokens so every JS-generated element is styled.
   =========================================================================== */

/* ---- node tooltip: graph.js emits .node__tooltip-meta (css has -count) ---- */
.node__tooltip-meta{
  margin-top:7px; font-size:11px; font-weight:600;
  color:var(--node-color); display:flex; align-items:center; gap:5px;
}
/* category dot + name at the top of the tooltip — reinforces hue->meaning at the node */
.node__tooltip-cat{
  display:flex; align-items:center; gap:6px;
  font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  color:var(--node-color); margin-bottom:5px;
}
.node__tooltip-cat-dot{
  width:8px; height:8px; border-radius:50%; flex:none;
  background:var(--node-color);
  box-shadow:0 0 7px color-mix(in srgb, var(--node-color) 70%, transparent);
}

/* ---- empty / loading state extras (dom.html class names) ---- */
.empty-state__icon{ width:120px; height:120px; color:var(--accent); opacity:.7; margin-bottom:6px; }
.empty-state__icon svg{ width:120px; height:120px; }
.empty-state__text{ font-size:13.5px; color:var(--text-dim); max-width:320px; line-height:1.6; }
.add-pattern-pill--lg{ position:static; transform:none; margin-top:18px; pointer-events:auto; }
.add-pattern-pill--lg:hover{ transform:translateY(-3px); }
.loading-state__shimmer{
  width:min(420px,70vw); height:220px; border-radius:var(--radius-lg);
  background:linear-gradient(100deg,var(--surface) 30%,var(--surface-3) 50%,var(--surface) 70%);
  background-size:200% 100%; animation:shimmer 1.4s linear infinite;
  box-shadow:var(--shadow);
}

/* =========================================================================
   DETAIL DRAWER (right) — drawer.js emitted classes
   ========================================================================= */
#detailDrawer{ overflow-y:auto; }
.drawer__addbtn{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; letter-spacing:.2px; text-transform:none;
  color:var(--accent); padding:3px 8px; border-radius:7px;
  transition:background var(--dur-fast) var(--ease);
}
.drawer__addbtn:hover{ background:color-mix(in srgb, var(--accent) 14%, transparent); }
.drawer__addbtn svg{ width:13px; height:13px; }

.drawer__title{
  width:100%; background:none; border:1px solid transparent;
}
.drawer__title:hover,.drawer__title:focus{ background:var(--surface-2); box-shadow:inset 0 0 0 1px var(--border); }

.drawer__badge-icon{ display:inline-flex; align-items:center; }
.drawer__badge-icon svg{ width:13px; height:13px; }

/* description as textarea */
.drawer__desc{
  width:100%; background:var(--surface-2); border:1px solid var(--border);
  border-radius:8px; padding:10px 12px; min-height:64px;
}
.drawer__desc:focus{ border-color:var(--accent); color:var(--text); box-shadow:none; }

/* refs */
.drawer__refs-empty,.drawer__chips-empty,.drawer__obs-empty{
  font-size:12.5px; color:var(--text-faint); font-style:italic; padding:2px 0;
}
.drawer__ref-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; }
.drawer__ref-remove,.drawer__chip-remove{
  width:20px; height:20px; flex:none; display:inline-flex; align-items:center; justify-content:center;
  border-radius:50%; color:var(--text-faint); transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.drawer__ref-remove:hover,.drawer__chip-remove:hover{ background:var(--err); color:#fff; }
.drawer__ref-remove svg,.drawer__chip-remove svg{ width:11px; height:11px; }

/* connected chips: jump button wraps content */
.drawer__chip{ padding:5px 6px 5px 10px; }
.drawer__chip-jump{
  display:inline-flex; align-items:center; gap:7px; color:inherit; font:inherit;
}
.drawer__chip-label{ font-size:12px; font-weight:600; }

/* inline connect search */
.drawer__connect{ margin-top:9px; }
.drawer__connect[hidden]{ display:none; }
.drawer__connect-input{
  width:100%; padding:9px 11px; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text); font-size:13px; outline:none;
  transition:border-color var(--dur-fast) var(--ease);
}
.drawer__connect-input:focus{ border-color:var(--accent); }
.drawer__connect-results{ display:flex; flex-direction:column; gap:4px; margin-top:6px; max-height:200px; overflow-y:auto; }
.drawer__connect-result{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:8px 11px; border-radius:var(--radius-sm); background:var(--surface-2);
  border:1px solid transparent; font-size:13px; color:var(--text-dim);
  transition:all var(--dur-fast) var(--ease);
}
.drawer__connect-result:hover{ background:var(--surface-3); color:var(--text); border-color:color-mix(in srgb, var(--accent) 45%, transparent); }
.drawer__connect-dot{ width:8px; height:8px; border-radius:50%; flex:none; }
.drawer__connect-none{ font-size:12px; color:var(--text-faint); padding:8px 2px; }

/* observations */
.drawer__obs-ts{ font-size:10.5px; color:var(--text-faint); margin-bottom:4px; }
.drawer__obs-add{ display:flex; flex-direction:column; gap:7px; margin-top:9px; }
.drawer__obs-btn{
  align-self:flex-end; display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:var(--radius-sm); font-size:12.5px; font-weight:600;
  color:var(--text-on-accent); background:linear-gradient(135deg,#b79bff,#8b6df0);
  box-shadow:0 4px 14px rgba(139,109,240,.35); transition:filter var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
}
.drawer__obs-btn:hover{ filter:brightness(1.08); }
.drawer__obs-btn svg{ width:13px; height:13px; }
.drawer__obs-toggle{
  margin-top:8px; font-size:12px; font-weight:600; color:var(--accent);
  padding:4px 0; transition:color var(--dur-fast) var(--ease);
}
.drawer__obs-toggle:hover{ text-decoration:underline; }

/* metadata rows (drawer.js uses dt/dd inside .drawer__meta-row) */
.drawer__meta{ display:block; }
.drawer__meta-row{
  display:flex; align-items:baseline; justify-content:space-between; gap:14px;
  padding:4px 0; font-size:12px;
}
.drawer__meta-row dt{ color:var(--text-faint); }
.drawer__meta-row dd{ margin:0; color:var(--text-dim); text-align:right; }

/* per-pattern sync block */
.drawer__sync{ display:block; }
.drawer__sync-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.drawer__sync-pill{
  display:inline-flex; align-items:center; gap:7px;
  padding:5px 11px; border-radius:999px; font-size:12px; font-weight:600;
  background:var(--surface-3); color:var(--text-dim);
}
.drawer__sync-dot{ width:8px; height:8px; border-radius:50%; background:var(--text-faint); flex:none; }
.drawer__sync-pill--synced{ color:var(--ok); background:color-mix(in srgb, var(--ok) 14%, var(--surface-2)); }
.drawer__sync-pill--synced .drawer__sync-dot{ background:var(--ok); box-shadow:0 0 7px color-mix(in srgb, var(--ok) 70%, transparent); }
.drawer__sync-pill--pending{ color:var(--warn); background:color-mix(in srgb, var(--warn) 14%, var(--surface-2)); }
.drawer__sync-pill--pending .drawer__sync-dot{ background:var(--warn); box-shadow:0 0 7px color-mix(in srgb, var(--warn) 70%, transparent); }
.drawer__sync-pill--error{ color:var(--err); background:color-mix(in srgb, var(--err) 14%, var(--surface-2)); }
.drawer__sync-pill--error .drawer__sync-dot{ background:var(--err); box-shadow:0 0 7px color-mix(in srgb, var(--err) 70%, transparent); }
.drawer__sync-open{
  display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600;
  color:var(--text-dim); padding:6px 10px; border-radius:var(--radius-sm);
  border:1px solid var(--border); transition:all var(--dur-fast) var(--ease);
}
.drawer__sync-open:hover{ color:var(--text); background:var(--surface-3); border-color:var(--accent); }
.drawer__sync-open svg{ width:13px; height:13px; }
.drawer__sync-path{ font-size:11px; color:var(--text-faint); font-family:ui-monospace,Menlo,Consolas,monospace; word-break:break-all; }

/* footer buttons */
.drawer__foot-btn{
  flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:10px 14px; border-radius:var(--radius-sm); font-size:12.5px; font-weight:600;
  background:var(--surface-2); border:1px solid var(--border); color:var(--text);
  transition:all var(--dur-fast) var(--ease);
}
.drawer__foot-btn:hover{ background:var(--surface-3); }
.drawer__foot-btn svg{ width:15px; height:15px; }
.drawer__foot-btn--del{ color:var(--err); border-color:color-mix(in srgb, var(--err) 35%, transparent); }
.drawer__foot-btn--del:hover{ background:color-mix(in srgb, var(--err) 16%, transparent); border-color:var(--err); }

/* drawer empty / loading-content states */
.drawer__empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-faint); text-align:center; padding:40px 24px; }
.drawer__empty-icon{ width:42px; height:42px; opacity:.5; }
.drawer__empty-icon svg{ width:42px; height:42px; }
.drawer__loading-label{ padding:18px 22px; color:var(--text-faint); font-size:12.5px; }
.skeleton{ background:linear-gradient(100deg,var(--surface) 30%,var(--surface-3) 50%,var(--surface) 70%); background-size:200% 100%; animation:shimmer 1.4s linear infinite; border-radius:6px; }
.skeleton--title{ height:22px; width:62%; margin:14px 0 10px; }
.skeleton--badge{ height:18px; width:90px; border-radius:999px; }
.skeleton--line{ height:11px; margin:8px 0; }
.skeleton--line.skeleton--short{ width:48%; }
.skeleton--block{ height:70px; }

/* =========================================================================
   ADD / EDIT MODAL — modal.js emitted classes
   ========================================================================= */
.modal__input,.modal__textarea,.modal__select{
  width:100%; padding:11px 13px; background:var(--surface-2);
  border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); font-size:13.5px; outline:none;
  transition:border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
}
.modal__input::placeholder,.modal__textarea::placeholder{ color:var(--text-faint); }
.modal__input:focus,.modal__textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
.modal__textarea{ min-height:88px; line-height:1.55; }
.modal__input--mono{ font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; }
.modal__input.is-invalid{ border-color:var(--err); box-shadow:0 0 0 3px color-mix(in srgb, var(--err) 18%, transparent); }
.modal__hint{ font-size:11.5px; color:var(--text-faint); }
.modal__hint code{ background:var(--surface-3); padding:1px 5px; border-radius:4px; font-family:ui-monospace,Menlo,Consolas,monospace; color:var(--c-divine); }
.modal__validation{ font-size:11.5px; color:var(--err); font-weight:600; }

/* segmented testament control */
.modal__segment{
  display:inline-flex; padding:3px; gap:3px;
  background:var(--surface-2); border:1px solid var(--border); border-radius:999px;
}
.modal__segment-btn{
  padding:7px 18px; border-radius:999px; font-size:12.5px; font-weight:600;
  color:var(--text-dim); transition:all var(--dur-fast) var(--ease);
}
.modal__segment-btn:hover{ color:var(--text); }
.modal__segment-btn.is-active{ background:var(--accent); color:var(--text-on-accent); box-shadow:0 2px 10px rgba(139,109,240,.4); }

/* tag input (refs + tags) */
.modal__taginput{
  display:flex; flex-wrap:wrap; align-items:center; gap:6px;
  padding:8px 10px; background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius-sm); transition:border-color var(--dur-fast) var(--ease); cursor:text;
}
.modal__taginput:focus-within{ border-color:var(--accent); }
.modal__tags{ display:flex; flex-wrap:wrap; gap:6px; }
.modal__taginput-field{ flex:1; min-width:120px; background:none; border:none; padding:3px 2px; box-shadow:none; }
.modal__taginput-field:focus{ box-shadow:none; }
.modal__tag{
  display:inline-flex; align-items:center; gap:6px; padding:4px 9px; border-radius:999px;
  font-size:11.5px; font-weight:600; background:var(--surface-3); color:var(--text);
}
.modal__tag--ref{ color:var(--c-divine); background:color-mix(in srgb, var(--c-divine) 14%, var(--surface-3)); }
.modal__tag--conn{ background:color-mix(in srgb, var(--node-color,var(--accent)) 14%, var(--surface-3)); }
.modal__tag-remove{
  width:14px; height:14px; display:flex; align-items:center; justify-content:center;
  border-radius:50%; color:var(--text-faint);
}
.modal__tag-remove:hover{ background:var(--err); color:#fff; }
.modal__tag-remove svg{ width:9px; height:9px; }
.modal__dot{ width:8px; height:8px; border-radius:50%; flex:none; }

/* connect multiselect */
.modal__multiselect{ position:relative; display:flex; flex-direction:column; gap:8px; }
.modal__multiselect-results{
  position:absolute; left:0; right:0; top:calc(100% + 4px);
  max-height:220px; overflow-y:auto; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow); z-index:5;
}
.modal__multiselect-result{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding:9px 13px; font-size:13px; color:var(--text-dim);
  transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.modal__multiselect-result:hover{ background:var(--surface-2); color:var(--text); }
.modal__multiselect-empty{ padding:9px 13px; font-size:12.5px; color:var(--text-faint); }
.modal__result-title{ font-size:13px; }

/* category pill icon/label already covered by base .cat-pill; ensure data-cat hook via inline --node-color */
.cat-pill{ --pill-color:var(--node-color,var(--c-custom)); }

/* submit spinner */
.modal__spinner{
  width:15px; height:15px; border-radius:50%; display:none;
  border:2px solid color-mix(in srgb, var(--text-on-accent) 35%, transparent);
  border-top-color:var(--text-on-accent); animation:spin .7s linear infinite;
}
.modal__submit.is-loading .modal__spinner{ display:inline-block; }
.modal__submit.is-loading .modal__submit-label{ opacity:.6; }
.modal__submit.is-disabled{ opacity:.5; pointer-events:none; }
.modal__error-icon{ width:16px; height:16px; flex:none; display:inline-flex; }
.modal__error-icon svg{ width:16px; height:16px; }
.modal__error-text{ flex:1; }

/* =========================================================================
   BIBLE EXPLORER (left) — bible.js emitted classes
   ========================================================================= */
#bibleDrawer{ overflow:hidden; }
.bible__head-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }

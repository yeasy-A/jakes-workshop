<script>
/* ===== graph.js ===== */
/* ============================================================================
 * PatternMap — PM.graph
 * The canvas engine: force layout, pan/zoom, drag, render (nodes+edges+minimap+
 * clusters), highlight, selection, hover. Follows CONTRACT.md §6.2 + §8 exactly.
 * Vanilla JS, no libraries. Attaches everything to window.PM.graph.
 * ==========================================================================*/
(function () {
  'use strict';

  window.PM = window.PM || {};
  PM.graph = PM.graph || {};

  var G = PM.graph;

  // --- private DOM ref cache (filled in mount) ---
  var refs = {
    viewport: null,
    world: null,
    edgeLayer: null,
    clusterLayer: null,
    nodeLayer: null,
    miniCanvas: null,
    miniViewport: null,
    miniMap: null,
    emptyState: null,
    loadingState: null
  };

  // --- private runtime state ---
  var nodeEls = {};      // id -> { root, glow, icon, label, tooltip }
  var edgeEls = {};      // id -> { path, label }
  var clusterEls = [];   // cluster bubble DOM elements (rebuilt each renderClusters)
  var hoverId = null;
  var mounted = false;
  var lastEdgeSig = '';  // cache: edge geometry signature to skip needless path recompute
  var miniDrag = false;

  // ------------------------------------------------------------------ utils
  function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
  function C() { return PM.consts || {}; }

  function patterns() { return (PM.state && PM.state.patterns) || []; }
  function edges() { return (PM.state && PM.state.edges) || []; }
  function layout() { return PM.state._layout; }
  function transform() { return PM.state.transform; }

  function getPattern(id) {
    if (PM.data && PM.data.getPattern) return PM.data.getPattern(id);
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) if (ps[i].id === id) return ps[i];
    return null;
  }

  function catColor(key) {
    if (PM.data && PM.data.categoryColor) return PM.data.categoryColor(key);
    return '#fb923c';
  }
  function iconSvg(name) {
    if (PM.data && PM.data.iconSvg) return PM.data.iconSvg(name);
    return '';
  }
  function catIconName(key) {
    if (PM.data && PM.data.category) {
      var c = PM.data.category(key);
      return (c && c.icon) || 'star';
    }
    return 'star';
  }

  // ------------------------------------------------------- layout bookkeeping
  // Ensure _layout.nodes mirrors patterns: every pattern has an entry with
  // velocities; drop stale entries. Mirrors pattern.x/y in.
  function syncLayoutNodes() {
    var L = layout();
    if (!L.nodes) L.nodes = new Map();
    var seen = {};
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      seen[p.id] = true;
      if (typeof p.x !== 'number' || isNaN(p.x)) p.x = (Math.random() - 0.5) * 200;
      if (typeof p.y !== 'number' || isNaN(p.y)) p.y = (Math.random() - 0.5) * 200;
      var n = L.nodes.get(p.id);
      if (!n) {
        L.nodes.set(p.id, { x: p.x, y: p.y, vx: 0, vy: 0, pinned: false, el: null });
      } else {
        // keep velocities; resync position from pattern (authoritative on load)
        n.x = p.x; n.y = p.y;
      }
    }
    // prune
    L.nodes.forEach(function (v, k) {
      if (!seen[k]) L.nodes.delete(k);
    });
  }

  // ============================================================= MOUNT / WIRE
  G.mount = function () {
    if (mounted) return;
    refs.viewport = document.getElementById('viewport');
    refs.world = document.getElementById('world');
    refs.edgeLayer = document.getElementById('edgeLayer');
    refs.clusterLayer = document.getElementById('clusterLayer');
    refs.nodeLayer = document.getElementById('nodeLayer');
    refs.miniCanvas = document.getElementById('miniMapCanvas');
    refs.miniViewport = document.getElementById('miniMapViewport');
    refs.miniMap = document.getElementById('miniMap');
    refs.emptyState = document.getElementById('emptyState');
    refs.loadingState = document.getElementById('loadingState');

    if (refs.world) refs.world.style.transformOrigin = '0 0';

    wireViewport();
    wireNodeLayer();
    wireEdgeLayer();
    wireMiniMap();
    mounted = true;
  };

  // --- edge layer: hover-to-reveal a single edge's label/color via its wide hit path ---
  function wireEdgeLayer() {
    var el = refs.edgeLayer;
    if (!el) return;
    function edgeRecFor(target) {
      if (!target || !target.getAttribute) return null;
      var id = target.getAttribute('data-id');
      return id ? edgeEls[id] : null;
    }
    el.addEventListener('pointerover', function (e) {
      var hit = e.target.closest && e.target.closest('.edge__hit');
      var rec = edgeRecFor(hit);
      if (!rec || !rec.path) return;
      rec.path.classList.add('edge--hover');
      if (rec.label) rec.label.classList.add('edge__label--show');
    });
    el.addEventListener('pointerout', function (e) {
      var hit = e.target.closest && e.target.closest('.edge__hit');
      var rec = edgeRecFor(hit);
      if (!rec || !rec.path) return;
      // don't strip the label if the edge is also active (focused) — let applyHighlight own that
      rec.path.classList.remove('edge--hover');
      if (rec.label && !rec.path.classList.contains('edge--active')) {
        rec.label.classList.remove('edge__label--show');
      }
    });
  }

  // --- viewport: wheel zoom, background pan ---
  function wireViewport() {
    var vp = refs.viewport;
    if (!vp) return;

    vp.addEventListener('wheel', function (e) {
      if (PM.state.ui.locked) return;
      e.preventDefault();
      var rect = vp.getBoundingClientRect();
      var cx = e.clientX - rect.left;
      var cy = e.clientY - rect.top;
      var step = C().ZOOM_STEP || 1.1;
      var f = (e.deltaY < 0) ? step : (1 / step);
      G.zoomBy(f, cx, cy);
    }, { passive: false });

    // Background pan via pointer drag (only when not starting on a node).
    var panning = false, lastX = 0, lastY = 0, pointerId = null;

    vp.addEventListener('pointerdown', function (e) {
      // node drag handled separately on nodeLayer (it stops propagation)
      if (PM.state.ui.locked) return;
      if (e.button !== 0) return;
      if (e.target.closest && e.target.closest('.node')) return; // node handles itself
      // ignore clicks on floating overlays inside viewport
      if (e.target.closest && e.target.closest('.toolbar, .searchbar, .filter-chips, .minimap, .sync-indicator, .add-pattern-pill, .empty-state, .map-popover')) return;
      panning = true;
      pointerId = e.pointerId;
      lastX = e.clientX;
      lastY = e.clientY;
      vp.classList.add('is-panning');
      try { vp.setPointerCapture(e.pointerId); } catch (err) {}
    });

    vp.addEventListener('pointermove', function (e) {
      if (!panning || e.pointerId !== pointerId) return;
      var dx = e.clientX - lastX;
      var dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      G.panBy(dx, dy);
    });

    function endPan(e) {
      if (!panning) return;
      if (pointerId !== null && e.pointerId !== pointerId) return;
      panning = false;
      pointerId = null;
      vp.classList.remove('is-panning');
      if (PM.save) PM.save();
    }
    vp.addEventListener('pointerup', endPan);
    vp.addEventListener('pointercancel', endPan);

    // Click on empty canvas clears selection.
    vp.addEventListener('click', function (e) {
      if (e.target.closest && e.target.closest('.node')) return;
      if (e.target.closest && e.target.closest('.toolbar, .searchbar, .filter-chips, .minimap, .sync-indicator, .add-pattern-pill')) return;
      if (PM.state.selection) G.select(null);
    });
  }

  // --- node layer: delegated hover + click + drag ---
  function wireNodeLayer() {
    var nl = refs.nodeLayer;
    if (!nl) return;

    var dragMoved = false;
    var dragId = null;
    var dragPointer = null;
    var dragLastX = 0, dragLastY = 0;

    nl.addEventListener('pointerover', function (e) {
      var el = e.target.closest('.node');
      if (!el) return;
      var id = el.getAttribute('data-id');
      if (id && id !== hoverId && !layout().dragId) G.setHover(id);
    });
    nl.addEventListener('pointerout', function (e) {
      var el = e.target.closest('.node');
      if (!el) return;
      // only clear if leaving the node entirely
      var to = e.relatedTarget;
      if (to && el.contains(to)) return;
      if (hoverId === el.getAttribute('data-id') && !layout().dragId) G.setHover(null);
    });

    nl.addEventListener('pointerdown', function (e) {
      if (e.button !== 0) return;
      var el = e.target.closest('.node');
      if (!el) return;
      e.stopPropagation(); // do NOT let viewport pan
      var id = el.getAttribute('data-id');
      if (!id) return;
      // When the canvas is locked, freeze the layout: no node dragging. We still
      // stopPropagation (above) so the viewport doesn't pan, and we leave dragId null
      // so pointerup treats this as a plain click (selection still works when locked),
      // mirroring the wheel/pan lock guards.
      if (PM.state && PM.state.ui && PM.state.ui.locked) return;
      dragId = id;
      dragPointer = e.pointerId;
      dragMoved = false;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      var L = layout();
      L.dragId = id;
      var n = L.nodes.get(id);
      if (n) n.pinned = true;
      el.classList.add('node--dragging');
      try { el.setPointerCapture(e.pointerId); } catch (err) {}
    });

    nl.addEventListener('pointermove', function (e) {
      if (dragId === null || e.pointerId !== dragPointer) return;
      var t = transform();
      var sdx = e.clientX - dragLastX;
      var sdy = e.clientY - dragLastY;
      if (Math.abs(sdx) > 1 || Math.abs(sdy) > 1) dragMoved = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      var wdx = sdx / t.k;
      var wdy = sdy / t.k;
      var L = layout();
      var n = L.nodes.get(dragId);
      var p = getPattern(dragId);
      if (n) { n.x += wdx; n.y += wdy; }
      if (p) {
        p.x = n ? n.x : (p.x + wdx);
        p.y = n ? n.y : (p.y + wdy);
      }
      // cheap: just move this node + recompute attached edges
      updateNodePosition(dragId);
      renderEdgesGeometry();
      G.renderMiniMap();
    });

    function endDrag(e) {
      if (dragId === null) return;
      if (dragPointer !== null && e.pointerId !== dragPointer) return;
      var id = dragId;
      var L = layout();
      var n = L.nodes.get(id);
      if (n) n.pinned = false;
      L.dragId = null;
      var el = nodeEls[id] && nodeEls[id].root;
      if (el) el.classList.remove('node--dragging');
      dragId = null;
      dragPointer = null;
      if (PM.save) PM.save();
    }
    nl.addEventListener('pointerup', function (e) {
      var wasDrag = dragMoved;
      var el = e.target.closest && e.target.closest('.node');
      var id = el && el.getAttribute('data-id');
      endDrag(e);
      // treat as click if not dragged
      if (!wasDrag && id) {
        G.select(id);
      }
    });
    nl.addEventListener('pointercancel', endDrag);
  }

  // --- minimap: draggable viewport rect ---
  function wireMiniMap() {
    var mvp = refs.miniViewport;
    var mm = refs.miniMap;
    if (!mvp || !mm) return;

    function jumpToMini(clientX, clientY) {
      var rect = refs.miniCanvas.getBoundingClientRect();
      var mx = clientX - rect.left;
      var my = clientY - rect.top;
      var info = miniInfo();
      if (!info) return;
      // mini -> world
      var wx = mx / info.scale + info.bb.minX;
      var wy = my / info.scale + info.bb.minY;
      var t = transform();
      var vpW = refs.viewport.clientWidth;
      var vpH = refs.viewport.clientHeight;
      t.x = vpW / 2 - wx * t.k;
      t.y = vpH / 2 - wy * t.k;
      G.applyTransform();
    }

    mvp.addEventListener('pointerdown', function (e) {
      e.stopPropagation();
      miniDrag = true;
      try { mvp.setPointerCapture(e.pointerId); } catch (err) {}
      jumpToMini(e.clientX, e.clientY);
    });
    mvp.addEventListener('pointermove', function (e) {
      if (!miniDrag) return;
      jumpToMini(e.clientX, e.clientY);
    });
    function end(e) {
      if (!miniDrag) return;
      miniDrag = false;
      if (PM.save) PM.save();
    }
    mvp.addEventListener('pointerup', end);
    mvp.addEventListener('pointercancel', end);

    // Click directly on canvas also recenters.
    refs.miniCanvas.addEventListener('pointerdown', function (e) {
      e.stopPropagation();
      jumpToMini(e.clientX, e.clientY);
    });
  }

  // ================================================================ TRANSFORM
  G.applyTransform = function () {
    var t = transform();
    if (refs.world) {
      refs.world.style.transform =
        'translate(' + t.x + 'px, ' + t.y + 'px) scale(' + t.k + ')';
    }
    G.renderMiniMap();
  };

  G.screenToWorld = function (sx, sy) {
    var t = transform();
    return { x: (sx - t.x) / t.k, y: (sy - t.y) / t.k };
  };
  G.worldToScreen = function (wx, wy) {
    var t = transform();
    return { x: wx * t.k + t.x, y: wy * t.k + t.y };
  };

  G.zoomBy = function (factor, cx, cy) {
    if (PM.state.ui.locked) return;
    var t = transform();
    var zmin = C().ZOOM_MIN || 0.2;
    var zmax = C().ZOOM_MAX || 3;
    var newK = clamp(t.k * factor, zmin, zmax);
    if (newK === t.k) return;
    t.x = cx - (cx - t.x) * (newK / t.k);
    t.y = cy - (cy - t.y) * (newK / t.k);
    t.k = newK;
    G.applyTransform();
    if (PM.save) PM.save();
  };

  G.zoomIn = function () {
    var step = C().ZOOM_STEP || 1.1;
    G.zoomBy(step, refs.viewport.clientWidth / 2, refs.viewport.clientHeight / 2);
  };
  G.zoomOut = function () {
    var step = C().ZOOM_STEP || 1.1;
    G.zoomBy(1 / step, refs.viewport.clientWidth / 2, refs.viewport.clientHeight / 2);
  };

  G.panBy = function (dx, dy) {
    if (PM.state.ui.locked) return;
    var t = transform();
    t.x += dx;
    t.y += dy;
    G.applyTransform();
  };

  G.bbox = function () {
    var ps = patterns();
    if (!ps.length) {
      return { minX: -200, minY: -150, maxX: 200, maxY: 150 };
    }
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      if (p.x < minX) minX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x;
      if (p.y > maxY) maxY = p.y;
    }
    var pad = (C().NODE_SIZE || 96) * 1.1;
    return { minX: minX - pad, minY: minY - pad, maxX: maxX + pad, maxY: maxY + pad };
  };

  G.fit = function () {
    var vp = refs.viewport;
    if (!vp) return;
    var bb = G.bbox();
    var w = bb.maxX - bb.minX || 1;
    var h = bb.maxY - bb.minY || 1;
    var vpW = vp.clientWidth;
    var vpH = vp.clientHeight;
    var zmin = C().ZOOM_MIN || 0.2;
    var zmax = C().ZOOM_MAX || 3;
    var k = clamp(Math.min(vpW / w, vpH / h) * 0.9, zmin, zmax);
    var t = transform();
    t.k = k;

  function applyNodeShape() {
    if (!refs.nodeLayer) return;
    var sh = (PM.state.settings && PM.state.settings.nodeShape) || 'circle';
    if (NODE_SHAPES.indexOf(sh) === -1) sh = 'circle';
    refs.nodeLayer.setAttribute('data-shape', sh);
  }

  // Public: set node shape. Persisted; applied live via data-shape on #nodeLayer.
  G.setNodeShape = function (shape) {
    if (NODE_SHAPES.indexOf(shape) === -1) shape = 'circle';
    if (PM.state.settings) PM.state.settings.nodeShape = shape;
    applyNodeShape();
    if (PM.save) PM.save();
  };

  // Edge curviness 0..1 (0 = straight, 1 = strongly curved). Persisted.
  G.setEdgeCurviness = function (c) {
    var v = (typeof c === 'number' && isFinite(c)) ? clamp(c, 0, 1) : 0.5;
    if (PM.state.settings) PM.state.settings.edgeCurviness = v;
    renderEdgesGeometry();
    if (PM.save) PM.save();
  };

  function edgeCurviness() {
    return (PM.state.settings && typeof PM.state.settings.edgeCurviness === 'number')
      ? PM.state.settings.edgeCurviness : 0.5;
  }

  // ============================================================ GRAPH INIT
  // Apply persisted layout type + node scale on boot (called by PM.init).
  G.init = function () {
    applyNodeScale();
    applyNodeShape();
    // Re-apply a persisted STATIC layout so the user's choice survives reload.
    // 'force' is left to PM.init's normal cooling/render path.
    var lt = PM.state.settings && PM.state.settings.layoutType;
    if (lt && lt !== 'force' && LAYOUT_TYPES.indexOf(lt) !== -1 && patterns().length) {
      var targets = computeTargets(lt);
      var L = layout();
      syncLayoutNodes();
      for (var id in targets) {
        var nd = L.nodes.get(id);
        var p = getPattern(id);
        if (nd) { nd.x = targets[id].x; nd.y = targets[id].y; nd.pinned = true; }
        if (p) { p.x = targets[id].x; p.y = targets[id].y; }
      }
    }
  };

  // ================================================================== RENDER
  G.render = function () {
    syncLayoutNodes();
    G.renderNodes();
    G.renderEdges();
    G.applyTransform();
    G.applyHighlight();
    if (PM.state.ui.clusterMode) G.renderClusters();
    else clearClusters();
    G.renderMiniMap();
    updateStateVisibility();
  };

  function updateStateVisibility() {
    var has = patterns().length > 0;
    if (refs.emptyState) refs.emptyState.classList.toggle('is-hidden', has);
    // loading state hidden once we've rendered (app.js also toggles after init)
    if (refs.loadingState) refs.loadingState.classList.add('is-hidden');
  }

  // --- show/hide skeleton shimmer (loading state) ---
  G.showLoading = function (on) {
    if (refs.loadingState) refs.loadingState.classList.toggle('is-hidden', !on);
  };

  // ------------------------------------------------------------- node render
  function buildNodeEl(p) {
    var root = document.createElement('div');
    root.className = 'node';
    root.setAttribute('data-id', p.id);
    root.setAttribute('data-cat', p.category);
    root.style.position = 'absolute';
    root.style.left = '0';
    root.style.top = '0';
    root.style.setProperty('--node-color', catColor(p.category));

    var glow = document.createElement('div');
    glow.className = 'node__glow';

    var icon = document.createElement('div');
    icon.className = 'node__icon';
    icon.innerHTML = iconSvg(catIconName(p.category));

    var label = document.createElement('div');
    label.className = 'node__label';
    label.textContent = p.title;

    var tip = document.createElement('div');
    tip.className = 'node__tooltip';

    root.appendChild(glow);
    root.appendChild(icon);
    root.appendChild(label);
    root.appendChild(tip);

    refs.nodeLayer.appendChild(root);
    var rec = { root: root, glow: glow, icon: icon, label: label, tooltip: tip };
    nodeEls[p.id] = rec;
    var L = layout();
    var n = L.nodes.get(p.id);
    if (n) n.el = root;
    return rec;
  }

  function updateNodeContent(p) {
    var rec = nodeEls[p.id];
    if (!rec) return;
    rec.root.setAttribute('data-cat', p.category);
    rec.root.style.setProperty('--node-color', catColor(p.category));
    if (rec.label.textContent !== p.title) rec.label.textContent = p.title;
    var wantIcon = iconSvg(catIconName(p.category));
    if (rec.icon.innerHTML !== wantIcon) rec.icon.innerHTML = wantIcon;
    // tooltip
    var desc = (p.description || '').split('\n')[0] || 'No description yet.';
    if (desc.length > 90) desc = desc.slice(0, 88) + '…';
    var cc = (typeof p.refCount === 'number') ? p.refCount : 0;
    var catObj = (PM.data && PM.data.category) ? PM.data.category(p.category) : null;
    var catLabel = (catObj && catObj.label) ? catObj.label : p.category;
    rec.tooltip.innerHTML =
      '<div class="node__tooltip-cat"><span class="node__tooltip-cat-dot"></span>' +
        escapeHtml(catLabel) + '</div>' +
      '<div class="node__tooltip-title">' + escapeHtml(p.title) + '</div>' +
      '<div class="node__tooltip-desc">' + escapeHtml(desc) + '</div>' +
      '<div class="node__tooltip-meta">' + cc + ' connection' + (cc === 1 ? '' : 's') + '</div>';
  }

  function updateNodePosition(id) {
    var rec = nodeEls[id];
    var p = getPattern(id);
    if (!rec || !p) return;
    rec.root.style.transform =
      'translate(' + p.x + 'px, ' + p.y + 'px) translate(-50%, -50%)';
  }

  // positions-only update for every node (used in layout loop / drag)
  function renderNodesGeometry() {
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) {
      if (nodeEls[ps[i].id]) updateNodePosition(ps[i].id);
    }
  }

  G.renderNodes = function () {
    if (!refs.nodeLayer) return;
    syncLayoutNodes();
    var ps = patterns();
    var present = {};

    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      present[p.id] = true;
      if (!nodeEls[p.id]) buildNodeEl(p);
      updateNodeContent(p);
      updateNodePosition(p.id);
    }
    // remove stale
    for (var id in nodeEls) {
      if (!present[id]) {
        var rec = nodeEls[id];
        if (rec.root.parentNode) rec.root.parentNode.removeChild(rec.root);
        delete nodeEls[id];
      }
    }
    // re-apply selection/hover classes
    var sel = PM.state.selection;
    for (var sid in nodeEls) {
      nodeEls[sid].root.classList.toggle('node--selected', sid === sel);
      nodeEls[sid].root.classList.toggle('node--hovered', sid === hoverId);
    }
  };

  // ------------------------------------------------------------- edge render
  function edgePath(a, b) {
    // cubic bezier whose bow is controlled by settings.edgeCurviness (0..1).
    // curv 0 -> straight line; higher -> control points bow perpendicular.
    var curv = edgeCurviness();
    var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    var dx = b.x - a.x, dy = b.y - a.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    // unit perpendicular
    var px = -dy / len, py = dx / len;
    var bow = len * 0.22 * curv;
    var c1x = a.x + dx * 0.33 + px * bow, c1y = a.y + dy * 0.33 + py * bow;
    var c2x = a.x + dx * 0.66 + px * bow, c2y = a.y + dy * 0.66 + py * bow;
    return 'M ' + a.x + ' ' + a.y +
      ' C ' + c1x + ' ' + c1y + ', ' + c2x + ' ' + c2y + ', ' + b.x + ' ' + b.y;
  }

  function edgeMid(a, b) {
    // midpoint of the curve at t=0.5, matching edgePath's control points.
    var curv = edgeCurviness();
    var dx = b.x - a.x, dy = b.y - a.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var px = -dy / len, py = dx / len;
    var bow = len * 0.22 * curv;
    var c1x = a.x + dx * 0.33 + px * bow, c1y = a.y + dy * 0.33 + py * bow;
    var c2x = a.x + dx * 0.66 + px * bow, c2y = a.y + dy * 0.66 + py * bow;
    // cubic at t=0.5
    var x = 0.125 * a.x + 0.375 * c1x + 0.375 * c2x + 0.125 * b.x;
    var y = 0.125 * a.y + 0.375 * c1y + 0.375 * c2y + 0.125 * b.y;
    return { x: x, y: y };
  }

  function buildEdgeEl(edge) {
    var ns = 'http://www.w3.org/2000/svg';

    // (1) wide transparent hit path BEHIND the visible stroke — makes the 1-2px edge
    // easy to hover so labels can reveal (see .edge__hit:hover in CSS).
    var hit = document.createElementNS(ns, 'path');
    hit.setAttribute('class', 'edge__hit');
    hit.setAttribute('data-id', edge.id);
    hit.setAttribute('fill', 'none');

    // (2) soft halo stroke — a wider, low-opacity wash in the edge's category hue. Paired
    // with the thin bright core it reads as a tapered, glowing ribbon (SPEC: tapered edges).
    var halo = document.createElementNS(ns, 'path');
    halo.setAttribute('class', 'edge__halo');
    halo.setAttribute('data-id', edge.id);
    halo.setAttribute('fill', 'none');

    // (3) the visible core stroke (carries the arrow marker + dash animation).
    var path = document.createElementNS(ns, 'path');
    path.setAttribute('class', 'edge');
    path.setAttribute('data-id', edge.id);
    path.setAttribute('marker-end', 'url(#arrowDefault)');
    path.setAttribute('fill', 'none');

    var txt = document.createElementNS(ns, 'text');
    txt.setAttribute('class', 'edge__label');
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('data-id', edge.id);

    // Order matters: hit + halo under the core, label last (the .edge--active + .edge__label
    // sibling selector relies on the core path immediately preceding its label).
    refs.edgeLayer.appendChild(hit);
    refs.edgeLayer.appendChild(halo);
    refs.edgeLayer.appendChild(path);
    refs.edgeLayer.appendChild(txt);
    edgeEls[edge.id] = { hit: hit, halo: halo, path: path, label: txt };
    return edgeEls[edge.id];
  }

  function updateEdgeStyle(edge) {
    var rec = edgeEls[edge.id];
    if (!rec) return;
    var s = (typeof edge.strength === 'number') ? edge.strength : 0.6;
    // Tie the edge to its SOURCE category color so relationships are legible by hue
    // (CSS blends --edge-color toward the faint base for idle, full hue when active).
    var from = getPattern(edge.from);
    var ec = catColor(from ? from.category : 'custom');
    rec.path.style.setProperty('--edge-color', ec);
    rec.halo.style.setProperty('--edge-color', ec);
    // Raised opacity/width floors so weak edges still read as "faint connection",
    // not "no connection" (idle: opacity 0.34..0.84, width 1.1..2.9px).
    var op = (0.34 + s * 0.5);
    var w = (1.1 + s * 1.8);
    rec.path.style.opacity = op.toFixed(3);
    rec.path.style.strokeWidth = w.toFixed(2);
    // Halo: a touch wider + much fainter, scaled with strength.
    rec.halo.style.opacity = (0.10 + s * 0.16).toFixed(3);
    rec.halo.style.strokeWidth = (w + 3.5).toFixed(2);
    rec.label.textContent = edge.label || '';
  }

  // positions-only geometry update of every edge (cheap; used in loop/drag)
  function renderEdgesGeometry() {
    var L = layout();
    var es = edges();
    for (var i = 0; i < es.length; i++) {
      var edge = es[i];
      var rec = edgeEls[edge.id];
      if (!rec) continue;
      var a = L.nodes.get(edge.from);
      var b = L.nodes.get(edge.to);
      if (!a || !b) continue;
      var d = edgePath(a, b);
      rec.path.setAttribute('d', d);
      rec.halo.setAttribute('d', d);
      rec.hit.setAttribute('d', d);
      var mid = edgeMid(a, b);
      rec.label.setAttribute('x', mid.x);
      rec.label.setAttribute('y', mid.y - 4);
    }
  }

  G.renderEdges = function () {
    if (!refs.edgeLayer) return;
    syncLayoutNodes();
    var es = edges();
    var present = {};
    for (var i = 0; i < es.length; i++) {
      var edge = es[i];
      present[edge.id] = true;
      if (!edgeEls[edge.id]) buildEdgeEl(edge);
      updateEdgeStyle(edge);
    }
    // geometry
    renderEdgesGeometry();
    // remove stale
    for (var id in edgeEls) {
      if (!present[id]) {
        var rec = edgeEls[id];
        if (rec.hit && rec.hit.parentNode) rec.hit.parentNode.removeChild(rec.hit);
        if (rec.halo && rec.halo.parentNode) rec.halo.parentNode.removeChild(rec.halo);
        if (rec.path.parentNode) rec.path.parentNode.removeChild(rec.path);
        if (rec.label.parentNode) rec.label.parentNode.removeChild(rec.label);
        delete edgeEls[id];
      }
    }
  };

  // ============================================================== HIGHLIGHT
  // Single place that translates filter/search/selection into node/edge classes.
  G.applyHighlight = function () {
    var st = PM.state;
    var q = (st.search || '').trim().toLowerCase();
    var hasSearch = q.length > 0;
    // is any filter active?
    var f = st.filters;
    var hasFilter = (f.categories && f.categories.size > 0) ||
      (f.testaments && f.testaments !== 'both') ||
      !!f.book || !!f.dateRange;

    var active = hasSearch || hasFilter;

    // determine matching set
    var match = {};
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      var ok = true;
      if (PM.data && PM.data.matchesFilters) ok = PM.data.matchesFilters(p);
      if (ok && hasSearch) ok = patternMatchesSearch(p, q);
      match[p.id] = ok;
    }

    // nodes
    for (var id in nodeEls) {
      var el = nodeEls[id].root;
      if (!active) {
        el.classList.remove('node--highlighted');
        el.classList.remove('node--dimmed');
      } else if (match[id]) {
        el.classList.add('node--highlighted');
        el.classList.remove('node--dimmed');
      } else {
        el.classList.remove('node--highlighted');
        el.classList.add('node--dimmed');
      }
    }

    // edges: active edges = attached to selection or hover; dimmed when filtering
    // and both endpoints not matching.
    var sel = st.selection;
    var focus = sel || hoverId;
    var es = edges();
    for (var ei = 0; ei < es.length; ei++) {
      var edge = es[ei];
      var rec = edgeEls[edge.id];
      if (!rec) continue;
      var isFocus = focus && (edge.from === focus || edge.to === focus);
      rec.path.classList.toggle('edge--active', !!isFocus);
      if (rec.halo) rec.halo.classList.toggle('edge--active', !!isFocus);
      rec.path.setAttribute('marker-end', isFocus ? 'url(#arrowActive)' : 'url(#arrowDefault)');
      rec.label.classList.toggle('edge__label--show', !!isFocus);

      if (active) {
        var bothMatch = match[edge.from] && match[edge.to];
        var dim = !bothMatch && !isFocus;
        rec.path.classList.toggle('edge--dimmed', dim);
        if (rec.halo) rec.halo.classList.toggle('edge--dimmed', dim);
      } else {
        rec.path.classList.remove('edge--dimmed');
        if (rec.halo) rec.halo.classList.remove('edge--dimmed');
      }
    }
  };

  function patternMatchesSearch(p, q) {
    if (PM.data && PM.data.search) {
      // reuse data layer search if available for consistency
      // (build a quick membership check once per call would be heavier; do inline)
    }
    if ((p.title || '').toLowerCase().indexOf(q) !== -1) return true;
    if ((p.description || '').toLowerCase().indexOf(q) !== -1) return true;
    var tags = p.tags || [];
    for (var i = 0; i < tags.length; i++) {
      if ((tags[i] || '').toLowerCase().indexOf(q) !== -1) return true;
    }
    var refsArr = p.refs || [];
    for (var j = 0; j < refsArr.length; j++) {
      var r = refsArr[j];
      var key = (PM.bible && PM.bible.verseKey) ? PM.bible.verseKey(r)
        : (r.book + ' ' + r.chapter + ':' + r.verse);
      if (key.toLowerCase().indexOf(q) !== -1) return true;
    }
    return false;
  }

  // ============================================================ HOVER/SELECT
  G.setHover = function (id) {
    if (hoverId === id) return;
    if (hoverId && nodeEls[hoverId]) {
      nodeEls[hoverId].root.classList.remove('node--hovered');
    }
    hoverId = id;
    if (hoverId && nodeEls[hoverId]) {
      nodeEls[hoverId].root.classList.add('node--hovered');
    }
    // re-evaluate active edges (brighten/pulse attached edges)
    G.applyHighlight();
  };

  G.select = function (id) {
    var st = PM.state;
    var prev = st.selection;
    // toggle off if reselecting same
    if (id && id === prev) {
      // keep selected (drawer re-open is fine); just refresh
    }
    st.selection = id || null;

    for (var nid in nodeEls) {
      nodeEls[nid].root.classList.toggle('node--selected', nid === st.selection);
    }

    if (st.selection) {
      if (PM.drawer && PM.drawer.open) PM.drawer.open(st.selection);
    } else {
      if (PM.drawer && PM.drawer.close && st.ui.drawerOpen) {
        // close without recursing into select(null): drawer.close calls select(null)
        // but selection is already null so it's a no-op cycle-wise.
        PM.drawer.close();
      }
    }
    G.applyHighlight();
  };

  // ============================================================ LOCK/CLUSTER
  G.toggleLock = function () {
    var ui = PM.state.ui;
    ui.locked = !ui.locked;
    var btn = document.getElementById('lockBtn');
    if (btn) {
      btn.classList.toggle('is-active', ui.locked);
      btn.setAttribute('aria-pressed', ui.locked ? 'true' : 'false');
      btn.innerHTML = iconSvg(ui.locked ? 'lock' : 'unlock') ||
        btn.innerHTML; // fallback keep existing svg if iconSvg empty
      btn.title = ui.locked ? 'Unlock pan/zoom' : 'Lock pan/zoom';
    }
    if (refs.viewport) refs.viewport.classList.toggle('is-locked', ui.locked);
    if (PM.toast) PM.toast(ui.locked ? 'Canvas locked' : 'Canvas unlocked', 'info', 1600);
  };

  G.toggleCluster = function () {
    var ui = PM.state.ui;
    ui.clusterMode = !ui.clusterMode;
    var btn = document.getElementById('clusterBtn');
    if (btn) {
      btn.classList.toggle('is-active', ui.clusterMode);
      btn.setAttribute('aria-pressed', ui.clusterMode ? 'true' : 'false');
    }
    if (ui.clusterMode) {
      // pull connected components tighter, then relax
      tightenClusters();
      G.renderClusters();
      G.startLayout(120);
    } else {
      clearClusters();
      for (var id in nodeEls) nodeEls[id].root.classList.remove('node--clustered');
      G.render();
    }
  };

  // --- union-find connected components ---
  function components() {
    var parent = {};
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) parent[ps[i].id] = ps[i].id;
    function find(a) { while (parent[a] !== a) { parent[a] = parent[parent[a]]; a = parent[a]; } return a; }
    function union(a, b) { var ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
    var es = edges();
    for (var e = 0; e < es.length; e++) {
      if (parent[es[e].from] !== undefined && parent[es[e].to] !== undefined) {
        union(es[e].from, es[e].to);
      }
    }
    var groups = {};
    for (var j = 0; j < ps.length; j++) {
      var root = find(ps[j].id);
      (groups[root] = groups[root] || []).push(ps[j]);
    }
    var out = [];
    for (var k in groups) out.push(groups[k]);
    return out;
  }

  function tightenClusters() {
    // nudge each component's nodes toward its centroid a bit, and mark them
    var comps = components();
    for (var c = 0; c < comps.length; c++) {
      var members = comps[c];
      var cx = 0, cy = 0;
      for (var i = 0; i < members.length; i++) { cx += members[i].x; cy += members[i].y; }
      cx /= members.length; cy /= members.length;
      for (var m = 0; m < members.length; m++) {
        var p = members[m];
        p.x = cx + (p.x - cx) * 0.7;
        p.y = cy + (p.y - cy) * 0.7;
        var n = layout().nodes.get(p.id);
        if (n) { n.x = p.x; n.y = p.y; }
        if (nodeEls[p.id]) nodeEls[p.id].root.classList.add('node--clustered');
      }
    }
  }

  function clearClusters() {
    if (!refs.clusterLayer) return;
    refs.clusterLayer.innerHTML = '';
    clusterEls = [];
  }

  G.renderClusters = function () {
    if (!refs.clusterLayer) return;
    if (!PM.state.ui.clusterMode) { clearClusters(); return; }
    clearClusters();
    var comps = components();
    var ns = (C().NODE_SIZE || 96);
    for (var c = 0; c < comps.length; c++) {
      var members = comps[c];
      if (members.length < 2) continue; // only bubble actual clusters
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      var catCount = {};
      for (var i = 0; i < members.length; i++) {
        var p = members[i];
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
        catCount[p.category] = (catCount[p.category] || 0) + 1;
      }
      var pad = ns * 0.85;
      var bx = minX - pad, by = minY - pad;
      var bw = (maxX - minX) + pad * 2;
      var bh = (maxY - minY) + pad * 2;
      // dominant category color for bubble tint
      var domCat = 'custom', domN = -1;
      for (var ck in catCount) if (catCount[ck] > domN) { domN = catCount[ck]; domCat = ck; }
      var color = catColor(domCat);

      var bubble = document.createElement('div');
      bubble.className = 'cluster';
      bubble.style.position = 'absolute';
      bubble.style.left = '0';
      bubble.style.top = '0';
      bubble.style.transform = 'translate(' + bx + 'px, ' + by + 'px)';
      bubble.style.width = bw + 'px';
      bubble.style.height = bh + 'px';
      bubble.style.setProperty('--cluster-color', color);

      var label = document.createElement('div');
      label.className = 'cluster__label';
      label.textContent = clusterLabel(members);
      bubble.appendChild(label);

      refs.clusterLayer.appendChild(bubble);
      clusterEls.push(bubble);
    }
  };

  function clusterLabel(members) {
    // pick a label: most-connected member's title, or count
    var best = members[0], bestC = -1;
    for (var i = 0; i < members.length; i++) {
      var rc = members[i].refCount || 0;
      if (rc > bestC) { bestC = rc; best = members[i]; }
    }
    return best.title + ' cluster (' + members.length + ')';
  }

  // ================================================================= MINIMAP
  function miniInfo() {
    var cv = refs.miniCanvas;
    if (!cv) return null;
    var miniW = cv.width, miniH = cv.height;
    var bb = G.bbox();
    var w = (bb.maxX - bb.minX) || 1;
    var h = (bb.maxY - bb.minY) || 1;
    var scale = Math.min(miniW / w, miniH / h);
    return { bb: bb, scale: scale, miniW: miniW, miniH: miniH };
  }

  G.renderMiniMap = function () {
    var cv = refs.miniCanvas;
    if (!cv) return;
    var ctx = cv.getContext('2d');
    if (!ctx) return;
    ctx.clearRect(0, 0, cv.width, cv.height);

    var info = miniInfo();
    if (!info) return;
    var bb = info.bb, scale = info.scale;

    function toMini(wx, wy) {
      return { x: (wx - bb.minX) * scale, y: (wy - bb.minY) * scale };
    }

    // node dots
    var ps = patterns();
    for (var i = 0; i < ps.length; i++) {
      var p = ps[i];
      var m = toMini(p.x, p.y);
      ctx.beginPath();
      ctx.arc(m.x, m.y, 2.4, 0, Math.PI * 2);
      ctx.fillStyle = catColor(p.category);
      ctx.fill();
    }

    // viewport rect
    var vp = refs.viewport;
    if (vp && refs.miniViewport) {
      var tl = G.screenToWorld(0, 0);
      var br = G.screenToWorld(vp.clientWidth, vp.clientHeight);
      var mtl = toMini(tl.x, tl.y);
      var mbr = toMini(br.x, br.y);
      var rx = clamp(mtl.x, 0, info.miniW);
      var ry = clamp(mtl.y, 0, info.miniH);
      var rw = clamp(mbr.x - mtl.x, 2, info.miniW);
      var rh = clamp(mbr.y - mtl.y, 2, info.miniH);
      var mv = refs.miniViewport;
      mv.style.left = rx + 'px';
      mv.style.top = ry + 'px';
      mv.style.width = rw + 'px';
      mv.style.height = rh + 'px';
    }
  };

  // =========================================================== CUSTOMIZE POPOVER
  // A small glassy panel: layout-type segmented buttons + node-size slider +
  // edge-curviness slider. Live-applies and persists via PM.save(). Closes on
  // outside-click / Escape. One-time wiring via G.mountCustomizer().
  var _popOpen = false;

  var LAYOUT_META = [
    { v: 'force',      label: 'Force',    icon: 'cluster' },
    { v: 'radial',     label: 'Radial',   icon: 'sun' },
    { v: 'concentric', label: 'Rings',    icon: 'eye' },
    { v: 'grid',       label: 'Grid',     icon: 'grid' },
    { v: 'circle',     label: 'Circle',   icon: 'sun' },
    { v: 'spiral',     label: 'Spiral',   icon: 'sun' },
    { v: 'clusters',   label: 'Clusters', icon: 'cluster' },
    { v: 'galaxy',     label: 'Galaxy',   icon: 'star' },
    { v: 'tree',       label: 'Tree',     icon: 'hash' },
    { v: 'arc',        label: 'Arc',      icon: 'eye' }
  ];

  var SHAPE_META = [
    { v: 'circle',   label: 'Circle' },
    { v: 'rounded',  label: 'Rounded' },
    { v: 'square',   label: 'Square' },
    { v: 'diamond',  label: 'Diamond' },
    { v: 'hexagon',  label: 'Hexagon' },
    { v: 'triangle', label: 'Triangle' },
    { v: 'star',     label: 'Star' }
  ];

  // a tiny CSS-shaped swatch (mirrors the node-shape clip-paths) for the picker
  function shapeSwatch(v) {
    var clip = {
      diamond: 'polygon(50% 0,100% 50%,50% 100%,0 50%)',
      hexagon: 'polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%)',
      triangle: 'polygon(50% 5%,95% 92%,5% 92%)',
      star: 'polygon(50% 2%,61% 35%,97% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,3% 35%,39% 35%)'
    };
    var rad = { circle: '50%', rounded: '32%', square: '12%' };
    var st = 'display:inline-block;width:15px;height:15px;background:currentColor;flex:0 0 auto;';
    st += clip[v] ? ('clip-path:' + clip[v] + ';') : ('border-radius:' + (rad[v] || '50%') + ';');
    return '<span style="' + st + '"></span>';
  }

  function popIcon(name) { return iconSvg(name); }

  G.renderCustomizer = function () {
    var pop = document.getElementById('mapPopover');
    if (!pop) return;
    var s = PM.state.settings || {};
    var lt = s.layoutType || 'force';
    var scale = (typeof s.nodeScale === 'number') ? s.nodeScale : 1;
    var curv = (typeof s.edgeCurviness === 'number') ? s.edgeCurviness : 0.5;

    var seg = LAYOUT_META.map(function (o) {
      return '<button type="button" class="map-popover__seg-btn' +
        (o.v === lt ? ' is-active' : '') + '" data-layout="' + o.v + '" ' +
        'aria-pressed="' + (o.v === lt ? 'true' : 'false') + '">' +
        popIcon(o.icon) + '<span>' + o.label + '</span></button>';
    }).join('');

    var curShape = s.nodeShape || 'circle';
    var shapeSeg = SHAPE_META.map(function (o) {
      return '<button type="button" class="map-popover__seg-btn' +
        (o.v === curShape ? ' is-active' : '') + '" data-shape="' + o.v + '" ' +
        'aria-pressed="' + (o.v === curShape ? 'true' : 'false') + '">' +
        shapeSwatch(o.v) + '<span>' + o.label + '</span></button>';
    }).join('');

    pop.innerHTML =
      '<div class="map-popover__group">' +
        '<div class="map-popover__title">Layout</div>' +
        '<div class="map-popover__seg">' + seg + '</div>' +
      '</div>' +
      '<div class="map-popover__group">' +
        '<div class="map-popover__title">Node shape</div>' +
        '<div class="map-popover__seg">' + shapeSeg + '</div>' +
      '</div>' +
      '<div class="map-popover__group">' +
        '<div class="map-popover__row"><div class="map-popover__title">Node size</div>' +
          '<div id="nodeSizeReadout" class="map-popover__readout">' + scale.toFixed(2) + '×</div></div>' +
        '<input id="nodeSizeRange" class="map-popover__range" type="range" min="0.6" max="1.8" step="0.05" value="' + scale + '" aria-label="Node size">' +
      '</div>' +
      '<div class="map-popover__group">' +
        '<div class="map-popover__row"><div class="map-popover__title">Edge curve</div>' +
          '<div id="edgeCurveReadout" class="map-popover__readout">' + Math.round(curv * 100) + '%</div></div>' +
        '<input id="edgeCurveRange" class="map-popover__range" type="range" min="0" max="1" step="0.05" value="' + curv + '" aria-label="Edge curviness">' +
      '</div>' +
      '<div class="map-popover__build">build 2026-06-29 · ' + LAYOUT_META.length + ' layouts · ' + SHAPE_META.length + ' shapes</div>';

    // wire segmented layout buttons (scope to [data-layout] — shapes share the class)
    var segs = pop.querySelectorAll('.map-popover__seg-btn[data-layout]');
    for (var i = 0; i < segs.length; i++) {
      segs[i].addEventListener('click', function () {
        G.setLayout(this.getAttribute('data-layout'));
        G.renderCustomizer();
      });
    }
    // wire node-shape buttons
    var shapeBtns = pop.querySelectorAll('.map-popover__seg-btn[data-shape]');
    for (var sb = 0; sb < shapeBtns.length; sb++) {
      shapeBtns[sb].addEventListener('click', function () {
        G.setNodeShape(this.getAttribute('data-shape'));
        G.renderCustomizer();
      });
    }
    var nr = document.getElementById('nodeSizeRange');
    if (nr) nr.addEventListener('input', function () {
      var v = parseFloat(nr.value);
      var ro = document.getElementById('nodeSizeReadout');
      if (ro) ro.textContent = v.toFixed(2) + '×';
      G.setNodeSize(v);
    });
    var er = document.getElementById('edgeCurveRange');
    if (er) er.addEventListener('input', function () {
      var v = parseFloat(er.value);
      var ro2 = document.getElementById('edgeCurveReadout');
      if (ro2) ro2.textContent = Math.round(v * 100) + '%';
      G.setEdgeCurviness(v);
    });
  };

  G.toggleCustomizer = function () {
    _popOpen ? G.closeCustomizer() : G.openCustomizer();
  };
  G.openCustomizer = function () {
    var pop = document.getElementById('mapPopover');
    if (!pop) return;
    _popOpen = true;
    G.renderCustomizer();
    pop.classList.add('is-open');
    pop.setAttribute('aria-hidden', 'false');
    var btn = document.getElementById('mapCustomizeBtn');
    if (btn) { btn.classList.add('is-active'); btn.setAttribute('aria-pressed', 'true'); }
  };
  G.closeCustomizer = function () {
    var pop = document.getElementById('mapPopover');
    if (!pop) return;
    _popOpen = false;
    pop.classList.remove('is-open');
    pop.setAttribute('aria-hidden', 'true');
    var btn = document.getElementById('mapCustomizeBtn');
    if (btn) { btn.classList.remove('is-active'); btn.setAttribute('aria-pressed', 'false'); }
  };

  G.mountCustomizer = function () {
    // outside-click closes the popover
    document.addEventListener('mousedown', function (e) {
      if (!_popOpen) return;
      var pop = document.getElementById('mapPopover');
      var btn = document.getElementById('mapCustomizeBtn');
      if (pop && pop.contains(e.target)) return;
      if (btn && (btn === e.target || btn.contains(e.target))) return;
      G.closeCustomizer();
    });
    // Escape closes it (only when nothing higher-priority is open)
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && _popOpen) {
        var ui = PM.state.ui || {};
        if (!ui.settingsOpen && !ui.modalOpen && !ui.bibleOpen) {
          G.closeCustomizer();
          e.stopPropagation();
        }
      }
    });
  };

  // ================================================================= helpers
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
</script>
<script>
/* ===== drawer.js ===== */
/* ============================================================================
 * PatternMap — drawer.js  (PM.drawer)
 * The right-hand Pattern Detail Drawer.
 *
 * Conforms to CONTRACT.md §6.3. Public surface (closed):
 *   PM.drawer.mount open close render renderRefs renderConnections
 *   renderObservations renderSyncStatus addReference addConnection
 *   addObservation confirmDelete
 *
 * Everything else here is a private local. No <style> injection, no parse-time
 * DOM mutation beyond attaching to PM. All wiring happens in PM.drawer.mount(),
 * called by PM.init().
 * ========================================================================== */
(function () {
  'use strict';

  window.PM = window.PM || {};
  PM.drawer = PM.drawer || {};

  /* ----------------------------------------------------------------------- *
   * Private module state
   * ----------------------------------------------------------------------- */
  var root = null;            // #detailDrawer element (cached at mount)
  var mounted = false;        // mount() ran once
  var closePicker = null;     // close fn returned by PM.bible.openPicker, if open
  var obsExpanded = false;    // observation "show all" toggle (per-open session)
  var connectSearchOpen = false; // inline connect-search visible

  /* ----------------------------------------------------------------------- *
   * Small private helpers
   * ----------------------------------------------------------------------- */

  function el() { return root || (root = document.getElementById('detailDrawer')); }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function icon(name) {
    // Defensive: PM.data.iconSvg exists by init time; fall back to ''.
    return (PM.data && typeof PM.data.iconSvg === 'function') ? PM.data.iconSvg(name) : '';
  }

  function catColor(key) {
    return (PM.data && typeof PM.data.categoryColor === 'function')
      ? PM.data.categoryColor(key) : '#fb923c';
  }

  function categoryOf(key) {
    return (PM.data && typeof PM.data.category === 'function')
      ? PM.data.category(key) : { key: 'custom', label: 'Custom', color: '#fb923c', icon: 'star' };
  }

  function fmt(ts, mode) {
    return (typeof PM.fmtDate === 'function') ? PM.fmtDate(ts, mode) : '—';
  }

  function current() {
    var id = PM.state && PM.state.selection;
    if (!id || !PM.data || typeof PM.data.getPattern !== 'function') return null;
    return PM.data.getPattern(id);
  }

  function verseKeyOf(ref) {
    if (PM.bible && typeof PM.bible.verseKey === 'function') return PM.bible.verseKey(ref);
    return (ref.book || '') + ' ' + (ref.chapter || '') + ':' + (ref.verse || '');
  }

  // Resolve verse text synchronously; if missing, kick an async fetch that fills
  // the element in place once resolved. `slot` is the DOM node to fill.
  function fillVerse(ref, slot) {
    var key = verseKeyOf(ref);
    var text = '';
    if (PM.bible && typeof PM.bible.verseText === 'function') {
      try { text = PM.bible.verseText(ref) || ''; } catch (e) { text = ''; }
    }
    if (text) {
      slot.textContent = text;
      slot.classList.remove('is-loading');
      return;
    }
    // Unknown locally → show loading then attempt async fetch (online bonus).
    slot.textContent = 'Loading verse…';
    slot.classList.add('is-loading');
    if (PM.bible && typeof PM.bible.fetchVerse === 'function') {
      Promise.resolve(PM.bible.fetchVerse(ref)).then(function (t) {
        // Only fill if this slot is still in the DOM (drawer may have re-rendered).
        if (!slot.isConnected) return;
        if (t) {
          slot.textContent = t;
          slot.classList.remove('is-loading');
        } else {
          slot.textContent = 'Verse text unavailable offline.';
          slot.classList.remove('is-loading');
          slot.classList.add('is-empty');
        }
      }).catch(function () {
        if (!slot.isConnected) return;
        slot.textContent = 'Verse text unavailable offline.';
        slot.classList.remove('is-loading');
        slot.classList.add('is-empty');
      });
    } else {
      slot.textContent = 'Verse text unavailable.';
      slot.classList.remove('is-loading');
      slot.classList.add('is-empty');
    }
  }

  /* ----------------------------------------------------------------------- *
   * mount() — one-time wiring (CONTRACT §6.3)
   * ----------------------------------------------------------------------- */
  PM.drawer.mount = function () {
    if (mounted) return;
    mounted = true;
    var d = el();
    if (!d) return;

    // Event delegation for everything inside the drawer. Because render() rebuilds
    // innerHTML, we wire ONCE on the stable container and dispatch by data-action.
    d.addEventListener('click', onClick);
    d.addEventListener('keydown', onKeydown, true);
    // blur (focusout) for inline title/description saves.
    d.addEventListener('focusout', onFocusOut, true);
    d.addEventListener('input', onInput);
  };

  /* ----------------------------------------------------------------------- *
   * Delegated event handlers
   * ----------------------------------------------------------------------- */

  function onClick(e) {
    var t = e.target.closest('[data-action]');
    if (!t) return;
    var action = t.getAttribute('data-action');

    switch (action) {
      case 'close':
        PM.drawer.close();
        break;

      case 'add-ref':
        PM.drawer.addReference();
        break;

      case 'remove-ref':
        removeReference(t.getAttribute('data-key'));
        break;

      case 'jump': {
        var id = t.getAttribute('data-id');
        if (id) {
          if (PM.graph && typeof PM.graph.centerOn === 'function') PM.graph.centerOn(id);
          PM.drawer.open(id);
        }
        break;
      }

      case 'remove-connection':
        removeConnection(t.getAttribute('data-edge'));
        break;

      case 'toggle-connect':
        toggleConnectSearch();
        break;

      case 'connect-pick':
        connectTo(t.getAttribute('data-id'));
        break;

      case 'add-obs': {
        var ta = d_query('[data-role="obs-input"]');
        if (ta && ta.value.trim()) {
          PM.drawer.addObservation(ta.value);
          ta.value = '';
        } else if (ta) {
          ta.focus();
        }
        break;
      }

      case 'toggle-obs':
        obsExpanded = !obsExpanded;
        PM.drawer.render();
        break;

      case 'open-obsidian': {
        var p = current();
        if (p) openInObsidian(p);
        break;
      }

      case 'edit-full': {
        var pp = current();
        if (pp && PM.modal && typeof PM.modal.openEdit === 'function') {
          PM.modal.openEdit(pp.id);
        }
        break;
      }

      case 'delete':
        PM.drawer.confirmDelete();
        break;
    }
  }

  function d_query(sel) { var d = el(); return d ? d.querySelector(sel) : null; }

  function onKeydown(e) {
    var t = e.target;
    // Inline title input: Enter commits + blurs (no newline).
    if (t && t.matches && t.matches('[data-role="title-input"]')) {
      if (e.key === 'Enter') {
        e.preventDefault();
        commitTitle(t);
        t.blur();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        var p = current();
        if (p) t.value = p.title;
        t.blur();
      }
      return;
    }
    // Description textarea: Ctrl/Cmd+Enter commits + blurs; Escape reverts.
    if (t && t.matches && t.matches('[data-role="desc-input"]')) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        commitDesc(t);
        t.blur();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        var pd = current();
        if (pd) t.value = pd.description || '';
        t.blur();
      }
      return;
    }
    // Observation textarea: Ctrl/Cmd+Enter adds.
    if (t && t.matches && t.matches('[data-role="obs-input"]')) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        if (t.value.trim()) { PM.drawer.addObservation(t.value); t.value = ''; }
      }
      return;
    }
    // Connect search: Escape closes the inline search.
    if (t && t.matches && t.matches('[data-role="connect-input"]')) {
      if (e.key === 'Escape') {
        e.preventDefault();
        toggleConnectSearch(false);
      }
      return;
    }
  }

  function onFocusOut(e) {
    var t = e.target;
    if (!t || !t.matches) return;
    if (t.matches('[data-role="title-input"]')) commitTitle(t);
    else if (t.matches('[data-role="desc-input"]')) commitDesc(t);
  }

  function onInput(e) {
    var t = e.target;
    if (t && t.matches && t.matches('[data-role="connect-input"]')) {
      renderConnectResults(t.value);
    }
  }

  /* ----------------------------------------------------------------------- *
   * Inline edit commits
   * ----------------------------------------------------------------------- */

  function commitTitle(input) {
    var p = current();
    if (!p) return;
    var val = (input.value || '').trim();
    if (!val) { input.value = p.title; return; }     // title is required & non-empty
    if (val === p.title) return;
    if (PM.data && typeof PM.data.updatePattern === 'function') {
      PM.data.updatePattern(p.id, { title: val });
    }
    if (PM.graph && typeof PM.graph.renderNodes === 'function') PM.graph.renderNodes();
    if (typeof PM.save === 'function') PM.save();
    // Refresh the metadata "modified" line + sync badge without a full rebuild flash.
    PM.drawer.render();
  }

  function commitDesc(input) {
    var p = current();
    if (!p) return;
    var val = input.value || '';
    if (val === (p.description || '')) return;
    if (PM.data && typeof PM.data.updatePattern === 'function') {
      PM.data.updatePattern(p.id, { description: val });
    }
    if (PM.graph && typeof PM.graph.renderNodes === 'function') PM.graph.renderNodes(); // tooltip desc
    if (typeof PM.save === 'function') PM.save();
    PM.drawer.renderSyncStatus(current());
    refreshMeta(current());
  }

  /* ----------------------------------------------------------------------- *
   * open / close / render  (CONTRACT §6.3)
   * ----------------------------------------------------------------------- */

  PM.drawer.open = function (id) {
    if (!id) return;
    // Reset per-pattern view toggles when switching patterns.
    if (!PM.state || PM.state.selection !== id) {
      obsExpanded = false;
      connectSearchOpen = false;
      teardownPicker();
    }
    // Selection is owned by PM.graph.select (single setter, per §9). It will
    // call back into PM.drawer.open — guard against the resulting recursion by
    // checking whether selection already equals id before delegating.
    if (PM.graph && typeof PM.graph.select === 'function'
        && PM.state && PM.state.selection !== id) {
      PM.graph.select(id);  // sets selection, toggles node classes, applies highlight,
                            // and (per its contract) re-opens the drawer — which lands
                            // back here with selection===id, so we proceed to build.
      // If select() already rebuilt + opened, selection is now id; continue to ensure open.
    } else if (PM.state) {
      PM.state.selection = id;
    }

    var d = el();
    if (!d) return;
    if (PM.state && PM.state.ui) PM.state.ui.drawerOpen = true;
    PM.drawer.render();
    d.classList.add('is-open');
    d.setAttribute('aria-hidden', 'false');
  };

  PM.drawer.close = function () {
    var d = el();
    if (d) {
      d.classList.remove('is-open');
      d.setAttribute('aria-hidden', 'true');
    }
    teardownPicker();
    connectSearchOpen = false;
    obsExpanded = false;
    if (PM.state && PM.state.ui) PM.state.ui.drawerOpen = false;
    // Clear selection through the single setter (which also clears node classes
    // + highlight). Guard recursion: select(null) must not call back into open.
    if (PM.graph && typeof PM.graph.select === 'function') {
      PM.graph.select(null);
    } else if (PM.state) {
      PM.state.selection = null;
    }
  };

  PM.drawer.render = function () {
    var d = el();
    if (!d) return;
    // No-op if drawer is closed AND nothing selected (avoid building hidden DOM
    // churn). But if it's open with no selection, show closed/empty gracefully.
    var p = current();

    if (!p) {
      // Nothing selected: if drawer somehow open, render a minimal empty body.
      if (d.classList.contains('is-open')) {
        d.innerHTML = buildEmptyShell();
      }
      return;
    }

    d.innerHTML = buildShell(p);

    // Post-build async fills + section renders that need live DOM.
    PM.drawer.renderRefs(p);
    PM.drawer.renderConnections(p);
    PM.drawer.renderObservations(p);
    PM.drawer.renderSyncStatus(p);

    // Drive the category color bar via the node-color custom prop (consistent w/ graph).
    var bar = d.querySelector('.drawer__catbar');
    if (bar) bar.style.background = catColor(p.category);
  };

  /* ----------------------------------------------------------------------- *
   * Loading-content state (DetailDrawer: "loading content" per SPEC)
   * Exposed for graph/app to show while a pattern's data is being prepared.
   * Public-surface-safe: implemented as a private, but the open() path uses it
   * implicitly. We also render it if open() is called before data is ready.
   * ----------------------------------------------------------------------- */
  function buildLoading() {
    return ''
      + '<button id="drawerCloseBtn" class="drawer__close" type="button" '
      + 'data-action="close" aria-label="Close details">' + icon('close') + '</button>'
      + '<div class="drawer__catbar drawer__catbar--skeleton"></div>'
      + '<div class="drawer__head">'
      +   '<div class="skeleton skeleton--title"></div>'
      +   '<div class="skeleton skeleton--badge"></div>'
      + '</div>'
      + '<div class="drawer__section">'
      +   '<div class="skeleton skeleton--line"></div>'
      +   '<div class="skeleton skeleton--line"></div>'
      +   '<div class="skeleton skeleton--line skeleton--short"></div>'
      + '</div>'
      + '<div class="drawer__section">'
      +   '<div class="skeleton skeleton--block"></div>'
      + '</div>'
      + '<div class="drawer__loading-label">Loading pattern…</div>';
  }

  // Public helper for graph to flip the drawer into loading-content state before
  // data resolves. Kept off the closed public list per §10, so used internally
  // and reachable via open() if a pattern isn't found yet.
  function showLoading() {
    var d = el();
    if (!d) return;
    d.innerHTML = buildLoading();
    d.classList.add('is-open');
    d.setAttribute('aria-hidden', 'false');
  }
  // expose privately on a non-public path so graph.select can optionally use it
  // (not part of §10 closed surface; safe internal extension under PM.drawer._).
  PM.drawer._showLoading = showLoading;

  function buildEmptyShell() {
    return ''
      + '<button id="drawerCloseBtn" class="drawer__close" type="button" '
      + 'data-action="close" aria-label="Close details">' + icon('close') + '</button>'
      + '<div class="drawer__empty">'
      +   '<div class="drawer__empty-icon">' + icon('eye') + '</div>'
      +   '<p>Select a pattern to see its details.</p>'
      + '</div>';
  }

  /* ----------------------------------------------------------------------- *
   * Shell builder — full drawer markup (sections per SPEC §2 + CONTRACT §4.2)
   * ----------------------------------------------------------------------- */
  function buildShell(p) {
    var cat = categoryOf(p.category);
    var refCount = (p.refCount != null)
      ? p.refCount
      : (PM.data && PM.data.edgesOf ? PM.data.edgesOf(p.id).length : 0);

    return ''
      // close
      + '<button id="drawerCloseBtn" class="drawer__close" type="button" '
      + 'data-action="close" aria-label="Close details">' + icon('close') + '</button>'

      // category color bar
      + '<div class="drawer__catbar" style="background:' + esc(cat.color) + '"></div>'

      // ----- HEADER -----
      + '<div class="drawer__head">'
      +   '<input class="drawer__title" data-role="title-input" type="text" '
      +     'value="' + esc(p.title) + '" aria-label="Pattern title" '
      +     'placeholder="Untitled pattern" spellcheck="false" />'
      +   '<span class="drawer__badge" style="--node-color:' + esc(cat.color) + '">'
      +     '<span class="drawer__badge-icon">' + icon(cat.icon) + '</span>'
      +     '<span class="drawer__badge-label">' + esc(cat.label) + '</span>'
      +   '</span>'
      + '</div>'

      // ----- DESCRIPTION -----
      + '<div class="drawer__section">'
      +   '<div class="drawer__section-title">Description</div>'
      +   '<textarea class="drawer__desc" data-role="desc-input" rows="3" '
      +     'placeholder="Describe this pattern… (Ctrl+Enter to save)" '
      +     'spellcheck="true">' + esc(p.description || '') + '</textarea>'
      + '</div>'

      // ----- BIBLE REFERENCES -----
      + '<div class="drawer__section">'
      +   '<div class="drawer__section-title">'
      +     '<span>Bible References</span>'
      +     '<button class="drawer__addbtn" type="button" data-action="add-ref" '
      +       'aria-label="Add reference">' + icon('plus') + '<span>Add Reference</span></button>'
      +   '</div>'
      +   '<div class="drawer__refs" data-role="refs"></div>'
      + '</div>'

      // ----- CONNECTED PATTERNS -----
      + '<div class="drawer__section">'
      +   '<div class="drawer__section-title">'
      +     '<span>Connected Patterns</span>'
      +     '<button class="drawer__addbtn" type="button" data-action="toggle-connect" '
      +       'aria-label="Connect a pattern">' + icon('link') + '<span>Connect</span></button>'
      +   '</div>'
      +   '<div class="drawer__chips" data-role="chips"></div>'
      +   '<div class="drawer__connect" data-role="connect" hidden>'
      +     '<input class="drawer__connect-input" data-role="connect-input" type="text" '
      +       'placeholder="Search patterns to connect…" spellcheck="false" autocomplete="off" />'
      +     '<div class="drawer__connect-results" data-role="connect-results"></div>'
      +   '</div>'
      + '</div>'

      // ----- OBSERVATIONS -----
      + '<div class="drawer__section">'
      +   '<div class="drawer__section-title">Observations</div>'
      +   '<div class="drawer__obs" data-role="obs"></div>'
      +   '<div class="drawer__obs-add">'
      +     '<textarea class="drawer__obs-input" data-role="obs-input" rows="2" '
      +       'placeholder="Add an observation… (Ctrl+Enter)" spellcheck="true"></textarea>'
      +     '<button class="drawer__obs-btn" type="button" data-action="add-obs">'
      +       icon('plus') + '<span>Add</span></button>'
      +   '</div>'
      + '</div>'

      // ----- OBSIDIAN SYNC -----
      + '<div class="drawer__section drawer__sync" data-role="sync"></div>'

      // ----- METADATA -----
      + '<div class="drawer__section">'
      +   '<div class="drawer__section-title">Metadata</div>'
      +   '<dl class="drawer__meta" data-role="meta">'
      +     metaRows(p, refCount)
      +   '</dl>'
      + '</div>'

      // ----- FOOTER -----
      + '<div class="drawer__footer">'
      +   '<button class="drawer__foot-btn drawer__foot-btn--edit" type="button" '
      +     'data-action="edit-full">' + icon('edit') + '<span>Edit full page</span></button>'
      +   '<button class="drawer__foot-btn drawer__foot-btn--del" type="button" '
      +     'data-action="delete">' + icon('trash') + '<span>Delete pattern</span></button>'
      + '</div>';
  }

  function metaRows(p, refCount) {
    // SPEC §Screens/2 metadata: date created, date modified, times referenced.
    // "Times referenced" = how often this pattern is cited/linked (its edge count).
    return ''
      + '<div class="drawer__meta-row"><dt>Created</dt><dd>' + esc(fmt(p.created, 'date')) + '</dd></div>'
      + '<div class="drawer__meta-row"><dt>Modified</dt><dd>' + esc(fmt(p.modified, 'rel')) + '</dd></div>'
      + '<div class="drawer__meta-row"><dt>Times referenced</dt><dd>' + esc(String(refCount)) + '</dd></div>'
      + '<div class="drawer__meta-row"><dt>Verse references</dt><dd>' + esc(String((p.refs || []).length)) + '</dd></div>';
  }

  function refreshMeta(p) {
    if (!p) return;
    var slot = d_query('[data-role="meta"]');
    if (!slot) return;
    var refCount = (p.refCount != null)
      ? p.refCount
      : (PM.data && PM.data.edgesOf ? PM.data.edgesOf(p.id).length : 0);
    slot.innerHTML = metaRows(p, refCount);
  }

  /* ----------------------------------------------------------------------- *
   * renderRefs — Bible references list with inline verse text
   * ----------------------------------------------------------------------- */
  PM.drawer.renderRefs = function (pattern) {
    var p = pattern || current();
    if (!p) return;
    var host = d_query('[data-role="refs"]');
    if (!host) return;
    host.innerHTML = '';

    var refs = p.refs || [];
    if (!refs.length) {
      var empty = document.createElement('div');
      empty.className = 'drawer__refs-empty';
      empty.textContent = 'No references yet.';
      host.appendChild(empty);
      return;
    }

    refs.forEach(function (ref) {
      var key = verseKeyOf(ref);
      var row = document.createElement('div');
      row.className = 'drawer__ref';

      var head = document.createElement('div');
      head.className = 'drawer__ref-head';

      var label = document.createElement('span');
      label.className = 'drawer__ref-cite';
      label.textContent = key;
      head.appendChild(label);

      var rm = document.createElement('button');
      rm.className = 'drawer__ref-remove';
      rm.type = 'button';
      rm.setAttribute('data-action', 'remove-ref');
      rm.setAttribute('data-key', key);
      rm.setAttribute('aria-label', 'Remove ' + key);
      rm.innerHTML = icon('close');
      head.appendChild(rm);

      row.appendChild(head);

      var text = document.createElement('blockquote');
      text.className = 'drawer__ref-text';
      row.appendChild(text);
      fillVerse(ref, text);   // sync fill or async-fill-in-place

      host.appendChild(row);
    });
  };

  /* ----------------------------------------------------------------------- *
   * renderConnections — connected-pattern chips
   * ----------------------------------------------------------------------- */
  PM.drawer.renderConnections = function (pattern) {
    var p = pattern || current();
    if (!p) return;
    var host = d_query('[data-role="chips"]');
    if (!host) return;
    host.innerHTML = '';

    var neighbors = (PM.data && typeof PM.data.neighborsOf === 'function')
      ? PM.data.neighborsOf(p.id) : [];

    if (!neighbors.length) {
      var empty = document.createElement('div');
      empty.className = 'drawer__chips-empty';
      empty.textContent = 'Not connected to anything yet.';
      host.appendChild(empty);
    } else {
      // Map neighbor id -> the edge that connects it (for removal + label).
      var edges = (PM.data && typeof PM.data.edgesOf === 'function') ? PM.data.edgesOf(p.id) : [];
      var edgeByNeighbor = {};
      edges.forEach(function (e) {
        var other = e.from === p.id ? e.to : e.from;
        if (!edgeByNeighbor[other]) edgeByNeighbor[other] = e;
      });

      neighbors.forEach(function (n) {
        var e = edgeByNeighbor[n.id];
        var chip = document.createElement('span');
        chip.className = 'drawer__chip';
        chip.style.setProperty('--node-color', catColor(n.category));

        var jump = document.createElement('button');
        jump.className = 'drawer__chip-jump';
        jump.type = 'button';
        jump.setAttribute('data-action', 'jump');
        jump.setAttribute('data-id', n.id);
        jump.setAttribute('title', 'Jump to ' + n.title);

        var dot = document.createElement('span');
        dot.className = 'drawer__chip-dot';
        jump.appendChild(dot);

        var lbl = document.createElement('span');
        lbl.className = 'drawer__chip-label';
        lbl.textContent = n.title;
        jump.appendChild(lbl);

        if (e && e.label) {
          var rel = document.createElement('span');
          rel.className = 'drawer__chip-rel';
          // Direction-aware caption.
          rel.textContent = (e.from === p.id) ? ('→ ' + e.label) : (e.label + ' →');
          jump.appendChild(rel);
        }

        chip.appendChild(jump);

        if (e) {
          var rm = document.createElement('button');
          rm.className = 'drawer__chip-remove';
          rm.type = 'button';
          rm.setAttribute('data-action', 'remove-connection');
          rm.setAttribute('data-edge', e.id);
          rm.setAttribute('aria-label', 'Disconnect ' + n.title);
          rm.innerHTML = icon('close');
          chip.appendChild(rm);
        }

        host.appendChild(chip);
      });
    }

    // Reflect connect-search open state.
    var box = d_query('[data-role="connect"]');
    if (box) box.hidden = !connectSearchOpen;
  };

  /* ----------------------------------------------------------------------- *
   * renderObservations — last 3 (newest first) + expand toggle + add
   * ----------------------------------------------------------------------- */
  PM.drawer.renderObservations = function (pattern) {
    var p = pattern || current();
    if (!p) return;
    var host = d_query('[data-role="obs"]');
    if (!host) return;
    host.innerHTML = '';

    var all = (p.observations || []).slice();   // stored newest-LAST
    if (!all.length) {
      var empty = document.createElement('div');
      empty.className = 'drawer__obs-empty';
      empty.textContent = 'No observations yet.';
      host.appendChild(empty);
      return;
    }

    // newest first for display
    var ordered = all.slice().reverse();
    var shown = obsExpanded ? ordered : ordered.slice(0, 3);

    shown.forEach(function (o) {
      var item = document.createElement('div');
      item.className = 'drawer__obs-item';

      var ts = document.createElement('div');
      ts.className = 'drawer__obs-ts';
      ts.textContent = fmt(o.ts, 'rel');
      ts.title = fmt(o.ts, 'datetime');
      item.appendChild(ts);

      var body = document.createElement('div');
      body.className = 'drawer__obs-text';
      body.textContent = o.text || '';
      item.appendChild(body);

      host.appendChild(item);
    });

    if (ordered.length > 3) {
      var toggle = document.createElement('button');
      toggle.className = 'drawer__obs-toggle';
      toggle.type = 'button';
      toggle.setAttribute('data-action', 'toggle-obs');
      toggle.textContent = obsExpanded
        ? 'Show less'
        : ('Show all ' + ordered.length + ' observations');
      host.appendChild(toggle);
    }
  };

  /* ----------------------------------------------------------------------- *
   * renderSyncStatus — per-pattern Obsidian sync block
   * ----------------------------------------------------------------------- */
  PM.drawer.renderSyncStatus = function (pattern) {
    var p = pattern || current();
    if (!p) return;
    var host = d_query('[data-role="sync"]');
    if (!host) return;

    var status = 'pending';
    if (PM.sync && typeof PM.sync.statusOf === 'function') {
      try { status = PM.sync.statusOf(p) || 'pending'; } catch (e) { status = 'pending'; }
    } else {
      status = p.synced ? 'synced' : 'pending';
    }

    var pillLabel = ({ synced: 'Synced', pending: 'Pending', error: 'Error' })[status] || status;

    host.innerHTML = ''
      + '<div class="drawer__section-title">Obsidian Sync</div>'
      + '<div class="drawer__sync-row">'
      +   '<span class="drawer__sync-pill drawer__sync-pill--' + esc(status) + '">'
      +     '<span class="drawer__sync-dot"></span>' + esc(pillLabel)
      +   '</span>'
      +   '<button class="drawer__sync-open" type="button" data-action="open-obsidian" '
      +     'title="Open this note in Obsidian">' + icon('external') + '<span>Open in Obsidian</span></button>'
      + '</div>'
      + '<div class="drawer__sync-path">' + esc(p.obsidianPath || '—') + '</div>';
  };

  /* ----------------------------------------------------------------------- *
   * addReference — open verse picker; on pick, push Ref onto pattern
   * ----------------------------------------------------------------------- */
  PM.drawer.addReference = function () {
    var p = current();
    if (!p) return;

    if (!PM.bible || typeof PM.bible.openPicker !== 'function') {
      if (typeof PM.toast === 'function') PM.toast('Verse picker unavailable.', 'error');
      return;
    }

    teardownPicker();
    closePicker = PM.bible.openPicker(function (ref) {
      if (!ref) return;
      var live = current();
      if (!live || live.id !== p.id) return;   // selection changed mid-pick

      var key = verseKeyOf(ref);
      var refs = (live.refs || []).slice();
      var dup = refs.some(function (r) { return verseKeyOf(r) === key; });
      if (dup) {
        if (typeof PM.toast === 'function') PM.toast(key + ' is already linked.', 'info');
        return;
      }
      refs.push({ book: ref.book, chapter: ref.chapter, verse: ref.verse });

      if (PM.data && typeof PM.data.updatePattern === 'function') {
        PM.data.updatePattern(live.id, { refs: refs });
      }
      if (typeof PM.save === 'function') PM.save();
      if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();

      PM.drawer.renderRefs(current());
      refreshMeta(current());
      PM.drawer.renderSyncStatus(current());
      if (typeof PM.toast === 'function') PM.toast('Added ' + key, 'success');
    });
  };

  function removeReference(key) {
    var p = current();
    if (!p || !key) return;
    var refs = (p.refs || []).filter(function (r) { return verseKeyOf(r) !== key; });
    if (refs.length === (p.refs || []).length) return;
    if (PM.data && typeof PM.data.updatePattern === 'function') {
      PM.data.updatePattern(p.id, { refs: refs });
    }
    if (typeof PM.save === 'function') PM.save();
    if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();
    PM.drawer.renderRefs(current());
    refreshMeta(current());
    PM.drawer.renderSyncStatus(current());
  }

  function teardownPicker() {
    if (typeof closePicker === 'function') {
      try { closePicker(); } catch (e) {}
    }
    closePicker = null;
  }

  /* ----------------------------------------------------------------------- *
   * Connect: inline pattern search → addEdge
   * ----------------------------------------------------------------------- */
  function toggleConnectSearch(force) {
    connectSearchOpen = (force === undefined) ? !connectSearchOpen : !!force;
    var box = d_query('[data-role="connect"]');
    if (box) box.hidden = !connectSearchOpen;
    if (connectSearchOpen) {
      var input = d_query('[data-role="connect-input"]');
      if (input) { input.value = ''; input.focus(); renderConnectResults(''); }
    }
  }

  function renderConnectResults(query) {
    var p = current();
    var host = d_query('[data-role="connect-results"]');
    if (!p || !host) return;
    host.innerHTML = '';

    var q = (query || '').trim().toLowerCase();
    var all = (PM.state && PM.state.patterns) ? PM.state.patterns : [];

    // Already-connected neighbor ids (exclude from results).
    var connected = {};
    var neighbors = (PM.data && typeof PM.data.neighborsOf === 'function')
      ? PM.data.neighborsOf(p.id) : [];
    neighbors.forEach(function (n) { connected[n.id] = true; });

    var matches = all.filter(function (cand) {
      if (cand.id === p.id) return false;        // no self-connect
      if (connected[cand.id]) return false;       // already linked
      if (!q) return true;
      return (cand.title || '').toLowerCase().indexOf(q) !== -1;
    }).slice(0, 8);

    if (!matches.length) {
      var none = document.createElement('div');
      none.className = 'drawer__connect-none';
      none.textContent = q ? 'No matching patterns.' : 'Nothing left to connect.';
      host.appendChild(none);
      return;
    }

    matches.forEach(function (cand) {
      var r = document.createElement('button');
      r.className = 'drawer__connect-result';
      r.type = 'button';
      r.setAttribute('data-action', 'connect-pick');
      r.setAttribute('data-id', cand.id);

      var dot = document.createElement('span');
      dot.className = 'drawer__connect-dot';
      dot.style.background = catColor(cand.category);
      r.appendChild(dot);

      var label = document.createElement('span');
      label.className = 'drawer__connect-label';
      label.textContent = cand.title;
      r.appendChild(label);

      host.appendChild(r);
    });
  }

  function connectTo(id) {
    var p = current();
    if (!p || !id || id === p.id) return;
    if (PM.data && typeof PM.data.addEdge === 'function') {
      PM.data.addEdge({ from: p.id, to: id, label: '', strength: 0.6 });
    }
    if (typeof PM.save === 'function') PM.save();
    if (PM.graph && typeof PM.graph.render === 'function') PM.graph.render();

    connectSearchOpen = false;
    PM.drawer.renderConnections(current());
    refreshMeta(current());
    var target = PM.data && PM.data.getPattern ? PM.data.getPattern(id) : null;
    if (typeof PM.toast === 'function') {

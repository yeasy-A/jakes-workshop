<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f0e6d6" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Spinner" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Jake&#39;s Workshop" />
<meta property="og:title" content="Decision Spinner" />
<meta property="og:description" content="Type in options, spin the wheel, and let it pick." />
<meta property="og:image" content="og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />

<meta name="twitter:description" content="Type in options, spin the wheel, and let it pick." />

<title>Decision Spinner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#f0e6d6;--paper-2:#fbf5ea;--card:#fffaf1;--ink:#231d16;--ink-soft:#6c6052;--line:#d8c9b3;--accent:#ec5a23;--accent-d:#c8461a;--shadow:0 12px 30px -16px rgba(60,40,20,.55);--card-shadow:0 1px 2px rgba(60,40,20,.06),0 8px 24px -8px rgba(60,40,20,.14)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 1px 1px,rgba(120,90,50,.10) 1px,transparent 0) 0 0/22px 22px,radial-gradient(ellipse 80% 55% at 50% 18%,rgba(236,140,60,.13) 0%,transparent 65%),linear-gradient(160deg,var(--paper),#e7dac6);background-attachment:fixed;min-height:100%;-webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;padding:16px 18px calc(30px + env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .home{border:1px solid var(--line);background:var(--paper-2);width:44px;height:44px;border-radius:12px;display:grid;place-items:center;text-decoration:none;font-size:18px;color:var(--ink);flex-shrink:0;transition:background .12s,box-shadow .12s}
  .home:hover{background:var(--card);box-shadow:0 2px 8px rgba(60,40,20,.1)}
  header h1{font-size:21px;margin:0;letter-spacing:-.5px;font-weight:700}
  .wheelwrap{position:relative;width:100%;max-width:380px;margin:10px auto 8px;aspect-ratio:1}
  #wheel{width:100%;height:100%;display:block;cursor:pointer;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.9),0 0 0 5px var(--line),0 10px 32px -6px rgba(60,40,20,.22)}
  .pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:30px;z-index:2;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
  .hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:58px;height:58px;border-radius:50%;background:var(--card);border:3px solid var(--accent);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--accent);cursor:pointer;z-index:2;box-shadow:0 3px 0 var(--accent-d),0 2px 10px rgba(236,90,35,.22);transition:transform .06s,box-shadow .06s}
  .hub:active{transform:translate(-50%,calc(-50% + 2px));box-shadow:0 1px 0 var(--accent-d),0 1px 4px rgba(236,90,35,.12)}
  .winner{text-align:center;font-size:22px;font-weight:700;margin:8px 0 4px;letter-spacing:-.3px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-height:52px;box-shadow:0 1px 2px rgba(60,40,20,.05);line-height:1.3}
  .winner b{color:var(--accent)}
  .hist{text-align:center;font-size:12.5px;color:var(--ink-soft);min-height:17px;margin-top:2px;padding:2px 8px}
  .spinbtn{width:100%;border:0;border-radius:16px;background:var(--accent);color:#fff;font:inherit;font-weight:700;font-size:20px;padding:17px;cursor:pointer;box-shadow:0 7px 0 var(--accent-d),var(--shadow);transition:transform .06s,box-shadow .06s,background .1s;margin-top:8px}
  .spinbtn:hover:not(:disabled){background:#f0642d}
  .spinbtn:active{transform:translateY(4px);box-shadow:0 3px 0 var(--accent-d)}
  .spinbtn:disabled{opacity:.6;cursor:default}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--card-shadow);padding:14px;margin-top:16px}
  .row{display:flex;gap:8px;margin-bottom:10px}
  .row input{flex:1;font:inherit;font-size:16px;padding:13px;border-radius:12px;border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink);min-height:44px;transition:border-color .12s,box-shadow .12s}
  .row input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(236,90,35,.12)}
  .row button{border:0;background:var(--ink);color:var(--paper-2);border-radius:12px;padding:0 18px;font:inherit;font-weight:700;font-size:20px;cursor:pointer;min-height:44px;min-width:44px;transition:background .12s,transform .06s}
  .row button:hover{background:#3d342b}
  .row button:active{transform:translateY(1px)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;min-height:28px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:7px 8px 7px 13px;font-size:14px;font-weight:600;box-shadow:0 1px 3px rgba(60,40,20,.07);animation:chipIn .15s ease-out both;transition:box-shadow .12s}
  .chip:hover{box-shadow:0 2px 6px rgba(60,40,20,.13)}
  .chip .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .chip button{border:0;background:transparent;color:var(--ink-soft);font-size:15px;cursor:pointer;line-height:1;min-width:28px;min-height:28px;display:grid;place-items:center;border-radius:50%;transition:color .1s,background .1s}
  .chip button:hover{color:var(--accent);background:rgba(236,90,35,.1)}
  @keyframes chipIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
  #chips>span:not(.chip){color:var(--ink-soft);font-size:13px;font-style:italic;padding:6px 4px;display:block;text-align:center;width:100%}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .tools button{flex:1;min-width:90px;border:1.5px solid var(--line);background:var(--paper-2);border-radius:12px;padding:11px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);min-height:44px;transition:background .12s,box-shadow .12s,transform .06s}
  .tools button:hover{background:var(--paper);box-shadow:0 2px 8px rgba(60,40,20,.09)}
  .tools button:active{transform:translateY(1px)}
  .opt{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:14px;color:var(--ink-soft);gap:12px}
  .switch{position:relative;width:46px;height:26px;background:var(--line);border-radius:99px;cursor:pointer;transition:background .2s;flex-shrink:0;box-shadow:inset 0 1px 3px rgba(0,0,0,.18)}
  .switch.on{background:var(--accent);box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.22);transition:left .2s}
  .switch.on::after{left:23px}
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .presets button{border:1px solid var(--line);background:var(--paper-2);border-radius:999px;padding:8px 14px;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);min-height:36px;transition:background .12s,border-color .12s,color .12s,transform .06s}
  .presets button:hover{background:var(--paper);border-color:var(--accent);color:var(--ink)}
  .presets button:active{transform:translateY(1px)}
  .saved{display:flex;gap:8px;margin-top:10px}
  .saved select{flex:1;min-width:0;font:inherit;font-size:13px;padding:10px;border-radius:11px;border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink);min-height:44px;transition:border-color .12s}
  .saved select:focus{outline:none;border-color:var(--accent)}
  .saved button{border:1.5px solid var(--line);background:var(--paper-2);border-radius:11px;padding:0 14px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);min-height:44px;transition:background .12s,box-shadow .12s,transform .06s}
  .saved button:hover{background:var(--paper);box-shadow:0 2px 6px rgba(60,40,20,.09)}
  .saved button:active{transform:translateY(1px)}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:60}
  button:focus-visible,input:focus-visible,select:focus-visible,a:focus-visible{outline:2.5px solid var(--accent);outline-offset:2px}
  .workshop-footer{text-align:center;font-size:12px;color:var(--ink-soft);opacity:.5;margin-top:28px;padding-bottom:calc(4px + env(safe-area-inset-bottom));letter-spacing:.03em}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="wrap">
  <header><a class="home" href="../" title="All apps">🏠</a><h1>🎡 Decision Spinner</h1></header>
  <div class="wheelwrap">
    <div class="pointer">🔻</div>
    <canvas id="wheel" width="600" height="600"></canvas>
    <div class="hub" id="hub">SPIN</div>
  </div>
  <div class="winner" id="winner">Add some options and spin!</div>
  <div class="hist" id="hist"></div>
  <button class="spinbtn" id="spinBtn">Spin the wheel</button>

  <div class="card">
    <div class="row">
      <input id="optInput" placeholder="Add an option…" maxlength="28" autocomplete="off"/>
      <button id="addBtn">＋</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="presets" id="presets">
      <button data-p="yesno">Yes / No</button>
      <button data-p="dinner">Dinner ideas</button>
      <button data-p="chores">Chores</button>
      <button data-p="1to6">1–6</button>
    </div>
    <div class="saved">
      <select id="loadSel"><option value="">📂 Load a saved list…</option></select>
      <button id="saveBtn">💾 Save</button>
      <button id="delBtn">🗑</button>
    </div>
    <div class="tools">
      <button id="shuffleBtn">🔀 Shuffle</button>
      <button id="clearBtn">🗑 Clear all</button>
    </div>
    <div class="opt">
      <span>Remove the winner after each spin</span>
      <div class="switch" id="removeSw"></div>
    </div>
  </div>
  <p class="workshop-footer">🧰 Jake's Workshop</p>
</div>
<canvas id="confetti"></canvas>
<script>
const $=s=>document.querySelector(s);
const COLORS=["#ec5a23","#2f6db0","#3f9d52","#e0a429","#8e5cd1","#d6457e","#28a0a0","#e07b39","#5b8c3a","#b0476f"];
const PRESETS={yesno:["Yes","No"],dinner:["Pizza","Tacos","Burgers","Pasta","Chinese","Breakfast"],chores:["Dishes","Trash","Laundry","Vacuum","Bathroom","Dinner"],"1to6":["1","2","3","4","5","6"]};
let S={opts:["Pizza","Tacos","Sushi","Burgers","Salad","Surprise!"],remove:false};
try{const s=JSON.parse(localStorage.getItem("spinner")||"null"); if(s&&Array.isArray(s.opts)) S=s;}catch(e){}
function save(){try{localStorage.setItem("spinner",JSON.stringify(S))}catch(e){}}

const cv=$("#wheel"), cx=cv.getContext("2d"); const R=300;
let angle=0, spinning=false;
function draw(){
  cx.clearRect(0,0,600,600); const n=S.opts.length;
  cx.save(); cx.translate(R,R); cx.rotate(angle);
  if(n===0){ cx.beginPath(); cx.arc(0,0,R-6,0,Math.PI*2); cx.fillStyle="#e7dac6"; cx.fill(); cx.restore(); return; }
  const seg=Math.PI*2/n;
  for(let i=0;i<n;i++){
    const a0=i*seg, a1=a0+seg;
    cx.beginPath(); cx.moveTo(0,0); cx.arc(0,0,R-6,a0,a1); cx.closePath();
    cx.fillStyle=COLORS[i%COLORS.length]; cx.fill();
    cx.strokeStyle="rgba(255,255,255,.45)"; cx.lineWidth=2; cx.stroke();
    // label
    cx.save(); cx.rotate(a0+seg/2); cx.textAlign="right"; cx.fillStyle="#fff"; cx.font="600 "+Math.max(15,Math.min(30,360/n))+"px 'Space Grotesk',sans-serif";
    let t=S.opts[i]; if(t.length>14)t=t.slice(0,13)+"…"; cx.fillText(t, R-26, 7); cx.restore();
  }
  cx.restore();
  cx.beginPath(); cx.arc(R,R,R-6,0,Math.PI*2); cx.strokeStyle="rgba(60,40,20,.25)"; cx.lineWidth=6; cx.stroke();
}
function renderChips(){
  $("#chips").innerHTML=S.opts.map((o,i)=>`<span class="chip"><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>${esc(o)}<button data-i="${i}">✕</button></span>`).join("")||`<span style="color:var(--ink-soft);font-size:13px">No options yet — add some above.</span>`;
  document.querySelectorAll("#chips .chip button").forEach(b=>b.onclick=()=>{S.opts.splice(+b.dataset.i,1);save();renderChips();draw();});
  $("#removeSw").classList.toggle("on",S.remove);
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function add(){const v=$("#optInput").value.trim();if(!v)return;S.opts.push(v);$("#optInput").value="";save();renderChips();draw();$("#optInput").focus();}
$("#addBtn").onclick=add;
$("#optInput").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();add();}});
document.querySelectorAll("#presets button").forEach(b=>b.onclick=()=>{S.opts=[...PRESETS[b.dataset.p]];save();renderChips();draw();$("#winner").textContent="Ready — give it a spin!";});
$("#shuffleBtn").onclick=()=>{for(let i=S.opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[S.opts[i],S.opts[j]]=[S.opts[j],S.opts[i]];}save();renderChips();draw();};
$("#clearBtn").onclick=()=>{if(S.opts.length&&!confirm("Clear all options?"))return;S.opts=[];save();renderChips();draw();$("#winner").textContent="Add some options and spin!";};
$("#removeSw").onclick=()=>{S.remove=!S.remove;save();renderChips();};

function spin(){
  if(spinning) return; const n=S.opts.length;
  if(n<2){ $("#winner").textContent="Add at least 2 options first."; return; }
  spinning=true; $("#spinBtn").disabled=true; $("#winner").textContent="…";
  const seg=Math.PI*2/n;
  const winIdx=Math.floor(Math.random()*n);
  // we want winIdx's center to land under the top pointer (-90deg => 270deg => -PI/2)
  const target = (Math.PI*2*6) + (-Math.PI/2 - (winIdx*seg+seg/2));
  const start=angle, dist=target-(start%(Math.PI*2)); const dur=4200; const t0=performance.now();
  (function frame(now){
    const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    angle=start+dist*e; draw();
    if(p<1) requestAnimationFrame(frame);
    else { angle=target%(Math.PI*2); draw(); spinning=false; $("#spinBtn").disabled=false; landed(winIdx); }
  })(t0);
}
function landed(i){
  const w=S.opts[i]; $("#winner").innerHTML=`👑 <b>${esc(w)}</b>`; confetti(); beep(); pushHist(w);
  if(S.remove){ setTimeout(()=>{ S.opts.splice(i,1); save(); renderChips(); draw(); },1200); }
}

/* saved lists */
let LISTS={}; try{LISTS=JSON.parse(localStorage.getItem("spinner_lists")||"{}")}catch(e){}
function saveLists(){try{localStorage.setItem("spinner_lists",JSON.stringify(LISTS))}catch(e){}}
function renderLists(){const names=Object.keys(LISTS);$("#loadSel").innerHTML='<option value="">📂 Load a saved list…</option>'+names.map(n=>`<option value="${esc(n)}">${esc(n)} (${LISTS[n].length})</option>`).join("");}
$("#saveBtn").onclick=()=>{if(S.opts.length<2){alert("Add at least 2 options first.");return;}const n=(prompt("Name this list:")||"").trim();if(!n)return;LISTS[n]=[...S.opts];saveLists();renderLists();$("#loadSel").value=n;};
$("#loadSel").onchange=()=>{const n=$("#loadSel").value;if(n&&LISTS[n]){S.opts=[...LISTS[n]];save();renderChips();draw();$("#winner").textContent="Loaded “"+n+"” — give it a spin!";}};
$("#delBtn").onclick=()=>{const n=$("#loadSel").value;if(!n){alert("Pick a saved list to delete.");return;}if(confirm("Delete “"+n+"”?")){delete LISTS[n];saveLists();renderLists();}};

/* recent winners */
let HIST=[];
function pushHist(w){HIST.unshift(w);if(HIST.length>6)HIST.pop();$("#hist").innerHTML=HIST.length?"Recent: "+HIST.map(esc).join("  ·  "):"";}
$("#spinBtn").onclick=spin; $("#hub").onclick=spin; cv.onclick=spin;

/* sound + confetti */
let _ac=null;
function beep(){try{const ac=_ac||(_ac=new(window.AudioContext||window.webkitAudioContext)());const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=720;o.type="triangle";g.gain.setValueAtTime(.14,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.35);o.start();o.stop(ac.currentTime+.35);}catch(e){}}
const ccv=$("#confetti"),ccx=ccv.getContext("2d");
function sz(){ccv.width=innerWidth;ccv.height=innerHeight}sz();addEventListener("resize",sz);
function confetti(){const N=130,P=[];for(let i=0;i<N;i++)P.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*0.3,vx:(Math.random()-.5)*10,vy:-(6+Math.random()*9),g:.3,s:5+Math.random()*7,c:COLORS[i%COLORS.length],r:Math.random()*6,vr:(Math.random()-.5)*.4});let f=0;(function run(){ccx.clearRect(0,0,ccv.width,ccv.height);f++;P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;ccx.save();ccx.translate(p.x,p.y);ccx.rotate(p.r);ccx.fillStyle=p.c;ccx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.4);ccx.restore();});if(f<150)requestAnimationFrame(run);else ccx.clearRect(0,0,ccv.width,ccv.height);})();}

renderChips(); draw(); renderLists();
</script>
</body>
</html>
